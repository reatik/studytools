<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>递等式巧算练习</title>
    <style>
        :root {
            --primary: #4A6CF7;
            --primary-light: #6B8AFF;
            --bg: #f0f2f5;
            --card-bg: #fff;
            --text: #1a1a2e;
            --text-secondary: #8e8e93;
            --border: #e0e4ea;
            --answer-green: #1a7a3a;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== 顶部栏 ===== */
        .header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .header h1 { font-size: 19px; color: var(--primary); font-weight: 700; white-space: nowrap; }
        .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .select-box {
            padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 14px; font-family: inherit; background: #fff; cursor: pointer;
            outline: none; min-width: 94px;
        }
        .select-box:focus { border-color: var(--primary); }
        .btn {
            padding: 8px 18px; border: none; border-radius: 8px; font-size: 14px;
            cursor: pointer; font-weight: 500; transition: all 0.2s;
            font-family: inherit; white-space: nowrap;
        }
        .btn-gen { background: var(--primary); color: #fff; }
        .btn-gen:hover { background: var(--primary-light); }
        .btn-preview { background: #fff; border: 1.5px solid #f59e0b; color: #f59e0b; }
        .btn-preview:hover { background: #fff8eb; }
        .btn-outline {
            background: transparent; border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
        .tip-text { font-size: 12px; color: #f59e0b; display: none; }
        .print-icon-btn {
            width: 34px; height: 34px; cursor: pointer; border: none; background: none;
            border-radius: 6px; padding: 4px; transition: all 0.2s; display: none;
        }
        .print-icon-btn:hover { background: #fef3c7; transform: scale(1.08); }
        .print-icon-btn img { width: 100%; height: 100%; object-fit: contain; }

        /* ===== 布局 ===== */
        .main-layout {
            display: flex;
            min-height: calc(100vh - 58px);
        }
        .content-area {
            flex: 1; padding: 20px; max-width: 1000px; margin: 0 auto; width: 100%;
        }

        /* ===== 卷子 ===== */
        .paper {
            background: #fff; border: 1px solid #ddd; padding: 36px 40px 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .paper-top {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #333;
        }
        .paper-title {
            font-size: 22px; font-weight: 700; letter-spacing: 3px; margin-bottom: 8px;
        }
        .paper-meta {
            font-size: 14px; color: #555;
            display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
        }
        .paper-meta .blank {
            display: inline-block; border-bottom: 1px solid #333; min-width: 48px;
            text-align: center; margin: 0 2px;
        }
        .paper-meta .auto-date { color: var(--text); font-weight: 500; }

        /* ===== 题目两列 ===== */
        .q-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 24px;
        }
        .q-item {
            padding: 8px 0;
            page-break-inside: avoid;
        }
        .q-item-header {
            display: flex; align-items: baseline; gap: 4px;
        }
        .q-item-header .q-index { font-weight: 700; font-size: 15px; min-width: 22px; }
        .q-item-header .q-expr {
            font-size: 17px; font-weight: 600;
            font-family: 'Consolas', 'Courier New', 'KaiTi', 'SimSun', monospace;
            letter-spacing: 1px;
        }

        /* 答案区 - 纯深绿色字，无装饰 */
        .q-item .q-answer {
            display: none;
            margin-top: 4px; margin-left: 26px;
            font-family: 'Consolas', 'Courier New', 'KaiTi', 'SimSun', monospace;
            font-size: 14px; line-height: 1.7;
            color: var(--answer-green);
        }
        .q-item .q-answer.show { display: block; }
        .q-item .q-answer .step { color: var(--answer-green); }
        .q-item .q-answer .step:last-child { font-weight: 700; }

        .q-toggle-btn {
            margin-left: 26px; margin-top: 2px;
            background: none; border: 1px solid #ddd; border-radius: 4px;
            padding: 1px 8px; font-size: 11px; cursor: pointer; color: #aaa;
            font-family: inherit; transition: all 0.15s;
        }
        .q-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
        .q-toggle-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 操作按钮行 */
        .paper-actions {
            text-align: right; margin-bottom: 10px; display: flex; justify-content: flex-end;
            gap: 8px;
        }
        .btn-show-answers {
            background: #fff; border: 1.5px solid var(--answer-green); color: var(--answer-green);
            font-size: 13px; padding: 6px 16px; border-radius: 6px;
            cursor: pointer; font-family: inherit; transition: all 0.15s;
        }
        .btn-show-answers:hover { background: #f0fdf4; }

        .paper-footer {
            margin-top: 16px; text-align: right; font-size: 12px; color: #bbb;
            border-top: 1px solid #eee; padding-top: 8px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        /* ===== 预览浮层 ===== */
        .preview-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999;
            justify-content: center; align-items: flex-start;
            overflow-y: auto; padding: 30px 16px;
        }
        .preview-overlay.show { display: flex; }
        .preview-box {
            background: #f5f5f7;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 210mm; /* A4 宽 */
            min-height: 200px;
            position: relative;
            flex-shrink: 0;
        }
        .preview-close {
            position: sticky; top: 10px; float: right; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5);
            color: #fff; border: none; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-right: 8px; margin-top: 8px;
        }
        .preview-close:hover { background: rgba(0,0,0,0.7); }
        .preview-box .paper {
            margin: 0;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .preview-box .paper-actions { display: none !important; }
        .preview-box .q-toggle-btn { display: none !important; }
        .preview-box .q-answer { display: none !important; }
        .preview-box .paper-footer { display: none; }

        /* ===== 历史面板 ===== */
        .history-panel {
            width: 320px; background: var(--card-bg); border-left: 1px solid var(--border);
            padding: 16px; overflow-y: auto; max-height: calc(100vh - 58px);
            position: sticky; top: 58px; flex-shrink: 0;
        }
        .history-panel h3 {
            font-size: 14px; margin-bottom: 12px; color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
        }
        .history-list { display: flex; flex-direction: column; gap: 6px; }
        .history-item {
            border: 1px solid var(--border);
            border-radius: 8px; transition: all 0.2s; font-size: 13px;
            overflow: hidden;
        }
        .history-item-header {
            padding: 10px 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            user-select: none;
        }
        .history-item-header:hover { background: #f8faff; }
        .history-item-header .hi-date { font-weight: 600; }
        .history-item-header .hi-meta { color: var(--text-secondary); font-size: 11px; }
        .history-item-header .hi-arrow {
            font-size: 11px; color: #aaa; transition: transform 0.2s;
        }
        .history-item.expanded .hi-arrow { transform: rotate(180deg); }
        .history-item .hi-body {
            display: none;
            padding: 0 12px 12px;
            border-top: 1px solid #f0f0f0;
            max-height: 350px;
            overflow-y: auto;
        }
        .history-item.expanded .hi-body { display: block; }

        /* 历史内嵌卷子 */
        .hi-paper {
            background: #fff; border: 1px solid #eee; border-radius: 6px;
            padding: 10px 12px; font-size: 12px;
        }
        .hi-paper .hi-title {
            font-weight: 700; text-align: center; font-size: 14px; margin-bottom: 6px;
        }
        .hi-paper .hi-meta-row {
            text-align: center; font-size: 11px; color: #888; margin-bottom: 8px;
        }
        .hi-paper .hi-q-item {
            margin-bottom: 6px; padding: 4px 0; border-bottom: 1px dashed #f0f0f0;
        }
        .hi-paper .hi-q-expr { font-weight: 600; font-family: 'Consolas','KaiTi',monospace; }
        .hi-paper .hi-q-steps {
            font-family: 'Consolas','KaiTi',monospace; color: var(--answer-green);
            font-size: 12px; margin-left: 14px; margin-top: 2px;
        }
        .hi-paper .hi-q-steps .step { padding: 1px 0; }
        .hi-paper .hi-q-steps .step:last-child { font-weight: 700; }
        .hi-actions { margin-top: 8px; display: flex; gap: 6px; }

        .no-history { text-align: center; color: #bbb; padding: 20px; font-size: 13px; }
        .clear-btn {
            font-size: 11px; color: #e53e3e; cursor: pointer; border: none;
            background: none; font-family: inherit;
        }
        .clear-btn:hover { text-decoration: underline; }

        /* ===== 打印样式 ===== */
        @media print {
            @page { margin: 12mm 14mm; size: A4; }
            body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .header { display: none !important; }
            .history-panel { display: none !important; }
            .content-area { padding: 0; max-width: 100%; }
            .paper { border: none; padding: 0; box-shadow: none; }
            .paper-top { border-bottom: 2px solid #000; }
            .paper-meta { color: #000; }
            .paper-meta .blank { border-bottom-color: #000; }
            .q-toggle-btn { display: none !important; }
            .q-item .q-answer { display: none !important; }
            .paper-actions { display: none !important; }
            .paper-footer { display: none; }
            .q-grid { gap: 4px 20px; }
            .q-item-header .q-expr { font-size: 15px; }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .content-area { padding: 10px; }
            .history-panel {
                width: 100%; max-height: none; position: relative; top: 0;
                border-left: none; border-top: 1px solid var(--border);
            }
            .header { padding: 10px 14px; }
            .header h1 { font-size: 16px; }
            .paper { padding: 20px 16px 28px; }
            .paper-title { font-size: 18px; }
            .q-item-header .q-expr { font-size: 15px; }
            .preview-box { width: 95vw; }
        }
        @media (max-width: 640px) {
            .q-grid { grid-template-columns: 1fr; gap: 6px 0; }
            .paper { padding: 14px 10px 20px; }
            .paper-title { font-size: 16px; }
            .paper-meta { font-size: 13px; gap: 12px; }
            .q-item-header .q-expr { font-size: 14px; }
        }
        @media (max-width: 400px) {
            .header { gap: 6px; }
            .header-right { gap: 4px; }
            .select-box { font-size: 13px; padding: 6px 8px; min-width: 80px; }
            .btn { padding: 6px 12px; font-size: 13px; }
            .btn-gen { padding: 6px 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📐 递等式巧算</h1>
        <div class="header-right">
            <span class="tip-text" id="tip-text"></span>
            <select class="select-box" id="grade-select">
                <option value="">-- 选择年级 --</option>
                <option value="三年级">三年级</option>
                <option value="四年级">四年级</option>
                <option value="五年级">五年级</option>
                <option value="六年级">六年级</option>
            </select>
            <button class="btn btn-gen" id="gen-btn" onclick="onGenerate()">生成试卷</button>
            <button class="btn btn-preview" id="preview-btn" style="display:none;" onclick="openPreview()">👁 预览</button>
            <button class="print-icon-btn" id="print-btn" onclick="printPaper()" title="打印试卷">
                <img src="../../images/打印.png" alt="打印">
            </button>
        </div>
    </div>

    <div class="main-layout">
        <div class="content-area" id="content-area">
            <div class="empty-state">
                <div class="icon">🧮</div>
                <p>选择年级后点击「生成试卷」</p>
            </div>
        </div>

        <div class="history-panel" id="history-panel">
            <h3>
                📋 打印记录
                <button class="clear-btn" id="clear-all-btn" style="display:none;" onclick="clearAllHistory()">清空全部</button>
            </h3>
            <div class="history-list" id="history-list">
                <div class="no-history">暂无打印记录</div>
            </div>
        </div>
    </div>

    <!-- 预览浮层 -->
    <div class="preview-overlay" id="preview-overlay" onclick="closePreview(event)">
        <button class="preview-close" onclick="closePreview()">&times;</button>
        <div class="preview-box" id="preview-box"></div>
    </div>

    <script>
        let questionBank = [];
        let currentPaperData = null;

        function getUsedQuestions() {
            try { return JSON.parse(localStorage.getItem('didengshi_used')) || {}; }
            catch(e) { return {}; }
        }
        function saveUsedQuestions(data) {
            localStorage.setItem('didengshi_used', JSON.stringify(data));
        }

        async function loadQuestions() {
            try {
                const resp = await fetch('timu.json');
                if (!resp.ok) throw new Error('加载失败');
                const data = await resp.json();
                questionBank = data.questions || [];
            } catch(e) {
                console.error('加载题库失败', e);
                questionBank = [];
            }
        }

        // ===== 点击生成 =====
        window.onGenerate = function() {
            const grade = document.getElementById('grade-select').value;
            if (!grade) {
                alert('请先选择年级');
                return;
            }
            currentPaperData = generatePaper(grade);
            if (!currentPaperData) return;
            renderPaper(currentPaperData, false);
            document.getElementById('print-btn').style.display = 'inline-block';
            document.getElementById('preview-btn').style.display = 'inline-block';
            updateTip();
        };

        function updateTip() {
            const grade = currentPaperData ? currentPaperData.grade : '';
            const used = getUsedQuestions();
            const usedIds = used[grade] || [];
            const remaining = questionBank.filter(q => q.grade === grade && !usedIds.includes(q.id)).length;
            const tip = document.getElementById('tip-text');
            if (remaining > 0) {
                tip.textContent = `💡 该年级剩余 ${remaining} 题未出`;
                tip.style.display = 'inline';
            } else {
                tip.textContent = '💡 该年级题目已全部出过';
                tip.style.display = 'inline';
            }
        }

        function generatePaper(grade) {
            let pool = questionBank.filter(q => q.grade === grade);
            if (pool.length === 0) {
                alert(`暂无「${grade}」的题目，请补充题库`);
                return null;
            }
            const used = getUsedQuestions();
            const usedIds = used[grade] || [];
            let available = pool.filter(q => !usedIds.includes(q.id));

            if (available.length === 0) {
                used[grade] = [];
                saveUsedQuestions(used);
                available = [...pool];
                alert(`「${grade}」所有题目已出过一轮，现已重置，开始新一轮随机出题`);
            }

            const maxCount = Math.min(10, available.length);
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, maxCount);

            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            return {
                id: Date.now(),
                grade: grade,
                date: dateStr,
                time: timeStr,
                count: selected.length,
                questions: JSON.parse(JSON.stringify(selected))
            };
        }

        // ===== 渲染试卷 =====
        function renderPaper(paperData, showAnswers) {
            const area = document.getElementById('content-area');
            const qs = paperData.questions;
            const now = new Date();
            const autoDate = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

            area.innerHTML = `
                <div class="paper" id="main-paper">
                    <div class="paper-top">
                        <div class="paper-title">递等式巧算练习</div>
                        <div class="paper-meta">
                            <span>班级：<span class="blank"></span></span>
                            <span>姓名：<span class="blank"></span></span>
                            <span>日期：<span class="auto-date">${autoDate}</span></span>
                        </div>
                    </div>
                    <div class="paper-actions">
                        <button class="btn-show-answers" onclick="toggleAllAnswers()" id="show-answers-btn">显示答案</button>
                    </div>
                    <div class="q-grid">
                        ${qs.map((q, i) => `
                            <div class="q-item">
                                <div class="q-item-header">
                                    <span class="q-index">${i + 1}.</span>
                                    <span class="q-expr">${q.expression}</span>
                                </div>
                                <div class="q-answer${showAnswers ? ' show' : ''}" id="ans-${i}">
                                    ${q.steps.map(s => `<div class="step">${s}</div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="paper-footer">
                        ${paperData.grade} | ${paperData.date} ${paperData.time} | 共 ${paperData.count} 题
                    </div>
                </div>
            `;
        }

        // ===== 显示/隐藏答案 =====
        let answersVisible = false;
        window.toggleAllAnswers = function() {
            answersVisible = !answersVisible;
            const btn = document.getElementById('show-answers-btn');
            document.querySelectorAll('.q-answer').forEach(div => {
                if (answersVisible) div.classList.add('show'); else div.classList.remove('show');
            });
            btn.textContent = answersVisible ? '隐藏答案' : '显示答案';
        };

        // ===== 打印 =====
        window.printPaper = function() {
            if (!currentPaperData) return;

            // 标记已使用
            const used = getUsedQuestions();
            const grade = currentPaperData.grade;
            if (!used[grade]) used[grade] = [];
            const currentIds = currentPaperData.questions.map(q => q.id);
            used[grade] = [...new Set([...used[grade], ...currentIds])];
            saveUsedQuestions(used);

            // 记录到历史
            saveToHistory(currentPaperData);
            updateTip();

            // 打印前隐藏答案
            const wasVisible = answersVisible;
            if (wasVisible) toggleAllAnswers();
            window.print();
            // 打印后恢复
            setTimeout(() => { if (wasVisible) toggleAllAnswers(); }, 500);
        };

        // ===== 预览 =====
        window.openPreview = function() {
            if (!currentPaperData) return;
            const qs = currentPaperData.questions;
            const now = new Date();
            const autoDate = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

            document.getElementById('preview-box').innerHTML = `
                <div class="paper">
                    <div class="paper-top">
                        <div class="paper-title">递等式巧算练习</div>
                        <div class="paper-meta">
                            <span>班级：<span class="blank"></span></span>
                            <span>姓名：<span class="blank"></span></span>
                            <span>日期：<span class="auto-date">${autoDate}</span></span>
                        </div>
                    </div>
                    <div class="q-grid">
                        ${qs.map((q, i) => `
                            <div class="q-item">
                                <div class="q-item-header">
                                    <span class="q-index">${i + 1}.</span>
                                    <span class="q-expr">${q.expression}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('preview-overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        };

        window.closePreview = function(e) {
            if (e && e.target !== document.getElementById('preview-overlay')) return;
            document.getElementById('preview-overlay').classList.remove('show');
            document.body.style.overflow = '';
        };

        // ===== 历史记录 =====
        const STORAGE_KEY = 'didengshi_history_v3';

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch(e) { return []; }
        }

        function saveToHistory(paperData) {
            const history = getHistory();
            const exists = history.find(h => h.id === paperData.id);
            if (!exists) history.unshift(paperData);
            if (history.length > 30) history.length = 30;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            renderHistory();
        }

        window.clearAllHistory = function() {
            if (!confirm('确定清空所有打印记录？')) return;
            localStorage.removeItem(STORAGE_KEY);
            renderHistory();
        };

        function deleteHistoryItem(e, id) {
            e.stopPropagation();
            if (!confirm('确定删除？')) return;
            let history = getHistory();
            history = history.filter(h => h.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            renderHistory();
        }

        function toggleHistoryItem(el, id) {
            // 展开/收起
            const wasExpanded = el.classList.contains('expanded');
            // 先收起所有
            document.querySelectorAll('.history-item').forEach(item => item.classList.remove('expanded'));
            if (!wasExpanded) {
                el.classList.add('expanded');
            }
        }

        function loadToMain(id) {
            const history = getHistory();
            const item = history.find(h => h.id === id);
            if (item) {
                currentPaperData = item;
                renderPaper(item, true);
                answersVisible = true;
                document.getElementById('show-answers-btn').textContent = '隐藏答案';
                document.getElementById('print-btn').style.display = 'inline-block';
                document.getElementById('preview-btn').style.display = 'inline-block';
                document.getElementById('tip-text').style.display = 'none';
            }
        }

        function renderHistory() {
            const history = getHistory();
            const list = document.getElementById('history-list');
            const clearBtn = document.getElementById('clear-all-btn');

            if (history.length === 0) {
                list.innerHTML = '<div class="no-history">暂无打印记录</div>';
                clearBtn.style.display = 'none';
            } else {
                clearBtn.style.display = 'inline';
                list.innerHTML = history.map(h => `
                    <div class="history-item" id="hi-${h.id}">
                        <div class="history-item-header" onclick="toggleHistoryItem(this.parentElement, ${h.id})">
                            <div>
                                <div class="hi-date">📄 ${h.date} ${h.time}</div>
                                <div class="hi-meta">${h.grade} · ${h.count} 题</div>
                            </div>
                            <span class="hi-arrow">▼</span>
                        </div>
                        <div class="hi-body">
                            <div class="hi-paper">
                                <div class="hi-title">递等式巧算练习</div>
                                <div class="hi-meta-row">${h.grade} | ${h.date} | ${h.count} 题</div>
                                ${h.questions.map((q, i) => `
                                    <div class="hi-q-item">
                                        <div class="hi-q-expr">${i+1}. ${q.expression}</div>
                                        <div class="hi-q-steps">
                                            ${q.steps.map(s => `<div class="step">${s}</div>`).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="hi-actions">
                                <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();loadToMain(${h.id})">复制到主面板</button>
                                <button class="btn btn-outline btn-sm" onclick="deleteHistoryItem(event, ${h.id})" style="color:#e53e3e;">删除</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // ===== 初始化 =====
        async function init() {
            await loadQuestions();
            renderHistory();
            if (questionBank.length > 0) {
                document.getElementById('content-area').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🧮</div>
                        <p>选择年级后点击「生成试卷」</p>
                        <p style="font-size:13px;color:#bbb;margin-top:6px;">题库共 ${questionBank.length} 道（三~六年级）</p>
                    </div>`;
            }
        }
        init();
    </script>
</body>
</html>
