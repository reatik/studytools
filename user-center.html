<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>个人中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft Yahei", sans-serif;
            background-color: #f7f8fa;
            color: #333;
            padding-bottom: 30px;
        }
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 46px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 0.5px 3px rgba(0,0,0,0.08);
            z-index: 99;
        }
        .header-bar a {
            font-size: 15px;
            color: #067aff;
            text-decoration: none;
        }
        .header-bar .title {
            font-size: 16px;
            font-weight: 500;
            color: #111;
        }
        body {
            padding-top: 46px;
        }
        .user-top-card {
            background: linear-gradient(135deg, #52b8ff 0%, #369eff 100%);
            margin: 12px;
            border-radius: 16px;
            padding: 25px 20px;
            color: #fff;
        }
        .avatar-box {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffffff40;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .user-name {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .user-desc {
            font-size: 13px;
            opacity: 0.9;
        }

        .list-wrap {
            margin: 12px;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
        }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            border-bottom: 1px solid #f5f5f5;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .list-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            color: #666;
        }
        .list-text {
            font-size: 15px;
            color: #333;
        }
        .list-arrow {
            color: #c8c9cc;
            font-size: 14px;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-box {
            background: #fff;
            width: 85%;
            max-width: 340px;
            border-radius: 20px;
            padding: 28px 24px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .input-item {
            margin-bottom: 12px;
        }
        .input-item input {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            background: #f9fafb;
        }
        .modal-btn {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            margin-top: 8px;
        }
        .btn-blue {
            background: #369eff;
            color: #fff;
        }
        .btn-gray {
            background: #eef0f3;
            color: #333;
        }
        .tip-text {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 12px;
        }
        .hide {
            display: none !important;
        }

        .data-panel {
            margin: 12px;
            background: #fff;
            border-radius: 16px;
            padding: 18px;
        }
        .data-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .data-line {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }

        .tab-row {
            display: flex;
            margin-bottom: 20px;
            border-radius: 12px;
            background: #f5f7fa;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .tab.active {
            background: #369eff;
            color: #fff;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        .form-tip {
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            height: 16px;
        }
        .tip-success {
            color: #07c160;
        }
        .tip-error {
            color: #fa3f3f;
        }
        .auth-tip {
            text-align: center;
            padding: 15px;
            color: #999;
            font-size: 13px;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .avatar-option:hover {
            transform: scale(1.1);
            border-color: #369eff;
        }
        .avatar-option.selected {
            border-color: #369eff;
            background: #e6f2ff;
        }
        .avatar-option.color-avatar {
            font-size: 14px;
            color: #fff;
            font-weight: bold;
        }
        .avatar-edit-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 18px;
            height: 18px;
            background: #369eff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

<div class="header-bar">
    <a href="index.html"><i class="fas fa-arrow-left"></i> 返回</a>
    <div class="title">个人中心</div>
    <span></span>
</div>

<div class="user-top-card">
    <div class="avatar-box">
        <div class="avatar" id="userAvatar" onclick="showAvatarModal()"><i class="fas fa-user"></i></div>
        <div class="user-info-text">
            <div class="user-name" id="showUserName">游客用户</div>
            <div class="user-desc" id="showUserDesc">仅本地游玩，数据不上传云端</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="avatarModal">
    <div class="modal-box">
        <div class="modal-title">选择头像</div>
        <div class="avatar-grid" id="avatarGrid"></div>
        <button class="modal-btn btn-gray" onclick="closeAvatarModal()">取消</button>
    </div>
</div>

<div id="guestView">
    <div class="list-wrap">
        <div class="list-item" onclick="showAuthModal()" style="cursor:pointer;">
            <div class="list-left">
                <div class="list-icon"><i class="fas fa-user-plus"></i></div>
                <div class="list-text">登录 / 注册</div>
            </div>
            <div class="list-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>
    </div>
    <div class="auth-tip">
        <p>登录后可将学习数据同步到云端</p>
    </div>
</div>

<div id="userView" class="hide">
    <div class="list-wrap">
        <div class="list-item" onclick="clearUserData()" style="cursor:pointer;">
            <div class="list-left">
                <div class="list-icon"><i class="fas fa-database"></i></div>
                <div class="list-text">清空游戏数据</div>
            </div>
            <div class="list-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>

        <div class="list-item" onclick="deleteAccount()" style="cursor:pointer; color:#fa3f3f;">
            <div class="list-left">
                <div class="list-icon"><i class="fas fa-trash-alt"></i></div>
                <div class="list-text">注销账号</div>
            </div>
            <div class="list-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>

        <div class="list-item" onclick="logout()" style="cursor:pointer;">
            <div class="list-left">
                <div class="list-icon"><i class="fas fa-sign-out-alt"></i></div>
                <div class="list-text">退出登录</div>
            </div>
            <div class="list-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="authModal">
    <div class="modal-box">
        <div class="tab-row">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <div class="panel active" id="loginPanel">
            <div class="input-item">
                <input type="text" id="loginNick" placeholder="请输入昵称">
            </div>
            <div class="input-item">
                <input type="password" id="loginPwd" placeholder="请输入密码">
            </div>
            <div class="form-tip" id="loginTip"></div>
            <button class="modal-btn btn-blue" onclick="login()">登录</button>
            <button class="modal-btn btn-gray" onclick="closeAllModals()">取消</button>
        </div>

        <div class="panel" id="registerPanel">
            <div class="input-item">
                <input type="text" id="regNick" placeholder="请输入昵称">
            </div>
            <div class="input-item">
                <input type="password" id="regPwd" placeholder="请输入密码">
            </div>
            <div class="form-tip" id="regTip"></div>
            <button class="modal-btn btn-blue" onclick="register()">注册</button>
            <button class="modal-btn btn-gray" onclick="closeAllModals()">取消</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
<script>
// ===================== 密码加密函数（MD5 不可逆）=====================
function md5(str) {
    function rotateLeft(lValue, iShiftBits) {
        return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
    }
    function addUnsigned(lX, lY) {
        var lX4, lY4, lX8, lY8, lResult;
        lX8 = (lX & 0x80000000);
        lY8 = (lY & 0x80000000);
        lX4 = (lX & 0x40000000);
        lY4 = (lY & 0x40000000);
        lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
        if (lX4 & lY4) return lResult ^ 0x80000000 ^ lX8 ^ lY8;
        if (lX4 | lY4) {
            if (lResult & 0x40000000) return lResult ^ 0xC0000000 ^ lX8 ^ lY8;
            else return lResult ^ 0x40000000 ^ lX8 ^ lY8;
        } else return lResult ^ lX8 ^ lY8;
    }
    function F(x, y, z) { return (x & y) | ((~x) & z); }
    function G(x, y, z) { return (x & z) | (y & (~z)); }
    function H(x, y, z) { return (x ^ y ^ z); }
    function I(x, y, z) { return (y ^ (x | (~z))); }
    function FF(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
    }
    function GG(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
    }
    function HH(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
    }
    function II(a, b, c, d, x, s, ac) {
        a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
        return addUnsigned(rotateLeft(a, s), b);
    }
    function convertToWordArray(string) {
        var lWordCount;
        var lMessageLength = string.length;
        var lNumberOfWords_temp1 = lMessageLength + 8;
        var lNumberOfWords_temp2 = (lNumberOfWords_temp1 - (lNumberOfWords_temp1 % 64)) / 64;
        var lNumberOfWords = (lNumberOfWords_temp2 + 1) * 16;
        var lWordArray = Array(lNumberOfWords - 1);
        var lBytePosition = 0;
        var lByteCount = 0;
        while (lByteCount < lMessageLength) {
            lWordCount = (lByteCount - (lByteCount % 4)) / 4;
            lBytePosition = (lByteCount % 4) * 8;
            lWordArray[lWordCount] = (lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition));
            lByteCount++;
        }
        lWordCount = (lByteCount - (lByteCount % 4)) / 4;
        lBytePosition = (lByteCount % 4) * 8;
        lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
        lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
        lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
        return lWordArray;
    }
    function wordToHex(lValue) {
        var WordToHexValue = "", WordToHexValue_temp = "", lByte, lCount;
        for (lCount = 0; lCount <= 3; lCount++) {
            lByte = (lValue >>> (lCount * 8)) & 255;
            WordToHexValue_temp = "0" + lByte.toString(16);
            WordToHexValue = WordToHexValue + WordToHexValue_temp.substr(WordToHexValue_temp.length - 2, 2);
        }
        return WordToHexValue;
    }
    var x = Array();
    var k, AA, BB, CC, DD, a, b, c, d;
    var S11 = 7, S12 = 12, S13 = 17, S14 = 22;
    var S21 = 5, S22 = 9, S23 = 14, S24 = 20;
    var S31 = 4, S32 = 11, S33 = 16, S34 = 23;
    var S41 = 6, S42 = 10, S43 = 15, S44 = 21;
    str = str.toString();
    x = convertToWordArray(str);
    a = 0x67452301; b = 0xEFCDAB89; c = 0x98BADCFE; d = 0x10325476;
    for (k = 0; k < x.length; k += 16) {
        AA = a; BB = b; CC = c; DD = d;
        a = FF(a, b, c, d, x[k + 0], S11, 0xD76AA478);
        d = FF(d, a, b, c, x[k + 1], S12, 0xE8C7B756);
        c = FF(c, d, a, b, x[k + 2], S13, 0x242070DB);
        b = FF(b, c, d, a, x[k + 3], S14, 0xC1BDCEEE);
        a = FF(a, b, c, d, x[k + 4], S11, 0xF57C0FAF);
        d = FF(d, a, b, c, x[k + 5], S12, 0x4787C62A);
        c = FF(c, d, a, b, x[k + 6], S13, 0xA8304613);
        b = FF(b, c, d, a, x[k + 7], S14, 0xFD469501);
        a = FF(a, b, c, d, x[k + 8], S11, 0x698098D8);
        d = FF(d, a, b, c, x[k + 9], S12, 0x8B44F7AF);
        c = FF(c, d, a, b, x[k + 10], S13, 0xFFFF5BB1);
        b = FF(b, c, d, a, x[k + 11], S14, 0x895CD7BE);
        a = FF(a, b, c, d, x[k + 12], S11, 0x6B901122);
        d = FF(d, a, b, c, x[k + 13], S12, 0xFD987193);
        c = FF(c, d, a, b, x[k + 14], S13, 0xA679438E);
        b = FF(b, c, d, a, x[k + 15], S14, 0x49B40821);
        a = GG(a, b, c, d, x[k + 1], S21, 0xF61E2562);
        d = GG(d, a, b, c, x[k + 6], S22, 0xC040B340);
        c = GG(c, d, a, b, x[k + 11], S23, 0x265E5A51);
        b = GG(b, c, d, a, x[k + 0], S24, 0xE9B6C7AA);
        a = GG(a, b, c, d, x[k + 5], S21, 0xD62F105D);
        d = GG(d, a, b, c, x[k + 10], S22, 0x02441453);
        c = GG(c, d, a, b, x[k + 15], S23, 0xD8A1E681);
        b = GG(b, c, d, a, x[k + 4], S24, 0xE7D3FBC8);
        a = GG(a, b, c, d, x[k + 9], S21, 0x21E1CDE6);
        d = GG(d, a, b, c, x[k + 14], S22, 0xC33707D6);
        c = GG(c, d, a, b, x[k + 3], S23, 0xF4D50D87);
        b = GG(b, c, d, a, x[k + 8], S24, 0x455A14ED);
        a = GG(a, b, c, d, x[k + 13], S21, 0xA9E3E905);
        d = GG(d, a, b, c, x[k + 2], S22, 0xFCEFA3F8);
        c = GG(c, d, a, b, x[k + 7], S23, 0x676F02D9);
        b = GG(b, c, d, a, x[k + 12], S24, 0x8D2A4C8A);
        a = HH(a, b, c, d, x[k + 5], S31, 0xFFFA3942);
        d = HH(d, a, b, c, x[k + 8], S32, 0x8771F681);
        c = HH(c, d, a, b, x[k + 11], S33, 0x6D9D6122);
        b = HH(b, c, d, a, x[k + 14], S34, 0xFDE5380C);
        a = HH(a, b, c, d, x[k + 1], S31, 0xA4BEEA44);
        d = HH(d, a, b, c, x[k + 4], S32, 0x4BDECFA9);
        c = HH(c, d, a, b, x[k + 7], S33, 0xF6BB4B60);
        b = HH(b, c, d, a, x[k + 10], S34, 0xBEBFBC70);
        a = HH(a, b, c, d, x[k + 13], S31, 0x289B7EC6);
        d = HH(d, a, b, c, x[k + 0], S32, 0xEAA127FA);
        c = HH(c, d, a, b, x[k + 3], S33, 0xD4EF3085);
        b = HH(b, c, d, a, x[k + 6], S34, 0x04881D05);
        a = HH(a, b, c, d, x[k + 9], S31, 0xD9D4D039);
        d = HH(d, a, b, c, x[k + 12], S32, 0xE6DB99E5);
        c = HH(c, d, a, b, x[k + 15], S33, 0x1FA27CF8);
        b = HH(b, c, d, a, x[k + 2], S34, 0xC4AC5665);
        a = II(a, b, c, d, x[k + 0], S41, 0xF4292244);
        d = II(d, a, b, c, x[k + 7], S42, 0x432AFF97);
        c = II(c, d, a, b, x[k + 14], S43, 0xAB9423A7);
        b = II(b, c, d, a, x[k + 5], S44, 0xFC93A039);
        a = II(a, b, c, d, x[k + 12], S41, 0x655B59C3);
        d = II(d, a, b, c, x[k + 3], S42, 0x8F0CCC92);
        c = II(c, d, a, b, x[k + 10], S43, 0xFFEFF47D);
        b = II(b, c, d, a, x[k + 1], S44, 0x85845DD1);
        a = II(a, b, c, d, x[k + 8], S41, 0x6FA87E4F);
        d = II(d, a, b, c, x[k + 15], S42, 0xFE2CE6E0);
        c = II(c, d, a, b, x[k + 6], S43, 0xA3014314);
        b = II(b, c, d, a, x[k + 13], S44, 0x4E0811A1);
        a = II(a, b, c, d, x[k + 4], S41, 0xF7537E82);
        d = II(d, a, b, c, x[k + 11], S42, 0xBD3AF235);
        c = II(c, d, a, b, x[k + 2], S43, 0x2AD7D2BB);
        b = II(b, c, d, a, x[k + 9], S44, 0xEB86D391);
        a = addUnsigned(a, AA);
        b = addUnsigned(b, BB);
        c = addUnsigned(c, CC);
        d = addUnsigned(d, DD);
    }
    return wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d);
}

window.onload = function () {
    updateUserView();
};

function updateUserView() {
    let isLogin = localStorage.getItem("game_logged_in") === "true";
    let uid = localStorage.getItem("game_user_id");
    let name = localStorage.getItem("game_nickname");
    let avatar = localStorage.getItem("user_avatar");

    if (isLogin && uid) {
        document.getElementById("guestView").classList.add("hide");
        document.getElementById("userView").classList.remove("hide");
        document.getElementById("showUserName").innerText = name;
        document.getElementById("showUserDesc").innerText = "已登录 · 数据云端同步";
        updateAvatarDisplay(avatar);
    } else {
        document.getElementById("guestView").classList.remove("hide");
        document.getElementById("userView").classList.add("hide");
        document.getElementById("showUserName").innerText = "游客用户";
        document.getElementById("showUserDesc").innerText = "仅本地游玩，数据不上传云端";
        updateAvatarDisplay(null);
    }
}

function updateAvatarDisplay(avatar) {
    let avatarEl = document.getElementById("userAvatar");
    if (avatar) {
        avatarEl.innerHTML = avatar + '<div class="avatar-edit-icon"><i class="fas fa-pen"></i></div>';
    } else {
        avatarEl.innerHTML = '<i class="fas fa-user"></i><div class="avatar-edit-icon"><i class="fas fa-pen"></i></div>';
    }
}

const avatarList = [
    "😊", "😄", "🥰", "😎", "🤔", "😴", "🤗", "😇",
    "🙂", "🤩", "🥳", "😋", "🤓", "😌", "🥺", "😤",
    "🦁", "🐱", "🐶", "🐰", "🐼", "🦊", "🐸", "🐵",
    "🌟", "⭐", "🌙", "☀️", "🌈", "❤️", "💙", "💚"
];

function showAvatarModal() {
    let grid = document.getElementById("avatarGrid");
    let currentAvatar = localStorage.getItem("user_avatar") || "";
    
    grid.innerHTML = avatarList.map(av => {
        let selected = (av === currentAvatar) ? 'selected' : '';
        return `<div class="avatar-option ${selected}" onclick="selectAvatar('${av}')">${av}</div>`;
    }).join('');
    
    document.getElementById("avatarModal").style.display = "flex";
}

function closeAvatarModal() {
    document.getElementById("avatarModal").style.display = "none";
}

function selectAvatar(avatar) {
    localStorage.setItem("user_avatar", avatar);
    updateAvatarDisplay(avatar);
    closeAvatarModal();
}

let currentTab = "login";
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById("loginTip").innerText = "";
    document.getElementById("regTip").innerText = "";

    if (tab === "login") {
        document.querySelector(".tab:nth-child(1)").classList.add("active");
        document.getElementById("loginPanel").classList.add("active");
    } else {
        document.querySelector(".tab:nth-child(2)").classList.add("active");
        document.getElementById("registerPanel").classList.add("active");
    }
}

function showAuthModal() {
    document.getElementById("authModal").style.display = "flex";
}
function closeAllModals() {
    document.getElementById("authModal").style.display = "none";
}

async function login() {
    try {
        let nick = document.getElementById("loginNick").value.trim();
        let pwd = document.getElementById("loginPwd").value.trim();
        let tip = document.getElementById("loginTip");

        if (!nick || !pwd) {
            tip.className = "form-tip tip-error";
            tip.innerText = "请填写昵称和密码";
            return;
        }

        let pwdMd5 = md5(pwd);
        let sb = getSupabaseClient();
        
        // 查询user_id（适配你的表）
        let { data, error } = await sb.from("users")
            .select("user_id,username,password")
            .eq("username", nick)
            .limit(1);

        if (error || !data.length) {
            tip.className = "form-tip tip-error";
            tip.innerText = "用户不存在";
            return;
        }

        let user = data[0];
        if (user.password !== pwdMd5) {
            tip.className = "form-tip tip-error";
            tip.innerText = "密码错误";
            return;
        }

        // 存储user_id（和表完全匹配）
        localStorage.setItem("game_logged_in", "true");
        localStorage.setItem("game_user_id", user.user_id);
        localStorage.setItem("game_nickname", user.username);
        
        closeAllModals();
        updateUserView();

    } catch (err) {
        document.getElementById("loginTip").innerText = "登录失败";
    }
}

// ===================== 最终修复版注册 =====================
// ===================== 完美修复版注册 =====================
async function register() {
    try {
        let nick = document.getElementById("regNick").value.trim();
        let pwd = document.getElementById("regPwd").value.trim();
        let tip = document.getElementById("regTip");

        if (!nick || !pwd) {
            tip.className = "form-tip tip-error";
            tip.innerText = "请输入昵称和密码";
            return;
        }

        // 修复：强制保留加密后的文本密码（英文+数字密码完全支持）
        let pwdMd5 = md5(pwd).toString();
        
        let sb = getSupabaseClient();

        // 检查昵称重复
        let { data: exist } = await sb.from("users")
            .select("username")
            .eq("username", nick)
            .limit(1);

        if (exist && exist.length > 0) {
            tip.className = "form-tip tip-error";
            tip.innerText = "该昵称已被注册";
            return;
        }

        let newUid = "user_" + Math.random().toString(36).slice(2, 10);

        // 插入数据（适配你的表结构）
        let { error: insertErr } = await sb.from("users").insert([{
            user_id: newUid,
            username: nick,
            password: pwdMd5
        }]);

        if (insertErr) {
            tip.className = "form-tip tip-error";
            tip.innerText = "注册失败";
            console.error(insertErr);
            return;
        }

        tip.className = "form-tip tip-success";
        tip.innerText = "注册成功！跳转登录...";
        document.getElementById("loginNick").value = nick;
        setTimeout(() => switchTab('login'), 800);

    } catch (err) {
        document.getElementById("regTip").innerText = "注册异常";
    }
}

function logout() {
    localStorage.removeItem("game_logged_in");
    localStorage.removeItem("game_user_id");
    localStorage.removeItem("game_nickname");
    updateUserView();
}

    if (!confirm("确定要清空所有游戏数据吗？\n此操作不可恢复！")) return;
    
    const userId = localStorage.getItem("game_user_id");
    if (!userId) return;

// 注销账号
async function deleteAccount() {
    if (!confirm("确定要注销账号吗？\n所有数据将被永久删除，无法恢复！")) return;

    const userId = localStorage.getItem("game_user_id");
    if (!userId) return;

    const sb = getSupabaseClient();
    // 修复：表名改为 users
    await sb.from("users").delete().eq("user_id", userId);

    localStorage.removeItem("game_logged_in");
    localStorage.removeItem("game_user_id");
    localStorage.removeItem("game_nickname");
    
    alert("✅ 账号已注销");
    updateUserView();
}

(function supabaseKeepAlive() {
    const lastPing = localStorage.getItem("last_supabase_ping");
    const now = Date.now();
    const oneDay = 24 * 60 * 60 * 1000;

    if (!lastPing || now - lastPing > oneDay) {
        try {
            const sb = getSupabaseClient();
            if (sb) {
                sb.from("user_stats").select("user_id", { head: true, count: "exact" }).limit(1);
                localStorage.setItem("last_supabase_ping", now);
            }
        } catch (e) {}
    }
    setTimeout(supabaseKeepAlive, oneDay);
})();
