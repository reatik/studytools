<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Learning tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 70px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            color: #1d1d1f;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.35rem;
            letter-spacing: -0.3px;
        }

        .logo i {
            color: #0071e3;
            font-size: 1.5rem;
        }

        .announcement-bar {
            background: linear-gradient(105deg, #30b46c, #1e9c6e);
            color: white;
            padding: 8px 0;
            overflow: hidden;
            position: relative;
            z-index: 99;
        }

        .announcement-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            white-space: nowrap;
            animation: scrollAnnouncement 18s linear infinite;
        }

        .announcement-text {
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        @keyframes scrollAnnouncement {
            0% { transform: translateX(30%); }
            100% { transform: translateX(-30%); }
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .section-area {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .section-area.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .feature-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 8px;
        }

        .feature-card {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 24px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .feature-card .custom-icon,
        .feature-card i {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            font-size: 3.6rem;
            color: currentColor;
        }

        .feature-card span,
        .feature-card .card-text {
            display: none;
        }

        .feature-card .dev-tag {
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 0.6rem;
            padding: 2px 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: white !important;
            border-radius: 30px;
            font-weight: 600;
            z-index: 2;
            white-space: nowrap;
            display: inline-block;
            line-height: 1.2;
            letter-spacing: 0;
            pointer-events: none;
        }

        .feature-card.disabled {
            opacity: 0.5;
            filter: grayscale(0.1);
            pointer-events: none;
        }

        .feature-card:hover {
            transform: scale(0.97);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            background: #fefefe;
        }

        .english-card { color: #0071e3; }
        .chinese-card { color: #d4264a; }
        .math-card { color: #30b46c; }
        .games-card { color: #8e44ad; }
        .tools-card { color: #e67e22; }

        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            z-index: 110;
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .nav-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 6px 10px;
            gap: 6px;
        }

        .nav-slider::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            flex: 0 0 25%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #8e8e93;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 8px 4px;
            border-radius: 40px;
            transition: all 0.2s ease;
            gap: 4px;
            min-width: 70px;
        }

        .nav-btn i {
            font-size: 1.35rem;
        }

        .nav-btn.active {
            background: rgba(0, 113, 227, 0.1);
            color: #0071e3;
            font-weight: 500;
            transform: scale(1.02);
        }

        .nav-btn[data-tab="english"].active { color: #0071e3; background: rgba(0,113,227,0.1); }
        .nav-btn[data-tab="chinese"].active { color: #d4264a; background: rgba(212,38,74,0.08); }
        .nav-btn[data-tab="math"].active { color: #30b46c; background: rgba(48,180,108,0.08); }
        .nav-btn[data-tab="games"].active { color: #8e44ad; background: rgba(142,68,173,0.08); }

        .custom-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s;
        }
        .custom-prompt.active {
            opacity: 1;
            visibility: visible;
        }
        .prompt-container {
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            width: 85%;
            max-width: 340px;
            padding: 28px 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            transform: scale(0.96);
            transition: transform 0.25s cubic-bezier(0.2,0,0,1);
            border: 0.5px solid rgba(0,0,0,0.05);
        }
        .custom-prompt.active .prompt-container {
            transform: scale(1);
        }
        .prompt-title {
            font-size: 1.3rem;
            font-weight: 550;
            text-align: center;
            margin-bottom: 24px;
            color: #1d1d1f;
        }
        .prompt-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e5e8;
            background: #f9f9fb;
            border-radius: 44px;
            font-size: 1rem;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .prompt-input:focus {
            outline: none;
            border-color: #0071e3;
            background: white;
        }
        .prompt-error {
            color: #d4264a;
            font-size: 0.8rem;
            margin: 6px 0 12px;
            display: none;
            text-align: center;
        }
        .prompt-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .prompt-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 44px;
            font-weight: 500;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .prompt-btn-cancel {
            background: #f2f2f5;
            color: #1d1d1f;
        }
        .prompt-btn-confirm {
            background: #0071e3;
            color: white;
        }

        @media (max-width: 640px) {
            .feature-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .feature-card .custom-icon,
            .feature-card i {
                width: 75%;
                height: 75%;
                font-size: 3rem;
            }
            .main-container {
                padding: 16px 12px 32px;
            }
            .bottom-nav {
                bottom: 12px;
                width: 94%;
            }
        }

        @media (max-width: 480px) {
            .feature-card .custom-icon,
            .feature-card i {
                width: 68%;
                height: 68%;
            }
            .prompt-container {
                padding: 24px 20px;
            }
        }

        .tab-nav {
            display: none;
        }

        a.feature-card[href="#"] {
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo" style="pointer-events: none;">
            <i class="fas fa-book-open"></i>
            Training Space
        </a>
    </div>
</nav>

<div class="main-container">
    <section id="english" class="section-area active">
        <div class="feature-cards">
            <a href="subjects/english/shuahaoti/index.html" class="feature-card english-card">
                <img src="images/shuahaoti.png" class="custom-icon" alt="刷好题">
            </a>
            <a href="subjects/english/word-list/index.html" class="feature-card english-card">
                <img src="images/wordlist.png" class="custom-icon" alt="单词表">
            </a>
            <a href="subjects/english/dictation/index.html" class="feature-card english-card">
                <img src="images/tingxie.png" class="custom-icon" alt="单词听写">
            </a>
            <a href="subjects/english/wordgame/index.html" class="feature-card english-card">
                <img src="images/peidui.png" class="custom-icon" alt="中英配对">
            </a>
            <a href="subjects/english/spellgame/index.html" class="feature-card english-card">
                <img src="images/pinxie.png" class="custom-icon" alt="拼写练习">
            </a>
            <a href="subjects/english/sandan/index.html" class="feature-card english-card">
                <img src="images/sandan.png" class="custom-icon" alt="三单练习">
            </a>
            <a href="subjects/english/xialuo/index.html" class="feature-card english-card">
                <img src="images/xialuo.png" class="custom-icon" alt="夏洛的网">
            </a>
        </div>
    </section>

    <section id="chinese" class="section-area">
        <div class="feature-cards">
            <a href="subjects/chinese/gushiyuxi/index.html" class="feature-card chinese-card">
                <img src="images/gushici.png" class="custom-icon" alt="古诗词">
            </a>
            <a href="subjects/chinese/zicimoxie/index.html" class="feature-card chinese-card">
                <img src="images/ciyumoxie.png" class="custom-icon" alt="词语默写">
            </a>
            <a href="subjects/chinese/dedede/index.html" class="feature-card chinese-card">
                <img src="images/dedede.png" class="custom-icon" alt="的得地">
            </a>
        </div>
    </section>

    <section id="math" class="section-area">
        <div class="feature-cards">
            <a href="subjects/math/24dian/index.html" class="feature-card math-card">
                <img src="images/24dian.png" class="custom-icon" alt="24点">
            </a>
            <a href="subjects/math/jisuan/index.html" class="feature-card math-card">
                <img src="images/jisuan.png" class="custom-icon" alt="计算题">
            </a>
            <a href="subjects/math/danweihuansuan/index.html" class="feature-card math-card">
                <img src="images/danweihuansuan.png" class="custom-icon" alt="单位换算">
            </a>
        </div>
    </section>

    <section id="games" class="section-area">
        <div class="feature-cards">
            <a href="game/quiz/index.html" class="feature-card games-card">
                <i class="fas fa-question-circle custom-icon"></i>
            </a>
            <a href="game/wuziqi/index.html" class="feature-card games-card">
                <img src="images/wuziqi.png" class="custom-icon" alt="五子棋">
            </a>
            <a href="game/xiangqi/index.html" class="feature-card games-card">
                <img src="images/xiangqi.png" class="custom-icon" alt="象棋">
            </a>
            <a href="#" class="feature-card tools-card" id="calligraphyGeneratorBtn">
                <i class="fas fa-pen-fancy custom-icon"></i>
            </a>
            <a href="game/talent1/index.html" class="feature-card games-card">
                <img src="images/circle.png" class="custom-icon" alt="圆点游戏">
            </a>
            <a href="#" class="feature-card tools-card" id="homeworkTrackerBtn">
                <i class="fas fa-clipboard-list custom-icon"></i>
            </a>
        </div>
    </section>
</div>

<div class="bottom-nav">
    <div class="nav-slider">
        <a href="#" class="nav-btn active" data-tab="english">
            <i class="fas fa-language"></i>
            <span>英语</span>
        </a>
        <a href="#" class="nav-btn" data-tab="chinese">
            <i class="fas fa-book"></i>
            <span>语文</span>
        </a>
        <a href="#" class="nav-btn" data-tab="math">
            <i class="fas fa-calculator"></i>
            <span>数学</span>
        </a>
        <a href="#" class="nav-btn" data-tab="games">
            <i class="fas fa-gamepad"></i>
            <span>其他</span>
        </a>
    </div>
</div>

<script>
    const navBtns = document.querySelectorAll('.nav-slider .nav-btn');
    const sections = document.querySelectorAll('.section-area');

    function switchTab(tabId) {
        sections.forEach(section => section.classList.remove('active'));
        const targetSection = document.getElementById(tabId);
        if (targetSection) targetSection.classList.add('active');
        navBtns.forEach(btn => {
            const btnTab = btn.getAttribute('data-tab');
            if (btnTab === tabId) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    navBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const tabId = this.getAttribute('data-tab');
            if (tabId) switchTab(tabId);
        });
    });

    function showCustomPrompt(title, callback) {
        const overlay = document.createElement('div');
        overlay.className = 'custom-prompt';
        overlay.innerHTML = `
            <div class="prompt-container">
                <div class="prompt-title">${title}</div>
                <input type="password" class="prompt-input" placeholder="请输入密码" autocomplete="off">
                <div class="prompt-error"></div>
                <div class="prompt-buttons">
                    <button class="prompt-btn prompt-btn-cancel">取消</button>
                    <button class="prompt-btn prompt-btn-confirm">确认</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        const input = overlay.querySelector('.prompt-input');
        const confirmBtn = overlay.querySelector('.prompt-btn-confirm');
        const cancelBtn = overlay.querySelector('.prompt-btn-cancel');
        const errorDiv = overlay.querySelector('.prompt-error');

        const closePrompt = () => {
            overlay.classList.remove('active');
            setTimeout(() => {
                if (document.body.contains(overlay)) document.body.removeChild(overlay);
            }, 200);
        };

        const validate = () => {
            const val = input.value.trim();
            if (!val) {
                errorDiv.innerText = '请输入密码';
                errorDiv.style.display = 'block';
                input.style.borderColor = '#d4264a';
                return false;
            }
            return true;
        };

        confirmBtn.addEventListener('click', () => {
            if (validate()) {
                callback(input.value.trim());
                closePrompt();
            } else {
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                    input.style.borderColor = '#e5e5e8';
                }, 2000);
            }
        });

        cancelBtn.addEventListener('click', closePrompt);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (validate()) {
                    callback(input.value.trim());
                    closePrompt();
                } else {
                    setTimeout(() => {
                        errorDiv.style.display = 'none';
                        input.style.borderColor = '#e5e5e8';
                    }, 2000);
                }
            }
        });
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closePrompt();
        });
        setTimeout(() => {
            overlay.classList.add('active');
            input.focus();
        }, 20);
    }

    const homeworkBtn = document.getElementById('homeworkTrackerBtn');
    if (homeworkBtn) {
        homeworkBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showCustomPrompt('作业记录 · 输入访问密码', (pwd) => {
                if (pwd === '769') {
                    window.location.href = 'game/table/index.html';
                } else {
                    alert('密码错误，请重试');
                }
            });
        });
    }

    const calligraphyBtn = document.getElementById('calligraphyGeneratorBtn');
    if (calligraphyBtn) {
        calligraphyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showCustomPrompt('字帖生成工具 · 输入密码', (pwd) => {
                if (pwd === '769') {
                    window.location.href = 'zitie/index.html';
                } else {
                    alert('密码错误，无法访问字帖生成器');
                }
            });
        });
    }

    const allCards = document.querySelectorAll('.feature-card');
    allCards.forEach(card => {
        const spans = card.querySelectorAll('span:not(.dev-tag)');
        spans.forEach(span => {
            if(!span.classList || !span.classList.contains('dev-tag')) {
                span.style.display = 'none';
            }
        });
        const iconImg = card.querySelector('.custom-icon');
        if (iconImg) {
            iconImg.style.width = '90%';
            iconImg.style.height = '90%';
            iconImg.style.objectFit = 'contain';
        }
        const iconI = card.querySelector('i.custom-icon');
        if (iconI) {
            iconI.style.fontSize = '3.6rem';
            iconI.style.width = 'auto';
            iconI.style.height = 'auto';
        }
    });
    
    if ('ontouchstart' in window) {
        document.body.style.cursor = 'pointer';
    }
</script>
</body>
</html>
