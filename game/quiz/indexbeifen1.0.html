<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>知识大冲关</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <script src="../../../common.js"></script>
    <script src="tiku.js"></script>
    <style>
:root {
    --bg-dark: #1a1a2e;
    --bg-mid: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #f5c518;
    --green: #00e676;
    --red: #ff1744;
    --blue: #448aff;
    --text: #eaeaea;
    --text-dim: #8892a4;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
    --glass: rgba(22,33,62,0.85);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
.screen { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
.screen.active { display:flex; animation: fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes countIn { from{transform:scale(2);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(233,69,96,.3)} 50%{box-shadow:0 0 24px rgba(233,69,96,.6)} }
@keyframes confetti { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

#menu-screen {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    position: relative; overflow: hidden;
}
#menu-screen::before {
    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(circle at 30% 40%, rgba(233,69,96,.12) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(15,52,96,.2) 0%, transparent 50%);
    animation: float 8s ease-in-out infinite;
}
.menu-title {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px; letter-spacing: 4px; position: relative; z-index:1;
}
.menu-subtitle {
    color: var(--text-dim); font-size: clamp(.85rem, 2vw, 1.1rem);
    margin-bottom: 40px; position: relative; z-index:1;
}
.menu-btns {
    display: flex; flex-direction: column; gap: 18px;
    width: 100%; max-width: 320px; position: relative; z-index:1;
}
.menu-btn {
    padding: 18px 32px; border-radius: 16px; font-size: 1.2rem;
    font-weight: 800; cursor: pointer; border: 2px solid transparent;
    transition: all .25s; letter-spacing: 3px; text-align: center;
    position: relative; overflow: hidden;
}
.menu-btn:active { transform: scale(.96); }
.btn-solo {
    background: linear-gradient(135deg, #0f3460, #1a1a6e);
    color: var(--gold); border-color: rgba(245,197,24,.3);
}
.btn-solo:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(245,197,24,.2); }
.btn-online {
    background: linear-gradient(135deg, #e94560, #c0392b);
    color: #fff; border-color: rgba(233,69,96,.3);
}
.btn-online:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(233,69,96,.3); }

#room-screen {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
    padding-top: 20px;
}
.room-header { font-size: 1.5rem; font-weight: 800; color: var(--gold); margin-bottom: 6px; letter-spacing: 3px; }
.room-sub { color: var(--text-dim); font-size: .85rem; margin-bottom: 20px; }
#status-bar {
    font-size: .9rem; font-weight: 600; text-align: center;
    color: var(--text-dim); min-height: 24px; margin-bottom: 12px;
    padding: 6px 16px; border-radius: 20px;
    background: var(--card-bg); border: 1px solid var(--card-border);
}
#status-bar.ok { color: var(--green); border-color: rgba(0,230,118,.2); }
#status-bar.err { color: var(--red); border-color: rgba(255,23,68,.2); }
.room-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; width: 100%; max-width: 500px; margin-bottom: 16px;
}
.room-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 14px 10px; text-align: center;
    transition: all .25s; cursor: pointer;
}
.room-card:hover { border-color: rgba(245,197,24,.3); }
.room-card.full { opacity: .5; cursor: default; }
.room-card.full:hover { border-color: var(--card-border); }
.room-name { font-size: .95rem; font-weight: 700; color: var(--gold); margin-bottom: 10px; letter-spacing: 2px; }
.room-seats { display:flex; align-items:center; justify-content:center; gap:6px; }
.seat-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--accent2); background: transparent;
    display: flex; align-items:center; justify-content:center;
    font-size: .7rem; font-weight: 700; color: var(--text-dim); transition: all .2s;
}
.seat-dot.taken { background: var(--accent); border-color: var(--accent); color: #fff; }
.seat-dot.me { background: var(--gold); border-color: var(--gold); color: #1a1a2e; }
.room-vs { font-size: .75rem; color: var(--text-dim); margin: 0 4px; }
.btn-back {
    padding: 10px 28px; border-radius: 10px; font-size: .9rem; font-weight: 700;
    cursor: pointer; border: 2px solid var(--card-border);
    background: var(--card-bg); color: var(--text-dim); transition: all .2s;
}
.btn-back:hover { border-color: var(--accent); color: var(--accent); }

#lobby-screen { background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%); }
.lobby-box {
    background: var(--glass); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 400px; text-align: center;
}
.lobby-title { font-size: 1.3rem; font-weight: 800; color: var(--gold); margin-bottom: 20px; letter-spacing: 2px; }
.lobby-players { display:flex; flex-direction:column; gap:10px; margin-bottom: 20px; }
.lobby-player {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--card-bg); border: 1px solid var(--card-border); transition: all .3s;
}
.lobby-player.ready { border-color: rgba(0,230,118,.4); background: rgba(0,230,118,.08); }
.lobby-player .p-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent2); display:flex; align-items:center; justify-content:center;
    font-size: 1rem; font-weight: 800; color: var(--gold); flex-shrink:0;
}
.lobby-player .p-name { flex:1; text-align:left; font-weight: 600; font-size: .95rem; }
.lobby-player .p-status { font-size: .8rem; font-weight: 700; }
.lobby-player .p-status.ready { color: var(--green); }
.lobby-player .p-status.waiting { color: var(--text-dim); }
.lobby-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn-ready {
    padding: 12px 36px; border-radius: 12px; font-size: 1rem; font-weight: 800;
    cursor: pointer; border: 2px solid rgba(0,230,118,.3);
    background: linear-gradient(135deg, #00c853, #00e676); color: #1a1a2e;
    transition: all .2s; letter-spacing: 2px;
}
.btn-ready:active { transform: scale(.96); }
.btn-ready.cancel {
    background: linear-gradient(135deg, #ff1744, #d50000);
    border-color: rgba(255,23,68,.3); color: #fff;
}
.btn-leave {
    padding: 12px 28px; border-radius: 12px; font-size: .9rem; font-weight: 700;
    cursor: pointer; border: 2px solid var(--card-border);
    background: var(--card-bg); color: var(--text-dim); transition: all .2s;
}

#game-screen {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
    padding: 12px; justify-content: flex-start; padding-top: 16px;
}
.game-top-bar {
    width: 100%; max-width: 500px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
.game-round { font-size: .85rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.game-score { font-size: .85rem; font-weight: 700; color: var(--green); }
.game-timer-wrap { width: 100%; max-width: 500px; margin-bottom: 12px; }
.game-timer-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,.08); overflow: hidden; }
.game-timer-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--green), #69f0ae);
    transition: width .15s linear; width: 100%;
}
.game-timer-fill.warn { background: linear-gradient(90deg, #ff9100, #ffab40); }
.game-timer-fill.danger { background: linear-gradient(90deg, var(--red), #ff5252); animation: pulse .5s infinite; }
.game-timer-text {
    text-align: center; font-size: 1.6rem; font-weight: 900;
    color: var(--text); margin-top: 4px; transition: color .3s;
}
.game-timer-text.warn { color: #ff9100; }
.game-timer-text.danger { color: var(--red); animation: pulse .5s infinite; }

.question-card {
    width: 100%; max-width: 500px;
    background: var(--glass); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 24px 20px; margin-bottom: 14px; animation: slideUp .4s ease;
}
.question-text {
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 700; line-height: 1.6; text-align: center; margin-bottom: 20px; color: #fff;
}
.options-list { display:flex; flex-direction:column; gap:10px; }
.option-item {
    padding: 14px 16px; border-radius: 14px;
    background: var(--card-bg); border: 2px solid var(--card-border);
    cursor: pointer; transition: all .25s;
    font-size: clamp(.85rem, 2.5vw, 1.05rem);
    font-weight: 600; display: flex; align-items: center; gap: 12px;
    -webkit-user-select: none; user-select: none;
}
.option-item:active { transform: scale(.98); }
.option-letter {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent2); display:flex; align-items:center; justify-content:center;
    font-weight: 800; font-size: .85rem; color: var(--gold); flex-shrink:0; transition: all .25s;
}
.option-item:hover { border-color: rgba(245,197,24,.3); }
.option-item.selected { border-color: var(--blue); background: rgba(68,138,255,.1); }
.option-item.selected .option-letter { background: var(--blue); color: #fff; }
.option-item.correct { border-color: var(--green); background: rgba(0,230,118,.1); animation: pulse .5s; }
.option-item.correct .option-letter { background: var(--green); color: #1a1a2e; }
.option-item.wrong { border-color: var(--red); background: rgba(255,23,68,.1); animation: shake .4s; }
.option-item.wrong .option-letter { background: var(--red); color: #fff; }
.option-item.disabled { pointer-events: none; opacity: .7; }

.explanation-box {
    width: 100%; max-width: 500px;
    background: rgba(245,197,24,.06); border: 1px solid rgba(245,197,24,.15);
    border-radius: 16px; padding: 16px 18px; margin-bottom: 14px;
    display: none; animation: slideUp .4s ease;
}
.explanation-box.show { display: block; }
.explanation-title { font-size: .9rem; font-weight: 800; color: var(--gold); margin-bottom: 6px; }
.explanation-text { font-size: .85rem; color: var(--text-dim); line-height: 1.6; }

.online-scoreboard {
    width: 100%; max-width: 500px;
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px;
}
.sb-player {
    padding: 6px 14px; border-radius: 10px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    font-size: .8rem; font-weight: 700;
    display: flex; align-items: center; gap: 6px; transition: all .3s;
}
.sb-player.me { border-color: rgba(245,197,24,.4); }
.sb-player .sb-name { color: var(--text); }
.sb-player .sb-pts { color: var(--gold); }
.sb-player .sb-answered { color: var(--green); font-size: .7rem; }

.game-bottom {
    width: 100%; max-width: 500px;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}
.btn-next {
    padding: 12px 36px; border-radius: 12px; font-size: 1rem; font-weight: 800;
    cursor: pointer; border: 2px solid rgba(0,230,118,.3);
    background: linear-gradient(135deg, #00c853, #00e676); color: #1a1a2e;
    transition: all .2s; display: none; letter-spacing: 2px;
}
.btn-next:active { transform: scale(.96); }
.btn-next.show { display: inline-flex; }
.btn-exit {
    padding: 10px 24px; border-radius: 10px; font-size: .85rem; font-weight: 700;
    cursor: pointer; border: 2px solid var(--card-border);
    background: var(--card-bg); color: var(--text-dim); transition: all .2s;
}

#result-screen { background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%); }
.result-box {
    background: var(--glass); border: 1px solid var(--card-border);
    border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 420px; text-align: center;
}
.result-title { font-size: 1.6rem; font-weight: 900; color: var(--gold); margin-bottom: 8px; letter-spacing: 3px; }
.result-subtitle { color: var(--text-dim); font-size: .9rem; margin-bottom: 24px; }
.result-rank { display:flex; flex-direction:column; gap:10px; margin-bottom: 24px; }
.rank-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--card-bg); border: 1px solid var(--card-border);
}
.rank-item.top { border-color: rgba(245,197,24,.4); background: rgba(245,197,24,.06); }
.rank-num { font-size: 1.2rem; font-weight: 900; color: var(--gold); width: 28px; }
.rank-name { flex:1; text-align:left; font-weight: 700; }
.rank-score { font-weight: 900; color: var(--green); font-size: 1.1rem; }
.result-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn-replay {
    padding: 12px 32px; border-radius: 12px; font-size: 1rem; font-weight: 800;
    cursor: pointer; border: 2px solid rgba(0,230,118,.3);
    background: linear-gradient(135deg, #00c853, #00e676); color: #1a1a2e;
    transition: all .2s; letter-spacing: 2px;
}
.btn-replay:active { transform: scale(.96); }
.btn-home {
    padding: 12px 28px; border-radius: 12px; font-size: .9rem; font-weight: 700;
    cursor: pointer; border: 2px solid var(--card-border);
    background: var(--card-bg); color: var(--text-dim); transition: all .2s;
}

#countdown-overlay {
    position: fixed; inset:0; background: rgba(0,0,0,.7);
    display:none; align-items:center; justify-content:center; z-index: 100;
}
#countdown-overlay.show { display:flex; }
.countdown-num {
    font-size: 6rem; font-weight: 900; color: var(--gold);
    animation: countIn .4s ease; text-shadow: 0 0 40px rgba(245,197,24,.4);
}

#waiting-overlay {
    position: fixed; inset:0; background: rgba(0,0,0,.6);
    display:none; align-items:center; justify-content:center;
    z-index: 90; flex-direction: column; gap: 12px;
}
#waiting-overlay.show { display:flex; }
.waiting-text { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.waiting-dots::after { content:''; animation: dots 1.5s infinite; }
@keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

.toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 24px; border-radius: 12px;
    background: var(--glass); border: 1px solid var(--card-border);
    color: var(--text); font-weight: 700; font-size: .9rem;
    z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { border-color: rgba(0,230,118,.4); color: var(--green); }
.toast.error { border-color: rgba(255,23,68,.4); color: var(--red); }

@media(max-width:480px) {
    .menu-title { letter-spacing: 2px; }
    .menu-btn { padding: 14px 24px; font-size: 1.05rem; }
    .question-card { padding: 16px 14px; }
    .option-item { padding: 10px 12px; }
    .lobby-box { padding: 20px 16px; }
}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>
<div id="countdown-overlay"><div class="countdown-num" id="countdown-num">3</div></div>
<div id="waiting-overlay"><div class="waiting-text">等待其他玩家答题<span class="waiting-dots"></span></div></div>

<div class="screen active" id="menu-screen">
    <div class="menu-title">知识大冲关</div>
    <div class="menu-subtitle">挑战你的知识极限</div>
    <div class="menu-btns">
        <button class="menu-btn btn-solo" onclick="startSolo()">单人闯关</button>
        <button class="menu-btn btn-online" onclick="showRooms()">联机对战</button>
    </div>
</div>

<div class="screen" id="room-screen">
    <div class="room-header">选择房间</div>
    <div class="room-sub">点击空位加入房间</div>
    <div id="status-bar"></div>
    <div class="room-grid" id="room-grid"></div>
    <button class="btn-back" onclick="backToMenu()">返回</button>
</div>

<div class="screen" id="lobby-screen">
    <div class="lobby-box">
        <div class="lobby-title" id="lobby-title">房间 1</div>
        <div class="lobby-players" id="lobby-players"></div>
        <div class="lobby-btns">
            <button class="btn-ready" id="btn-ready" onclick="toggleReady()">准备</button>
            <button class="btn-leave" onclick="leaveRoom()">离开</button>
        </div>
    </div>
</div>

<div class="screen" id="game-screen">
    <div class="game-top-bar">
        <div class="game-round" id="game-round">第 1 题</div>
        <div class="game-score" id="game-score"></div>
    </div>
    <div class="online-scoreboard" id="online-scoreboard"></div>
    <div class="game-timer-wrap">
        <div class="game-timer-bar"><div class="game-timer-fill" id="timer-fill"></div></div>
        <div class="game-timer-text" id="timer-text"></div>
    </div>
    <div class="question-card">
        <div class="question-text" id="question-text"></div>
        <div class="options-list" id="options-list"></div>
    </div>
    <div class="explanation-box" id="explanation-box">
        <div class="explanation-title">解析</div>
        <div class="explanation-text" id="explanation-text"></div>
    </div>
    <div class="game-bottom">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题</button>
        <button class="btn-exit" onclick="exitGame()">退出</button>
    </div>
</div>

<div class="screen" id="result-screen">
    <div class="result-box">
        <div class="result-title" id="result-title">比赛结束</div>
        <div class="result-subtitle" id="result-subtitle"></div>
        <div class="result-rank" id="result-rank"></div>
        <div class="result-btns">
            <button class="btn-replay" id="btn-replay" onclick="replay()">再来一局</button>
            <button class="btn-home" onclick="backToMenu()">返回主页</button>
        </div>
    </div>
</div>

<script>
const ROOM_COUNT = 8;
const COLLECTION = 'quiz_rooms';
const MAX_PLAYERS = 4;
const ANSWER_TIME = 10;
const TOTAL_QUESTIONS = 10;
const REVEAL_DELAY = 3000;

let db = null;
let watcher = null;
let myUserId = '';
let myNickname = '';
let currentRoomDocId = '';
let currentRoomId = '';
let myPlayerIndex = -1;
let isOnlineMode = false;
let isReady = false;

let soloState = {
    questions: [],
    currentIdx: 0,
    score: 0,
    selected: null,
    answered: false,
    timer: null,
    timeLeft: 0
};

let onlineState = {
    questions: [],
    currentIdx: -1,
    score: 0,
    selected: null,
    answered: false,
    timer: null,
    timeLeft: 0,
    roomData: null,
    revealed: false,
    advanceTimer: null,
    gameStarting: false,
    safetyTimer: null
};

const questionBank = window.questionBank || [];
const letters = ['A','B','C','D'];

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    setTimeout(() => t.className = 'toast', 2200);
}

function setStatus(msg, type) {
    const s = document.getElementById('status-bar');
    s.textContent = msg;
    s.className = type || '';
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function pickQuestions(count) {
    if (questionBank.length === 0) return [];
    const pool = questionBank.length >= count
        ? shuffle(questionBank)
        : shuffle(questionBank).concat(shuffle(questionBank));
    return pool.slice(0, count);
}

function showCountdown(callback) {
    const overlay = document.getElementById('countdown-overlay');
    const numEl = document.getElementById('countdown-num');
    overlay.classList.add('show');
    let count = 3;
    numEl.textContent = count;
    const iv = setInterval(() => {
        count--;
        if (count <= 0) {
            clearInterval(iv);
            overlay.classList.remove('show');
            callback();
        } else {
            numEl.textContent = count;
            numEl.style.animation = 'none';
            numEl.offsetHeight;
            numEl.style.animation = 'countIn .4s ease';
        }
    }, 800);
}

function startSolo() {
    isOnlineMode = false;
    soloState = {
        questions: pickQuestions(TOTAL_QUESTIONS),
        currentIdx: 0,
        score: 0,
        selected: null,
        answered: false,
        timer: null,
        timeLeft: 0
    };
    if (soloState.questions.length === 0) {
        showToast('题库为空，无法开始', 'error');
        return;
    }
    showCountdown(() => {
        showScreen('game-screen');
        renderSoloQuestion();
    });
}

function renderSoloQuestion() {
    const s = soloState;
    if (s.currentIdx >= s.questions.length) { endSolo(); return; }
    const q = s.questions[s.currentIdx];
    s.selected = null;
    s.answered = false;
    s.timeLeft = ANSWER_TIME;

    document.getElementById('game-round').textContent = '第 ' + (s.currentIdx + 1) + '/' + s.questions.length + ' 题';
    document.getElementById('game-score').textContent = '得分: ' + s.score;
    document.getElementById('online-scoreboard').innerHTML = '';
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('explanation-box').classList.remove('show');
    document.getElementById('btn-next').classList.remove('show');

    const ol = document.getElementById('options-list');
    ol.innerHTML = '';
    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + opt + '</span>';
        div.onclick = () => soloSelect(i);
        ol.appendChild(div);
    });

    startSoloTimer();
}

function soloSelect(idx) {
    const s = soloState;
    if (s.answered) return;
    s.answered = true;
    s.selected = idx;
    clearInterval(s.timer);

    const q = s.questions[s.currentIdx];
    const items = document.querySelectorAll('#options-list .option-item');
    items.forEach((it, i) => {
        it.classList.add('disabled');
        if (i === q.answer) it.classList.add('correct');
        if (i === idx && idx !== q.answer) it.classList.add('wrong');
    });

    if (idx === q.answer) {
        s.score++;
        document.getElementById('game-score').textContent = '得分: ' + s.score;
    }

    document.getElementById('explanation-text').textContent = q.explanation || '暂无解析';
    document.getElementById('explanation-box').classList.add('show');
    document.getElementById('btn-next').classList.add('show');
}

function startSoloTimer() {
    const s = soloState;
    clearInterval(s.timer);
    const fill = document.getElementById('timer-fill');
    const text = document.getElementById('timer-text');
    const start = Date.now();
    const total = ANSWER_TIME * 1000;

    function tick() {
        const elapsed = Date.now() - start;
        const remain = Math.max(0, total - elapsed);
        s.timeLeft = remain / 1000;
        const pct = (remain / total) * 100;
        fill.style.width = pct + '%';
        fill.className = 'game-timer-fill' + (pct < 20 ? ' danger' : pct < 40 ? ' warn' : '');
        text.className = 'game-timer-text' + (pct < 20 ? ' danger' : pct < 40 ? ' warn' : '');
        text.textContent = Math.ceil(s.timeLeft);
        if (remain <= 0) {
            clearInterval(s.timer);
            soloTimeUp();
        }
    }
    s.timer = setInterval(tick, 100);
    tick();
}

function soloTimeUp() {
    const s = soloState;
    if (s.answered) return;
    s.answered = true;
    const q = s.questions[s.currentIdx];
    const items = document.querySelectorAll('#options-list .option-item');
    items.forEach((it, i) => {
        it.classList.add('disabled');
        if (i === q.answer) it.classList.add('correct');
    });
    document.getElementById('explanation-text').textContent = q.explanation || '暂无解析';
    document.getElementById('explanation-box').classList.add('show');
    document.getElementById('btn-next').classList.add('show');
    showToast('时间到！', 'error');
}

function nextQuestion() {
    if (isOnlineMode) { onlineNext(); return; }
    soloState.currentIdx++;
    renderSoloQuestion();
}

function endSolo() {
    clearInterval(soloState.timer);
    const s = soloState;
    document.getElementById('result-title').textContent = '闯关结束';
    document.getElementById('result-subtitle').textContent = '共 ' + s.questions.length + ' 题，答对 ' + s.score + ' 题';
    const rank = document.getElementById('result-rank');
    rank.innerHTML = '<div class="rank-item top"><div class="rank-num">1</div><div class="rank-name">你</div><div class="rank-score">' + s.score + ' 分</div></div>';
    document.getElementById('btn-replay').textContent = '再来一局';
    showScreen('result-screen');
}

function exitGame() {
    if (isOnlineMode) { leaveRoom(); return; }
    clearInterval(soloState.timer);
    showScreen('menu-screen');
}

function replay() {
    if (isOnlineMode) { onlineReplay(); return; }
    startSolo();
}

async function initCloudBase() {
    if (db) return true;
    try {
        const app = await getCloudBaseApp();
        if (!app) throw new Error('CloudBase 不可用');
        db = app.database();
        myUserId = getUserId();
        myNickname = await fetchNickname();
        return true;
    } catch (e) {
        console.error('CloudBase 初始化失败:', e);
        return false;
    }
}

async function fetchNickname() {
    const userId = getUserId();
    if (userId.startsWith('visitor_')) return '游客';
    const local = localStorage.getItem('game_nickname');
    if (local && local !== '玩家') return local;
    try {
        const app = await getCloudBaseApp();
        if (app) {
            const cdb = app.database();
            const res = await cdb.collection('users').where({ user_id: userId }).get();
            if (res.data && res.data.length > 0) {
                const name = res.data[0].username || res.data[0].nickname || '玩家';
                localStorage.setItem('game_nickname', name);
                return name;
            }
        }
    } catch (e) { console.warn('获取昵称失败:', e); }
    return localStorage.getItem('game_nickname') || '玩家';
}

async function showRooms() {
    showScreen('room-screen');
    setStatus('连接中...', '');
    const ok = await initCloudBase();
    if (!ok) { setStatus('连接失败，请重试', 'err'); return; }
    await ensureRooms();
    await refreshRooms();
}

async function ensureRooms() {
    try {
        const res = await db.collection(COLLECTION).limit(ROOM_COUNT + 5).get();
        const existing = {};
        (res.data || []).forEach(r => { if (r.roomId) existing[r.roomId] = r; });
        for (let i = 1; i <= ROOM_COUNT; i++) {
            const rid = 'room' + i;
            if (!existing[rid]) {
                const players = [];
                for (let p = 0; p < MAX_PLAYERS; p++) {
                    players.push({ id: null, nickname: null, ready: false, score: 0, answered: false, answerChoice: -1 });
                }
                await db.collection(COLLECTION).add({
                    roomId: rid,
                    roomName: '房间' + i,
                    players: players,
                    started: false,
                    currentQuestion: -1,
                    questions: [],
                    questionStartTime: 0,
                    lastActiveAt: Date.now()
                });
            }
        }
    } catch (e) { console.error('ensureRooms 失败:', e); throw e; }
}

async function refreshRooms() {
    const grid = document.getElementById('room-grid');
    grid.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);grid-column:1/-1;">加载中...</div>';
    try {
        await cleanupZombieRooms();
        const res = await db.collection(COLLECTION).orderBy('roomId', 'asc').limit(ROOM_COUNT).get();
        const rooms = (res.data || []).sort((a, b) => {
            const na = parseInt(a.roomId.replace('room', '')) || 999;
            const nb = parseInt(b.roomId.replace('room', '')) || 999;
            return na - nb;
        });
        renderRoomList(rooms);
    } catch (e) {
        grid.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red);grid-column:1/-1;">加载失败</div>';
    }
}

const ZOMBIE_TIMEOUT = 10 * 60 * 1000;
async function cleanupZombieRooms() {
    try {
        const now = Date.now();
        const res = await db.collection(COLLECTION).limit(ROOM_COUNT + 5).get();
        for (const room of (res.data || [])) {
            if (!room.roomId || !room.roomId.startsWith('room')) continue;
            if (!room.started && (now - (room.lastActiveAt || 0) > ZOMBIE_TIMEOUT)) {
                const players = [];
                for (let p = 0; p < MAX_PLAYERS; p++) {
                    players.push({ id: null, nickname: null, ready: false, score: 0, answered: false, answerChoice: -1 });
                }
                await db.collection(COLLECTION).doc(room._id).update({
                    players: players, started: false, currentQuestion: -1, questions: [], questionStartTime: 0, lastActiveAt: Date.now()
                });
            }
        }
    } catch (e) { console.warn('清理僵尸房间失败:', e); }
}

function renderRoomList(rooms) {
    const grid = document.getElementById('room-grid');
    let html = '';
    rooms.forEach(room => {
        const taken = (room.players || []).filter(p => p.id).length;
        const isFull = taken >= MAX_PLAYERS;
        const isPlaying = !!room.started;
        html += '<div class="room-card ' + (isFull ? 'full' : '') + '" onclick="' + (isFull || isPlaying ? '' : "joinRoom('" + room.roomId + "')") + '">';
        html += '<div class="room-name">' + room.roomName + '</div>';
        html += '<div class="room-seats">';
        for (let i = 0; i < MAX_PLAYERS; i++) {
            const p = (room.players || [])[i];
            const cls = p && p.id ? (p.id === myUserId ? 'seat-dot me' : 'seat-dot taken') : 'seat-dot';
            const txt = p && p.id ? (p.id === myUserId ? '我' : '✓') : '+';
            html += '<div class="' + cls + '">' + txt + '</div>';
            if (i === 1) html += '<div class="room-vs">|</div>';
        }
        html += '</div><div style="font-size:.75rem;color:var(--text-dim);margin-top:6px;">' + (isPlaying ? '游戏中' : taken + '/' + MAX_PLAYERS) + '</div></div>';
    });
    grid.innerHTML = html;
}

async function joinRoom(roomId) {
    if (!db) return setStatus('未连接数据库', 'err');
    try {
        await cleanupMyOldRooms(roomId);
        const res = await db.collection(COLLECTION).where({ roomId }).limit(1).get();
        if (!res.data || !res.data.length) return setStatus('房间不存在', 'err');
        const room = res.data[0];
        if (room.started) return setStatus('游戏进行中', 'err');

        const players = room.players || [];
        let mySpot = players.findIndex(p => p.id === myUserId);
        if (mySpot === -1) {
            mySpot = players.findIndex(p => !p.id);
            if (mySpot === -1) return setStatus('房间已满', 'err');
            players[mySpot] = { id: myUserId, nickname: myNickname, ready: false, score: 0, answered: false, answerChoice: -1 };
            await db.collection(COLLECTION).doc(room._id).update({ players, lastActiveAt: Date.now() });
        }

        currentRoomDocId = room._id;
        currentRoomId = roomId;
        myPlayerIndex = mySpot;
        isReady = false;
        isOnlineMode = true;

        showScreen('lobby-screen');
        renderLobby(room);
        startWatchRoom();
        setStatus('', '');
    } catch (e) {
        setStatus('加入失败: ' + e.message, 'err');
    }
}

async function cleanupMyOldRooms(excludeRoomId) {
    try {
        const res = await db.collection(COLLECTION).limit(ROOM_COUNT + 5).get();
        for (const room of (res.data || [])) {
            if (room.roomId === excludeRoomId) continue;
            const players = room.players || [];
            const idx = players.findIndex(p => p.id === myUserId);
            if (idx === -1) continue;
            players[idx] = { id: null, nickname: null, ready: false, score: 0, answered: false, answerChoice: -1 };
            const anyoneLeft = players.some(p => p.id);
            const updateData = { players };
            if (!anyoneLeft) {
                updateData.started = false;
                updateData.currentQuestion = -1;
                updateData.questions = [];
                updateData.questionStartTime = 0;
            }
            await db.collection(COLLECTION).doc(room._id).update(updateData);
        }
    } catch (e) { console.warn('清理旧房间失败:', e); }
}

function renderLobby(room) {
    const players = room.players || [];
    document.getElementById('lobby-title').textContent = room.roomName || ('房间 ' + currentRoomId);
    const container = document.getElementById('lobby-players');
    container.innerHTML = '';
    players.forEach((p, i) => {
        if (!p.id) return;
        const isMe = p.id === myUserId;
        const div = document.createElement('div');
        div.className = 'lobby-player' + (p.ready ? ' ready' : '');
        div.innerHTML = '<div class="p-avatar">' + (isMe ? '我' : (i + 1)) + '</div>'
            + '<div class="p-name">' + (p.nickname || '玩家') + (isMe ? ' (你)' : '') + '</div>'
            + '<div class="p-status ' + (p.ready ? 'ready' : 'waiting') + '">' + (p.ready ? '已准备' : '等待中') + '</div>';
        container.appendChild(div);
    });

    const btnReady = document.getElementById('btn-ready');
    const myP = players[myPlayerIndex];
    if (myP && myP.ready) {
        btnReady.textContent = '取消准备';
        btnReady.classList.add('cancel');
    } else {
        btnReady.textContent = '准备';
        btnReady.classList.remove('cancel');
    }
}

async function toggleReady() {
    if (!currentRoomDocId || myPlayerIndex < 0) return;
    try {
        const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
        if (!res.data || !res.data.length) return;
        const room = res.data[0];
        const players = room.players || [];
        if (!players[myPlayerIndex]) return;
        const newReady = !players[myPlayerIndex].ready;
        players[myPlayerIndex].ready = newReady;
        await db.collection(COLLECTION).doc(currentRoomDocId).update({ players, lastActiveAt: Date.now() });
        isReady = newReady;
    } catch (e) { console.error('准备失败:', e); }
}

async function startWatchRoom() {
    if (watcher) watcher.close();
    try {
        watcher = db.collection(COLLECTION).doc(currentRoomDocId).watch({
            onChange: snapshot => {
                if (!snapshot.docs || !snapshot.docs.length) {
                    showToast('房间已解散', 'error');
                    leaveRoom();
                    return;
                }
                handleRoomUpdate(snapshot.docs[0]);
            },
            onError: err => {
                console.error('监听出错:', err);
                setTimeout(() => { if (currentRoomDocId) startWatchRoom(); }, 3000);
            }
        });
    } catch (e) {
        console.error('启动监听失败:', e);
    }
}

function handleRoomUpdate(room) {
    onlineState.roomData = room;
    const players = room.players || [];
    const activePlayers = players.filter(p => p.id);

    if (room.started) {
        if (onlineState.gameStarting) return;
        if (!document.getElementById('game-screen').classList.contains('active') &&
            !document.getElementById('result-screen').classList.contains('active')) {
            onlineState.gameStarting = true;
            onlineState.currentIdx = -1;
            onlineState.revealed = false;
            onlineState.answered = false;
            onlineState.selected = null;
            clearInterval(onlineState.timer);
            clearTimeout(onlineState.advanceTimer);
            clearTimeout(onlineState.safetyTimer);
            showCountdown(() => {
                onlineState.gameStarting = false;
                showScreen('game-screen');
                renderOnlineQuestion(room);
            });
        } else if (document.getElementById('game-screen').classList.contains('active')) {
            renderOnlineQuestion(room);
        } else if (document.getElementById('result-screen').classList.contains('active')) {
            return;
        }
    } else {
        if (document.getElementById('lobby-screen').classList.contains('active')) {
            renderLobby(room);
        }
        const allReady = activePlayers.length >= 2 && activePlayers.every(p => p.ready);
        if (allReady && players[myPlayerIndex] && players[myPlayerIndex].id === myUserId) {
            startOnlineGame(room);
        }
    }
}

async function startOnlineGame(room) {
    try {
        const questions = pickQuestions(TOTAL_QUESTIONS);
        if (questions.length === 0) {
            showToast('题库为空，无法开始', 'error');
            return;
        }
        const players = room.players.map(p => ({
            ...p,
            score: 0,
            ready: false,
            answered: false,
            answerChoice: -1
        }));
        await db.collection(COLLECTION).doc(currentRoomDocId).update({
            started: true,
            questions: questions.map(q => q.id),
            currentQuestion: 0,
            players: players,
            questionStartTime: Date.now(),
            lastActiveAt: Date.now()
        });
    } catch (e) { console.error('开始游戏失败:', e); }
}

function renderOnlineQuestion(room) {
    const players = room.players || [];
    const activePlayers = players.filter(p => p.id);
    const qIds = room.questions || [];
    const currentQ = room.currentQuestion != null ? room.currentQuestion : -1;

    if (currentQ < 0 || currentQ >= qIds.length) {
        if (qIds.length > 0 && currentQ >= qIds.length) {
            if (!document.getElementById('result-screen').classList.contains('active')) {
                endOnlineGame(room);
            }
        }
        return;
    }

    const qId = qIds[currentQ];
    const q = questionBank.find(qq => qq.id === qId);
    if (!q) return;

    const myP = players[myPlayerIndex];
    if (!myP) return;

    const isNewQuestion = onlineState.currentIdx !== currentQ;
    if (isNewQuestion) {
        onlineState.currentIdx = currentQ;
        onlineState.selected = null;
        onlineState.answered = false;
        onlineState.revealed = false;
        onlineState.score = myP.score || 0;
        clearInterval(onlineState.timer);
        clearTimeout(onlineState.advanceTimer);
        clearTimeout(onlineState.safetyTimer);
        onlineState.safetyTimer = null;
        document.getElementById('waiting-overlay').classList.remove('show');
        document.getElementById('explanation-box').classList.remove('show');
        document.getElementById('btn-next').classList.remove('show');

        document.getElementById('question-text').textContent = q.question;
        const ol = document.getElementById('options-list');
        ol.innerHTML = '';
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + opt + '</span>';
            div.onclick = () => onlineSelect(i);
            ol.appendChild(div);
        });

        startOnlineTimer(room.questionStartTime || Date.now());
    }

    onlineState.score = myP.score || 0;
    document.getElementById('game-round').textContent = '第 ' + (currentQ + 1) + '/' + qIds.length + ' 题';
    document.getElementById('game-score').textContent = '我的得分: ' + onlineState.score;

    const sb = document.getElementById('online-scoreboard');
    sb.innerHTML = '';
    activePlayers.forEach(p => {
        const div = document.createElement('div');
        div.className = 'sb-player' + (p.id === myUserId ? ' me' : '');
        const answeredMark = p.answered ? ' ✓' : '';
        div.innerHTML = '<span class="sb-name">' + (p.nickname || '玩家') + '</span><span class="sb-pts">' + (p.score || 0) + '分</span><span class="sb-answered">' + answeredMark + '</span>';
        sb.appendChild(div);
    });

    if (myP.answered && !onlineState.answered) {
        onlineState.answered = true;
        onlineState.selected = myP.answerChoice;
        clearInterval(onlineState.timer);

        const items = document.querySelectorAll('#options-list .option-item');
        items.forEach((it, i) => {
            it.classList.add('disabled');
            if (i === myP.answerChoice && myP.answerChoice >= 0) it.classList.add('selected');
        });

        document.getElementById('waiting-overlay').classList.add('show');
    }

    const allAnswered = activePlayers.every(p => p.answered);
    if (allAnswered && !onlineState.revealed) {
        revealAnswer(room, q);
    }

    if (!onlineState.revealed && !onlineState.safetyTimer && myPlayerIndex === 0) {
        const elapsed = Date.now() - (room.questionStartTime || Date.now());
        const safetyDelay = (ANSWER_TIME + 5) * 1000 - elapsed;
        if (safetyDelay > 0) {
            onlineState.safetyTimer = setTimeout(() => {
                forceAdvanceIfStuck(room);
            }, safetyDelay);
        }
    }
}

async function forceAdvanceIfStuck(room) {
    if (!currentRoomDocId || onlineState.revealed) return;
    try {
        const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
        if (!res.data || !res.data.length) return;
        const freshRoom = res.data[0];
        const players = freshRoom.players || [];
        const activePlayers = players.filter(p => p.id);
        const allAnswered = activePlayers.every(p => p.answered);
        if (allAnswered) return;
        for (let i = 0; i < players.length; i++) {
            if (players[i].id && !players[i].answered) {
                players[i].answered = true;
                players[i].answerChoice = -1;
            }
        }
        await db.collection(COLLECTION).doc(currentRoomDocId).update({ players, lastActiveAt: Date.now() });
    } catch (e) { console.error('强制推进失败:', e); }
}

function revealAnswer(room, q) {
    onlineState.revealed = true;
    clearInterval(onlineState.timer);
    document.getElementById('waiting-overlay').classList.remove('show');

    const items = document.querySelectorAll('#options-list .option-item');
    items.forEach((it, i) => {
        it.classList.add('disabled');
        if (i === q.answer) it.classList.add('correct');
        if (onlineState.selected === i && i !== q.answer) it.classList.add('wrong');
    });

    document.getElementById('explanation-text').textContent = q.explanation || '暂无解析';
    document.getElementById('explanation-box').classList.add('show');

    if (myPlayerIndex === 0) {
        onlineState.advanceTimer = setTimeout(() => {
            advanceQuestion(room);
        }, REVEAL_DELAY);
    }
}

async function advanceQuestion(room) {
    if (!currentRoomDocId) return;
    try {
        const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
        if (!res.data || !res.data.length) return;
        const freshRoom = res.data[0];
        const currentQ = freshRoom.currentQuestion != null ? freshRoom.currentQuestion : -1;
        const nextQ = currentQ + 1;
        const players = freshRoom.players.map(p => ({
            ...p,
            answered: false,
            answerChoice: -1
        }));
        await db.collection(COLLECTION).doc(currentRoomDocId).update({
            currentQuestion: nextQ,
            players: players,
            questionStartTime: Date.now(),
            lastActiveAt: Date.now()
        });
    } catch (e) { console.error('推进题目失败:', e); }
}

async function onlineSelect(idx) {
    if (onlineState.answered || onlineState.revealed) return;
    onlineState.answered = true;
    onlineState.selected = idx;

    const qIds = onlineState.roomData.questions || [];
    const currentQ = onlineState.roomData.currentQuestion || 0;
    const qId = qIds[currentQ];
    const q = questionBank.find(qq => qq.id === qId);
    if (!q) return;

    const isCorrect = idx === q.answer;

    const items = document.querySelectorAll('#options-list .option-item');
    items.forEach((it, i) => {
        it.classList.add('disabled');
        if (i === idx) it.classList.add('selected');
    });

    try {
        const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
        if (!res.data || !res.data.length) return;
        const room = res.data[0];
        const players = room.players || [];
        if (players[myPlayerIndex]) {
            players[myPlayerIndex].answered = true;
            players[myPlayerIndex].answerChoice = idx;
            if (isCorrect) {
                players[myPlayerIndex].score = (players[myPlayerIndex].score || 0) + 1;
            }
            await db.collection(COLLECTION).doc(currentRoomDocId).update({ players, lastActiveAt: Date.now() });
        }
    } catch (e) { console.error('提交答案失败:', e); }

    document.getElementById('waiting-overlay').classList.add('show');
}

function startOnlineTimer(questionStartTime) {
    clearInterval(onlineState.timer);
    const fill = document.getElementById('timer-fill');
    const text = document.getElementById('timer-text');
    const total = ANSWER_TIME * 1000;
    const deadline = questionStartTime + total;

    function tick() {
        const now = Date.now();
        const remain = Math.max(0, deadline - now);
        onlineState.timeLeft = remain / 1000;
        const pct = (remain / total) * 100;
        fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        fill.className = 'game-timer-fill' + (pct < 20 ? ' danger' : pct < 40 ? ' warn' : '');
        text.className = 'game-timer-text' + (pct < 20 ? ' danger' : pct < 40 ? ' warn' : '');
        text.textContent = Math.ceil(onlineState.timeLeft);
        if (remain <= 0) {
            clearInterval(onlineState.timer);
            onlineTimeUp();
        }
    }
    onlineState.timer = setInterval(tick, 100);
    tick();
}

async function onlineTimeUp() {
    if (onlineState.answered) return;
    onlineState.answered = true;

    try {
        const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
        if (!res.data || !res.data.length) return;
        const room = res.data[0];
        const players = room.players || [];
        if (players[myPlayerIndex] && !players[myPlayerIndex].answered) {
            players[myPlayerIndex].answered = true;
            players[myPlayerIndex].answerChoice = -1;
            await db.collection(COLLECTION).doc(currentRoomDocId).update({ players, lastActiveAt: Date.now() });
        }
    } catch (e) { console.error('超时提交失败:', e); }

    const items = document.querySelectorAll('#options-list .option-item');
    items.forEach((it) => {
        it.classList.add('disabled');
    });
    document.getElementById('waiting-overlay').classList.add('show');
    showToast('时间到！', 'error');
}

function onlineNext() {
    document.getElementById('btn-next').classList.remove('show');
}

function endOnlineGame(room) {
    clearInterval(onlineState.timer);
    clearTimeout(onlineState.advanceTimer);
    clearTimeout(onlineState.safetyTimer);
    onlineState.safetyTimer = null;
    document.getElementById('waiting-overlay').classList.remove('show');
    const players = (room.players || []).filter(p => p.id).sort((a, b) => (b.score || 0) - (a.score || 0));
    document.getElementById('result-title').textContent = '比赛结束';
    document.getElementById('result-subtitle').textContent = '共 ' + room.questions.length + ' 题';
    const rank = document.getElementById('result-rank');
    rank.innerHTML = '';
    players.forEach((p, i) => {
        const isMe = p.id === myUserId;
        const div = document.createElement('div');
        div.className = 'rank-item' + (i === 0 ? ' top' : '');
        div.innerHTML = '<div class="rank-num">' + (i + 1) + '</div><div class="rank-name">' + (p.nickname || '玩家') + (isMe ? ' (你)' : '') + '</div><div class="rank-score">' + (p.score || 0) + ' 分</div>';
        rank.appendChild(div);
    });
    document.getElementById('btn-replay').textContent = '再来一局';
    showScreen('result-screen');
}

async function onlineReplay() {
    if (!currentRoomDocId) { showScreen('menu-screen'); return; }
    try {
        const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
        if (!res.data || !res.data.length) { showScreen('menu-screen'); return; }
        const room = res.data[0];
        const players = (room.players || []).map(p => ({
            ...p,
            score: 0,
            ready: false,
            answered: false,
            answerChoice: -1
        }));
        await db.collection(COLLECTION).doc(currentRoomDocId).update({
            players, started: false, currentQuestion: -1, questions: [], questionStartTime: 0, lastActiveAt: Date.now()
        });
        onlineState.currentIdx = -1;
        onlineState.revealed = false;
        onlineState.answered = false;
        onlineState.selected = null;
        onlineState.gameStarting = false;
        clearInterval(onlineState.timer);
        clearTimeout(onlineState.advanceTimer);
        clearTimeout(onlineState.safetyTimer);
        onlineState.safetyTimer = null;
        showScreen('lobby-screen');
        renderLobby({ ...room, players, started: false });
    } catch (e) {
        showScreen('menu-screen');
    }
}

async function leaveRoom() {
    if (watcher) { watcher.close(); watcher = null; }
    clearInterval(onlineState.timer);
    clearTimeout(onlineState.advanceTimer);
    clearTimeout(onlineState.safetyTimer);
    onlineState.safetyTimer = null;
    document.getElementById('waiting-overlay').classList.remove('show');

    if (currentRoomDocId && myPlayerIndex >= 0) {
        try {
            const res = await db.collection(COLLECTION).doc(currentRoomDocId).get();
            if (res.data && res.data.length) {
                const room = res.data[0];
                const players = room.players || [];
                players[myPlayerIndex] = { id: null, nickname: null, ready: false, score: 0, answered: false, answerChoice: -1 };
                const anyoneLeft = players.some(p => p.id);
                const updateData = { players, lastActiveAt: Date.now() };
                if (!anyoneLeft) {
                    updateData.started = false;
                    updateData.currentQuestion = -1;
                    updateData.questions = [];
                    updateData.questionStartTime = 0;
                }
                await db.collection(COLLECTION).doc(currentRoomDocId).update(updateData);
            }
        } catch (e) { console.warn('离开房间更新失败:', e); }
    }

    currentRoomDocId = '';
    currentRoomId = '';
    myPlayerIndex = -1;
    isReady = false;
    isOnlineMode = false;
    onlineState.currentIdx = -1;
    onlineState.revealed = false;
    onlineState.answered = false;
    onlineState.selected = null;
    onlineState.gameStarting = false;
    showScreen('menu-screen');
}

function backToMenu() {
    if (isOnlineMode && currentRoomDocId) {
        leaveRoom();
        return;
    }
    clearInterval(soloState.timer);
    clearInterval(onlineState.timer);
    clearTimeout(onlineState.advanceTimer);
    clearTimeout(onlineState.safetyTimer);
    showScreen('menu-screen');
}

document.addEventListener('DOMContentLoaded', () => {
    myUserId = getUserId();
});
</script>
