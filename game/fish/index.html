<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>传说鱼王 - 悠闲垂钓</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#000;}
#cv{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:0;}
#fade{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:5;pointer-events:none;opacity:0;transition:opacity 1s;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 100%);pointer-events:none;}
#hud>*{pointer-events:auto;}
.hud-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hud-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hc{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:3px 10px;font-size:12px;color:rgba(255,255,255,.85);white-space:nowrap;}
.hc .v{color:#FFD700;font-weight:600;}
.hc .v2{color:#8FBC8F;font-weight:600;}
#lv-wrap{display:flex;flex-direction:column;gap:1px;}
#lv-label{font-size:9px;color:rgba(255,255,255,.5);}
#lv-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;width:60px;}
#lv-fill{height:100%;background:linear-gradient(90deg,#8FBC8F,#6B9E78);border-radius:2px;transition:width .4s;}
#cstatus{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);font-size:16px;color:rgba(255,255,255,.9);text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;z-index:15;transition:opacity .8s;white-space:nowrap;}
#menu-btns{position:fixed;right:10px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:6px;}
.mb{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.35);backdrop-filter:blur(4px);color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;}
.mb:hover{background:rgba(107,158,120,.3);border-color:rgba(107,158,120,.5);color:#fff;}
#sleep-btn{position:fixed;bottom:20px;right:14px;z-index:10;padding:8px 14px;background:rgba(30,30,80,.5);backdrop-filter:blur(4px);border:1px solid rgba(100,100,200,.3);border-radius:10px;color:rgba(180,180,255,.8);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
#sleep-btn:hover{background:rgba(40,40,100,.6);color:#fff;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;animation:fi .2s;}
.obox{background:rgba(20,20,30,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;max-width:440px;width:90%;max-height:75vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.obox::-webkit-scrollbar{width:3px;}
.obox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.otitle{font-size:16px;font-weight:700;color:#FFD700;margin-bottom:12px;text-align:center;}
.oclose{position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.4);font-size:16px;cursor:pointer;}
.oclose:hover{color:#fff;}
.settle-card{text-align:center;}
.settle-day{font-size:28px;font-weight:700;color:#FFD700;margin-bottom:4px;}
.settle-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px;}
.settle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.settle-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px;text-align:center;}
.settle-item .sl{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:2px;}
.settle-item .sv{font-size:18px;font-weight:700;color:#8FBC8F;}
.settle-item .sv.gold{color:#FFD700;}
.settle-best{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:10px;padding:10px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.settle-best .sb-icon{font-size:28px;}
.settle-best .sb-info{text-align:left;}
.settle-best .sb-name{font-size:13px;font-weight:600;color:#FFD700;}
.settle-best .sb-detail{font-size:11px;color:rgba(255,255,255,.5);}
.settle-weather{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px;}
.settle-weather span{color:#87CEEB;}
.settle-energy{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px;}
.settle-energy span{color:#8FBC8F;}
.new-day-btn{padding:12px 32px;background:linear-gradient(135deg,#6B9E78,#5A8A66);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(107,158,120,.3);}
.new-day-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,158,120,.4);}
.sc-item{padding:8px 10px;border-radius:10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;transition:all .15s;border:1px solid rgba(255,255,255,.05);margin-bottom:3px;color:rgba(255,255,255,.7);}
.sc-item:hover{background:rgba(255,255,255,.05);}
.sc-item.act{background:rgba(107,158,120,.15);border-color:rgba(107,158,120,.4);color:#8FBC8F;}
.sc-item.lock{opacity:.3;cursor:not-allowed;}
.sc-icon{font-size:18px;}
.sc-nm{font-weight:600;font-size:12px;}
.sc-ds{font-size:10px;color:rgba(255,255,255,.35);}
.sp-btn{padding:6px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;color:rgba(255,255,255,.6);width:100%;text-align:left;margin-bottom:3px;transition:all .15s;display:flex;justify-content:space-between;}
.sp-btn:hover{border-color:rgba(107,158,120,.4);}
.sp-btn.act{border-color:rgba(107,158,120,.5);color:#8FBC8F;background:rgba(107,158,120,.08);}
.sp-stars{color:#FFD700;font-size:10px;}
.sec-title{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.05);}
.qi{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px;margin-bottom:4px;}
.qi.done{opacity:.4;}
.qi.act-q{border-color:rgba(107,158,120,.3);}
.qi-t{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);}
.qi-d{font-size:10px;color:rgba(255,255,255,.35);margin:2px 0;}
.qi-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin:3px 0;}
.qi-bar-in{height:100%;background:#6B9E78;border-radius:2px;transition:width .4s;}
.qi-r{font-size:10px;color:#FFD700;}
.si{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;}
.si:hover{border-color:rgba(255,215,0,.3);}
.si.owned{opacity:.5;cursor:default;}
.si.lock{opacity:.35;cursor:not-allowed;}
.si.equipped{border-color:rgba(107,158,120,.4);}
.si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.si-nm{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);}
.si-pr{color:#FFD700;font-size:11px;font-weight:600;}
.si-ds{font-size:10px;color:rgba(255,255,255,.35);}
.si-st{font-size:10px;color:#8FBC8F;margin-top:2px;}
.si-mat{font-size:9px;color:rgba(255,255,255,.25);margin-top:2px;line-height:1.4;word-break:break-all;}
.rb{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;}
.rb-common{background:rgba(154,148,132,.12);color:#9A9484;}
.rb-uncommon{background:rgba(107,170,107,.12);color:#6BAA6B;}
.rb-rare{background:rgba(91,142,201,.12);color:#5B8EC9;}
.rb-epic{background:rgba(155,109,184,.12);color:#9B6DB8;}
.rb-legendary{background:rgba(212,160,23,.12);color:#D4A017;}
.fg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:2px;}
.fc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:4px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.fc:hover{border-color:rgba(107,158,120,.4);}
.fc.caught{border-color:rgba(107,158,120,.3);}
.fc.escaped{border-color:rgba(200,150,60,.35);}
.fc.legendary-fish{border-color:rgba(255,215,0,.3);animation:gg 2s infinite alternate;}
@keyframes gg{from{box-shadow:0 0 3px rgba(255,215,0,.15)}to{box-shadow:0 0 8px rgba(255,215,0,.3)}}
.fe{font-size:16px;margin-bottom:1px;filter:grayscale(1);opacity:.3;transition:all .3s;}
.fc.caught .fe{filter:none;opacity:1;}
.fc.escaped .fe{filter:grayscale(.5);opacity:.5;}
.fn{font-size:7px;color:rgba(255,255,255,.3);}
.fc.caught .fn{color:rgba(255,255,255,.6);}
.fc.escaped .fn{color:rgba(200,150,60,.6);}
.fcnt{position:absolute;top:1px;right:2px;font-size:7px;color:rgba(255,255,255,.3);}
.fc.hint{font-size:6px;color:rgba(200,150,60,.5);margin-top:1px;line-height:1.2;}
.gs{text-align:center;padding:4px;font-size:11px;color:rgba(255,255,255,.35);margin-bottom:4px;}
.gs span{color:#8FBC8F;font-weight:700;}
.fd-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;}
.fd-s{background:rgba(255,255,255,.03);border-radius:6px;padding:5px 7px;}
.fd-l{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:1px;}
.fd-v{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);}
.gr-row{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px;color:rgba(255,255,255,.6);}
.gr-icon{font-size:14px;width:18px;text-align:center;}
.gr-nm{flex:1;}
.gr-val{color:#8FBC8F;font-size:10px;}
.lc{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.cc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
.cc:hover{border-color:rgba(107,158,120,.4);background:rgba(107,158,120,.06);transform:translateY(-1px);}
.cc-icon{font-size:22px;}
.cc-info{flex:1;}
.cc-nm{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);}
.cc-ds{font-size:11px;color:rgba(255,255,255,.4);}
#cpop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(20,20,30,.92);backdrop-filter:blur(10px);border:2px solid #6B9E78;border-radius:14px;padding:16px 24px;text-align:center;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);min-width:180px;box-shadow:0 6px 25px rgba(0,0,0,.4);}
#cpop.show{transform:translate(-50%,-50%) scale(1);}
#cpop.lc{border-color:#FFD700;}
#cpop-close{display:inline-block;margin-top:8px;padding:4px 16px;background:rgba(107,158,120,.25);border:1px solid rgba(107,158,120,.5);border-radius:6px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;transition:background .2s;}
#cpop-close:hover{background:rgba(107,158,120,.45);color:#fff;}
#pe{font-size:42px;margin-bottom:4px;}
#pn{font-size:16px;font-weight:700;margin-bottom:2px;color:rgba(255,255,255,.9);}
#pd{font-size:11px;color:rgba(255,255,255,.5);}
#px{font-size:12px;color:#8FBC8F;font-weight:600;margin-top:4px;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,.85);backdrop-filter:blur(6px);border:1px solid rgba(107,158,120,.3);border-radius:8px;padding:6px 14px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;color:rgba(255,255,255,.8);}
#toast.show{opacity:1;}
@keyframes fi{from{opacity:0}to{opacity:1}}
@media(max-width:700px){
  .hc{font-size:10px;padding:2px 7px;}
  #menu-btns{right:6px;gap:4px;}
  .mb{width:34px;height:34px;font-size:14px;}
  #cstatus{font-size:14px;}
  #sleep-btn{padding:6px 10px;font-size:11px;}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="fade"></div>
<div id="hud">
  <div class="hud-left">
    <div class="hc" id="h-day">📅 第1天</div>
    <div class="hc" id="h-season">🌸 春天</div>
    <div class="hc" id="h-time">🌅 6:00</div>
    <div class="hc" id="h-weather">☀️ 晴天</div>
  </div>
  <div class="hud-right">
    <div class="hc">Lv.<span class="v2" id="h-lv">1</span></div>
    <div id="lv-wrap"><div id="lv-label"><span style="color:rgba(255,255,255,.4);font-size:9px">经验 <span id="h-xp">0</span>/<span id="h-xpn">100</span></span></div><div id="lv-bar"><div id="lv-fill" style="width:0%"></div></div></div>
    <div class="hc">💰<span class="v" id="h-gold">200</span></div>
    <div class="hc">🐟<span class="v2" id="h-caught">0</span></div>
    <div class="hc">⚡<span class="v2" id="h-energy">100</span></div>
  </div>
</div>
<div id="cstatus"></div>
<div id="menu-btns">
  <button class="mb" onclick="showPanel('ol-scene')" title="场景">🏔️</button>
  <button class="mb" onclick="showPanel('ol-bag')" title="背包">🎒</button>
  <button class="mb" onclick="showPanel('ol-forge')" title="锻造">🔨</button>
  <button class="mb" onclick="showPanel('ol-guide')" title="图鉴">📖</button>
  <button class="mb" onclick="showPanel('ol-quest')" title="任务">📋</button>
</div>
<button id="sleep-btn" onclick="endDayEarly()">💤 休息</button>
<div id="cpop"><div id="pe">🐟</div><div id="pn"></div><div id="pd"></div><div id="px"></div><button id="cpop-close" onclick="closeCatch()">收下</button></div>
<div id="ol-settle" class="overlay" style="display:none"><div class="obox settle-card"><div class="otitle">🌙 一天结束了</div><div id="settle-c"></div></div></div>
<div id="ol-scene" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-scene')">✕</button><div class="otitle">🏔️ 场景与钓点</div><div id="scene-c"></div></div></div>
<div id="ol-bag" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-bag')">✕</button><div class="otitle">🎒 背包</div><div id="bag-c"></div></div></div>
<div id="ol-forge" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-forge')">✕</button><div class="otitle">🔨 锻造工坊</div><div id="forge-c"></div></div></div>
<div id="ol-guide" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-guide')">✕</button><div class="otitle">📖 鱼类图鉴</div><div id="guide-c"></div></div></div>
<div id="ol-quest" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-quest')">✕</button><div class="otitle">📋 任务</div><div id="quest-c"></div></div></div>
<div id="ol-fish" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-fish')">✕</button><div id="fish-det"></div></div></div>
<div id="ol-lv" class="overlay" style="display:none"><div class="obox"><div class="otitle">🎉 等级提升！Lv.<span id="nlv"></span></div><div style="text-align:center;color:rgba(255,255,255,.5);font-size:12px;margin-bottom:8px">选择一项强化能力</div><div class="lc" id="lv-opts"></div></div></div>
<div id="ol-ach" class="overlay" style="display:none"><div class="obox" style="text-align:center"><button class="oclose" onclick="clOL('ol-ach')">✕</button><div style="font-size:36px;margin-bottom:4px" id="ac-icon">🏆</div><div class="otitle" id="ac-title">成就解锁</div><div style="color:rgba(255,255,255,.5);font-size:12px" id="ac-desc"></div><div style="color:#FFD700;font-size:12px;margin-top:4px" id="ac-rw"></div></div></div>
<div id="toast"></div>
<script src="fish_data.js"></script>

  {id:'line_strong',t:'line',nm:'高强度线',pr:90,pw:1,lk:0,sp:1,ds:'不易断线',r:'uncommon',ulv:3},
  {id:'line_steel',t:'line',nm:'钢丝线',pr:280,pw:3,lk:0,sp:0,ds:'极高耐久',r:'rare',ulv:6},

function drawFishingRod(w,h,wy){var rodBase={x:w*.82,y:h*.92};var rodTip={x:w*.52,y:h*.32};var rodAngle=0;if(G.state==='charging'){var elapsed=st-G.chargeStart;G.castPower=Math.abs(Math.sin(elapsed*2.5));rodAngle=G.castPower*0.25}else if(G.state==='casting'&&G.castAnim){G.castAnim.t+=1/60;var prog=Math.min(1,G.castAnim.t/G.castAnim.dur);var ease=1-Math.pow(1-prog,3);rodAngle=G.castAnim.power*0.25*(1-ease);var tipOrigX=rodTip.x;var tipOrigY=rodTip.y;var tipSwing=G.castAnim.power*0.15*ease;rodTip={x:tipOrigX-tipSwing*w,y:tipOrigY-tipSwing*h*0.3}}var ctrlX=w*.7;var ctrlY=h*.58;if(rodAngle>0){var midX=(rodBase.x+rodTip.x)/2;var midY=(rodBase.y+rodTip.y)/2;ctrlY=midY-rodAngle*h*0.3;ctrlX=midX+rodAngle*w*0.05}cx.strokeStyle='#8B7355';cx.lineWidth=5;cx.lineCap='round';cx.beginPath();cx.moveTo(rodBase.x,rodBase.y);cx.quadraticCurveTo(ctrlX,ctrlY,rodTip.x,rodTip.y);cx.stroke();cx.strokeStyle='#A08060';cx.lineWidth=3;cx.beginPath();cx.moveTo(rodTip.x,rodTip.y);cx.lineTo(rodTip.x-8,rodTip.y-4);cx.stroke();cx.strokeStyle='#C0A070';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(rodBase.x-3,rodBase.y-10);cx.lineTo(rodBase.x+3,rodBase.y-10);cx.stroke();if(G.state==='charging'){var barW=12;var barH=h*0.25;var barX=w*.78;var barY=h*.35;cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(barX-2,barY-2,barW+4,barH+4);var fillH=barH*G.castPower;var powerColor=G.castPower<0.4?'rgba(100,200,100,0.9)':G.castPower<0.75?'rgba(255,200,50,0.9)':'rgba(255,80,80,0.9)';var barGrad=cx.createLinearGradient(barX,barY+barH,barX,barY);barGrad.addColorStop(0,'rgba(100,200,100,0.8)');barGrad.addColorStop(0.5,'rgba(255,200,50,0.8)');barGrad.addColorStop(1,'rgba(255,80,80,0.8)');cx.fillStyle=barGrad;cx.fillRect(barX,barY+barH-fillH,barW,fillH);cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;cx.strokeRect(barX,barY,barW,barH);cx.fillStyle='rgba(255,255,255,0.7)';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillText('力度',barX+barW/2,barY-8);var pct=Math.round(G.castPower*100);cx.fillText(pct+'%',barX+barW/2,barY+barH+16);cx.fillStyle=powerColor;cx.beginPath();cx.arc(barX+barW/2,barY+barH-fillH,5,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(255,255,255,0.5)';cx.lineWidth=1.5;cx.stroke()}if(G.state==='casting'&&G.castAnim){var prog=Math.min(1,G.castAnim.t/G.castAnim.dur);var power=G.castAnim.power;var lineEndX=w*.52-power*w*0.35*prog;var lineEndY=wy+(1-prog)*h*0.15-prog*5;cx.strokeStyle='rgba(200,200,200,0.5)';cx.lineWidth=.8;cx.beginPath();cx.moveTo(rodTip.x-8,rodTip.y-4);cx.quadraticCurveTo((rodTip.x-8+lineEndX)/2,wy-20*(1-prog),lineEndX,lineEndY);cx.stroke();if(prog<0.5){var splashAlpha=prog*2;cx.fillStyle='rgba(200,220,255,'+splashAlpha*0.3+')';for(var i=0;i<3;i++){var sx=lineEndX+(Math.random()-0.5)*20;var sy=lineEndY-Math.random()*15*prog;cx.beginPath();cx.arc(sx,sy,2+Math.random()*3,0,Math.PI*2);cx.fill()}}}if(G.state==='waiting'||G.state==='bite'){var bobBaseX=w*.42-G.castPower*w*0.15;var bobX=bobBaseX+Math.sin(st*1.5)*4;var bobY=wy+3+Math.sin(st*2.5)*2;if(G.state==='bite'){bobY+=4+Math.sin(st*12)*2;bobX+=Math.sin(st*8)*2}cx.strokeStyle='rgba(200,200,200,0.4)';cx.lineWidth=.8;cx.beginPath();cx.moveTo(rodTip.x-8,rodTip.y-4);cx.quadraticCurveTo((rodTip.x-8+bobX)/2,wy-15,bobX,bobY);cx.stroke();cx.fillStyle='#E85D5D';cx.beginPath();cx.ellipse(bobX,bobY,3,5,0,0,Math.PI*2);cx.fill();cx.fillStyle='#FFFFFF';cx.beginPath();cx.ellipse(bobX,bobY-3,3,2,0,0,Math.PI*2);cx.fill();if(G.state==='bite'){cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1;for(var i=0;i<3;i++){cx.beginPath();var ra=i*Math.PI*2/3+st*3;cx.arc(bobX,bobY,8+i*5+Math.sin(st*5)*2,ra,ra+1);cx.stroke()}}}}
function drawFog(w,h){if(G.weather.fog<=0)return;var fogA=Math.min(G.weather.fog*.35,.3);var g=cx.createLinearGradient(0,h*.3,0,h);g.addColorStop(0,'rgba(180,185,195,'+(fogA*.3)+')');g.addColorStop(.5,'rgba(180,185,195,'+fogA+')');g.addColorStop(1,'rgba(170,175,185,'+(fogA*.8)+')');cx.fillStyle=g;cx.fillRect(0,0,w,h)}

function rForge(){var c=document.getElementById('forge-c');c.innerHTML='<div class="sec-title">📦 材料库存</div>';MATERIALS.forEach(function(m){var q=G.inv[m.id]||0;var d=document.createElement('div');d.className='gr-row';d.innerHTML='<span class="gr-icon">'+m.emoji+'</span><span class="gr-nm">'+m.name+'</span><span class="gr-val">'+q+'个</span>';c.appendChild(d)});['rod','line','bait','flt'].forEach(function(slot){var lb={rod:'🎣 鱼竿',line:'🧵 鱼线',bait:'🪱 鱼饵',flt:'🔴 浮漂'}[slot];var h=document.createElement('div');h.className='sec-title';h.textContent='🔧 '+lb;c.appendChild(h);GEAR.filter(function(g){return g.t===slot&&G.lv>=(g.ulv||1)}).forEach(function(g){var owned=!!G.own[g.id],eq=G.eq[slot]===g.id;var recipe=RECIPES[g.id];var canCraft=true;var matList='';if(recipe){var parts=[];Object.keys(recipe).forEach(function(mid){var need=recipe[mid];var have=G.inv[mid]||0;var mat=MATERIALS.find(function(x){return x.id===mid});parts.push((have>=need?'✅':'❌')+(mat?mat.emoji:'')+(mat?mat.name:mid)+'×'+need+'('+have+')');if(have<need)canCraft=false});matList=parts.join(' ')}var d=document.createElement('div');d.className='si'+(owned&&eq?' equipped':owned?' owned':canCraft&&!owned?'':'lock');var sts=[];if(g.pw)sts.push('力+'+g.pw);if(g.lk)sts.push('运+'+g.lk);if(g.sp)sts.push('速+'+g.sp);var rl={common:'普通',uncommon:'非凡',rare:'稀有',epic:'史诗',legendary:'传说'};var extra='';if(g.con&&owned)extra=' ('+(G.bc[g.id]||0)+'个)';d.innerHTML='<div class="si-top"><span class="si-nm"><span class="rb rb-'+g.r+'">'+rl[g.r]+'</span> '+g.nm+'</span><span class="si-pr">'+(owned&&!g.con?(eq?'✅装备中':'已拥有'):'')+(g.con&&owned?'库存'+extra:'')+'</span></div><div class="si-ds">'+g.ds+'</div>'+(sts.length?'<div class="si-st">'+sts.join(' | ')+'</div>':'')+'<div class="si-mat">'+matList+'</div>';var clickable=canCraft&&(!owned||g.con);if(clickable){d.onclick=function(){craftG(g)};d.style.cursor='pointer'}else if(owned&&!eq&&!g.con){d.onclick=function(){G.eq[slot]=g.id;addLog('🔧 装备了 '+g.nm,'sys');rForge();save()};d.style.c
