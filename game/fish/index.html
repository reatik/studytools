<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>传说鱼王 - 悠闲垂钓</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{touch-action:manipulation;overflow:hidden;}
:root{
  --bg:#F5F0E8;--bg2:#EDE6D8;--bg3:#E5DDCC;--panel:#FAF6EF;
  --border:#D4C9B0;--border2:#C2B69A;
  --accent:#6B9E78;--accent2:#5A8A66;--accent3:#4A7A56;
  --gold:#D4A017;--gold2:#B8860B;
  --red:#C75C5C;--green:#5A9E6F;--blue:#6B8EB5;--purple:#9B7DB8;
  --orange:#D4915A;
  --text:#4A4035;--text2:#7A7060;--text3:#A09888;
  --rare:#5B8EC9;--epic:#9B6DB8;--legendary:#D4A017;
  --common:#9A9484;--uncommon:#6BAA6B;
  --shadow:0 2px 8px rgba(80,60,30,.08);
}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:var(--shadow);}
#topbar .title{font-size:15px;font-weight:700;color:var(--gold2);letter-spacing:1px;}
.stat-chip{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text2);}
.stat-chip .val{color:var(--accent2);font-weight:600;}
.stat-chip.gold .val{color:var(--gold2);}
#lv-wrap{flex:0 0 120px;display:flex;flex-direction:column;gap:1px;}
#lv-label{font-size:10px;color:var(--text3);}
#lv-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
#lv-fill{height:100%;background:linear-gradient(90deg,#8FBC8F,#6B9E78);border-radius:3px;transition:width .4s;}
.weather-chip{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text2);}
.tbtn{padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;}
.tbtn:hover{border-color:var(--accent);color:var(--accent2);}
#main{flex:1;display:flex;overflow:hidden;}
#side{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
#side::-webkit-scrollbar{width:3px;}
#side::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sec{border-bottom:1px solid var(--border);padding:8px 10px;}
.sec h3{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.sc-item{padding:5px 7px;border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:7px;transition:all .15s;border:1px solid transparent;margin-bottom:2px;}
.sc-item:hover{background:var(--bg2);}
.sc-item.act{background:rgba(107,158,120,.12);border-color:var(--accent);color:var(--accent2);}
.sc-item.lock{opacity:.35;cursor:not-allowed;}
.sc-icon{font-size:16px;}
.sc-nm{font-weight:600;font-size:11px;}
.sc-ds{font-size:10px;color:var(--text3);}
.sp-btn{padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;color:var(--text2);width:100%;text-align:left;margin-bottom:3px;transition:all .15s;display:flex;justify-content:space-between;}
.sp-btn:hover{border-color:var(--accent);}
.sp-btn.act{border-color:var(--accent2);color:var(--accent2);background:rgba(107,158,120,.08);}
.sp-stars{color:var(--gold2);font-size:10px;}
.gr-row{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px;}
.gr-icon{font-size:14px;width:18px;text-align:center;}
.gr-nm{flex:1;color:var(--text2);}
.gr-val{color:var(--accent2);font-size:10px;}
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#cv-wrap{width:100%;height:200px;position:relative;overflow:hidden;flex-shrink:0;background:#87CEEB;}
#cv-wrap canvas{display:block;width:100%;height:100%;}
#fctrl{padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
#cast-btn{padding:8px 20px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(107,158,120,.3);}
#cast-btn:hover{background:var(--accent2);transform:translateY(-1px);}
#cast-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
#cast-btn.reeling{background:var(--orange);animation:pulse .5s infinite alternate;}
@keyframes pulse{from{opacity:.85}to{opacity:1;transform:scale(1.02)}}
#fstatus{flex:1;font-size:12px;color:var(--text2);}
#fstatus .hl{color:var(--accent2);font-weight:600;}
#mgw{display:none;flex-direction:column;align-items:center;gap:4px;}
#mgw.on{display:flex;}
#mg-bar{width:240px;height:22px;background:var(--bg);border:1px solid var(--border);border-radius:5px;position:relative;overflow:hidden;}
#mg-zone{position:absolute;height:100%;background:rgba(107,158,120,.25);border-left:2px solid var(--green);border-right:2px solid var(--green);}
#mg-needle{position:absolute;width:4px;height:100%;background:var(--blue);border-radius:2px;}
#mg-pwrap{width:240px;height:6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
#mg-prog{height:100%;background:var(--accent);border-radius:3px;transition:width .1s;}
#mg-twrap{width:240px;height:5px;background:var(--bg);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
#mg-tens{height:100%;background:var(--green);border-radius:3px;transition:width .1s,background .2s;}
.mg-label{font-size:10px;color:var(--text3);width:240px;display:flex;justify-content:space-between;}
#log{flex:1;overflow-y:auto;padding:6px 12px;font-size:12px;line-height:1.6;}
#log::-webkit-scrollbar{width:3px;}
#log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.le{padding:1px 0;border-bottom:1px solid rgba(0,0,0,.03);animation:fi .3s ease;}
.le.catch{color:var(--green)}.le.fail{color:var(--text3)}.le.sys{color:var(--text2)}
.le.rare{color:var(--rare);font-weight:600}.le.epic{color:var(--epic);font-weight:700}
.le.legendary{color:var(--legendary);font-weight:700;text-shadow:0 0 6px rgba(212,160,23,.3)}
@keyframes fi{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
#rpanel{width:240px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.ptabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.ptab{flex:1;padding:7px 3px;text-align:center;font-size:11px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;}
.ptab:hover{color:var(--text2);}
.ptab.act{color:var(--accent2);border-bottom-color:var(--accent2);}
.pcont{display:none;flex:1;overflow-y:auto;padding:6px;}
.pcont.act{display:block;}
.pcont::-webkit-scrollbar{width:3px;}
.pcont::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.qi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;margin-bottom:4px;transition:border-color .2s;}
.qi.done{border-color:var(--green);opacity:.6;}
.qi.act-q{border-color:var(--accent2);}
.qi-t{font-size:12px;font-weight:600;margin-bottom:1px;}
.qi-d{font-size:10px;color:var(--text3);margin-bottom:3px;}
.qi-bar{height:3px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:2px;}
.qi-bar-in{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.qi-r{font-size:10px;color:var(--gold2);}
.si{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;margin-bottom:4px;cursor:pointer;transition:all .15s;}
.si:hover{border-color:var(--gold2);}
.si.owned{border-color:var(--green);opacity:.6;cursor:default;}
.si.equipped{border-color:var(--accent2);}
.si-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px;}
.si-nm{font-size:12px;font-weight:600;}
.si-pr{color:var(--gold2);font-size:11px;font-weight:600;}
.si-ds{font-size:10px;color:var(--text3);}
.si-st{font-size:10px;color:var(--accent2);margin-top:1px;}
.rb{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;}
.rb-common{background:rgba(154,148,132,.12);color:var(--common);}
.rb-uncommon{background:rgba(107,170,107,.12);color:var(--uncommon);}
.rb-rare{background:rgba(91,142,201,.12);color:var(--rare);}
.rb-epic{background:rgba(155,109,184,.12);color:var(--epic);}
.rb-legendary{background:rgba(212,160,23,.12);color:var(--legendary);}
.fg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:2px;}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.fc:hover{border-color:var(--accent);}
.fc.caught{border-color:var(--green);}
.fc.legendary-fish{border-color:var(--gold2);animation:gg 2s infinite alternate;}
@keyframes gg{from{box-shadow:0 0 3px rgba(212,160,23,.2)}to{box-shadow:0 0 8px rgba(212,160,23,.4)}}
.fe{font-size:16px;margin-bottom:1px;filter:grayscale(1);opacity:.35;transition:all .3s;}
.fc.caught .fe{filter:none;opacity:1;}
.fn{font-size:8px;color:var(--text3);}
.fc.caught .fn{color:var(--text2);}
.fcnt{position:absolute;top:1px;right:2px;font-size:8px;color:var(--text3);}
.gs{text-align:center;padding:4px;font-size:11px;color:var(--text3);margin-bottom:4px;}
.gs span{color:var(--accent2);font-weight:700;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(80,60,30,.4);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fi .2s;}
.obox{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:440px;width:90%;max-height:75vh;overflow-y:auto;position:relative;box-shadow:0 8px 28px rgba(80,60,30,.12);}
.obox::-webkit-scrollbar{width:3px;}
.obox::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.otitle{font-size:16px;font-weight:700;color:var(--gold2);margin-bottom:12px;text-align:center;}
.oclose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;}
.oclose:hover{color:var(--text);}
.lc{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
.cc:hover{border-color:var(--accent);background:rgba(107,158,120,.06);transform:translateY(-1px);}
.cc-icon{font-size:22px;}
.cc-info{flex:1;}
.cc-nm{font-size:13px;font-weight:600;margin-bottom:1px;}
.cc-ds{font-size:11px;color:var(--text3);}
#cpop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--panel);border:2px solid var(--green);border-radius:14px;padding:16px 24px;text-align:center;z-index:2000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);min-width:180px;box-shadow:0 6px 20px rgba(80,60,30,.12);}
#cpop.show{transform:translate(-50%,-50%) scale(1);}
#cpop.lc{border-color:var(--gold2);}
#pe{font-size:42px;margin-bottom:4px;}
#pn{font-size:16px;font-weight:700;margin-bottom:2px;}
#pd{font-size:11px;color:var(--text2);}
#px{font-size:12px;color:var(--green);font-weight:600;margin-top:4px;}
.fd-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;}
.fd-s{background:var(--bg2);border-radius:6px;padding:5px 7px;}
.fd-l{font-size:10px;color:var(--text3);margin-bottom:1px;}
.fd-v{font-size:13px;font-weight:600;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:6px 14px;font-size:12px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
#toast.show{opacity:1;}
#particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.ptcl{position:absolute;border-radius:50%;pointer-events:none;animation:pf var(--dur,1s) ease-out forwards;}
@keyframes pf{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx,0),var(--ty,-40px)) scale(0)}}
@media(max-width:900px){#side{width:160px;}#rpanel{width:200px;}}
@media(max-width:700px){
  body{flex-direction:column;}
  #topbar{flex-wrap:wrap;gap:6px;padding:6px 10px;}
  #topbar .title{font-size:13px;}
  .stat-chip{font-size:11px;padding:2px 7px;}
  #lv-wrap{flex:0 0 80px;}
  #side,#rpanel{display:none;}
  #side.mob-show,#rpanel.mob-show{display:flex;position:fixed;top:0;left:0;right:0;bottom:60px;z-index:500;background:var(--panel);}
  #center{flex:1;min-height:0;}
  #cv-wrap{height:180px;}
  #fctrl{flex-wrap:wrap;gap:6px;padding:6px 8px;}
  #cast-btn{padding:10px 24px;font-size:15px;flex:1;max-width:200px;}
  #fstatus{font-size:11px;width:100%;order:3;}
  #mgw{width:100%;padding:8px 0;}
  #mg-bar,#mg-pwrap,#mg-twrap,.mg-label{width:min(280px,85vw);}
  #touch-zone{display:block;width:100%;min-height:100px;background:var(--bg2);border-radius:10px;
    text-align:center;font-size:14px;color:var(--text3);padding:12px;
    cursor:pointer;user-select:none;-webkit-user-select:none;
    border:2px solid var(--border);transition:all .15s;}
  #touch-zone:active,#touch-zone.holding{background:rgba(107,158,120,.15);border-color:var(--accent);}
  #touch-zone .tz-hint{font-size:18px;margin-bottom:4px;}
  #mob-bar{display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;
    background:var(--panel);border-top:1px solid var(--border);
    z-index:600;padding:0 8px;gap:4px;align-items:center;box-shadow:0 -2px 8px rgba(80,60,30,.08);}
  .mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:4px 0;border:none;background:none;color:var(--text2);font-size:10px;cursor:pointer;
    border-radius:8px;transition:all .15s;font-family:inherit;gap:2px;}
  .mob-btn:active{background:var(--bg2);}
  .mob-btn .mb-icon{font-size:18px;}
  .mob-btn.active{color:var(--accent2);background:rgba(107,158,120,.08);}
  #center{padding-bottom:56px;}
}
#dn-chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);}
#dn-icon{font-size:13px;}
#dn-bar{width:50px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px;}
#dn-fill{height:100%;border-radius:2px;transition:width .5s,background .5s;}
</style>
</head>
<body>
<div id="topbar">
  <div class="title">🎣 传说鱼王</div>
  <div class="stat-chip">Lv.<span class="val" id="h-lv">1</span></div>
  <div id="lv-wrap"><div id="lv-label">经验 <span id="h-xp">0</span>/<span id="h-xpn">100</span></div><div id="lv-bar"><div id="lv-fill" style="width:0%"></div></div></div>
  <div class="stat-chip gold">💰<span class="val" id="h-gold">200</span></div>
  <div class="stat-chip">🐟<span class="val" id="h-caught">0</span></div>
  <div class="weather-chip" id="h-weather">☀️ 晴天</div>
  <div id="dn-chip"><span id="dn-icon">🌅</span><span id="dn-time">黎明</span><div id="dn-bar"><div id="dn-fill" style="width:15%;background:#FFB347"></div></div></div>
  <div style="flex:1"></div>
  <button class="tbtn" onclick="showBag()">🎒 背包</button>
  <button class="tbtn" onclick="confirmNew()">🔄 新游戏</button>
</div>
<div id="main">
  <div id="side">
    <div class="sec"><h3>场景</h3><div id="sc-list"></div></div>
    <div class="sec"><h3>钓点</h3><div id="sp-list"></div></div>
    <div class="sec" style="flex:1;overflow-y:auto;"><h3>装备</h3><div id="gear-disp"></div></div>
  </div>
  <div id="center">
    <div id="cv-wrap"><canvas id="cv"></canvas></div>
    <div id="fctrl">
      <button id="cast-btn" onclick="doCast()">🎣 抛竿</button>
      <div id="fstatus">选择钓点，然后抛竿开始垂钓~</div>
      <div id="mgw">
        <div class="mg-label"><span>进度</span><span id="mg-pct">0%</span></div>
        <div id="mg-bar"><div id="mg-zone"></div><div id="mg-needle"></div></div>
        <div class="mg-label"><span>张力</span><span id="mg-tpct">0%</span></div>
        <div id="mg-twrap"><div id="mg-tens" style="width:0%"></div></div>
        <div style="font-size:9px;color:var(--text3)">按住空格/点击 保持蓝针在绿区内</div>
        <div id="touch-zone" style="display:none"><div class="tz-hint">👇</div><div>按住此处收线</div></div>
      </div>
    </div>
    <div id="log"><div class="le sys">⚓ 欢迎来到传说鱼王！选择钓点，抛竿开始你的垂钓之旅吧~</div></div>
    <div id="particles"></div>
  </div>
  <div id="rpanel">
    <div class="ptabs">
      <div class="ptab act" onclick="swTab('quests',this)">📋 任务</div>
      <div class="ptab" onclick="swTab('shop',this)">🏪 鱼店</div>
      <div class="ptab" onclick="swTab('guide',this)">📖 图鉴</div>
    </div>
    <div id="tab-quests" class="pcont act"><div id="q-list"></div></div>
    <div id="tab-shop" class="pcont"><div id="sh-list"></div></div>
    <div id="tab-guide" class="pcont"><div id="gd-content"></div></div>
  </div>
</div>
<div id="cpop"><div id="pe">🐟</div><div id="pn"></div><div id="pd"></div><div id="px"></div></div>
<div id="ol-lv" class="overlay" style="display:none"><div class="obox"><div class="otitle">🎉 等级提升！Lv.<span id="nlv"></span></div><div style="text-align:center;color:var(--text2);font-size:12px;margin-bottom:8px">选择一项强化能力</div><div class="lc" id="lv-opts"></div></div></div>
<div id="ol-fish" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-fish')">✕</button><div id="fish-det"></div></div></div>
<div id="ol-bag" class="overlay" style="display:none"><div class="obox"><button class="oclose" onclick="clOL('ol-bag')">✕</button><div class="otitle">🎒 背包</div><div id="bag-c"></div></div></div>
<div id="ol-ach" class="overlay" style="display:none"><div class="obox" style="text-align:center"><button class="oclose" onclick="clOL('ol-ach')">✕</button><div style="font-size:36px;margin-bottom:4px" id="ac-icon">🏆</div><div class="otitle" id="ac-title">成就解锁</div><div style="color:var(--text2);font-size:12px" id="ac-desc"></div><div style="color:var(--gold2);font-size:12px;margin-top:4px" id="ac-rw"></div></div></div>
<div id="mob-bar">
  <button class="mob-btn" onclick="toggleMobPanel('side')"><span class="mb-icon">🏔️</span>场景</button>
  <button class="mob-btn" onclick="toggleMobPanel('rpanel')"><span class="mb-icon">📋</span>任务</button>
  <button class="mob-btn" id="mob-cast-btn" onclick="doCast()"><span class="mb-icon">🎣</span>抛竿</button>
  <button class="mob-btn" onclick="swTab('shop',document.querySelectorAll('.ptab')[1]);toggleMobPanel('rpanel')"><span class="mb-icon">🏪</span>鱼店</button>
  <button class="mob-btn" onclick="showBag()"><span class="mb-icon">🎒</span>背包</button>
</div>
<div id="toast"></div>
<script>

function save(){try{localStorage.setItem('fg_save',JSON.stringify(G))}catch(e){}}
function load(){try{var s=localStorage.getItem('fg_save');if(!s)return false;G=JSON.parse(s);if(!G.stats.patience)G.stats.patience=0;if(!G.bc)G.bc={bait_worm:99};if(!G.cb)G.cb={power:0,luck:0,speed:0};if(G.dnTime===undefined)G.dnTime=0;if(G.dnPhase===undefined)G.dnPhase=0;if(G.mobPanel===undefined)G.mobPanel=null;return true}catch(e){return false}}

function totStats(){
  var s={power:G.stats.power,luck:G.stats.luck,speed:G.stats.speed,goldBonus:G.stats.goldBonus,xpBonus:G.stats.xpBonus};
  ['rod','line','bait','flt'].forEach(function(sl){var g=findG(G.eq[sl]);if(g){s.power+=g.pw;s.luck+=g.lk;s.speed+=g.sp}});
  s.power+=G.cb.power;s.luck+=G.cb.luck;s.speed+=G.cb.speed;
  return s;
}
function findG(id){return GEAR.find(function(g){return g.id===id})}
function spotStars(){var spots=SPOTS[G.scene]||[];var sp=spots.find(function(s){return s.id===G.spot});return sp?sp.s:1}
function rollWeather(){if(G.castN>0&&G.castN%5===0){var t=0;WEATHERS.forEach(function(w){t+=w.f});var r=Math.random()*t;for(var i=0;i<WEATHERS.length;i++){r-=WEATHERS[i].f;if(r<=0){G.weather=WEATHERS[i];return}}G.weather=WEATHERS[0]}}

function selFish(){
  var stars=spotStars(),ts=totStats(),w=G.weather,dn=getDN(),luck=ts.luck+(w.lr||0)+(w.rr||0)+(dn.lr||0);
  var pool=(typeof FISH_TEMPLATES!=='undefined'?FISH_TEMPLATES:[]).filter(function(f){return f.scenes.indexOf(G.scene)>=0});
  if(!pool.length)return null;
  var wt=[];
  pool.forEach(function(f){
    var weight=f.rarity==='common'?60:f.rarity==='uncommon'?25:f.rarity==='rare'?10:f.rarity==='epic'?4:1;
    weight*=(1+stars*.15);
    if(f.rarity!=='common')weight*=(1+luck*.08);
    if(f.rarity==='legendary')weight*=(1+luck*.15);
    if(f.isKing){
      var ok=G.lv>=10&&G.eq.rod==='rod_legend'&&G.eq.bait==='bait_golden'&&G.spot==='p2'&&ts.luck>=20;
      var dnOk=dn.id==='dusk'||dn.id==='night';
      var wOk=w.id==='dusk'||w.id==='fog';
      if(!ok||(!dnOk&&!wOk))weight=0;else weight*=.03;
    }
    if(weight>0)wt.push({fish:f,w:weight});
  });
  if(!wt.length)return null;
  var tw=0;wt.forEach(function(i){tw+=i.w});var r=Math.random()*tw;
  for(var i=0;i<wt.length;i++){r-=wt[i].w;if(r<=0)return wt[i].fish;}
  return wt[0].fish;
}
function fishActual(f){
  var fs=G.fs[f.id]||{szM:1,xpM:1,vlM:1};
  var sz=Math.round((f.baseSize[0]+Math.random()*(f.baseSize[1]-f.baseSize[0]))*fs.szM*100)/100;
  var xp=Math.floor((f.baseXP[0]+Math.random()*(f.baseXP[1]-f.baseXP[0]))*fs.xpM);
  var vl=Math.floor((f.baseVal[0]+Math.random()*(f.baseVal[1]-f.baseVal[0]))*fs.vlM);
  return{sz:sz,xp:xp,vl:vl};
}

function doCast(){
  if(G.state!=='idle')return;
  var bait=G.eq.bait;
  if(!G.bc[bait]||G.bc[bait]<=0){toast('没有鱼饵了！去鱼店购买吧');return}
  var sc=SCENES.find(function(s){return s.id===G.scene});
  if(sc&&G.lv<(sc.ulv||1)){toast('需要 Lv.'+sc.ulv+' 解锁');return}
  G.state='casting';G.castN++;G.bc[bait]--;
  rollWeather();
  document.getElementById('cast-btn').disabled=true;
  updWeather();
  addLog('🎣 抛竿...','sys');
  var dn=getDN(),ts=totStats(),baseW=3+Math.random()*5,wr=1-Math.min(ts.waitReduce||0,.6)-spotStars()*.03,wm=(G.weather.br||1)*(dn.br||1);
  var wait=Math.max(1.5,baseW*wr/wm);
  G.state='waiting';
  G.waitT=setTimeout(function(){doBite()},wait*1000);
}

// 上钩逻辑（简化版：力量判定 + 自动收杆）
function doBite(){
  if(G.state!=='waiting')return;
  var fish=selFish();
  if(!fish){G.state='idle';document.getElementById('cast-btn').disabled=false;addLog('水面平静，没有鱼上钩。','fail');return}
  
  G.curFish = fish;
  G.state = 'bite';
  var ts = totStats();
  var act = fishActual(fish);
  var power = ts.power;
  var fishSize = act.sz;

  // 力量不足直接脱钩
  if(power < fishSize){
    addLog(`💨 ${fish.name} (${fishSize}kg) 力气太大，你的力量不足，鱼脱钩了！`, 'fail');
    G.state = 'idle';
    G.curFish = null;
    resetBtn();
    return;
  }

  // 力量足够 → 自动收杆（速度越快，收杆越快）
  var baseWait = 2.0;
  var speedFactor = 1 - (ts.speed * 0.08);
  var finalWait = Math.max(0.5, baseWait * speedFactor);

  document.getElementById('cast-btn').textContent = '⏳ 收线中...';
  document.getElementById('cast-btn').disabled = true;
  document.getElementById('fstatus').innerHTML = `🎣 正在拉起 <span class="hl">${fish.name}</span> (${fishSize}kg)`;

  setTimeout(() => {
    endFishing(true, act);
  }, finalWait * 1000);
}

// 钓鱼结束
function endFishing(won, act){
  G.state = 'cooldown';
  var fish = G.curFish;
  var ts = totStats();

  if(won){
    var dn=getDN(),xg=Math.floor(act.xp*(1+(ts.xpBonus||0))),sb=(G.weather.sr||0)+(ts.goldBonus||0)+(dn.sr||0),vg=Math.floor(act.vl*(1+sb));
    G.gold+=vg;G.tgold+=vg;G.caught++;addXP(xg);
    var isNew=!G.coll[fish.id];
    if(!G.coll[fish.id])G.coll[fish.id]={n:0,best:0};
    G.coll[fish.id].n++;if(act.sz>G.coll[fish.id].best)G.coll[fish.id].best=act.sz;
    if(isNew){var b=collBonus(fish);G.cb.power+=b.pw||0;G.cb.luck+=b.lk||0;G.cb.speed+=b.sp||0;
      var bp=[];if(b.pw)bp.push('力量+'+b.pw);if(b.lk)bp.push('幸运+'+b.lk);if(b.sp)bp.push('速度+'+b.sp);
      if(bp.length){toast('📖 新鱼种！图鉴奖励：'+bp.join(' '));addLog('📖 图鉴「'+fish.name+'」— '+bp.join('，'),'sys')}}
    var rc=fish.rarity==='legendary'?'legendary':fish.rarity==='epic'?'epic':fish.rarity==='rare'?'rare':'catch';
    addLog('🐟 钓到 '+fish.emoji+' '+fish.name+'！'+act.sz+'kg | 经验+'+xg+' | 💰+'+vg,rc);
    if(ts.multiHook>0&&Math.random()<ts.multiHook&&fish.rarity!=='legendary'){var b2=Math.floor(act.xp*.5);addXP(b2);addLog('🎯 双钩！额外经验+'+b2,'catch')}
    showCatch(fish,act,xg,vg);updQuests('catch',fish,act);particles(fish.rarity);chkAch();
  }
  
  G.curFish=null;
  setTimeout(function(){G.state='idle';resetBtn()},1000);
  save();
}

function showLvUp(){
  document.getElementById('nlv').textContent=G.lv;

  for(var i=0;i<3&&pool.length;i++){var idx=Math.floor(Math.random()*pool.length);opts.push(pool.splice(idx,1)[0])}

function updQuests(ev,fish,act){
  if(!G.qp)G.qp={};if(!G.qd)G.qd={};
  QUESTS.forEach(function(q){
    if(G.qd[q.id])return;
    if(!isQuestAvail(q))return;
    if(!G.qp[q.id])G.qp[q.id]=0;
    var p=G.qp[q.id],done=false;
    if(q.tp==='catch_any'&&ev==='catch')p++;
    else if(q.tp==='catch_rarity'&&ev==='catch'&&fish&&fish.rarity===q.rr)p++;
    else if(q.tp==='catch_scene'&&ev==='catch'&&fish&&G.scene===q.sn)p++;
    else if(q.tp==='reach_level')p=G.lv;
    else if(q.tp==='catch_size'&&ev==='catch'&&act&&act.sz>=q.tg)p=1;
    else if(q.tp==='catch_fish'&&ev==='catch'&&fish&&fish.id===q.fi)p++;
    else if(q.tp==='collect')p=Object.keys(G.coll).length;
    else if(q.tp==='total_gold')p=G.tgold;
    else if(q.tp==='catch_rare_big'&&ev==='catch'&&act&&fish&&fish.rarity!=='common'&&fish.rarity!=='uncommon'&&act.sz>=q.tg)p=1;
    G.qp[q.id]=p;
    if(p>=q.tg&&!G.qd[q.id]){
      G.qd[q.id]=true;if(q.rw.g)G.gold+=q.rw.g;if(q.rw.x)addXP(q.rw.x);
      if(q.rw.st){Object.keys(q.rw.st).forEach(function(k){G.stats[k]+=q.rw.st[k]})}
      addLog('📋 任务完成「'+q.nm+'」！💰+'+(q.rw.g||0)+' ⭐+'+(q.rw.x||0),'sys');
      toast('📋 任务完成：'+q.nm);
      showAch(q.ic,q.nm+' 完成！',q.ds,'💰'+(q.rw.g||0));
      save();
    }
  });
  rQuests();
}
function isQuestAvail(q){
  if(G.lv<(q.rlv||1))return false;
  if(q.prev&&!G.qd[q.prev])return false;
  return true;
}
function chkAch(){
  var n=Object.keys(G.coll).length;
  if(n===10&&!G.achS.a10){G.achS.a10=1;showAch('📚','收藏达人','收集了10种鱼！','')}
  if(n===25&&!G.achS.a25){G.achS.a25=1;showAch('📕','收藏专家','收集了25种鱼！','')}
  if(n===50&&!G.achS.a50){G.achS.a50=1;showAch('✨','图鉴大师','收集了50种鱼！','')}
  if(G.caught===100&&!G.achS.c100){G.achS.c100=1;showAch('🏅','百鱼斩','累计100条！','')}
  if(G.curFish&&G.curFish.isKing)showAch('👑','传说鱼王！！！','成功钓到传说鱼王！','🎉🎉🎉');
}

function startCV(){cv=document.getElementById('cv');cx=cv.getContext('2d');rsCV();window.addEventListener('resize',rsCV);st=0;drawF()}
function rsCV(){var w=document.getElementById('cv-wrap');cv.width=w.clientWidth;cv.height=w.clientHeight}
function drawF(){
  var w=cv.width,h=cv.height;st+=.016;
  var sc=SCENES.find(function(s){return s.id===G.scene})||SCENES[0];
  cx.clearRect(0,0,w,h);
  var sg=cx.createLinearGradient(0,0,0,h*.55);
  sg.addColorStop(0,sc.sky1);sg.addColorStop(.5,sc.sky2);sg.addColorStop(1,sc.sky3);
  cx.fillStyle=sg;cx.fillRect(0,0,w,h*.55);
  if(G.scene==='lake')dLake(w,h);else if(G.scene==='stream')dStream(w,h);else if(G.scene==='bay')dBay(w,h);else dPool(w,h);
  var wy=h*.55,wg=cx.createLinearGradient(0,wy,0,h);wg.addColorStop(0,sc.wc);wg.addColorStop(1,adjC(sc.wc,-.15));cx.fillStyle=wg;cx.fillRect(0,wy,w,h-wy);
  cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1;
  for(var i=0;i<4;i++){cx.beginPath();var y2=wy+6+i*14;for(var x=0;x<w;x+=2){var yy=y2+Math.sin((x+st*40+i*30)*.03)*3;x===0?cx.moveTo(x,yy):cx.lineTo(x,yy)}cx.stroke()}
  drawChar(w*.65,wy-2);
  if(G.state!=='idle'){cx.strokeStyle='rgba(100,80,60,0.5)';cx.lineWidth=1;cx.beginPath();var rtx=w*.65+32,rty=wy-38,flx=w*.55+Math.sin(st*2)*7,fly=wy+4+Math.sin(st*3)*2;cx.moveTo(rtx,rty);cx.quadraticCurveTo((rtx+flx)/2,wy-8,flx,fly);cx.stroke();if(G.state!=='casting'){cx.fillStyle=G.state==='bite'?'#FF6B6B':'#E85D5D';cx.beginPath();cx.ellipse(flx,fly,2.5,5,0,0,Math.PI*2);cx.fill()}}
  var dn=getDN();var skyA=dn.sky||0;
  if(skyA>.2&&G.scene!=='pool'){
    cx.fillStyle='rgba(10,10,30,'+skyA*.35+')';cx.fillRect(0,0,w,wy);
    cx.fillStyle='rgba(10,10,40,'+skyA*.2+')';cx.fillRect(0,wy,w,h-wy);
  }
