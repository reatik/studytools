<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>深海垂钓 · 动态日夜 · 星露谷风格</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  user-select: none;
}

body {
  background: linear-gradient(145deg, #0a2f44 0%, #06212e 100%);
  color: #f0f3f5;
  padding: 20px 16px;
  font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
  max-width: 850px;
  margin: auto;
  transition: background 0.8s ease;
}

/* 时段主题背景 */
body.period-morning { background: linear-gradient(145deg, #2c6e8f 0%, #1a4a63 100%); }
body.period-afternoon { background: linear-gradient(145deg, #2f6b47 0%, #1d4d2e 100%); }
body.period-evening { background: linear-gradient(145deg, #b45f2b 0%, #5e2a0c 100%); }
body.period-night { background: linear-gradient(145deg, #0a1c2a 0%, #030c14 100%); }

.panel {
  background: rgba(8, 32, 55, 0.75);
  backdrop-filter: blur(4px);
  border-radius: 32px;
  padding: 18px 20px;
  margin-bottom: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  border: 1px solid rgba(80, 180, 255, 0.2);
  transition: all 0.3s;
}

h2 {
  font-size: 1.7rem;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  color: #c3eaff;
}

.info-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 24px;
  margin-top: 8px;
}

.info-item {
  background: #071e2c;
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 0.9rem;
  font-weight: 500;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.05);
}

.badge {
  color: #ffd966;
}

/* 经验条 */
.exp-bar-container {
  background: #1e3a4d;
  border-radius: 20px;
  height: 14px;
  width: 100%;
  margin-top: 12px;
  overflow: hidden;
  box-shadow: inset 0 1px 3px #00000044;
}

.exp-fill {
  background: linear-gradient(90deg, #4bc0ff, #2a7faa);
  width: 0%;
  height: 100%;
  border-radius: 20px;
  transition: width 0.3s ease;
}

.row-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

button {
  background: #1f4e6e;
  border: none;
  padding: 10px 18px;
  border-radius: 60px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.9rem;
  box-shadow: 0 3px 0 #0a2a3a;
  flex: 1 0 auto;
}

button:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #0a2a3a;
}

button:disabled {
  opacity: 0.5;
  transform: none;
  cursor: not-allowed;
  background: #2a4b64;
}

.special-btn {
  background: #876b42;
  box-shadow: 0 3px 0 #5a3e28;
}

.log {
  min-height: 200px;
  max-height: 260px;
  background: #03121ecc;
  border-radius: 24px;
  padding: 14px 16px;
  overflow-y: auto;
  font-size: 0.85rem;
  font-family: monospace;
  line-height: 1.4;
}

.log div {
  margin-bottom: 6px;
  border-left: 3px solid #2e86ab;
  padding-left: 10px;
}

.rarity-普通 { color: #b0c4de; }
.rarity-稀有 { color: #5bc0ff; }
.rarity-史诗 { color: #c58aff; }
.rarity-传说 { color: #ffaa66; }
.rarity-神话 { color: #ff6b6b; text-shadow: 0 0 3px rgba(255,0,0,0.5); }

/* 模态框 */
.modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-card {
  background: #0e2c3b;
  max-width: 90%;
  width: 360px;
  border-radius: 32px;
  padding: 20px;
  border: 1px solid #7fc1ff;
  box-shadow: 0 20px 35px black;
}

.modal-card h3 {
  margin-bottom: 16px;
  text-align: center;
}

.modal-card ul {
  list-style: none;
  max-height: 280px;
  overflow-y: auto;
}

.modal-card li {
  background: #0a1f2b;
  margin: 8px 0;
  padding: 8px 12px;
  border-radius: 40px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  transition: 0.1s;
}

.modal-card li:active { background: #2a5f7a; }
.buy-btn { background: #3f8db3; border-radius: 40px; padding: 4px 12px; font-size: 0.8rem; }
.close-modal { margin-top: 20px; background: #5f7f92; width: 100%; }

.task-panel {
  background: #092b3bbb;
  border-radius: 24px;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.85rem;
}
</style>
</head>
<body>

<div class="panel">
  <h2>🎣 深海垂钓 · 渔夫人生</h2>
  <div class="info-grid">
    <div class="info-item">🌟 等级 <span id="level">1</span></div>
    <div class="info-item">✨ 经验 <span id="exp">0</span>/<span id="maxExp">100</span></div>
    <div class="info-item">📆 第 <span id="day">1</span> 天</div>
    <div class="info-item">⚡ 体力 <span id="energy">10</span>/10</div>
    <div class="info-item">🎣 鱼竿: <span id="rod">木杆</span></div>
    <div class="info-item">🪱 鱼饵: <span id="bait">普通饵料</span></div>
    <div class="info-item">☀️ 天气: <span id="weather">晴朗</span></div>
    <div class="info-item">🌙 时段: <span id="timePeriod">早上</span></div>
    <div class="info-item">💰 金币: <span id="gold">280</span></div>
  </div>
  <div class="exp-bar-container"><div class="exp-fill" id="expFill"></div></div>
</div>

<div class="row-buttons">
  <button id="castBtn">🎣 抛竿钓鱼</button>
  <button id="endDayBtn">🌙 结束今日</button>
  <button id="shopBtn">🛒 莉亚的鱼店</button>
  <button id="bagBtn">🎒 鱼获背包</button>
</div>

<div id="taskArea" class="task-panel">
  📜 <strong>当前委托</strong><br>
  <span id="taskDesc">暂无委托，去鱼店看看吧～</span>
  <span id="taskReward" style="display: block; font-size:0.8rem; color:#ffd97c;"></span>
</div>

<div class="panel">
  <div>📖 垂钓见闻</div>
  <div class="log" id="log"></div>
</div>

<script>
// ----- 游戏配置数据 -----
const rods = {
  "木杆": { level: 1, rareRate: 1.0, price: 0, desc: "新手入门" },
  "竹节竿": { level: 3, rareRate: 1.35, price: 90, desc: "韧性提升" },
  "海钓竿": { level: 6, rareRate: 1.8, price: 260, desc: "专业海钓" },
  "深海神竿": { level: 10, rareRate: 2.6, price: 680, desc: "传说之竿" }
};

const baits = {
  "普通饵料": { level: 1, rate: 1.0, price: 0, desc: "基础鱼饵" },
  "腥味虾饵": { level: 4, rate: 1.45, price: 55, desc: "吸引肉食鱼" },
  "荧光虫饵": { level: 7, rate: 2.0, price: 160, desc: "夜钓神器" },
  "深海秘饵": { level: 12, rate: 3.2, price: 450, desc: "神话诱饵" }
};

// 鱼种库 (时段更新为：早上/下午/晚上/深夜)
const fishList = [
  { name: "小银鱼", rarity: "普通", rod: "木杆", bait: "普通饵料", level: 1, weather: ["晴朗","多云","小雨"], time: ["早上","下午"], rate: 38, exp: 12, hint: "银色鳞光一闪，小鱼跃出水面。", lore: "渔民都说小银鱼是幸运的象征。" },
  { name: "条纹鲫鱼", rarity: "普通", rod: "木杆", bait: "普通饵料", level: 1, weather: ["晴朗","多云"], time: ["早上","下午"], rate: 32, exp: 14, hint: "浮漂轻点，扬竿中鱼！", lore: "河海交汇处常有鲫鱼群。" },
  { name: "蓝背鲈鱼", rarity: "稀有", rod: "竹节竿", bait: "腥味虾饵", level: 3, weather: ["多云","小雨"], time: ["下午","晚上"], rate: 9, exp: 45, hint: "猛力下顿，蓝光闪过！", lore: "鲈鱼喜欢藏于岩石附近。" },
  { name: "月光锦鲤", rarity: "史诗", rod: "海钓竿", bait: "荧光虫饵", level: 6, weather: ["多云","晴朗"], time: ["晚上","深夜"], rate: 2.8, exp: 135, hint: "湖面泛起柔光，锦鲤出现。", lore: "传说月光锦鲤能带来好运。" },
  { name: "深渊幽鲨", rarity: "传说", rod: "深海神竿", bait: "深海秘饵", level: 10, weather: ["小雨","暴雨"], time: ["深夜"], rate: 0.5, exp: 380, hint: "深海巨影，鱼线狂啸！", lore: "幽鲨出没，风暴将至。" },
  { name: "海之灵主", rarity: "神话", rod: "深海神竿", bait: "深海秘饵", level: 12, weather: ["暴雨"], time: ["深夜"], rate: 0.1, exp: 1450, hint: "整片海域寂静，神光缠绕。", lore: "深海灵主，只回应真正的传承者。" },
  { name: "琥珀蟹", rarity: "稀有", rod: "竹节竿", bait: "腥味虾饵", level: 2, weather: ["小雨","晴朗"], time: ["早上","下午"], rate: 12, exp: 28, hint: "沉底拖拽感，原来是蟹！", lore: "琥珀蟹的外壳能入药。" },
  { name: "星鳗", rarity: "史诗", rod: "海钓竿", bait: "荧光虫饵", level: 5, weather: ["夜晚","暴雨"], time: ["晚上","深夜"], rate: 4, exp: 90, hint: "夜光扭动，星鳗上钩", lore: "星鳗喜欢追逐光源。" },
  { name: "晨光鲷鱼", rarity: "稀有", rod: "竹节竿", bait: "普通饵料", level: 2, weather: ["晴朗","多云"], time: ["早上"], rate: 14, exp: 30, hint: "清晨的第一缕阳光，鲷鱼活跃。", lore: "晨钓最佳伴侣。" },
  { name: "暮色石斑", rarity: "史诗", rod: "海钓竿", bait: "腥味虾饵", level: 5, weather: ["多云","小雨"], time: ["下午","晚上"], rate: 5, exp: 85, hint: "黄昏时分，石斑凶猛咬钩。", lore: "石斑力气极大，考验技术。" }
];

const weathers = ["晴朗","多云","小雨","暴雨"];
// 四个时段: 早上, 下午, 晚上, 深夜
const timeSlots = ["早上", "下午", "晚上", "深夜"];

// 特殊npc事件池
const npcEvents = [
  { msg: "🧜‍♀️ 神秘的渔女出现：'听说暴雨夜深海会出现灵主，要用秘饵才有机会~'", effect: null },
  { msg: "🧙 老渔夫：'小伙子，竹节竿配虾饵在黄昏最容易钓到蓝背鲈鱼！'", effect: null },
  { msg: "✨ 旅行商人路过：'给你一点小祝福~ 今天钓鱼经验额外+20%'", effect: (s) => { s.tempExpBuff = 1.2; addLog("✨ 祝福生效，经验加成20%！", "rarity-稀有"); } },
  { msg: "⚓ 码头水手：'暴雨天别出海，但如果你有深海神竿，或许能遇见传说。'", effect: null },
  { msg: "🌙 守夜人：'深夜的深海藏有神话之鱼，但需要最顶级的鱼竿。'", effect: null }
];

// ----- 全局状态 -----
let state = {
  level: 1, exp: 0, maxExp: 100,
  rod: "木杆", bait: "普通饵料", gold: 280,
  bag: [],
  permanentCollection: [],
  day: 1, energy: 10, maxEnergy: 10,
  lastCast: 0, castCd: 2200,
  tempExpBuff: 1,
  activeTask: null,
  weatherNow: "晴朗",
  timePeriod: "早上",    // 初始早上
};

let timeInterval = null;   // 时段定时器
let weatherInterval = null; // 天气随机变化定时器（每90秒左右随机变一次）

// 辅助函数
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
const $ = s => document.querySelector(s);

function addLog(text, cls = "") {
  const div = document.createElement("div");
  div.className = cls;
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

// 更新时段视觉主题
function updateTimeVisual(period) {
  const body = document.body;
  body.classList.remove("period-morning", "period-afternoon", "period-evening", "period-night");
  if (period === "早上") body.classList.add("period-morning");
  else if (period === "下午") body.classList.add("period-afternoon");
  else if (period === "晚上") body.classList.add("period-evening");
  else if (period === "深夜") body.classList.add("period-night");
}

// 切换时段（每30秒调用）
function advanceTimePeriod() {
  const currentIdx = timeSlots.indexOf(state.timePeriod);
  const nextIdx = (currentIdx + 1) % timeSlots.length;
  state.timePeriod = timeSlots[nextIdx];
  $("#timePeriod").textContent = state.timePeriod;
  updateTimeVisual(state.timePeriod);
  
  // 时段切换时的趣味提示
  let periodMsg = "";
  if (state.timePeriod === "早上") periodMsg = "🌅 清晨的阳光洒在海面，鱼儿开始觅食。";
  else if (state.timePeriod === "下午") periodMsg = "☀️ 午后暖阳，波光粼粼。";
  else if (state.timePeriod === "晚上") periodMsg = "🌙 夜幕降临，月光铺满深海。";
  else if (state.timePeriod === "深夜") periodMsg = "🌌 深夜万籁俱寂，传说之鱼悄然游弋。";
  addLog(`⏰ 【时段变化】现在已是 ${state.timePeriod}。 ${periodMsg}`, "info");
  
  // 可额外刷新界面
  updateUI();
}

// 启动时段自动流转（每30秒）
function startTimeCycle() {
  if (timeInterval) clearInterval(timeInterval);
  timeInterval = setInterval(() => {
    advanceTimePeriod();
  }, 30000); // 30秒
}

// 随机天气变化 (每60~120秒变化一次，让游戏更生动)
function startWeatherCycle() {
  if (weatherInterval) clearInterval(weatherInterval);
  const scheduleNextWeather = () => {
    weatherInterval = setTimeout(() => {
      const oldWeather = state.weatherNow;
      let newWeather = pick(weathers);
      // 避免连续两次完全一样太无聊，但也可以允许
      if (newWeather === oldWeather && Math.random() > 0.3) {
        newWeather = weathers[(weathers.indexOf(oldWeather) + 1) % weathers.length];
      }
      state.weatherNow = newWeather;
      $("#weather").textContent = state.weatherNow;
      
      let weatherMsg = "";
      if (newWeather === "晴朗") weatherMsg = "☀️ 天空放晴，鱼群活跃度上升。";
      else if (newWeather === "多云") weatherMsg = "⛅ 云层遮蔽阳光，水温微凉。";
      else if (newWeather === "小雨") weatherMsg = "🌧️ 细雨绵绵，深海大鱼蠢蠢欲动。";
      else if (newWeather === "暴雨") weatherMsg = "⚡ 暴雨倾盆！危险与机遇并存！";
      addLog(`🌦️ 天气变化：${oldWeather} → ${newWeather}。${weatherMsg}`, "rarity-稀有");
      
      updateUI();
      scheduleNextWeather();
    }, 60000 + Math.random() * 60000); // 60~120秒随机变化
  };
  scheduleNextWeather();
}

// 任务生成
function generateRandomTask() {
  const rareFish = fishList.filter(f => f.rarity !== "普通");
  if (rareFish.length === 0) return null;
  const target = rareFish[Math.floor(Math.random() * rareFish.length)];
  const needCount = Math.floor(Math.random() * 2) + 1;
  const rewardGold = 80 + (target.rarity === "史诗" ? 120 : target.rarity === "传说" ? 220 : 60);
  const rewardExp = 50 + (target.rarity === "史诗" ? 70 : target.rarity === "传说" ? 150 : 30);
  const desc = `📋 鱼店莉亚的委托：钓上 ${needCount} 条【${target.rarity}·${target.name}】交给莉亚（任意时段/天气）`;
  return {
    type: "deliverFish",
    targetFishName: target.name,
    targetRarity: target.rarity,
    requiredCount: needCount,
    currentCount: 0,
    rewardGold: rewardGold,
    rewardExp: rewardExp,
    desc: desc,
    fishRef: target
  };
}

// NPC偶遇 (钓鱼后概率)
function tryTriggerNPCEvent() {
  if (Math.random() < 0.18) {
    const ev = npcEvents[Math.floor(Math.random() * npcEvents.length)];
    addLog(`🌠 偶遇事件：${ev.msg}`, "rarity-稀有");
    if (ev.effect) ev.effect(state);
    return true;
  }
  return false;
}

function updateUI() {
  $("#level").textContent = state.level;
  $("#exp").textContent = Math.floor(state.exp);
  $("#maxExp").textContent = state.maxExp;
  $("#rod").textContent = state.rod;
  $("#bait").textContent = state.bait;
  $("#energy").textContent = state.energy;
  $("#day").textContent = state.day;
  $("#gold").textContent = state.gold;
  $("#weather").textContent = state.weatherNow;
  $("#timePeriod").textContent = state.timePeriod;
  let percent = (state.exp / state.maxExp) * 100;
  document.getElementById("expFill").style.width = `${percent}%`;
  
  if(state.activeTask) {
    $("#taskDesc").innerHTML = state.activeTask.desc + ` (${state.activeTask.currentCount}/${state.activeTask.requiredCount})`;
    $("#taskReward").innerHTML = `🏆 奖励: ${state.activeTask.rewardGold}💰 + ${state.activeTask.rewardExp}✨`;
  } else {
    $("#taskDesc").innerHTML = "暂无委托，去鱼店看看吧～";
    $("#taskReward").innerHTML = "";
  }
}

function levelUp() {
  while (state.exp >= state.maxExp) {
    state.exp -= state.maxExp;
    state.level++;
    state.maxExp = Math.floor(state.maxExp * 1.4);
    addLog(`🎉 恭喜升至 ${state.level} 级！钓鱼技术精进`, "rarity-传说");
    updateUI();
  }
  updateUI();
}

// 钓鱼核心逻辑
async function castFish() {
  if (state.energy <= 0) {
    addLog("😫 体力不足，结束今天或明天再来吧。");
    return;
  }
  const now = Date.now();
  if (now - state.lastCast < state.castCd) {
    addLog("⏳ 鱼线还没收好，稍等一下...");
    return;
  }
  state.lastCast = now;
  state.energy--;
  updateUI();
  $("#castBtn").disabled = true;

  addLog("🎣 奋力抛竿... 等待鱼儿咬钩...");
  const waitTime = 1200 + Math.random() * 2500;
  await new Promise(r => setTimeout(r, waitTime));

  const rodMulti = rods[state.rod]?.rareRate || 1;
  const baitMulti = baits[state.bait]?.rate || 1;
  const weather = state.weatherNow;
  const time = state.timePeriod;

  let pool = [];
  let totalRate = 0;
  fishList.forEach(fish => {
    if (state.level >= fish.level && state.rod === fish.rod && state.bait === fish.bait &&
        fish.weather.includes(weather) && fish.time.includes(time)) {
      let weight = fish.rate * rodMulti * baitMulti;
      totalRate += weight;
      pool.push({ ...fish, weight });
    }
  });

  if (!pool.length) {
    addLog("😢 没有适合的鱼种，调整鱼饵或鱼竿再来吧。");
    $("#castBtn").disabled = false;
    if(state.energy <= 0) addLog("体力归零，明天再来吧");
    return;
  }

  let r = Math.random() * totalRate;
  let caughtFish = null;
  for (const fish of pool) {
    r -= fish.weight;
    if (r <= 0) {
      caughtFish = fish;
      break;
    }
  }
  if (!caughtFish) caughtFish = pool[0];

  const reelTime = (Math.random() * 1.5 + 0.5).toFixed(1);
  addLog(`⏱️ 收线耗时 ${reelTime} 秒... 水花四溅！`, "");
  addLog(`💬 ${caughtFish.hint}`, `rarity-${caughtFish.rarity}`);
  let gainExp = Math.floor(caughtFish.exp * (state.tempExpBuff || 1));
  addLog(`🐟 获得 【${caughtFish.rarity}】${caughtFish.name}  +${gainExp} 经验`, `rarity-${caughtFish.rarity}`);
  addLog(`📖 图鉴说: ${caughtFish.lore}`, "info");
  
  state.bag.push(caughtFish);
  state.exp += gainExp;
  levelUp();
  
  // 任务进度
  if(state.activeTask && state.activeTask.type === "deliverFish" && 
     caughtFish.name === state.activeTask.targetFishName && caughtFish.rarity === state.activeTask.targetRarity) {
    state.activeTask.currentCount++;
    addLog(`✨ 委托进度：${state.activeTask.currentCount}/${state.activeTask.requiredCount}`, "rarity-史诗");
    if(state.activeTask.currentCount >= state.activeTask.requiredCount) {
      addLog(`🎉 完成鱼店委托！获得 ${state.activeTask.rewardGold} 金币 和 ${state.activeTask.rewardExp} 经验`, "rarity-传说");
      state.gold += state.activeTask.rewardGold;
      state.exp += state.activeTask.rewardExp;
      levelUp();
      state.activeTask = null;
    }
    updateUI();
  }
  
  // 特殊罕见物品触发隐藏任务
  if(caughtFish.rarity === "传说" && Math.random() < 0.4) {
    addLog("💎 一道闪光！鱼店老板似乎对这条鱼很感兴趣，可以去找她聊聊。", "rarity-神话");
    state.specialOffer = caughtFish.name;
  }
  if(caughtFish.rarity === "神话") {
    addLog("🌟 远古回响：鱼店老板莉亚向你发出神秘任务邀请！", "rarity-神话");
    state.mythEncounter = true;
  }
  
  updateUI();
  $("#castBtn").disabled = false;
  if(state.energy <= 0) addLog("🌙 体力耗尽，记得结束今日垂钓~");
  
  tryTriggerNPCEvent();
}

// 结束一天（时段重置为早上，体力恢复，不清除天气流转，但天气保留自然变化）
function endDay() {
  state.day++;
  state.energy = state.maxEnergy;
  state.bag = [];
  state.tempExpBuff = 1;
  // 新的一天开始时，将时段重置为“早上”
  state.timePeriod = "早上";
  $("#timePeriod").textContent = state.timePeriod;
  updateTimeVisual(state.timePeriod);
  // 天气不用重置，保持自然流转即可，但给一个新提示
  addLog(`🌅 第 ${state.day} 天到来，体力完全恢复，新的一天从早上开始！`);
  updateUI();
  $("#castBtn").disabled = false;
  
  // 每天有几率刷新任务
  if(!state.activeTask && (state.day % 2 === 0 || state.level >= 2)) {
    let newTask = generateRandomTask();
    if(newTask) {
      state.activeTask = newTask;
      addLog(`📜 鱼店老板给你带来了新委托：${newTask.desc}`, "rarity-稀有");
      updateUI();
    }
  }
}

// 商店模态窗
function openShopModal() {
  const modalDiv = document.createElement("div");
  modalDiv.className = "modal";
  let itemListHTML = `<div class="modal-card"><h3>🐟 莉亚的渔具店</h3><ul>`;
  for (let [name, data] of Object.entries(rods)) {
    let canBuy = state.level >= data.level && (data.price <= state.gold);
    itemListHTML += `<li><span><strong>${name}</strong> Lv.${data.level}  ${data.price}💰<br><small>${data.desc} (稀有度加成 x${data.rareRate})</small></span>
    <button class="buy-btn" data-type="rod" data-name="${name}" data-price="${data.price}" data-level="${data.level}" ${!canBuy ? "disabled" : ""}>购买</button></li>`;
  }
  for (let [name, data] of Object.entries(baits)) {
    let canBuy = state.level >= data.level && (data.price <= state.gold);
    itemListHTML += `<li><span><strong>${name}</strong> Lv.${data.level}  ${data.price}💰<br><small>${data.desc} (上钩率 x${data.rate})</small></span>
    <button class="buy-btn" data-type="bait" data-name="${name}" data-price="${data.price}" data-level="${data.level}" ${!canBuy ? "disabled" : ""}>购买</button></li>`;
  }
  if(state.specialOffer || state.mythEncounter) {
    itemListHTML += `<li style="background:#4f3b28;"><span>✨ <strong>【特殊兑换】</strong> 稀有渔获可交换奖励</span>
    <button id="specialTradeBtn" class="buy-btn">✨ 兑换奖励</button></li>`;
  }
  itemListHTML += `</ul><button class="close-modal">关闭商店</button></div>`;
  modalDiv.innerHTML = itemListHTML;
  document.body.appendChild(modalDiv);
  
  const btns = modalDiv.querySelectorAll(".buy-btn");
  btns.forEach(btn => {
    if(btn.id === "specialTradeBtn") {
      btn.onclick = () => {
        if(state.specialOffer) {
          addLog(`🏅 你向莉亚展示了${state.specialOffer}，莉亚赠与你 180 金币和稀有鱼饵「荧光虫饵」！`);
          state.gold += 180;
          if(baits["荧光虫饵"] && state.level >= baits["荧光虫饵"].level) {
            state.bait = "荧光虫饵";
            addLog(`🎁 获得鱼饵：荧光虫饵已装备！`);
          } else { state.gold += 50; addLog("作为补偿，额外获得50金币"); }
          state.specialOffer = null;
        } else if(state.mythEncounter) {
          addLog(`💎 莉亚惊讶：“神话之鱼的气运！”奖励你 500 金币 + 深海神竿（如果等级不足暂存后续）`);
          state.gold += 500;
          if(state.level >= 10) state.rod = "深海神竿";
          else addLog("但是等级不足，深海神竿无法使用，赠送300金币补偿");
          state.mythEncounter = false;
        } else { addLog("没有可兑换的特殊物品"); }
        updateUI();
        modalDiv.remove();
      };
    } else {
      btn.onclick = (e) => {
        e.stopPropagation();
        let type = btn.dataset.type;
        let name = btn.dataset.name;
        let price = parseInt(btn.dataset.price);
        let needLv = parseInt(btn.dataset.level);
        if(state.gold >= price && state.level >= needLv) {
          state.gold -= price;
          if(type === "rod") state.rod = name;
          else if(type === "bait") state.bait = name;
          addLog(`🛒 购买成功！${name} 已装备。`, "rarity-稀有");
          updateUI();
          modalDiv.remove();
          openShopModal();
        } else { alert("金币不足或等级不够"); }
      };
    }
  });
  modalDiv.querySelector(".close-modal").onclick = () => modalDiv.remove();
}

// 背包模态窗: 提交任务鱼获
function openBagModal() {
  if(state.bag.length === 0) {
    alert("🐟 背包空空，去钓几条鱼吧！");
    return;
  }
  const modalDiv = document.createElement("div");
  modalDiv.className = "modal";
  let fishHtml = `<div class="modal-card"><h3>🎒 今日鱼获 (${state.bag.length})</h3><ul>`;
  let fishCountMap = new Map();
  state.bag.forEach(f => {
    let key = `${f.rarity}-${f.name}`;
    fishCountMap.set(key, (fishCountMap.get(key)||0)+1);
  });
  for(let [key, cnt] of fishCountMap.entries()) {
    let namePart = key.split("-")[1];
    let rarity = key.split("-")[0];
    fishHtml += `<li><span class="rarity-${rarity}">${namePart} x${cnt} (${rarity})</span></li>`;
  }
  fishHtml += `</ul><button id="submitSpecialFish" class="special-btn">🐟 提交委托鱼获(如有任务)</button>
  <button class="close-modal">关闭背包</button></div>`;
  modalDiv.innerHTML = fishHtml;
  document.body.appendChild(modalDiv);
  document.getElementById("submitSpecialFish")?.addEventListener("click", () => {
    if(state.activeTask && state.activeTask.type === "deliverFish") {
      let task = state.activeTask;
      let collected = state.bag.filter(f => f.name === task.targetFishName && f.rarity === task.targetRarity);
      let submitCount = collected.length;
      if(submitCount > 0) {
        let addCount = Math.min(submitCount, task.requiredCount - task.currentCount);
        if(addCount > 0) {
          task.currentCount += addCount;
          let removed = 0;
          state.bag = state.bag.filter(f => {
            if(f.name === task.targetFishName && f.rarity === task.targetRarity && removed < addCount) { removed++; return false; }
            return true;
          });
          addLog(`📦 提交了 ${addCount} 条 ${task.targetFishName} 给莉亚！`, "");
          if(task.currentCount >= task.requiredCount) {
            addLog(`🎉 委托完成！获得 ${task.rewardGold}💰 ${task.rewardExp}✨`, "rarity-传说");
            state.gold += task.rewardGold;
            state.exp += task.rewardExp;
            levelUp();
            state.activeTask = null;
          }
          updateUI();
          modalDiv.remove();
        } else alert("你已经完成或超额完成委托啦!");
      } else { alert("背包中没有任务所需的鱼种～"); }
    } else { alert("当前没有有效的委托，去鱼店看看！"); }
  });
  modalDiv.querySelector(".close-modal").onclick = () => modalDiv.remove();
}

// 启动游戏与定时器
const logEl = $("#log");
document.getElementById("castBtn").onclick = castFish;
document.getElementById("endDayBtn").onclick = endDay;
document.getElementById("shopBtn").onclick = () => openShopModal();
document.getElementById("bagBtn").onclick = () => openBagModal();

// 初始化: 随机天气，时段为早上，启动循环
state.weatherNow = pick(weathers);
state.timePeriod = "早上";
$("#weather").textContent = state.weatherNow;
$("#timePeriod").textContent = state.timePeriod;
updateTimeVisual("早上");
updateUI();
startTimeCycle();    // 每30秒自动切换时段
startWeatherCycle(); // 天气随机变化

</script>
