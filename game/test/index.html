<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>局域网房间测试</title>
    <style>
        body{text-align:center;padding:30px;background:#f5f5f5;}
        input{padding:8px;width:200px;margin:5px;}
        button{padding:8px 16px;margin:5px;background:#1677ff;color:white;border:none;border-radius:4px;cursor:pointer;}
        .room{background:white;padding:10px;margin:10px auto;max-width:400px;border-radius:8px;}
        .item{padding:10px;border-bottom:1px solid #eee;}
        #status{color:red;margin:10px 0;}
    </style>
</head>
<body>
    <h2>局域网房间（纯前端版）</h2>
    <input id="roomName" placeholder="输入房间名" value="测试房间">
    <button onclick="createRoom()">创建房间</button>

    <h3>房间列表</h3>
    <div id="roomList">加载中...</div>
    <div id="status"></div>

    <script>
        // ==========================================
        // 核心：局域网广播（同一网络所有设备可见）
        // ==========================================
        const bc = new BroadcastChannel("ROOM_CHANNEL");
        let rooms = {};

        // 接收别人发的房间
        bc.onmessage = (e) => {
            if(e.data.type === "newRoom"){
                rooms[e.data.id] = e.data.name;
                refreshList();
            }
        };

        // 创建房间（广播给所有人）
        function createRoom(){
            let name = document.getElementById("roomName").value;
            let id = "ROOM_" + Date.now();
            rooms[id] = name;
            
            // 发给局域网所有设备
            bc.postMessage({
                type:"newRoom",
                id:id,
                name:name
            });
            
            refreshList();
            setStatus("房间创建成功：" + name);
        }

        // 刷新房间列表
        function refreshList(){
            let list = document.getElementById("roomList");
            list.innerHTML = "";

            let keys = Object.keys(rooms);
            if(keys.length===0){
                list.innerHTML = "暂无房间";
                return;
            }

            keys.forEach(k => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = rooms[k];
                list.appendChild(div);
            });
        }

        function setStatus(text){
            document.getElementById("status").innerText = text;
        }

        // 初始化
        refreshList();
    </script>
</body>
</html>
