<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组卷 - 英语试卷生成</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft YaHei', 'SimSun', sans-serif;
  background: #e8e8e8;
  height: 100vh;
  overflow: hidden;
}
.toolbar {
  background: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  border-bottom: 1px solid #ddd;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  z-index: 10;
  position: relative;
}
.toolbar button {
  padding: 7px 16px;
  border: none;
  border-radius: 5px;
  background: #5A4B75;
  color: #fff;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
}
.toolbar button:hover { background: #72638D; }
.toolbar button.active { background: #1565c0; }
.toolbar select {
  padding: 6px 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 13px;
  background: #fff;
}
.toolbar .info {
  font-size: 12px;
  color: #888;
  margin-left: auto;
}
.toolbar .sep { width: 1px; height: 24px; background: #ddd; }
.main {
  display: flex;
  height: calc(100vh - 52px);
}
.sidebar {
  width: 42%;
  min-width: 380px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 10px 16px;
  background: #fafafa;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.sidebar-header .count { font-size: 13px; color: #666; }
.sidebar-header .select-all { font-size: 12px; color: #5A4B75; cursor: pointer; user-select: none; }
.sidebar-header .select-all:hover { text-decoration: underline; }
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  position: relative;
}
.side-content-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.side-panel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  display: none;
}
.side-panel.active { display: block; }
.sort-panel {
  padding: 12px;
}
.sort-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}
.sort-bar button {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  background: #f5f5f5;
  color: #333;
}
.sort-bar button:hover { background: #e0e0e0; }
.sort-bar button.danger {
  background: #f56c6c;
  color: #fff;
}
.sort-bar button.danger:hover { background: #e64c4c; }
.sort-list {
  min-height: 200px;
}
.sort-item {
  padding: 10px 12px;
  background: #f8f9fa;
  border: 1px solid #ddd;
  border-radius: 6px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: grab;
}
.sort-item:active { cursor: grabbing; }
.sort-item .del {
  background: #f56c6c;
  color: #fff;
  border: none;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.sort-item .del:hover { background: #e64c4c; }
.sort-item .text {
  flex: 1;
  margin-right: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.q-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
  border: 1px solid #eee;
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
  background: #fff;
}
.q-card:hover { border-color: #c5b8d8; background: #fdfcff; }
.q-card.selected { border-color: #8E7AB5; background: #f7f3fc; }
.q-card.drag-selected { border-color: #FFB74D; background: #fff8e1; }
.q-card input[type=checkbox] {
  margin-top: 2px;
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  cursor: pointer;
}
.q-card .q-info { flex: 1; min-width: 0; }
.q-card .q-info .q-text {
  font-size: 13px;
  color: #333;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.q-card .q-meta { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.q-card .q-tag {
  display: inline-block;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 3px;
  background: #f0ecf6;
  color: #5A4B75;
}
.q-card .q-tag.grade { background: #fff3e0; color: #e65100; }
.q-card .q-tag.knowledge { background: #e3f2fd; color: #1565c0; }
.q-card .q-tag.unit { background: #e8f5e9; color: #2e7d32; }
.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #dcdcdc;
}
.panel-header {
  padding: 8px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
  font-weight: bold;
  color: #333;
  display: flex;
  align-items: center;
  gap: 12px;
}
.panel-header .paper-count { font-weight: normal; font-size: 13px; color: #888; }
.paper-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.papers-wrap {
  min-height: 100%;
}
@media print {
  @page { size: A4; margin: 15mm 15mm 15mm 20mm; }
  body { background: #fff; overflow: visible; height: auto; }
  .toolbar, .sidebar, .panel-header, .resizer { display: none !important; }
  .main { display: block; height: auto; }
  .panel { display: block; overflow: visible; background: #fff; }
  .paper-scroll { overflow: visible; padding: 0 !important; margin: 0 !important; }
  .paper-page {
    box-shadow: none !important; width: 100% !important; min-height: auto !important; max-width: none !important;
    background: #fff !important; padding: 0 !important; margin: 0 !important;
    font-size: 14px !important; line-height: 2 !important; color: #222 !important; display: block !important; position: relative !important;
  }
  .paper-page .page-num { display: none; }
  .paper-title { text-align: center !important; font-size: 22px !important; font-weight: bold !important; margin-bottom: 20px !important; }
  .plain-q { page-break-inside: avoid; break-inside: avoid; }
  .plain-section { page-break-after: avoid; break-after: avoid; page-break-inside: avoid; break-inside: avoid; }
}
.resizer {
  width: 5px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
}
.resizer:hover { background: #c5b8d8; }
.selection-box {
  position: absolute;
  border: 2px dashed #8E7AB5;
  background: rgba(142, 122, 181, 0.12);
  pointer-events: none;
  z-index: 50;
  display: none;
}
.sidebar.selecting { user-select: none; }
.sidebar.selecting .q-card { cursor: default; }
.paper-page {
  width: 210mm;
  min-height: 297mm;
  max-width: none;
  background: #fff;
  padding: 0 20mm 10mm 25mm;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  margin: 0 auto 20px;
  font-size: 15px;
  line-height: 2.2;
  color: #222;
  display: flex;
  flex-direction: column;
  position: relative;
}
@media screen and (max-width: 900px) {
  .paper-page { width: 100%; min-height: auto; padding: 0 24px 40px; }
}
.paper-page:last-child { margin-bottom: 0; }
.paper-page .page-header-space { height: 20px; }
.paper-title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  padding-bottom: 12px;
  outline: none;
  min-height: 1.5em;
  color: #222;
}
.plain-section {
  font-size: 17px;
  font-weight: bold;
  margin: 26px 0 14px;
  color: #333;
  border-bottom: 1px solid #ddd;
  padding-bottom: 6px;
}
.plain-q {
  margin: 4px 0 10px 0;
  text-indent: -1.8em;
  padding-left: 1.8em;
  line-height: 2;
}
.plain-num { font-weight: bold; margin-right: 2px; }
.plain-bracket { display: inline; margin-right: 4px; }
.plain-sentence-line { border-bottom: 1px solid #999; min-height: 1.5em; width: 94%; margin-top: 3em; }
.plain-q u {
  text-decoration: none;
  border-bottom: 1px solid #222;
  padding-bottom: 2px;
  display: inline-block;
  line-height: 1.2;
}
.plain-q { overflow-wrap: break-word; }
.plain-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 20px;
  padding-left: 2.7em;
  margin-top: 4px;
}
.plain-opt { padding: 2px 0; line-height: 1.9; white-space: nowrap; }
.paper-page[contenteditable] > div { min-height: 1.2em; }
.paper-page[contenteditable] br { display: block; margin-top: 0.4em; }
.paper-page[contenteditable] :empty:not(br) { min-height: 1.2em; }
.paper-page[contenteditable] .plain-q:empty::after { content: '\200B'; }
.paper-page[contenteditable] .plain-section:empty::after { content: '\200B'; }
.paper-page[contenteditable] { outline: none; cursor: text; }
.paper-page[contenteditable]:focus { box-shadow: 0 0 0 3px rgba(142,122,181,0.2), 0 2px 12px rgba(0,0,0,0.12); }
.paper-page[contenteditable] ::selection { background: #c5b8d8; color: #222; }
.papers-wrap { display: block !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="toolbar">
  <button id="btnSelectPage" class="active" onclick="switchSidePanel('select')">📚 题目选择</button>
  <button id="btnSortPage" onclick="switchSidePanel('sort')">🧩 题目整理</button>
  <span class="sep"></span>
  <select id="typeFilter" onchange="applyFilter()"><option value="">全部题型</option></select>
  <select id="gradeFilter" onchange="applyFilter()"><option value="">全部年级</option></select>
  <select id="unitFilter" onchange="applyFilter()"><option value="">全部单元</option></select>
  <select id="knowledgeFilter" onchange="applyFilter()"><option value="">全部知识点</option></select>
  <span class="sep"></span>
  <button id="btnGenPdf" onclick="generatePDF()">📄 生成PDF</button>
  <button id="btnAnswerPdf" onclick="generateAnswerPDF()">📋 答案解析</button>
  <span class="info" id="toolbarInfo"></span>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="count" id="sidebarCount">正在加载题库...</span>
      <span style="flex:1"></span>
      <span class="select-all" onclick="selectAllShown()">全选当前</span>
      <span class="select-all" onclick="deselectAll()">取消全选</span>
      <span class="select-all" onclick="checkDragged()" id="btnCheckDragged" style="display:none;color:#e65100;">勾选选中</span>
    </div>
    <div class="side-content-wrap">
      <div id="selectPanel" class="side-panel active">
        <div class="sidebar-list" id="sidebarList">
          <div style="text-align:center;padding:60px 20px;color:#bbb;font-size:14px;" id="loadingHint">正在加载题库...</div>
          <div class="selection-box" id="selectionBox"></div>
        </div>
      </div>
      <div id="sortPanel" class="side-panel">
        <div class="sort-panel">
          <div class="sort-bar">
            <button onclick="refreshSortList()">刷新列表</button>
            <button onclick="clearSortList()" class="danger">清空全部</button>
          </div>
          <div class="sort-list" id="sortContainer">
            <div style="text-align:center;padding:40px 10px;color:#999;">暂无已选题目</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="panel">
    <div class="panel-header" id="panelHeader">
      📋 试卷预览
      <span class="paper-count" id="paperCount"></span>
      <span style="flex:1"></span>
    </div>
    <div class="paper-scroll" id="paperScroll">
      <div class="papers-wrap" id="papersWrap">
        <div style="text-align:center;padding:80px 20px;color:#bbb;font-size:15px;">请在左侧题库中勾选题目，在此预览试卷</div>
      </div>
    </div>
  </div>
</div>
<script>
let allQuestions = [];
let filteredQuestions = [];
let selectedIds = new Set();
let dragSelectedIds = new Set();
let typeOrder = ['音标', '选择', '填空', '句型转换', '连词成句', '翻译'];
let sortList = [];
let sortableObj = null;
let paperTitle = '英语试卷';

function formatQuestionHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  let html = div.innerHTML;
  html = html.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
  html = html.replace(/&lt;u&gt;/gi, '<u>');
  html = html.replace(/&lt;\/u&gt;/gi, '</u>');
  return html;
}

function switchSidePanel(type) {
  document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
  if(type === 'select') {
    document.getElementById('selectPanel').classList.add('active');
    document.getElementById('btnSelectPage').classList.add('active');
  } else if(type === 'sort') {
    document.getElementById('sortPanel').classList.add('active');
    document.getElementById('btnSortPage').classList.add('active');
    refreshSortList();
  }
}

function refreshSortList() {
  sortList = JSON.parse(JSON.stringify(getSelectedQuestions()));
  renderSortPage();
}

function renderSortPage() {
  const container = document.getElementById('sortContainer');
  container.innerHTML = '';
  if(sortList.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 10px;color:#999;">暂无已选题目</div>';
    return;
  }
  sortList.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'sort-item';
    div.dataset.id = q.id;
    div.innerHTML = `<div class="text">${i+1}. ${escapeHtml(q.question)}</div><button class="del" onclick="deleteSortItem('${q.id}')">删除</button>`;
    container.appendChild(div);
  });
  if(sortableObj) sortableObj.destroy();
  sortableObj = new Sortable(container, {
    animation: 150,
    onEnd: () => {
      const arr = [];
      container.querySelectorAll('.sort-item').forEach(item => {
        const id = item.dataset.id;
        arr.push(sortList.find(x => x.id == id));
      });
      sortList = arr;
      syncSelected();
    }
  });
}

function deleteSortItem(id) {
  sortList = sortList.filter(x => x.id != id);
  selectedIds.delete(id);
  renderSortPage();
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function clearSortList() {
  if (!confirm('确定清空所有题目吗？')) return;
  sortList = [];
  selectedIds.clear();
  renderSortPage();
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function syncSelected() {
  selectedIds.clear();
  sortList.forEach(x => selectedIds.add(x.id));
  renderPaper();
  updateToolbarInfo();
}

async function loadFromShuahaoti() {
  try {
    const res = await fetch('../shuahaoti/tiku.json');
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    allQuestions = (data.questions || []).map((q, idx) => ({...q, id: q.id || ('q_' + idx)}));
    buildFilters();
    selectedIds.clear();
    dragSelectedIds.clear();
    filteredQuestions = [...allQuestions];
    renderSidebar();
    renderPaper();
    updateToolbarInfo();
    document.getElementById('toolbarInfo').textContent = `题库：${allQuestions.length} 题`;
  } catch (e) {
    alert('导入失败：' + e.message);
  }
}

function buildFilters() {
  const types = [...new Set(allQuestions.map(q => q.type).filter(Boolean))];
  const grades = [...new Set(allQuestions.map(q => q.grade).filter(Boolean))];
  const units = [...new Set(allQuestions.map(q => q.unit).filter(Boolean))];
  const knowledges = [...new Set(allQuestions.map(q => q.knowledge_point).filter(Boolean))];
  document.getElementById('typeFilter').innerHTML = '<option value="">全部题型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('gradeFilter').innerHTML = '<option value="">全部年级</option>' + grades.map(g => `<option value="${g}">${g}</option>`).join('');
  document.getElementById('unitFilter').innerHTML = '<option value="">全部单元</option>' + units.map(u => `<option value="${u}">${u}</option>`).join('');
  document.getElementById('knowledgeFilter').innerHTML = '<option value="">全部知识点</option>' + knowledges.map(k => `<option value="${k}">${k}</option>`).join('');
}

function applyFilter() {
  const type = document.getElementById('typeFilter').value;
  const grade = document.getElementById('gradeFilter').value;
  const unit = document.getElementById('unitFilter').value;
  const knowledge = document.getElementById('knowledgeFilter').value;
  filteredQuestions = allQuestions.filter(q => {
    if (type && q.type !== type) return false;
    if (grade && q.grade !== grade) return false;
    if (unit && q.unit !== unit) return false;
    if (knowledge && q.knowledge_point !== knowledge) return false;
    return true;
  });
  renderSidebar();
  updateToolbarInfo();
}

function renderSidebar() {
  const container = document.getElementById('sidebarList');
  const countEl = document.getElementById('sidebarCount');
  const dragCount = countDragInFiltered();
  const selCount = countSelectedInFiltered();
  countEl.textContent = `共 ${filteredQuestions.length} 题，已勾选 ${selCount}，框选 ${dragCount}`;
  const btnCheck = document.getElementById('btnCheckDragged');
  btnCheck.textContent = `勾选选中 (${dragCount})`;
  btnCheck.style.display = dragCount>0 ? '' : 'none';
  if(filteredQuestions.length===0){container.innerHTML='<div style="text-align:center;padding:60px 20px;color:#bbb;">无匹配题目</div><div class="selection-box"></div>';return;}
  container.innerHTML = filteredQuestions.map(q=>{
    const isSel=selectedIds.has(q.id);const isDrag=dragSelectedIds.has(q.id);
    const cls=(isSel?' selected':'')+(isDrag&&!isSel?' drag-selected':'');
    return `<div class="q-card${cls}" data-id="${q.id}"><input type="checkbox" ${isSel?'checked':''} onclick="toggleQuestion('${q.id}')"><div class="q-info"><div class="q-text">【${q.id}】${escapeHtml(q.question.slice(0,60))}…</div><div class="q-meta"><span class="q-tag">${q.type}</span><span class="q-tag grade">${q.grade}</span><span class="q-tag unit">${q.unit}</span></div></div></div>`;
  }).join('')+'<div class="selection-box"></div>';
}

function countSelectedInFiltered(){let c=0;filteredQuestions.forEach(q=>{if(selectedIds.has(q.id))c++;});return c;}
function countDragInFiltered(){let c=0;filteredQuestions.forEach(q=>{if(dragSelectedIds.has(q.id))c++;});return c;}
function checkDragged(){dragSelectedIds.forEach(id=>selectedIds.add(id));dragSelectedIds.clear();renderSidebar();renderPaper();updateToolbarInfo();}
function toggleQuestion(id){selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);renderSidebar();renderPaper();updateToolbarInfo();}
function selectAllShown(){filteredQuestions.forEach(q=>selectedIds.add(q.id));renderSidebar();renderPaper();updateToolbarInfo();}
function deselectAll(){filteredQuestions.forEach(q=>selectedIds.delete(q.id));dragSelectedIds.clear();renderSidebar();renderPaper();updateToolbarInfo();}

function getSelectedQuestions(){
  if(sortList.length>0)return sortList.filter(q=>selectedIds.has(q.id));
  return allQuestions.filter(q=>selectedIds.has(q.id)).sort((a,b)=>{
    const ia=typeOrder.indexOf(a.type),ib=typeOrder.indexOf(b.type);
    return (ia===-1?99:ia)-(ib===-1?99:ib);
  });
}

function renderPaper(){
  const titleEl=document.querySelector('.paper-title');
  if(titleEl)paperTitle=titleEl.innerText||paperTitle;
  const s=getSelectedQuestions();
  const wrap=document.getElementById('papersWrap');
  if(!s.length){wrap.innerHTML='<div style="padding:80px 20px;color:#bbb;">请勾选题目</div>';return;}
  const g=groupByType(s);let html='<div class="paper-page" contenteditable>';
  html+='<div class="paper-title">'+escapeHtml(paperTitle)+'</div>';
  let num=0;
  g.forEach(grp=>{
    html+=`<div class="plain-section">【${getTypeLabel(grp.type)}】</div>`;
    grp.questions.forEach(q=>{
      num++;html+='<div class="plain-q">';
      if(q.type==='选择')html+='<span class="plain-bracket">( &nbsp;&nbsp;&nbsp;&nbsp; )</span>';
      let t=q.question.replace(/_+/g,m=>m+'__');
      html+=`<span class="plain-num">${num}.</span> `+formatQuestionHtml(t);
      if(q.type==='选择'&&q.options){html+='<div class="plain-options">';q.options.forEach(o=>{html+=`<span class="plain-opt">${escapeHtml(o)}</span>`;});html+='</div>';}
      if(q.type==='连词成句'){html+='<div class="plain-sentence-line"></div>';}
      html+='</div>';
    });
  });
  html+='</div>';wrap.innerHTML=html;
}

function groupByType(qs){
  const g={};qs.forEach(q=>{const t=q.type||'其他';if(!g[t])g[t]=[];g[t].push(q);});
  return Object.entries(g).sort((a,b)=>{
    const ia=typeOrder.indexOf(a[0]),ib=typeOrder.indexOf(b[0]);
    return (ia===-1?99:ia)-(ib===-1?99:ib);
  }).map(([t,qs])=>({type:t,questions:qs}));
}

async function generatePDF(){
  const s=getSelectedQuestions();if(!s.length){alert('请先选题');return;}
  const titleEl=document.querySelector('.paper-title');
  if(titleEl)paperTitle=titleEl.innerText||paperTitle;
  const btn=document.getElementById('btnGenPdf');const old=btn.textContent;btn.textContent='生成中...';btn.disabled=true;
  try{
    const c=document.createElement('div');
    c.style.cssText='font-family:"Microsoft YaHei","SimSun",sans-serif;font-size:14px;line-height:2;color:#222;padding:0;margin:0;';
    const titleDiv=document.createElement('div');
    titleDiv.style.cssText='text-align:center;font-size:22px;font-weight:bold;margin-bottom:20px;padding-bottom:12px;';
    titleDiv.textContent=paperTitle;
    c.appendChild(titleDiv);
    let num=0;
    groupByType(s).forEach(grp=>{
      const sec=document.createElement('div');
      sec.style.cssText='font-size:16px;font-weight:bold;margin:22px 0 12px;border-bottom:1px solid #ddd;padding-bottom:5px;color:#333;page-break-after:avoid;break-after:avoid;';
      sec.textContent='【'+getTypeLabel(grp.type)+'】';
      c.appendChild(sec);
      grp.questions.forEach(q=>{
        num++;
        const qd=document.createElement('div');
        qd.style.cssText='margin:4px 0 10px;text-indent:-1.8em;padding-left:1.8em;line-height:2;overflow-wrap:break-word;page-break-inside:avoid;break-inside:avoid;';
        let h='';
        if(q.type==='选择')h+='<span style="display:inline;margin-right:4px;">( &nbsp;&nbsp;&nbsp;&nbsp; )</span>';
        let t=q.question.replace(/_+/g,m=>m+'__');
        h+='<span style="font-weight:bold;margin-right:2px;">'+num+'.</span> '+formatQuestionHtml(t);
        if(q.type==='选择'&&q.options){
          h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;padding-left:2.7em;margin-top:4px;">';
          q.options.forEach(o=>{h+='<span style="padding:2px 0;line-height:1.9;white-space:nowrap;">'+escapeHtml(o)+'</span>';});
          h+='</div>';
        }
        if(q.type==='连词成句'){h+='<div style="border-bottom:1px solid #999;min-height:1.5em;width:94%;margin-top:2em;"></div>';}
        qd.innerHTML=h;
        c.appendChild(qd);
      });
    });
    document.body.appendChild(c);
    await html2pdf().set({
      margin:[15,15,15,20],
      filename:'英语试卷.pdf',
      image:{quality:0.98},
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{format:'a4'},
      pagebreak:{mode:['avoid-all','css','legacy']}
    }).from(c).save();
    document.body.removeChild(c);
  }catch(e){alert('失败：'+e.message);}
  finally{btn.textContent=old;btn.disabled=false;}
}

async function generateAnswerPDF(){
  const s=getSelectedQuestions();if(!s.length){alert('请先选题');return;}
  const btn=document.getElementById('btnAnswerPdf');const old=btn.textContent;btn.textContent='生成中...';btn.disabled=true;
  try{
    const c=document.createElement('div');
    c.style.cssText='font-family:"Microsoft YaHei","SimSun",sans-serif;font-size:14px;line-height:2;color:#222;padding:0;margin:0;';
    let num=0;
    groupByType(s).forEach(g=>{
      const sec=document.createElement('div');
      sec.style.cssText='font-weight:bold;margin:20px 0 10px;border-bottom:1px solid #ddd;padding-bottom:6px;page-break-after:avoid;break-after:avoid;';
      sec.textContent='【'+getTypeLabel(g.type)+'】';
      c.appendChild(sec);
      g.questions.forEach(q=>{
        num++;
        const qd=document.createElement('div');
        qd.style.cssText='margin:8px 0;line-height:2;page-break-inside:avoid;break-inside:avoid;';
        qd.innerHTML='<b>'+num+'.</b> 答案：'+formatQuestionHtml(q.answer||'无')+(q.explanation?'<br>解析：'+formatQuestionHtml(q.explanation):'');
        c.appendChild(qd);
      });
    });
    document.body.appendChild(c);
    await html2pdf().set({
      margin:[15,15,15,20],
      filename:'答案解析.pdf',
      image:{quality:0.98},
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{format:'a4'},
      pagebreak:{mode:['avoid-all','css','legacy']}
    }).from(c).save();
    document.body.removeChild(c);
  }catch(e){alert('失败：'+e.message);}
  finally{btn.textContent=old;btn.disabled=false;}
}

function escapeHtml(s){if(!s)return'';const div=document.createElement('div');div.textContent=s;return div.innerHTML;}
function getTypeLabel(t){const m={选择:'选择题',填空:'填空题',音标:'音标题',句型转换:'句型转换题',连词成句:'连词成句题',翻译:'翻译题'};return m[t]||t;}
function updateToolbarInfo(){const sel=getSelectedQuestions().length;document.getElementById('toolbarInfo').textContent=`题库：${allQuestions.length} | 已选：${sel}`;}

(function(){
  const list=document.getElementById('sidebarList');
  let sel=false,sx=0,sy=0;
  list.addEventListener('mousedown',e=>{if(e.target.tagName==='INPUT')return;sel=true;const r=list.getBoundingClientRect();sx=e.clientX-r.left+list.scrollLeft;sy=e.clientY-r.top+list.scrollTop;const b=document.querySelector('.selection-box');b.style.left=sx+'px';b.style.top=sy+'px';b.style.width=b.style.height='0';b.style.display='block';});
  document.addEventListener('mousemove',e=>{if(!sel)return;const b=document.querySelector('.selection-box');const r=list.getBoundingClientRect();const cx=e.clientX-r.left+list.scrollLeft;const cy=e.clientY-r.top+list.scrollTop;b.style.left=Math.min(sx,cx)+'px';b.style.top=Math.min(sy,cy)+'px';b.style.width=Math.abs(cx-sx)+'px';b.style.height=Math.abs(cy-sy)+'px';});
  document.addEventListener('mouseup',()=>{if(!sel)return;sel=false;const b=document.querySelector('.selection-box');b.style.display='none';dragSelectedIds.clear();document.querySelectorAll('.q-card').forEach(c=>{const cr=c.getBoundingClientRect();const br=b.getBoundingClientRect();if(!(br.right<cr.left||br.left>cr.right||br.bottom<cr.top||br.top>cr.bottom))dragSelectedIds.add(c.dataset.id);});renderSidebar();});
})();

(function(){const r=document.getElementById('resizer');const s=document.getElementById('sidebar');let resize=false;r.addEventListener('mousedown',()=>{resize=true;document.body.style.cursor='col-resize';});document.addEventListener('mousemove',e=>{if(!resize)return;const w=e.clientX;if(w>280&&w<innerWidth-400)s.style.width=w+'px';});document.addEventListener('mouseup',()=>{resize=false;document.body.style.cursor='';});})();
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='a'){e.preventDefault();const w=document.getElementById('papersWrap');const r=document.createRange();r.selectNodeContents(w);const s=getSelection();s.removeAllRanges();s.addRange(r);}});
document.addEventListener('DOMContentLoaded',loadFromShuahaoti);
</script>
