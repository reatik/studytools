<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组卷 - 英语试卷生成</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Microsoft YaHei', 'SimSun', sans-serif;
  background: #e8e8e8;
  height: 100vh;
  overflow: hidden;
}

.toolbar {
  background: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  border-bottom: 1px solid #ddd;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  z-index: 10;
  position: relative;
}

.toolbar button {
  padding: 7px 16px;
  border: none;
  border-radius: 5px;
  background: #5A4B75;
  color: #fff;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
}
.toolbar button:hover { background: #72638D; }
.toolbar button.active { background: #1565c0; }
.toolbar select {
  padding: 6px 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 13px;
  background: #fff;
}

.toolbar .info {
  font-size: 12px;
  color: #888;
  margin-left: auto;
}

.toolbar .sep { width: 1px; height: 24px; background: #ddd; }

.main {
  display: flex;
  height: calc(100vh - 52px);
}

.sidebar {
  width: 42%;
  min-width: 380px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 10px 16px;
  background: #fafafa;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.sidebar-header .count { font-size: 13px; color: #666; }
.sidebar-header .select-all { font-size: 12px; color: #5A4B75; cursor: pointer; user-select: none; }
.sidebar-header .select-all:hover { text-decoration: underline; }

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  position: relative;
}

.side-content-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.side-panel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  display: none;
}
.side-panel.active { display: block; }

.sort-panel {
  padding: 12px;
}
.sort-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}
.sort-bar button {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  background: #f5f5f5;
  color: #333;
}
.sort-bar button:hover { background: #e0e0e0; }
.sort-bar button.danger {
  background: #f56c6c;
  color: #fff;
}
.sort-bar button.danger:hover { background: #e64c4c; }
.sort-list {
  min-height: 200px;
}
.sort-item {
  padding: 10px 12px;
  background: #f8f9fa;
  border: 1px solid #ddd;
  border-radius: 6px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: grab;
}
.sort-item:active { cursor: grabbing; }
.sort-item .del {
  background: #f56c6c;
  color: #fff;
  border: none;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.sort-item .del:hover { background: #e64c4c; }
.sort-item .text {
  flex: 1;
  margin-right: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.q-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
  border: 1px solid #eee;
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
  background: #fff;
}
.q-card:hover { border-color: #c5b8d8; background: #fdfcff; }
.q-card.selected { border-color: #8E7AB5; background: #f7f3fc; }
.q-card.drag-selected { border-color: #FFB74D; background: #fff8e1; }
.q-card input[type=checkbox] {
  margin-top: 2px;
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  cursor: pointer;
}
.q-card .q-info { flex: 1; min-width: 0; }
.q-card .q-info .q-text {
  font-size: 13px;
  color: #333;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.q-card .q-meta { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.q-card .q-tag {
  display: inline-block;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 3px;
  background: #f0ecf6;
  color: #5A4B75;
}
.q-card .q-tag.grade { background: #fff3e0; color: #e65100; }
.q-card .q-tag.knowledge { background: #e3f2fd; color: #1565c0; }
.q-card .q-tag.unit { background: #e8f5e9; color: #2e7d32; }

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #dcdcdc;
}

.panel-header {
  padding: 8px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
  font-weight: bold;
  color: #333;
  display: flex;
  align-items: center;
  gap: 12px;
}
.panel-header .paper-count { font-weight: normal; font-size: 13px; color: #888; }

.paper-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  justify-content: center;
}

@media print {
  @page {
    size: A4;
    margin: 15mm;
  }
  body { background: #fff; overflow: visible; height: auto; }
  .toolbar, .sidebar, .panel-header { display: none !important; }
  .main { display: block; height: auto; }
  .panel { display: block; overflow: visible; background: #fff; }
  .paper-scroll { overflow: visible; padding: 0; }
  .paper {
    box-shadow: none;
    max-width: 100%;
    padding: 0;
    margin: 0;
    min-height: auto;
  }
  .paper-page {
    box-shadow: none !important;
    width: 100% !important;
    min-height: auto !important;
    max-width: none !important;
    background: #fff !important;
    padding: 10mm 20mm 10mm 25mm !important;
    margin: 0 !important;
    font-size: 15px !important;
    line-height: 2.2 !important;
    color: #222 !important;
    display: block !important;
    position: relative !important;
  }
  .paper-page .page-num {
    display: none;
  }
  .paper-info-row span, .paper-info-row b { color: #000; }
  .plain-q { page-break-inside: avoid; }
  .plain-section { page-break-after: avoid; }
  img {
    max-width: 80% !important;
    height: auto !important;
    display: block !important;
    margin: 12px auto !important;
    page-break-inside: avoid !important;
  }
}

.resizer {
  width: 5px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
}
.resizer:hover { background: #c5b8d8; }

.selection-box {
  position: absolute;
  border: 2px dashed #8E7AB5;
  background: rgba(142, 122, 181, 0.12);
  pointer-events: none;
  z-index: 50;
  display: none;
}
.sidebar.selecting { user-select: none; }
.sidebar.selecting .q-card { cursor: default; }

.paper-page {
  width: 210mm;
  min-height: 297mm;
  max-width: none;
  background: #fff;
  padding: 10mm 20mm 10mm 25mm;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  margin: 0 auto 20px;
  font-size: 15px;
  line-height: 2.2;
  color: #222;
  display: flex;
  flex-direction: column;
  position: relative;
}
@media screen and (max-width: 900px) {
  .paper-page {
    width: 100%;
    min-height: auto;
    padding: 30px 24px 40px;
  }
}
.paper-page:last-child { margin-bottom: 0; }
.paper-page .page-header-space { height: 20px; }

.plain-section {
  font-size: 17px;
  font-weight: bold;
  margin: 26px 0 14px;
  color: #333;
  border-bottom: 1px solid #ddd;
  padding-bottom: 6px;
}
.plain-q {
  margin: 4px 0 10px 0;
  text-indent: -1.8em;
  padding-left: 1.8em;
  line-height: 2;
}
.plain-num {
  font-weight: bold;
  margin-right: 2px;
}
.plain-bracket {
  display: inline;
  margin-right: 4px;
}
.plain-q { overflow-wrap: break-word; }
.plain-options {
  display: grid;
  gap: 4px 15px;
  padding-left: 2.7em;
  margin-top: 4px;
}
.plain-options.col-2 {
  grid-template-columns: repeat(2, 1fr);
}
.plain-options.col-4 {
  grid-template-columns: repeat(4, 1fr);
}
.plain-opt {
  padding: 2px 0;
  line-height: 1.9;
  white-space: normal;
  word-break: break-all;
  max-width: 100%;
}

.read-article {
  margin: 10px 0;
  line-height: 2.1;
  text-indent: 2em;
}
.read-title {
  font-weight: bold;
  font-size: 16px;
  text-align: center;
  margin: 10px 0;
}
.read-subtitle {
  font-weight: bold;
  margin: 10px 0 4px;
}
.read-list {
  margin: 8px 0 8px 1.2em;
}
.read-list-item {
  position: relative;
  padding-left: 16px;
  margin: 4px 0;
}
.read-list-item::before {
  content: "◇";
  position: absolute;
  left: 0;
}

.paper-page[contenteditable] > div {
  min-height: 1.2em;
}
.paper-page[contenteditable] br {
  display: block;
  margin-top: 0.4em;
}
.paper-page[contenteditable] :empty:not(br) {
  min-height: 1.2em;
}
.paper-page[contenteditable] .plain-q:empty::after {
  content: '\200B';
}
.paper-page[contenteditable] .plain-section:empty::after {
  content: '\200B';
}
.paper-page[contenteditable] {
  outline: none;
  cursor: text;
}
.paper-page[contenteditable]:focus {
  box-shadow: 0 0 0 3px rgba(142,122,181,0.2), 0 2px 12px rgba(0,0,0,0.12);
}
.paper-page[contenteditable] ::selection {
  background: #c5b8d8;
  color: #222;
}

.papers-wrap { display: block !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="toolbar">
  <button id="btnSelectPage" class="active" onclick="switchSidePanel('select')">📚 题目选择</button>
  <button id="btnSortPage" onclick="switchSidePanel('sort')">🧩 题目整理</button>
  <span class="sep"></span>
  <select id="typeFilter" onchange="applyFilter()">
    <option value="">全部题型</option>
  </select>
  <select id="gradeFilter" onchange="applyFilter()">
    <option value="">全部年级</option>
  </select>
  <select id="unitFilter" onchange="applyFilter()">
    <option value="">全部单元</option>
  </select>
  <select id="knowledgeFilter" onchange="applyFilter()">
    <option value="">全部知识点</option>
  </select>
  <input type="text" id="searchInput" placeholder="搜ID号(支持3-20范围)" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:170px;" oninput="applyFilter()">
  <span class="sep"></span>
  <button class="primary" id="btnGenPdf" onclick="generatePDF()">📄 生成PDF</button>
  <span class="info" id="toolbarInfo"></span>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="count" id="sidebarCount">正在加载题库...</span>
      <span style="flex:1"></span>
      <span class="select-all" onclick="selectAllShown()">全选当前</span>
      <span class="select-all" onclick="deselectAll()">取消全选</span>
      <span class="select-all" onclick="checkDragged()" id="btnCheckDragged" style="display:none;color:#e65100;">勾选选中</span>
    </div>

    <div class="side-content-wrap">
      <div id="selectPanel" class="side-panel active">
        <div class="sidebar-list" id="sidebarList">
          <div style="text-align:center;padding:60px 20px;color:#bbb;font-size:14px;" id="loadingHint">正在加载题库...</div>
          <div class="selection-box" id="selectionBox"></div>
        </div>
      </div>

      <div id="sortPanel" class="side-panel">
        <div class="sort-panel">
          <div class="sort-bar">
            <button onclick="refreshSortList()">刷新列表</button>
            <button onclick="clearSortList()" class="danger">清空全部</button>
          </div>
          <div class="sort-list" id="sortContainer">
            <div style="text-align:center;padding:40px 10px;color:#999;">暂无已选题目</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="panel">
    <div class="panel-header" id="panelHeader">
      📋 试卷预览
      <span class="paper-count" id="paperCount"></span>
      <span style="flex:1"></span>
    </div>
    <div class="paper-scroll" id="paperScroll">
      <div class="papers-wrap" id="papersWrap">
        <div style="text-align:center;padding:80px 20px;color:#bbb;font-size:15px;">请在左侧题库中勾选题目，在此预览试卷</div>
      </div>
    </div>
  </div>
</div>

<script>
let allQuestions = [];
let filteredQuestions = [];
let selectedIds = new Set();
let dragSelectedIds = new Set();
let typeOrder = ['阅读', '音标', '选择', '填空', '句型转换', '翻译'];
let sortList = [];
let sortableObj = null;

function switchSidePanel(type) {
  document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
  
  if(type === 'select') {
    document.getElementById('selectPanel').classList.add('active');
    document.getElementById('btnSelectPage').classList.add('active');
  } else if(type === 'sort') {
    document.getElementById('sortPanel').classList.add('active');
    document.getElementById('btnSortPage').classList.add('active');
    refreshSortList();
  }
}

function refreshSortList() {
  sortList = JSON.parse(JSON.stringify(getSelectedQuestions()));
  renderSortPage();
}

function renderSortPage() {
  const container = document.getElementById('sortContainer');
  container.innerHTML = '';

  if(sortList.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 10px;color:#999;">暂无已选题目</div>';
    return;
  }

  sortList.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'sort-item';
    div.dataset.id = q.id;
    let title = q.type === '阅读' ? '【阅读理解】' + (q.title || '') : q.question;
    if (title.length > 70) title = title.slice(0,70)+'…';
    div.innerHTML = `
      <div class="text">${i+1}. ${escapeHtml(title)}</div>
      <button class="del" onclick="deleteSortItem('${q.id}')">删除</button>
    `;
    container.appendChild(div);
  });

  if(sortableObj) sortableObj.destroy();
  sortableObj = new Sortable(container, {
    animation: 150,
    onEnd: () => {
      const arr = [];
      container.querySelectorAll('.sort-item').forEach(item => {
        const id = item.dataset.id;
        arr.push(sortList.find(x => String(x.id) === id));
      });
      sortList = arr;
      syncSelected();
    }
  });
}

function deleteSortItem(id) {
  const qid = String(id);
  sortList = sortList.filter(x => String(x.id) !== qid);
  selectedIds.delete(qid);
  renderSortPage();
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function clearSortList() {
  if (!confirm('确定清空所有题目吗？')) return;
  sortList = [];
  selectedIds.clear();
  renderSortPage();
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function syncSelected() {
  selectedIds.clear();
  sortList.forEach(x => selectedIds.add(String(x.id)));
  renderPaper();
  updateToolbarInfo();
}

async function loadFromShuahaoti() {
  try {
    const res = await fetch('yuedu.json');
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    allQuestions = (data.questions || []).map((q, idx) => ({
      ...q,
      id: q.id || ('q_' + idx)
    }));

    buildFilters();
    selectedIds.clear();
    dragSelectedIds.clear();
    filteredQuestions = [...allQuestions];
    renderSidebar();
    renderPaper();
    updateToolbarInfo();

    document.getElementById('toolbarInfo').textContent = `题库：${allQuestions.length} 题`;
  } catch (e) {
    const hint = document.getElementById('loadingHint');
    if (hint) {
      hint.textContent = '加载失败：' + e.message;
    }
    alert('导入失败：' + e.message);
  }
}

function buildFilters() {
  const types = [...new Set(allQuestions.map(q => q.type).filter(Boolean))];
  const grades = [...new Set(allQuestions.map(q => q.grade).filter(Boolean))];
  const units = [...new Set(allQuestions.map(q => q.unit).filter(Boolean))];
  const knowledges = [...new Set(allQuestions.map(q => q.knowledge_point).filter(Boolean))];

  document.getElementById('typeFilter').innerHTML = '<option value="">全部题型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('gradeFilter').innerHTML = '<option value="">全部年级</option>' + grades.map(g => `<option value="${g}">${g}</option>`).join('');
  document.getElementById('unitFilter').innerHTML = '<option value="">全部单元</option>' + units.map(u => `<option value="${u}">${u}</option>`).join('');
  document.getElementById('knowledgeFilter').innerHTML = '<option value="">全部知识点</option>' + knowledges.map(k => `<option value="${k}">${k}</option>`).join('');
}

function applyFilter() {
  const type = document.getElementById('typeFilter').value;
  const grade = document.getElementById('gradeFilter').value;
  const unit = document.getElementById('unitFilter').value;
  const knowledge = document.getElementById('knowledgeFilter').value;
  const searchRaw = document.getElementById('searchInput').value.trim();

  let searchMode = null;
  let searchId = null;
  let rangeStart = null;
  let rangeEnd = null;

  if (searchRaw) {
    const rangeMatch = searchRaw.match(/^(\d+)\s*[-到]\s*(\d+)$/);
    if (rangeMatch) {
      searchMode = 'range';
      rangeStart = parseInt(rangeMatch[1]);
      rangeEnd = parseInt(rangeMatch[2]);
      if (rangeStart > rangeEnd) [rangeStart, rangeEnd] = [rangeEnd, rangeStart];
    } else if (/^\d+$/.test(searchRaw)) {
      searchMode = 'single';
      searchId = searchRaw;
    }
  }

  filteredQuestions = allQuestions.filter(q => {
    if (type && q.type !== type) return false;
    if (grade && q.grade !== grade) return false;
    if (unit && q.unit !== unit) return false;
    if (knowledge && q.knowledge_point !== knowledge) return false;
    if (searchMode === 'range') {
      const qid = parseInt(q.id);
      if (isNaN(qid) || qid < rangeStart || qid > rangeEnd) return false;
    }
    return true;
  });

  if (searchMode === 'single') {
    filteredQuestions = [...allQuestions];
    renderSidebar();
    updateToolbarInfo();
    setTimeout(() => {
      const card = document.querySelector(`.q-card[data-id="${searchId}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.background = '#fff9c4';
        setTimeout(() => { card.style.background = ''; }, 1500);
      }
    }, 100);
    return;
  }

  if (searchMode === 'range') {
    dragSelectedIds.clear();
    allQuestions.forEach(q => {
      const qid = parseInt(q.id);
      if (!isNaN(qid) && qid >= rangeStart && qid <= rangeEnd) selectedIds.add(q.id);
    });
  }

  renderSidebar();
  updateToolbarInfo();
}

// ========== 渲染左侧 ==========
function renderSidebar() {
  const container = document.getElementById('sidebarList');
  const countEl = document.getElementById('sidebarCount');
  const dragCount = countDragInFiltered();
  const selCount = countSelectedInFiltered();
  countEl.textContent = `共 ${filteredQuestions.length} 题，已勾选 ${selCount}，框选 ${dragCount}`;

  const btnCheck = document.getElementById('btnCheckDragged');
  if (btnCheck) {
    btnCheck.textContent = `勾选选中 (${dragCount})`;
    btnCheck.style.display = dragCount > 0 ? '' : 'none';
  }

  if (filteredQuestions.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#bbb;font-size:14px;">无匹配题目</div><div class="selection-box" id="selectionBox"></div>';
    return;
  }

  container.innerHTML = filteredQuestions.map(q => {
    const qid = String(q.id);
    const isSel = selectedIds.has(qid);
    const isDrag = dragSelectedIds.has(qid);
    const cls = (isSel ? ' selected' : '') + (isDrag && !isSel ? ' drag-selected' : '');
    const qText = q.question || q.title || '';
    const shortText = qText.length > 60 ? qText.slice(0, 60) + '…' : qText;
    return `
      <div class="q-card${cls}" data-id="${qid}">
        <input type="checkbox" ${isSel ? 'checked' : ''} onclick="event.stopPropagation(); toggleQuestion('${qid}')" style="pointer-events:auto;">
        <div class="q-info">
          <div class="q-text">【${escapeHtml(qid)}】${escapeHtml(shortText)}</div>
          <div class="q-meta">
            <span class="q-tag">${escapeHtml(q.type || '')}</span>
            <span class="q-tag grade">${escapeHtml(q.grade || '')}</span>
            <span class="q-tag unit">${escapeHtml(q.unit || '')}</span>
            <span class="q-tag knowledge">${escapeHtml(q.knowledge_point || '')}</span>
          </div>
        </div>
      </div>`;
  }).join('') + '<div class="selection-box" id="selectionBox"></div>';
}
function countSelectedInFiltered() {
  let count = 0;
  filteredQuestions.forEach(q => { if (selectedIds.has(String(q.id))) count++; });
  return count;
}

function countDragInFiltered() {
  let count = 0;
  filteredQuestions.forEach(q => { if (dragSelectedIds.has(String(q.id))) count++; });
  return count;
}

function checkDragged() {
  if (dragSelectedIds.size === 0) return;
  dragSelectedIds.forEach(id => selectedIds.add(id));
  dragSelectedIds.clear();
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function toggleQuestion(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function selectAllShown() {
  filteredQuestions.forEach(q => selectedIds.add(q.id));
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function deselectAll() {
  filteredQuestions.forEach(q => selectedIds.delete(q.id));
  dragSelectedIds.clear();
  renderSidebar();
  renderPaper();
  updateToolbarInfo();
}

function getSelectedQuestions() {
  return allQuestions
    .filter(q => selectedIds.has(String(q.id)))
    .sort((a, b) => {
      const ia = typeOrder.indexOf(a.type);
      const ib = typeOrder.indexOf(b.type);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
}

function renderPaper() {
  const papersWrap = document.getElementById('papersWrap');
  const countEl = document.getElementById('paperCount');
  const selected = getSelectedQuestions();

  if (selected.length === 0) {
    papersWrap.innerHTML = '<div style="text-align:center;padding:80px 20px;color:#bbb;font-size:15px;">请在左侧题库中勾选题目，在此预览试卷</div>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `（已选 ${selected.length} 题）`;
  const groups = groupByType(selected);
  let html = '<div class="paper-page" contenteditable="true">';
  let qNum = 0;
  let readIndex = 1;

  function getChineseNum(n) {
    const arr = ['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五'];
    return arr[n-1] || n;
  }

  groups.forEach(g => {
    html += `<div class="plain-section">【${getTypeLabel(g.type)}】</div>`;

    g.questions.forEach(q => {
      if (q.type === '阅读') {
        html += `<div style="font-size:16px;font-weight:bold;margin:15px 0 8px;">${getChineseNum(readIndex)}、</div>`;
        readIndex++;

        if (q.image) {
          html += `<img src="${escapeHtml(q.image)}" style="max-width:80%;height:auto;display:block;margin:10px auto;">`;
        }
        if (q.title) {
          html += `<div class="read-title">${escapeHtml(q.title)}</div>`;
        }
        if (q.article) {
          html += `<div class="read-article">${escapeHtml(q.article)}</div>`;
        }
        if (q.sections && q.sections.length) {
          q.sections.forEach(s => {
            if (s.heading) {
              html += `<div class="read-subtitle">${escapeHtml(s.heading)}</div>`;
            }
            if (s.text) {
              html += `<div class="read-article">${escapeHtml(s.text)}</div>`;
            }
          });
        }
        if (q.list && q.list.length) {
          html += '<div class="read-list">';
          q.list.forEach(item => {
            html += `<div class="read-list-item">${escapeHtml(item)}</div>`;
          });
          html += '</div>';
        }
        if (q.options && q.options.length) {
          q.options.forEach(opt => {
            qNum++;
            html += `
            <div class="plain-q">
              <span class="plain-bracket">( &nbsp;&nbsp;&nbsp;&nbsp; )</span>
              <span class="plain-num">${qNum}.</span>
              <span class="plain-text">${escapeHtml(opt.q)}</span>
              <div class="plain-options col-${getOptionColumns(opt.opts)}">
                ${opt.opts.map(o => `<span class="plain-opt">${escapeHtml(o)}</span>`).join('')}
              </div>
            </div>`;
          });
        }
      } else {
        qNum++;
        let qHtml = '<div class="plain-q">';
        if (q.type === '选择') {
          qHtml += '<span class="plain-bracket">( &nbsp;&nbsp;&nbsp;&nbsp; )</span>';
        }
        qHtml += `<span class="plain-num">${qNum}.</span> `;
        qHtml += `<span class="plain-text">${escapeHtml(q.question)}</span>`;
        if (q.type === '选择' && q.options && q.options.length) {
          const cols = getOptionColumns(q.options);
          qHtml += `<div class="plain-options col-${cols}">`;
          q.options.forEach(opt => {
            qHtml += `<span class="plain-opt">${escapeHtml(opt)}</span>`;
          });
          qHtml += '</div>';
        }
        qHtml += '</div>';
        html += qHtml;
      }
    });
  });

  html += '</div>';
  papersWrap.innerHTML = html;
}

function groupByType(qs) {
  const g = {};
  qs.forEach(q => {
    const t = q.type || '其他';
    if (!g[t]) g[t] = [];
    g[t].push(q);
  });
  return Object.entries(g)
    .sort(([a], [b]) => {
      const ia = typeOrder.indexOf(a);
      const ib = typeOrder.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    })
    .map(([t, qs]) => ({ type: t, questions: qs }));
}

async function generatePDF() {
  const s = getSelectedQuestions();
  if (!s.length) return alert('请先勾选题目！');
  const el = document.getElementById('papersWrap');
  const btn = document.getElementById('btnGenPdf');
  const old = btn?.textContent;
  if (btn) { btn.textContent = '生成中...'; btn.disabled = true; }

  try {
    await html2pdf().set({
      margin: [0,0,0,0],
      filename: '英语试卷.pdf',
      image: {type:'jpeg',quality:0.98},
      html2canvas: {scale:2,useCORS:true,logging:false,allowTaint:true},
      jsPDF: {unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak: {mode:['avoid-all','css']}
    }).from(el).save();
  } catch (e) {
    alert('失败：' + e.message);
  } finally {
    if (btn) { btn.textContent = old || '📄 生成PDF'; btn.disabled = false; }
  }
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getTypeLabel(t) {
  const m = {
    '阅读':'阅读理解',
    '选择':'选择题',
    '填空':'填空题',
    '音标':'音标题',
    '句型转换':'句型转换题',
    '翻译':'翻译题'
  };
  return m[t] || t;
}

function getOptionColumns(options) {
  if (!options || options.length === 0) return 4;
  const totalLength = options.reduce((sum, opt) => sum + (opt?.length || 0), 0);
  if (totalLength > 60) return 1;
  return 4;
}

function updateToolbarInfo() {
  const sel = getSelectedQuestions().length;
  const total = allQuestions.length;
  const drag = dragSelectedIds.size;
  document.getElementById('toolbarInfo').textContent =
    `题库：${total} 题 | 已勾选：${sel} 题` + (drag ? ` | 框选：${drag} 题` : '');
}

(function() {
  const list = document.getElementById('sidebarList');
  const bar = document.getElementById('sidebar');
  let sel = false, sx = 0, sy = 0, move = false;
  const box = () => document.getElementById('selectionBox');

  list.addEventListener('mousedown', e => {
    if (e.target.tagName === 'INPUT') return;
    sel = true; move = false;
    bar.classList.add('selecting');
    const r = list.getBoundingClientRect();
    sx = e.clientX - r.left + list.scrollLeft;
    sy = e.clientY - r.top + list.scrollTop;
    const b = box();
    b.style.left = sx + 'px';
    b.style.top = sy + 'px';
    b.style.width = b.style.height = '0';
    b.style.display = 'block';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!sel) return;
    const b = box();
    const r = list.getBoundingClientRect();
    const cx = e.clientX - r.left + list.scrollLeft;
    const cy = e.clientY - r.top + list.scrollTop;
    const w = Math.abs(cx - sx);
    const h = Math.abs(cy - sy);
    if (w > 6 || h > 6) move = true;
    b.style.left = Math.min(sx, cx) + 'px';
    b.style.top = Math.min(sy, cy) + 'px';
    b.style.width = w + 'px';
    b.style.height = h + 'px';
  });

  document.addEventListener('mouseup', e => {
    if (!sel) return;
    sel = false;
    const b = box();
    bar.classList.remove('selecting');
    if (!move) {
      b.style.display = 'none';
      const card = e.target.closest('.q-card');
      if (card) {
        const id = card.dataset.id;
        if (id) {
          selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
          renderSidebar();
          renderPaper();
          updateToolbarInfo();
        }
      }
      b.style.width = b.style.height = '0';
      return;
    }

    const r = b.getBoundingClientRect();
    const w = parseFloat(b.style.width) || 0;
    const h = parseFloat(b.style.height) || 0;
    b.style.display = 'none';
    if (w < 5 || h < 5) {
      b.style.width = b.style.height = '0';
      return;
    }

    if (!e.shiftKey) dragSelectedIds.clear();
    document.querySelectorAll('.q-card').forEach(c => {
      const cr = c.getBoundingClientRect();
      if (!(r.right < cr.left || r.left > cr.right || r.bottom < cr.top || r.top > cr.bottom)) {
        const id = c.dataset.id;
        if (id) dragSelectedIds.add(id);
      }
    });
    renderSidebar();
    renderPaper();
    updateToolbarInfo();
  });
})();

(function() {
  const r = document.getElementById('resizer');
  const s = document.getElementById('sidebar');
  let resize = false;
  r.addEventListener('mousedown', () => {
    resize = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!resize) return;
    const w = e.clientX;
    if (w > 280 && w < window.innerWidth - 400) s.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (resize) {
      resize = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    e.preventDefault();
    const w = document.getElementById('papersWrap');
    if (w) {
      const r = document.createRange();
      r.selectNodeContents(w);
      const s = window.getSelection();
      s.removeAllRanges();
      s.addRange(r);
    }
  }
});

document.addEventListener('DOMContentLoaded', () => {
  loadFromShuahaoti();
});
