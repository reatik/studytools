<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三单动词练习</title>

<style>
:root {
    --bg: #faf5ef;         /* 莫兰迪浅橙背景 */
    --card: #fff9f3;       /* 暖白卡片 */
    --text: #5c4a3d;       /* 深棕色文字 */
    --border: #dbb89a;     /* 莫兰迪橙边框 */
    --correct: #7a9a6d;    /* 莫兰迪绿（正确） */
    --wrong: #c79285;      /* 莫兰迪红（错误） */
    --primary: #d4957a;    /* 主色：莫兰迪橙色 */
}

body {
    margin: 0;
    padding: 24px;
    font-family: "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.home-title {
    text-align: center;
    font-size: 30px;
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Microsoft YaHei", sans-serif;
    color: #b57d5c;
    font-weight: bold;
    margin-bottom: 24px;
}

.container {
    max-width: 640px;
    margin: auto;
    position: relative;
}

/* 右上角按钮组 */
.top-right-option {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 999;
    display: flex;
    gap: 8px;
}

.top-wrong-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(212,149,122,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
.top-wrong-btn img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}
.top-wrong-btn.active {
    background: var(--primary);
    border-color: #d4957a;
}
.top-wrong-btn.active img {
    filter: brightness(0) invert(1);
}
.top-wrong-btn:hover {
    border-color: var(--primary);
}

/* 清空错题按钮 */
.clear-wrong-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(211,47,47,0.2);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
    position: relative;
}
.clear-wrong-btn.show {
    display: flex;
}
.clear-wrong-btn:hover {
    border-color: #d32f2f;
    background: rgba(255,235,238,0.95);
}
.clear-wrong-btn svg {
    width: 20px;
    height: 20px;
    fill: #d32f2f;
}

/* 选项菜单按钮 */
.option-menu-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(212,149,122,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
.option-menu-btn.active {
    background: var(--primary);
    border-color: #d4957a;
}
.option-menu-btn.active img {
    filter: brightness(0) invert(1);
}
.option-menu-btn img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}

/* 筛选面板 */
.filter-panel {
    position: fixed;
    top: 60px;
    right: 12px;
    width: 220px;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(212,149,122,0.25);
    border: 1px solid rgba(212,149,122,0.15);
    padding: 12px 14px;
    z-index: 998;
    display: none;
}
.filter-panel.show {
    display: block;
}
.filter-group {
    margin-bottom: 12px;
}
.filter-group:last-child {
    margin-bottom: 0;
}
.filter-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
}
.filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.filter-tag {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    background: #f5ebe1;
    color: #b57d5c;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
}
.filter-tag.active {
    background: var(--primary);
    color: #fff;
}
.filter-tag.all {
    background: #f1f1f1;
    color: #666;
}

/* 卡片内错题按钮 */
.card-wrong-btn {
    width: 25px;
    height: 25px;
    border-radius: 8px;
    background: rgba(255,255,255,0.95);
    border: 1px solid #e0e0e0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
}
.card-wrong-btn img {
    width: 16px;
    height: 16px;
    object-fit: contain;
}
.card-wrong-btn.active {
    background: var(--primary);
    border-color: #d4957a;
}
.card-wrong-btn.active img {
    filter: brightness(0) invert(1);
}
.card-wrong-btn:hover {
    border-color: var(--primary);
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(212,149,122,0.08);
    outline: 2px dashed var(--border);
    outline-offset: -6px;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
}

.question-index {
    font-size: 14px;
    font-weight: bold;
    color: var(--primary);
}

.card-progress {
    font-size: 14px;
    color: var(--correct);
    font-weight: 600;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}
#unansweredProgress {
    color: #ac7c39;
}

.question {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.8;
    color: #333;
    margin-bottom: 16px;
}

.subject {
    font-weight: 700;
    color: #b57d5c;
}

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 0px;
    padding-bottom: 10px;
}

.option {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    position: relative;
    color: var(--text);
    background: #fff5ed;
    font-size: 16px;
    transition: all 0.2s;
}
.option:hover {
    background: #f0f6fa;
    border-color: var(--primary);
}
.option .option-letter {
    display: inline-block;
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    background: #f2e6dc;
    border-radius: 6px;
    margin-right: 12px;
    font-weight: bold;
    color: var(--text);
}
.option.correct {
    background: #f2e6dc;
    border-color: var(--correct);
}
.option.wrong {
    background: #fff0f0;
    border-color: var(--wrong);
}

.option span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
}

.correct { color: var(--correct); }
.wrong { color: var(--wrong); }
.correct-text { color: var(--correct); }

.nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    gap: 12px;
}
.nav button {
    padding: 10px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    background: #f5ebe1;
    white-space: nowrap;
}
#prevBtn {
    background: #f2e6dc;
    border-color: #dfb89a;
    color: #b57d5c;
}
#nextBtn {
    background: #ebd9cc;
    border-color: #d4a58a;
    color: #b57d5c;
}
.hidden { display: none; }

.summary-item {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff5ed;
}
.summary-title {
    font-weight: bold;
    margin-bottom: 6px;
}
.error-list {
    margin-top: 20px;
}

.back-btn {
    position: fixed;
    top: 24px;
    left: 24px;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #d8eed8;
    border: 2px solid var(--border);
    cursor: pointer;
    z-index: 999;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.back-btn img {
    width: 18px;
    height: 18px;
    display: block;
}
.back-btn:hover {
    background: #c0e8c0;
}
</style>
</head>

<body>
<h1 class="home-title">三单动词练习</h1>

<div class="container" id="practicePanel">
    <!-- 右上角按钮 -->
    <div class="top-right-option">
        <div class="top-wrong-btn" id="topWrongBtn" title="只练错题">
            <img src="../../../images/错题1.png" alt="错题">
        </div>
        <div class="clear-wrong-btn" id="clearWrongBtn" title="清空所有错题">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </div>
        <div class="option-menu-btn" id="optionMenuBtn" title="筛选选项">
            <img src="../../../images/选项.png" alt="选项">
        </div>
        <div class="filter-panel" id="filter-panel">
            <div class="filter-group">
                <div class="filter-title">句型</div>
                <div class="filter-tags" id="type-tags"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="question-index" id="questionLabel">第1题</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="progressCounters" style="display: flex; align-items: center; gap: 8px;">
                    <span class="card-progress" id="cardProgress">正确 0</span>
                    <span class="card-progress" id="errorProgress" style="color: #e58989;">错误 0</span>
                    <span class="card-progress" id="unansweredProgress">未答 0</span>
                </div>
                <div class="card-wrong-btn" id="cardWrongBtn" title="加入错题本">
                    <img src="../../../images/错题2.png" alt="错">
                </div>
            </div>
        </div>
        <div class="question" id="questionText"></div>
        <div class="options" id="options"></div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="prev()">上一题</button>
        <button id="nextBtn" onclick="next()">下一题</button>
    </div>
</div>

<div class="container hidden" id="resultPanel">
    <div class="card">
        <h2 style="text-align:center;">练习结果</h2>
        <p id="scoreInfo"></p>
        <div class="error-list" id="errorList"></div>
        <div id="wrongModeResult" style="display:none; margin-top:16px; padding:16px; background:#fef9e7; border-radius:10px; border:1px solid #e8d88e; text-align:center;">
            <p style="margin:0 0 12px 0; color:#8a6d2b; font-size:15px;">错题本已练完，是否清除错题本？</p>
            <button style="background:#e6a23c; color:#fff; border:none; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:15px; margin-right:10px;" onclick="deleteAllWrong()">删除所有错题</button>
            <button style="background:#909399; color:#fff; border:none; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:15px;" onclick="keepWrongAndRestart()">保留错题</button>
        </div>
        <button class="level-btn active" style="width:100%;margin-top:16px; background: var(--primary); border-color:#5f8f5f; color:#fff; padding:12px; border-radius:10px; cursor:pointer; font-size:16px; border:2px solid #5f8f5f;" onclick="restart()">继续练习</button>
    </div>
</div>

<script src="sentences.js"></script>
<script>
// 本地存储键名
const STORAGE_KEY = "sandan_types";
const WRONG_IDS_KEY = "sandan_wrong_ids";
const ONLY_WRONG_KEY = "sandan_only_wrong";

// 给题库中每个题目分配索引ID
sentenceBank.forEach((q, i) => { q._id = i; });

// 全局变量
const allTypes = ['陈述', '否定', '一般疑问', '特殊疑问'];
const typeNames = { '陈述': '陈述句', '否定': '否定句', '一般疑问': '一般疑问', '特殊疑问': '特殊疑问' };

let questionPool = [];
let usedQuestions = [];
let answers = [];
let wrongQuestions = [];
let correctCount = 0;
let errorCount = 0;
let unansweredCount = 0;
let currentIndex = 0;
let wrongQids = new Set();       // 错题ID集合
let isOnlyWrongMode = false;     // 只看错题模式
let selectedTypeSet = new Set(allTypes); // 默认全选
let lastNormalIndex = 0;       // 正常模式下最后的位置
let lastWrongIndex = 0;        // 错题模式下最后的位置

// ===================== 错题数据持久化 =====================
function loadWrongData() {
    try {
        const saved = localStorage.getItem(WRONG_IDS_KEY);
        if (saved) wrongQids = new Set(JSON.parse(saved));
        const savedMode = localStorage.getItem(ONLY_WRONG_KEY);
        if (savedMode) isOnlyWrongMode = JSON.parse(savedMode);
    } catch(e) {}
}

function saveWrongData() {
    localStorage.setItem(WRONG_IDS_KEY, JSON.stringify([...wrongQids]));
    localStorage.setItem(ONLY_WRONG_KEY, JSON.stringify(isOnlyWrongMode));
}

function addWrongQid(qid) {
    wrongQids.add(qid);
    saveWrongData();
}

function removeWrongQid(qid) {
    wrongQids.delete(qid);
    saveWrongData();
}

// ===================== 筛选面板 =====================
function renderFilterTags() {
    const container = document.getElementById('type-tags');
    container.innerHTML = '';

    // 全部按钮
    const allTag = document.createElement('div');
    allTag.className = 'filter-tag all';
    allTag.textContent = '全部';
    allTag.onclick = () => {
        if (selectedTypeSet.size >= allTypes.length) {
            selectedTypeSet.clear();
        } else {
            allTypes.forEach(t => selectedTypeSet.add(t));
        }
        saveTypesToLocal();
        renderFilterTags();
        if (selectedTypeSet.size > 0) resetQuestions();
    };
    container.appendChild(allTag);

    // 各句型标签
    allTypes.forEach(type => {
        const tag = document.createElement('div');
        tag.className = 'filter-tag';
        if (selectedTypeSet.has(type)) tag.classList.add('active');
        tag.textContent = typeNames[type] || type;
        tag.onclick = () => {
            if (selectedTypeSet.has(type)) selectedTypeSet.delete(type);
            else selectedTypeSet.add(type);
            saveTypesToLocal();
            renderFilterTags();
            if (selectedTypeSet.size > 0) resetQuestions();
        };
        container.appendChild(tag);
    });
}

function saveTypesToLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...selectedTypeSet]));
}

function initSavedTypes() {
    const saved = localStorage.getItem(STORAGE_KEY);
    const types = saved ? JSON.parse(saved) : allTypes;
    selectedTypeSet = new Set(types);
}

// ===================== 筛选面板开关 =====================
const optionMenuBtn = document.getElementById('optionMenuBtn');
const filterPanel = document.getElementById('filter-panel');

optionMenuBtn.onclick = (e) => {
    e.stopPropagation();
    let shown = filterPanel.classList.toggle('show');
    optionMenuBtn.classList.toggle('active', shown);
};

document.addEventListener('click', () => {
    if (filterPanel.classList.contains('show')) {
        filterPanel.classList.remove('show');
        optionMenuBtn.classList.remove('active');
    }
});
filterPanel.onclick = (e) => e.stopPropagation();

// ===================== 错题模式切换 =====================
function toggleOnlyWrongMode() {
    const topBtn = document.getElementById('topWrongBtn');
    const clearBtn = document.getElementById('clearWrongBtn');
    // 切换前保存当前题库中的位置
    if (isOnlyWrongMode) {
        lastWrongIndex = currentIndex;
        isOnlyWrongMode = false;
    } else {
        lastNormalIndex = currentIndex;
        isOnlyWrongMode = true;
    }
    topBtn.classList.toggle('active', isOnlyWrongMode);
    clearBtn.classList.toggle('show', isOnlyWrongMode);
    saveWrongData();
    let targetIdx = isOnlyWrongMode ? lastWrongIndex : lastNormalIndex;
    resetQuestions(targetIdx);
    if (isOnlyWrongMode && questionPool.length === 0) {
        document.getElementById('questionText').innerText = '错题本暂无题目';
        document.getElementById('options').innerHTML = '';
        document.getElementById('questionLabel').innerText = '';
    }
}

function clearAllWrong() {
    if (!confirm('确定要清空所有错题吗？此操作不可撤销。')) return;
    wrongQids.clear();
    lastWrongIndex = 0;
    saveWrongData();
    if (isOnlyWrongMode) {
        // 在错题模式下，清空后自动退出错题模式
        isOnlyWrongMode = false;
        document.getElementById('topWrongBtn').classList.remove('active');
        document.getElementById('clearWrongBtn').classList.remove('show');
        saveWrongData();
        resetQuestions(lastNormalIndex);
    } else {
        // 不在错题模式下，刷新当前视图
        updateCardWrongBtn(questionPool[currentIndex] ? questionPool[currentIndex]._id : null);
    }
    alert('已清空所有错题');
}

// ===================== 卡片错题按钮状态 =====================
function updateCardWrongBtn(qid) {
    const btn = document.getElementById('cardWrongBtn');
    const img = btn.querySelector('img');
    if (wrongQids.has(qid)) {
        btn.classList.add('active');
        img.src = '../../../images/错题1.png';
        btn.title = '从错题本移除';
    } else {
        btn.classList.remove('active');
        img.src = '../../../images/错题2.png';
        btn.title = '加入错题本';
    }
}

// ===================== 题目池管理 =====================
function resetQuestions(targetIndex) {
    const types = [...selectedTypeSet];
    if (types.length === 0 || questionPool === undefined) return;

    let filterList = [...sentenceBank].filter(q =>
        types.includes(q.difficulty)
    );

    // 错题模式过滤
    if (isOnlyWrongMode) {
        filterList = filterList.filter(q => wrongQids.has(q._id));
    }

    questionPool = filterList;
    if (questionPool.length === 0) {
        document.getElementById('questionText').innerText = isOnlyWrongMode ? '错题本暂无题目' : '当前题型暂无题目';
        document.getElementById('options').innerHTML = '';
        document.getElementById('questionLabel').innerText = '';
        document.getElementById('progressCounters').style.display = isOnlyWrongMode ? 'none' : '';
        answers = [];
    correctCount = 0;
    errorCount = 0;
    unansweredCount = 0;
    let idx = (targetIndex !== undefined) ? targetIndex : 0;
    if (idx >= questionPool.length) idx = Math.max(0, questionPool.length - 1);
    currentIndex = idx;
    updateProgress();
        return;
    }

    answers = [];
    correctCount = 0;
    errorCount = 0;
    unansweredCount = 0;
    let idx = (targetIndex !== undefined) ? targetIndex : 0;
    if (idx >= questionPool.length) idx = Math.max(0, questionPool.length - 1);
    currentIndex = idx;
    updateProgress();
    showQuestion(currentIndex);
}

function refreshQuestionPool() {
    resetQuestions();
}

// 显示题目
function showQuestion(index) {
    const q = questionPool[index];
    if (!q) {
        finish();
        return;
    }

    usedQuestions[index] = q;

    document.getElementById('questionLabel').innerText = isOnlyWrongMode
        ? `${index + 1}/${questionPool.length}`
        : `第${index + 1}题`;
    updateCardWrongBtn(q._id);

    // 错题模式隐藏计数
    document.getElementById('progressCounters').style.display = isOnlyWrongMode ? 'none' : '';

    document.getElementById('questionText').innerHTML =
        q.text.replace(/{(.*?)}/g, '<span class="subject">$1</span>');

    document.getElementById('options').innerHTML = q.options.map((opt, i) => `
        <div class="option" data-index="${i}">
            ${opt.label}. ${opt.value}
        </div>
    `).join('');

    document.querySelectorAll('.option').forEach(el => {
        el.onclick = () => selectOption(el, q, index);
    });

    restoreAnswer(q, index);
}

// 选择答案
function selectOption(el, q, index) {
    if (answers[index]) return;

    const selectedIndex = +el.dataset.index;
    const selected = q.options[selectedIndex];
    answers[index] = selected;

    // 显示对错
    document.querySelectorAll('.option').forEach((optEl, i) => {
        const opt = q.options[i];
        optEl.style.pointerEvents = 'none';
        const mark = document.createElement('span');

        if (opt.correct) {
            mark.className = 'correct';
            mark.innerText = '✔';
            optEl.classList.add('correct-text');
        } else if (i === selectedIndex) {
            mark.className = 'wrong';
            mark.innerText = '✗';
            optEl.classList.add('wrong');
        }
        optEl.appendChild(mark);
    });

    // 答对计数（错题模式不计数）
    if (!isOnlyWrongMode) {
        if (selected.correct) {
            correctCount++;
        } else {
            errorCount++;
            addWrongQid(q._id); // 答错自动加入错题本
            updateCardWrongBtn(q._id);
        }
        updateProgress(true);
    } else if (!selected.correct) {
        addWrongQid(q._id);
        updateCardWrongBtn(q._id);
    }

    // 自动下一题
    setTimeout(() => {
        if (currentIndex < questionPool.length - 1) {
            currentIndex++;
            showQuestion(currentIndex);
        } else {
            finish();
        }
    }, 1000);
}

// 恢复已答状态
function restoreAnswer(q, index) {
    const ans = answers[index];
    if (!ans) return;

    document.querySelectorAll('.option').forEach((optEl, i) => {
        const opt = q.options[i];
        optEl.style.pointerEvents = 'none';
        const mark = document.createElement('span');

        if (opt.correct) {
            mark.className = 'correct';
            mark.innerText = '✔';
            optEl.classList.add('correct-text');
        } else if (opt === ans) {
            mark.className = 'wrong';
            mark.innerText = '✗';
            optEl.classList.add('wrong');
        }
        optEl.appendChild(mark);
    });
}

function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        showQuestion(currentIndex);
    }
}

function next() {
    if (currentIndex < questionPool.length - 1) {
        currentIndex++;
        showQuestion(currentIndex);
    }
}

// 更新进度显示
function updateProgress(animate) {
    const correctEl = document.getElementById('cardProgress');
    const errorEl = document.getElementById('errorProgress');
    const unansweredEl = document.getElementById('unansweredProgress');

    correctEl.innerText = `正确 ${correctCount}`;
    errorEl.innerText = `错误 ${errorCount}`;
    unansweredEl.innerText = `未答 ${unansweredCount}`;

    if (animate) {
        correctEl.classList.remove('pop');
        errorEl.classList.remove('pop');
        unansweredEl.classList.remove('pop');
        void correctEl.offsetWidth;

        if (unansweredCount > 0) {
            unansweredEl.classList.add('pop');
        }
    }
}

// 结束练习
function finish() {
    // 计算未答题数
    unansweredCount = questionPool.length - correctCount - errorCount;

    wrongQuestions = [];
    answers.forEach((ans, i) => {
        if (ans && !ans.correct) wrongQuestions.push(usedQuestions[i]);
    });

    document.getElementById('practicePanel').classList.add('hidden');
    document.getElementById('resultPanel').classList.remove('hidden');

    // 错题模式：简洁提示 + 删除选项
    if (isOnlyWrongMode) {
        const answeredCount = answers.filter(a => a).length;
        const skippedCount = questionPool.length - answeredCount;
        document.getElementById('scoreInfo').innerText =
            `错题练习完成！共 ${questionPool.length} 道错题，已练习 ${answeredCount} 道` +
            (skippedCount > 0 ? `，跳过 ${skippedCount} 道` : '') + '。';
        document.getElementById('errorList').innerHTML = '';
        document.getElementById('wrongModeResult').style.display = 'block';
        // 更新删除提示
        document.querySelector('#wrongModeResult p').innerText = skippedCount > 0
            ? `将删除已练习的 ${answeredCount} 道错题，跳过的 ${skippedCount} 道将保留在错题本。`
            : '错题本已练完，是否清除错题本？';
    } else {
        document.getElementById('scoreInfo').innerText =
            `本次练习：共 ${questionPool.length} 题，答对 ${correctCount} 题，答错 ${errorCount} 题，未答 ${unansweredCount} 题。`;
        document.getElementById('wrongModeResult').style.display = 'none';
        document.getElementById('errorList').innerHTML = wrongQuestions.length === 0
            ? '<p>太棒了，全部正确！</p>'
            : wrongQuestions.map((q, i) => `
                <div class="summary-item">
                    <div class="summary-title">错题 ${i + 1}</div>
                    <div>${q.text.replace(/{(.*?)}/g, '<b>$1</b>')}</div>
                    <div>正确答案：${q.options.find(o => o.correct).value}</div>
                </div>
            `).join('');
    }
}

// 删除已练习的错题（跳过的不删除）
function deleteAllWrong() {
    // 只删除已作答的错题
    questionPool.forEach((q, i) => {
        if (answers[i]) {
            wrongQids.delete(q._id);
        }
    });
    // 如果错题本清空则退出错题模式
    if (wrongQids.size === 0) {
        isOnlyWrongMode = false;
        document.getElementById('topWrongBtn').classList.remove('active');
    }
    saveWrongData();
    document.getElementById('wrongModeResult').style.display = 'none';
    restart();
}

// 保留错题继续
function keepWrongAndRestart() {
    document.getElementById('wrongModeResult').style.display = 'none';
    restart();
}

// 重新开始
function restart() {
    document.getElementById('resultPanel').classList.add('hidden');
    document.getElementById('practicePanel').classList.remove('hidden');
    refreshQuestionPool();
}

// 错题模式移除后刷新
function doFilterAfterWrongChange() {
    const types = [...selectedTypeSet];
    let filterList = [...sentenceBank].filter(q =>
        types.includes(q.difficulty)
    );
    filterList = filterList.filter(q => wrongQids.has(q._id));
    questionPool = filterList;
    if (questionPool.length === 0) {
        document.getElementById('questionText').innerText = '错题本暂无题目';
        document.getElementById('options').innerHTML = '';
        document.getElementById('questionLabel').innerText = '';
        document.getElementById('progressCounters').style.display = 'none';
        correctCount = 0;
        errorCount = 0;
        unansweredCount = 0;
        updateProgress();
        return;
    }
    if (currentIndex >= questionPool.length) currentIndex = questionPool.length - 1;
    showQuestion(currentIndex);
}

// 乱序
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// ===================== 初始化 =====================
initSavedTypes();
loadWrongData();
renderFilterTags();
document.getElementById('topWrongBtn').classList.toggle('active', isOnlyWrongMode);

// 错题模式按钮点击
document.getElementById('topWrongBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleOnlyWrongMode();
});

// 清空错题按钮点击
document.getElementById('clearWrongBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    clearAllWrong();
});

// 卡片内错题按钮（事件委托）
document.getElementById('practicePanel').addEventListener('click', (e) => {
    const wrongBtn = e.target.closest('#cardWrongBtn');
    if (!wrongBtn) return;
    e.stopPropagation();
    const q = questionPool[currentIndex];
    if (!q) return;
    if (wrongQids.has(q._id)) {
        removeWrongQid(q._id);
    } else {
        addWrongQid(q._id);
    }
    updateCardWrongBtn(q._id);
    // 如果在错题模式下移除了最后一题，需要刷新
    if (isOnlyWrongMode && !wrongQids.has(q._id)) {
        doFilterAfterWrongChange();
    }
});

resetQuestions();
</script>
