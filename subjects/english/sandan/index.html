<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三单动词练习</title>

<style>
:root {
    --bg: #f2f7f2;         /* 浅森系背景：淡薄荷绿 */
    --card: #ffffff;       /* 卡片白 */
    --text: #2c3e2c;       /* 深墨绿文字，柔和不黑 */
    --border: #a8c5a8;     /* 浅绿边框 */
    --correct: #64a573;    /* 清新绿（正确） */
    --wrong: #e58989;      /* 柔和红（错误） */
    --primary: #75a875;    /* 主色：浅森林绿 */
}

body {
    margin: 0;
    padding: 24px;
    font-family: "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.home-title {
    text-align: center;
    font-size: 30px;
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Microsoft YaHei", sans-serif;
    color: #406640;
    font-weight: bold;
    margin-bottom: 24px;
}

.container {
    max-width: 640px;
    margin: auto;
    position: relative;
}

/* 题型栏（顶部一行） */
.type-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.level-btn {
    padding: 8px 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #f0f8f0;
    color: var(--text);
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s ease;
    white-space: nowrap;
}
.level-btn:hover {
    background: #e0f0e0;
}
.level-btn.active {
    background: var(--primary);
    border-color: #5f8f5f;
    color: #fff;
}

/* 答对题数 */
#correctCountBox {
    font-size: 16px;
    font-weight: 500;
    color: #406640;
    background: #e8f2e8;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    white-space: nowrap;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(120,160,120,0.08);
    outline: 2px dashed var(--border);
    outline-offset: -6px;
}

.question {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.8;
    color: #333;
    margin-bottom: 16px;
}

.subject {
    font-weight: 700;
    color: #507d50;
}

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 0px;
    padding-bottom: 10px;
}

.option {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    position: relative;
    color: var(--text);
    background: #fafdfa;
    font-size: 16px;
    transition: all 0.2s;
}
.option:hover {
    background: #f0f6fa;
    border-color: var(--primary);
}
.option .option-letter {
    display: inline-block;
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    background: #e8f0f8;
    border-radius: 6px;
    margin-right: 12px;
    font-weight: bold;
    color: var(--text);
}
.option.correct {
    background: #e8f0f8;
    border-color: var(--correct);
}
.option.wrong {
    background: #fff0f0;
    border-color: var(--wrong);
}

.option span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
}

.correct { color: var(--correct); }
.wrong { color: var(--wrong); }
.correct-text { color: var(--correct); }

.nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
    gap: 12px;
}
.nav button {
    padding: 10px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    background: #f0f8f0;
    white-space: nowrap;
}
#prevBtn {
    background: #e8d8e8;
    border-color: #c8b0c8;
    color: #5a3a5a;
}
#nextBtn {
    background: #d0e8e8;
    border-color: #a0c8c8;
    color: #2a4a4a;
}
.nav button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
#correctCountBox {
    font-size: 16px;
    font-weight: 500;
    color: #2c3e2c;
    white-space: nowrap;
}

.hidden { display: none; }

.summary-item {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fafdfa;
}
.summary-title {
    font-weight: bold;
    margin-bottom: 6px;
}
.error-list {
    margin-top: 20px;
}

.back-btn {
    position: fixed;
    top: 24px;
    left: 24px;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #d8eed8;
    border: 2px solid var(--border);
    cursor: pointer;
    z-index: 999;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.back-btn img {
    width: 18px;
    height: 18px;
    display: block;
}
.back-btn:hover {
    background: #c0e8c0;
}
</style>
</head>

<body>
<h1 class="home-title">三单动词练习</h1>

<div class="container" id="practicePanel">
    <!-- 题型选择 + 答对题数 同行 -->
    <div class="type-bar">
        <div class="radio-group" id="levelGroup">
            <button type="button" class="level-btn" data-value="陈述">陈述句</button>
            <button type="button" class="level-btn" data-value="否定">否定句</button>
            <button type="button" class="level-btn" data-value="一般疑问">一般疑问句</button>
            <button type="button" class="level-btn" data-value="特殊疑问">特殊疑问句</button>
        </div>
    </div>

    <div class="card">
        <div class="question" id="questionText"></div>
        <div class="options" id="options"></div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="prev()">上一题</button>
        <div id="correctCountBox">答对：0 题</div>
        <button id="nextBtn" onclick="next()">下一题</button>
    </div>
</div>

<div class="container hidden" id="resultPanel">
    <div class="card">
        <h2 style="text-align:center;">练习结果</h2>
        <p id="scoreInfo"></p>
        <div class="error-list" id="errorList"></div>
        <button class="level-btn active" style="width:100%;margin-top:16px;" onclick="restart()">继续练习</button>
    </div>
</div>

<script src="sentences.js"></script>
<script>
// 本地存储键名
const STORAGE_KEY = "lastSelectedTypes";

// 全局变量
let questionPool = [];
let usedQuestions = [];
let answers = [];
let wrongQuestions = [];
let correctCount = 0;
let currentIndex = 0;

// 初始化：加载上次选择的题型
initSavedTypes();

// 题型按钮点击事件
document.querySelectorAll(".level-btn").forEach(btn => {
    btn.onclick = () => {
        btn.classList.toggle("active");
        saveTypesToLocal();
        refreshQuestionPool();
    };
});

// 从本地存储读取上次选择
function initSavedTypes() {
    const saved = localStorage.getItem(STORAGE_KEY);
    const defaultTypes = ["陈述"];
    const types = saved ? JSON.parse(saved) : defaultTypes;

    document.querySelectorAll(".level-btn").forEach(btn => {
        btn.classList.remove("active");
        if (types.includes(btn.dataset.value)) {
            btn.classList.add("active");
        }
    });

    saveTypesToLocal();
    refreshQuestionPool();
}

// 保存当前选择到本地存储
function saveTypesToLocal() {
    const selected = Array.from(document.querySelectorAll(".level-btn.active"))
        .map(b => b.dataset.value);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(selected));
}

// 刷新题库
function refreshQuestionPool() {
    const selectedTypes = Array.from(document.querySelectorAll(".level-btn.active"))
        .map(b => b.dataset.value);

    if (selectedTypes.length === 0) {
        alert("请至少选择一种题型");
        return;
    }

    // 筛选题目
    questionPool = shuffle([...sentenceBank].filter(q =>
        selectedTypes.includes(q.difficulty)
    ));

    if (questionPool.length === 0) {
        alert("当前题型暂无题目");
        return;
    }

    // 重置答题状态
    usedQuestions = [];
    answers = [];
    correctCount = 0;
    currentIndex = 0;
    updateCorrectDisplay();
    showQuestion(0);
}

// 显示题目
function showQuestion(index) {
    const q = questionPool[index];
    if (!q) {
        finish();
        return;
    }

    usedQuestions[index] = q;

    document.getElementById("questionText").innerHTML =
        `<span class="question-number">${index + 1}.</span>` +
        q.text.replace(/{(.*?)}/g, '<span class="subject">$1</span>');

    document.getElementById("options").innerHTML = q.options.map((opt, i) => `
        <div class="option" data-index="${i}">
            ${opt.label}. ${opt.value}
        </div>
    `).join("");

    document.querySelectorAll(".option").forEach(el => {
        el.onclick = () => selectOption(el, q, index);
    });

    restoreAnswer(q, index);
    updateNavButtons();
}

// 选择答案
function selectOption(el, q, index) {
    if (answers[index]) return;

    const selectedIndex = +el.dataset.index;
    const selected = q.options[selectedIndex];
    answers[index] = selected;

    // 显示对错
    document.querySelectorAll(".option").forEach((optEl, i) => {
        const opt = q.options[i];
        optEl.style.pointerEvents = "none";
        const mark = document.createElement("span");

        if (opt.correct) {
            mark.className = "correct";
            mark.innerText = "✔";
            optEl.classList.add("correct-text");
        } else if (i === selectedIndex) {
            mark.className = "wrong";
            mark.innerText = "✗";
            optEl.classList.add("wrong");
        }
        optEl.appendChild(mark);
    });

    // 答对计数
    if (selected.correct) {
        correctCount++;
        updateCorrectDisplay();
    }

    updateNavButtons();

    // 自动下一题
    setTimeout(() => {
        if (currentIndex < questionPool.length - 1) {
            currentIndex++;
            showQuestion(currentIndex);
        } else {
            finish();
        }
    }, 1000);
}

// 恢复已答状态
function restoreAnswer(q, index) {
    const ans = answers[index];
    if (!ans) return;

    document.querySelectorAll(".option").forEach((optEl, i) => {
        const opt = q.options[i];
        optEl.style.pointerEvents = "none";
        const mark = document.createElement("span");

        if (opt.correct) {
            mark.className = "correct";
            mark.innerText = "✔";
            optEl.classList.add("correct-text");
        } else if (opt === ans) {
            mark.className = "wrong";
            mark.innerText = "✗";
            optEl.classList.add("wrong");
        }
        optEl.appendChild(mark);
    });
}

// 导航按钮
function updateNavButtons() {
    document.getElementById("prevBtn").disabled = currentIndex === 0;
    const isLast = currentIndex === questionPool.length - 1;
    document.getElementById("nextBtn").disabled = !answers[currentIndex] || isLast;
}

function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        showQuestion(currentIndex);
    }
}

function next() {
    if (currentIndex < questionPool.length - 1 && answers[currentIndex]) {
        currentIndex++;
        showQuestion(currentIndex);
    }
}

// 更新答对题数显示
function updateCorrectDisplay() {
    document.getElementById("correctCountBox").textContent = `答对：${correctCount} 题`;
}

// 结束练习
function finish() {
    wrongQuestions = [];
    answers.forEach((ans, i) => {
        if (ans && !ans.correct) wrongQuestions.push(usedQuestions[i]);
    });

    document.getElementById("practicePanel").classList.add("hidden");
    document.getElementById("resultPanel").classList.remove("hidden");
    document.getElementById("scoreInfo").innerText =
        `本次练习：共 ${questionPool.length} 题，答对 ${correctCount} 题，答错 ${wrongQuestions.length} 题。`;

    document.getElementById("errorList").innerHTML = wrongQuestions.length === 0
        ? "<p>太棒了，全部正确！</p>"
        : wrongQuestions.map((q, i) => `
            <div class="summary-item">
                <div class="summary-title">错题 ${i + 1}</div>
                <div>${q.text.replace(/{(.*?)}/g, '<b>$1</b>')}</div>
                <div>正确答案：${q.options.find(o => o.correct).value}</div>
            </div>
        `).join("");
}

// 重新开始
function restart() {
    document.getElementById("resultPanel").classList.add("hidden");
    document.getElementById("practicePanel").classList.remove("hidden");
    refreshQuestionPool();
}

// 乱序
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}
</script>
</body>
</html>
