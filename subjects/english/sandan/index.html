<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三单动词练习</title>

<style>
:root {
    --bg: #eef4ee;
    --card: #ffffff;
    --text: #2f3a2f;
    --border: #d6e5d6;
    --correct: #4caf7f;
    --wrong: #e57373;
    --btn-prev: #ffd6e0;
    --btn-next: #d6ebff;
}

body {
    margin: 0;
    padding: 24px;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
}

h1 {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 24px;
}

.container {
    max-width: 560px;
    margin: auto;
}

/* ===== 设置区 ===== */
.setting-box {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.05);
}

.setting-item {
    margin-bottom: 16px;
}

.setting-item label {
    font-size: 18px;
}

.setting-item input[type="number"] {
    width: 80px;
    padding: 6px;
    font-size: 16px;
}

.radio-group label {
    margin-right: 16px;
    font-size: 16px;
}

.start-btn {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #b7d8b7;
    cursor: pointer;
}

/* ===== 答题区 ===== */
.top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
    font-size: 16px;
    color: #555;
}

.question-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.05);
}

.question {
    font-size: 20px;
    margin-bottom: 18px;
}

.question-number {
    font-weight: normal;
    margin-right: 6px;
}

.subject {
    font-weight: 700;
}

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.option {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 18px;
    cursor: pointer;
    position: relative;
}

.option span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    font-weight: bold;
}

.correct {
    color: var(--correct);
}

.wrong {
    color: var(--wrong);
}

.nav {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
}

.nav button {
    padding: 10px 18px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    visibility: visible;
}

#prevBtn { background: var(--btn-prev); }
#nextBtn { background: var(--btn-next); }

.hidden { display: none; }
</style>
</head>

<body>

<h1>英语三单动词练习</h1>

<!-- 设置区 -->
<div class="container" id="settingPanel">
    <div class="setting-box">
        <div class="setting-item">
            <label>答题数量：</label>
            <input type="number" id="totalCount" value="20" step="10" min="10">
        </div>

        <div class="setting-item">
            <label>题型选择：</label>
            <div class="radio-group">
                <label><input type="radio" name="level" value="陈述" checked> 陈述句</label>
                <label><input type="radio" name="level" value="否定"> 否定句</label>
                <label><input type="radio" name="level" value="一般疑问"> 一般疑问句</label>
                <label><input type="radio" name="level" value="特殊疑问"> 特殊疑问句</label>
            </div>
        </div>

        <button class="start-btn" onclick="startPractice()">开始练习</button>
    </div>
</div>

<!-- 答题区 -->
<div class="container hidden" id="practicePanel">
    <div class="top-bar" id="progressInfo"></div>

    <div class="question-card">
        <div class="question" id="questionText"></div>
        <div class="options" id="options"></div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="prev()">上一题</button>
        <button id="nextBtn" onclick="next()">下一题</button>
    </div>
</div>

<!-- ✅ 引入外部题库 -->
<script src="sentences.js"></script>

<script>
let questionBank = [];
let current = 0;
let answers = [];

function getDifficultySet(level) {
    return [level];
}

function startPractice() {
    const targetCount = Number(document.getElementById("totalCount").value) || 20;
    const level = document.querySelector("input[name='level']:checked").value;

    const allowed = getDifficultySet(level);
    let pool = sentenceBank.filter(q => allowed.includes(q.difficulty));

    const maxStatements = Math.floor(targetCount * 0.1);
    const statements = pool.filter(q => q.difficulty === "陈述").slice(0, maxStatements);
    const others = shuffle(pool.filter(q => q.difficulty !== "陈述"));

    questionBank = shuffle([
        ...statements,
        ...others.slice(0, targetCount - statements.length)
    ]).slice(0, targetCount);

    answers = Array(questionBank.length).fill(null);

    document.getElementById("settingPanel").classList.add("hidden");
    document.getElementById("practicePanel").classList.remove("hidden");

    current = 0;
    showQuestion();
}

function updateProgress() {
    const correct = answers.filter(a => a && a.correct).length;
    const need = questionBank.length - correct;
    document.getElementById("progressInfo").innerText =
        `还需答对 ${need} 题`;
}

function showQuestion() {
    const q = questionBank[current];

    const text = q.text.replace(
        /{(.*?)}/g,
        '<span class="subject">$1</span>'
    );

    document.getElementById("questionText").innerHTML =
        `<span class="question-number">${current + 1}.</span>${text}`;

    document.getElementById("options").innerHTML = q.options.map((opt, i) => {
        let mark = "";
        if (answers[current] !== null) {
            if (answers[current].index === i) {
                mark = `<span class="${opt.correct ? 'correct' : 'wrong'}">${opt.correct ? '✔' : '✗'}</span>`;
            }
        }

        return `
            <div class="option" data-index="${i}">
                ${opt.label}. ${opt.value} ${mark}
            </div>
        `;
    }).join("");

    if (answers[current] === null) {
        document.querySelectorAll(".option").forEach(el => {
            el.onclick = () => selectOption(parseInt(el.dataset.index));
        });
    }

    updateNav();
    updateProgress();
}

function selectOption(index) {
    const q = questionBank[current];
    answers[current] = {
        index,
        correct: q.options[index].correct
    };

    showQuestion();

    if (q.options[index].correct && current < questionBank.length - 1) {
        setTimeout(() => {
            current++;
            showQuestion();
        }, 800);
    }
}

function updateNav() {
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    prevBtn.style.visibility = current > 0 ? "visible" : "hidden";
    nextBtn.style.visibility =
        answers[current] !== null ? "visible" : "hidden";
}

function prev() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function next() {
    if (current < questionBank.length - 1 && answers[current] !== null) {
        current++;
        showQuestion();
    }
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}
</script>

</body>
</html>
