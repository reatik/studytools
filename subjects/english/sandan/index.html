<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三单动词练习</title>

<style>
:root {
    --bg: #eef4ee;
    --card: #ffffff;
    --text: #2f3a2f;
    --border: #d6e5d6;
    --correct: #4caf7f;
    --wrong: #e57373;
}

body {
    margin: 0;
    padding: 24px;
    font-family: "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
}

h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 24px;
}

.container {
    max-width: 640px;
    margin: auto;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.05);
}

.setting-item {
    margin-bottom: 16px;
}

.setting-item label {
    font-size: 18px;
}

.setting-item input[type="number"] {
    width: 80px;
    padding: 6px;
    font-size: 16px;
}

.radio-group label {
    margin-right: 16px;
}

.start-btn {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #b7d8b7;
    cursor: pointer;
}

.top-bar {
    text-align: right;
    margin-bottom: 12px;
    font-size: 16px;
}

.question-number {
    font-weight: normal;
}

.subject {
    font-weight: 700;
}

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.option {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    position: relative;
}

.option span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
}

.correct { color: var(--correct); }
.wrong { color: var(--wrong); }

.nav {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
}

.nav button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#prevBtn { background: #ffd6e0; }
#nextBtn { background: #d6ebff; }

.hidden { display: none; }

.summary-item {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
}

.summary-title {
    font-weight: bold;
    margin-bottom: 6px;
}

.error-list {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>英语三单动词练习</h1>

<!-- 设置页 -->
<div class="container" id="settingPanel">
    <div class="card">
        <div class="setting-item">
            <label>题型选择：</label>
            <div class="radio-group">
                <label><input type="radio" name="level" value="陈述" onchange="updateMaxCount()" checked> 陈述句</label>
                <label><input type="radio" name="level" value="否定" onchange="updateMaxCount()"> 否定句</label>
                <label><input type="radio" name="level" value="一般疑问" onchange="updateMaxCount()"> 一般疑问句</label>
                <label><input type="radio" name="level" value="特殊疑问" onchange="updateMaxCount()"> 特殊疑问句</label>
            </div>
        </div>

        <div class="setting-item">
            <label>答题数量：</label>
            <input type="number" id="totalCount" value="20" min="10" step="10">
        </div>

        <button class="start-btn" onclick="startPractice()">开始练习</button>
    </div>
</div>

<!-- 答题页 -->
<div class="container hidden" id="practicePanel">
    <div class="top-bar" id="progressInfo"></div>

    <div class="card">
        <div class="question" id="questionText"></div>
        <div class="options" id="options"></div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="prev()">上一题</button>
        <button id="nextBtn" onclick="next()">下一题</button>
    </div>
</div>

<!-- 结算页 -->
<div class="container hidden" id="resultPanel">
    <div class="card">
        <h2 style="text-align:center;">练习结果</h2>
        <p id="scoreInfo"></p>

        <div class="error-list" id="errorList"></div>

        <button class="start-btn" onclick="location.reload()">重新开始</button>
    </div>
</div>

<script src="sentences.js"></script>

<script>
let questionBank = [];
let current = 0;
let answers = [];
let TOTAL = 20;

function updateMaxCount() {
    const level = document.querySelector("input[name='level']:checked").value;
    const totalInput = document.getElementById("totalCount");

    const maxCount = sentenceBank.filter(q => q.difficulty === level).length;

    totalInput.max = maxCount;

    if (Number(totalInput.value) > maxCount) {
        totalInput.value = maxCount;
    }
}

// 页面加载时初始化一次
updateMaxCount();

function startPractice() {
    const level = document.querySelector("input[name='level']:checked").value;
    const totalInput = document.getElementById("totalCount");

    TOTAL = Number(totalInput.value) || 20;

    const pool = sentenceBank.filter(q => q.difficulty === level);

    if (pool.length < 10) {
        alert("该题型题目不足 10 道，无法开始练习");
        return;
    }

    questionBank = shuffle(pool).slice(0, TOTAL);
    answers = Array(TOTAL).fill(null);

    document.getElementById("settingPanel").classList.add("hidden");
    document.getElementById("practicePanel").classList.remove("hidden");

    current = 0;
    showQuestion();
}

function showQuestion() {
    const q = questionBank[current];

    document.getElementById("questionText").innerHTML =
        `<span class="question-number">${current + 1}.</span>` +
        q.text.replace(/{(.*?)}/g, '<span class="subject">$1</span>');

    document.getElementById("options").innerHTML = q.options.map((opt, i) => {
        let mark = "";
        if (answers[current] !== null) {
            if (answers[current].index === i) {
                mark = `<span class="${opt.correct ? 'correct' : 'wrong'}">${opt.correct ? '✔' : '✗'}</span>`;
            }
        }
        return `<div class="option" data-index="${i}">${opt.label}. ${opt.value} ${mark}</div>`;
    }).join("");

    if (answers[current] === null) {
        document.querySelectorAll(".option").forEach(el => {
            el.onclick = () => selectOption(+el.dataset.index);
        });
    }

    updateNav();
    updateProgress();
}

function selectOption(index) {
    const q = questionBank[current];
    answers[current] = {
        index,
        correct: q.options[index].correct
    };

    showQuestion();

    if (q.options[index].correct) {
        setTimeout(() => {
            current++;
            if (current >= TOTAL) {
                finish();
            } else {
                showQuestion();
            }
        }, 800);
    }
}

function updateNav() {
    document.getElementById("prevBtn").style.visibility =
        current > 0 ? "visible" : "hidden";

    document.getElementById("nextBtn").style.visibility =
        answers[current] !== null ? "visible" : "hidden";
}

function updateProgress() {
    const correct = answers.filter(a => a && a.correct).length;
    document.getElementById("progressInfo").innerText =
        `已答对 ${correct} / ${TOTAL} 题`;
}

function prev() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function next() {
    if (current < TOTAL - 1 && answers[current] !== null) {
        current++;
        showQuestion();
    }
}

function finish() {
    document.getElementById("practicePanel").classList.add("hidden");
    document.getElementById("resultPanel").classList.remove("hidden");

    const correct = answers.filter(a => a.correct).length;
    const wrong = TOTAL - correct;

    document.getElementById("scoreInfo").innerText =
        `共 ${TOTAL} 题，答对 ${correct} 题，答错 ${wrong} 题。`;

    const errors = questionBank.filter((_, i) => !answers[i].correct);

    document.getElementById("errorList").innerHTML =
        errors.length === 0
            ? "<p>太棒了，没有错题！</p>"
            : errors.map((q, i) => `
                <div class="summary-item">
                    <div class="summary-title">错题 ${i + 1}</div>
                    <div>${q.text.replace(/{(.*?)}/g, '<b>$1</b>')}</div>
                    <div>正确答案：${q.options.find(o => o.correct).value}</div>
                </div>
            `).join("");
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}
</script>

</body>
</html>
