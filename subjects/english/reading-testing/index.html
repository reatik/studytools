<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文章单词检测（6–9 年级）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f4f6f8;
    padding: 16px;
}

.container {
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

h1 {
    text-align: center;
    font-size: 22px;
}

textarea {
    width: 100%;
    min-height: 140px;
    font-size: 16px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    resize: vertical;
}

button {
    align-self: flex-start;
    padding: 10px 18px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #1677ff;
    color: #fff;
    cursor: pointer;
}

button:hover {
    background: #0958d9;
}

.output {
    background: #fff;
    padding: 16px;
    border-radius: 8px;
    line-height: 1.9;
    font-size: 18px;
    word-wrap: break-word;
}

.highlight {
    background: #ffe58f;
    cursor: pointer;
    border-radius: 4px;
    padding: 0 4px;
}

.tooltip {
    position: fixed;
    background: #222;
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 9999;
    max-width: 280px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>文章单词检测（6–9 年级）</h1>

    <textarea id="articleInput" placeholder="请粘贴文章内容..."></textarea>

    <button onclick="analyze()">开始分析</button>

    <div id="output" class="output"></div>
</div>

<!-- ✅ 你的原始 words.js -->
<script src="../words.js"></script>

<script>
/* =========================
   目标年级
========================= */
const targetGrades = new Set([
    "六年级上","六年级下",
    "七年级上","七年级下",
    "八年级上","八年级下",
    "九年级上","九年级下"
]);

const filteredWords = wordData.words.filter(w =>
    targetGrades.has(w.grade)
);

/* =========================
   自动生成变形
========================= */
function getForms(word) {
    const forms = new Set([word]);

    // 名词复数
    if (word.endsWith("s") || word.endsWith("x") || word.endsWith("ch") || word.endsWith("sh")) {
        forms.add(word + "es");
    } else if (word.endsWith("y") && !/[aeiou]/.test(word[word.length - 2])) {
        forms.add(word.slice(0, -1) + "ies");
    } else {
        forms.add(word + "s");
    }

    // 动词变形
    forms.add(word + "ed");
    forms.add(word + "ing");

    // 所有格
    forms.add(word + "'s");
    forms.add(word + "s'");

    return Array.from(forms);
}

/* =========================
   建立变形 → 原词映射
========================= */
const formMap = new Map();

filteredWords.forEach(w => {
    const forms = getForms(w.english);
    forms.forEach(form => {
        if (!formMap.has(form)) {
            formMap.set(form, []);
        }
        formMap.get(form).push(w);
    });
});

/* =========================
   分词
========================= */
function tokenize(text) {
    return text.match(/\b[\w’']+\b/g) || [];
}

/* =========================
   匹配单词
========================= */
function matchWord(token) {
    // ✅ 精确变形匹配（大小写敏感）
    if (formMap.has(token)) {
        return formMap.get(token)[0];
    }

    // ✅ 首字母大写匹配
    const capitalized =
        token.charAt(0).toUpperCase() + token.slice(1);

    if (formMap.has(capitalized)) {
        return formMap.get(capitalized)[0];
    }

    return null;
}

/* =========================
   分析文章
========================= */
function analyzeArticle(text) {
    return tokenize(text)
        .map(token => {
            const info = matchWord(token);
            return info ? { original: token, info } : null;
        })
        .filter(Boolean);
}

/* =========================
   渲染
========================= */
function render(text, matches) {
    let html = text;

    matches.forEach(({ original, info }) => {
        const tooltip =
            `${info.chinese}<br>${info.grade}<br>${info.pos} ${info.phonetic}`;

        const regex = new RegExp(`\\b${original}\\b`, "g");
        html = html.replace(
            regex,
            `<span class="highlight" data-tooltip="${tooltip}">${original}</span>`
        );
    });

    return html;
}

/* =========================
   主函数
========================= */
function analyze() {
    const input = document.getElementById("articleInput").value;
    const output = document.getElementById("output");

    if (!input.trim()) {
        alert("请先输入文章内容");
        return;
    }

    const matches = analyzeArticle(input);
    output.innerHTML = render(input, matches);

    if (matches.length === 0) {
        output.innerHTML += "<p>未检测到 6–9 年级单词。</p>";
    }
}

/* =========================
   提示框
========================= */
document.body.addEventListener("click", e => {
    document.querySelectorAll(".tooltip").forEach(t => t.remove());

    if (e.target.classList.contains("highlight")) {
        const tip = document.createElement("div");
        tip.className = "tooltip";
        tip.innerHTML = e.target.dataset.tooltip;
        document.body.appendChild(tip);

        const rect = e.target.getBoundingClientRect();
        tip.style.left = rect.left + window.scrollX + "px";
        tip.style.top = rect.bottom + window.scrollY + 6 + "px";
    }
});
</script>

</body>
</html>
