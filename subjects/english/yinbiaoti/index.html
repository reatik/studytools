<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>音标练习</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "微软雅黑", sans-serif;
}
body {
    background: #fff9f0;
    color: #4a4a4a;
    padding: 15px;
    line-height: 1.6;
}
.top-desc {
    text-align: center;
    font-size: 17px;
    color: #d48e55;
    font-weight: bold;
    margin-bottom: 18px;
}
.q-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
}
.question-card {
    background: #ffffff;
    border: 1px solid #f7e4d1;
    border-radius: 12px;
    padding: 14px 12px;
    width: auto;
    max-width: 90vw;
}
.option-row {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: flex-start;
    gap: 10px;
    white-space: nowrap;
    width: auto;
}
.num-item {
    width: 50px;
    text-align: center;
    padding: 12px 0;
}
.num-text {
    font-size: 19px;
    color: #d48e55;
    font-weight: bold;
}
.option-item {
    padding: 12px 10px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    width: auto;
    min-width: 0;
    flex: none;
    text-align: center;
}
.option-item:hover {
    background: #f9d9b5;
}
.option-item.active {
    background: #f9e3c7;
    border-color: #f1c79e;
}
.option-item.correct {
    color: #6e9c68;
}
.option-item.wrong {
    color: #4a4a4a;
}
.word-text {
    font-size: 18px;
    position: relative;
    padding-right: 22px;
    line-height: 1.4;
    white-space: nowrap;
}
.icon-tag {
    position: absolute;
    right: 0;
    top: 0;
    font-weight: bold;
}
.icon-tag.correct-icon { color: #6e9c68; }
.icon-tag.wrong-icon { color: #e27070; }
u {
    color: #e74c3c;
    text-decoration-color: #e74c3c;
    text-underline-offset: 3px;
    display: inline-block;
    position: relative;
}
.phonetic-under {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #888;
    white-space: nowrap;
    margin-top: 2px;
    display: none;
}
.show-phonetic .phonetic-under {
    display: block;
}
.btn-box {
    text-align: center;
    margin: 30px 0;
}
button {
    background: #a886c7;
    border: none;
    color: #fff;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #9472b3;
}
</style>
</head>
<body>

<div class="top-desc">选出划线发音不同的一项</div>
<div class="q-container" id="qWrap"></div>

<div class="btn-box">
    <button onclick="prevQ()">上一题</button>
    <button onclick="nextQ()">下一题</button>
</div>

<script src="phonetic.js"></script>
<script>
// 👇 把这里换成你新表单的链接
const FEISHU_URL = "https://xcnsaubdgn7c.feishu.cn/share/base/form/shrcnzUWZ3RHri52w97tUTo0pje";

// 自动生成用户信息
function getUserId(){
    let id = localStorage.getItem("stu_uid");
    if(!id) id = "stu_"+Date.now();
    localStorage.setItem("stu_uid",id);
    return id;
}
function getUserName(){
    let n = localStorage.getItem("stu_name");
    if(!n){
        n = prompt("请输入你的昵称（用于排行榜）：","学生");
        localStorage.setItem("stu_name",n);
    }
    return n;
}

// 自动提交做题记录
function sendRecord(qNum, isRight){
    let name = encodeURIComponent(getUserName());
    let uid = getUserId();
    let qid = qNum;
    let res = isRight ? "是" : "否";
    let score = isRight ? 10 : 0;

    // 用GET方式提交，绕过跨域限制
    let api = `${FEISHU_URL}?username=${name}&user_id=${uid}&question_id=${qid}&is_correct=${res}&score=${score}`;
    let img = new Image();
    img.src = api;
    console.log("✅ 数据已尝试提交");
}

// 原题做题逻辑
let allList = phoneticBank;
let showList = [];
let curIdx = 0;
let answerRecord = {};

function formatWord(str, phonetic) {
    return str.replace(/\[(.+?)\]/g, "<u>$1<span class='phonetic-under'>"+phonetic+"</span></u>");
}
function savePos(idx) {
    localStorage.setItem("phoneticLastIdx", idx);
}
function getLastPos() {
    let idx = localStorage.getItem("phoneticLastIdx");
    return idx ? parseInt(idx) : 0;
}

function init() {
    showList = allList;
    curIdx = getLastPos();
    renderQ();
}

function renderQ() {
    savePos(curIdx);
    let q = showList[curIdx];
    let isAnswered = answerRecord[curIdx] !== undefined;

    let html = `
    <div class="question-card">
        <div class="option-row ${isAnswered ? 'show-phonetic' : ''}">
            <div class="num-item">
                <div class="num-text">${curIdx + 1}.</div>
            </div>
    `;

    q.words.forEach((item, i) => {
        let letter = String.fromCharCode(65 + i);
        let showW = formatWord(item.word, item.phonetic);

        let statusClass = "";
        let icon = "";
        if(isAnswered) {
            if(i === q.answerIndex) {
                statusClass = "correct";
                icon = '<span class="icon-tag correct-icon">✔</span>';
            } else if(i === answerRecord[curIdx]) {
                statusClass = "wrong";
                icon = '<span class="icon-tag wrong-icon">✘</span>';
            }
        }

        html += `
            <div class="option-item ${statusClass}" data-idx="${i}">
                <div class="word-text">${letter}. ${showW}${icon}</div>
            </div>
        `;
    });

    html += `</div></div>`;
    document.getElementById("qWrap").innerHTML = html;

    document.querySelectorAll(".option-item").forEach(el => {
        el.onclick = function() {
            if(answerRecord[curIdx] !== undefined) return;
            let myIdx = parseInt(el.dataset.idx);
            answerRecord[curIdx] = myIdx;
            let ok = (myIdx === q.answerIndex);
            sendRecord(curIdx+1, ok);
            renderQ();
        };
    });
}

function prevQ() {
    if(curIdx > 0) {
        curIdx--;
        renderQ();
    }
}
function nextQ() {
    if(curIdx < showList.length -1) {
        curIdx++;
        renderQ();
    }
}

init();
</script>
</body>
</html>
