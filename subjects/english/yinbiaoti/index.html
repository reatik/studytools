<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>音标练习</title>
<style>
/* 柔和深一点的绿色系，降低亮度 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "微软雅黑", sans-serif;
}
body {
    background: #eef4f1;
    color: #333;
    padding: 15px;
    line-height: 1.6;
}
/* 顶部固定说明 */
.top-desc {
    position: sticky;
    top: 0;
    background: #dce8e3;
    padding: 12px 15px;
    border-radius: 10px;
    text-align: center;
    font-size: 17px;
    color: #2c6e54;
    z-index: 99;
    margin-bottom: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
/* 回到上次位置提示 */
.back-tip {
    display: inline-block;
    background: #659b87;
    color: #fff;
    padding: 3px 12px;
    border-radius: 15px;
    font-size: 13px;
    margin-bottom: 12px;
}
/* 题目区域 */
.q-container {
    max-width: 480px;
    margin: 0 auto;
}
/* 选项横向布局 */
.option-row {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 10px;
    justify-content: flex-start;
}

/* 序号容器 —— 和选项完全一样的结构！ */
.num-item {
    flex: 0 0 auto;
    min-width: 40px;
    text-align: center;
    padding: 10px 5px;
    padding-bottom: 25px;
    cursor: default;
    border-radius: 8px;
    background: transparent;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}
.num-text {
    font-size: 19px;
    color: #245c46;
    height: 28px;
    line-height: 28px;
    font-weight: bold;
}

/* 选项样式 */
.option-item {
    flex: 1;
    min-width: 90px;
    max-width: 120px;
    text-align: center;
    padding: 10px 5px;
    padding-bottom: 25px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    background: transparent;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}
/* 悬浮效果 */
.option-item:hover {
    background: #e2ebe7;
}
/* 选中样式 */
.option-item.active {
    background: #d0e0da;
    border-color: #a0c7bb;
}
/* 正确错误 */
.option-item.correct {
    background: transparent;
    border-color: transparent;
    color: #24805c;
}
.option-item.wrong {
    background: transparent;
    border-color: transparent;
    color: #333;
}
/* 单词文字 */
.word-text {
    font-size: 18px;
    position: relative;
    padding-right: 22px;
    display: inline-block;
    height: 28px;
    line-height: 28px;
}
/* 勾叉 */
.icon-tag {
    position: absolute;
    right: 0;
    top: 0;
    font-weight: bold;
}
.icon-tag.correct-icon { color: #24805c; }
.icon-tag.wrong-icon { color: #d32f2f; }
/* 下划线 */
u {
    color: #d32f2f;
    text-decoration-color: #d32f2f;
    text-underline-offset: 3px;
    font-weight: 500;
}
/* 音标 */
.phonetic-line {
    font-size: 14px;
    color: #666;
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    text-align: center;
    white-space: nowrap;
}
.btn-box {
    text-align: center;
    margin: 50px 0 30px;
}
button {
    background: #70a892;
    border: none;
    color: #fff;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    margin: 0 10px;
    cursor: pointer;
    transition: background 0.2s;
}
button:hover {
    background: #5c947f;
}
</style>
</head>
<body>

<div id="tipLabel" class="back-tip" style="display:none;">自动回到上次做题位置</div>
<div class="top-desc">选出划线发音不同的一项</div>
<div class="q-container" id="qWrap"></div>

<div class="btn-box">
    <button onclick="prevQ()">上一题</button>
    <button onclick="nextQ()">下一题</button>
</div>

<script src="phonetic.js"></script>
<script>
let allList = phoneticBank;
let showList = [];
let curIdx = 0;
let answerRecord = {};
let hasLoadAll = false;

function formatWord(str) {
    return str.replace(/\[(.+?)\]/g, "<u>$1</u>");
}
function getPureWord(str) {
    return str.replace(/\[|\]/g, "");
}
function getAlignSpace(word) {
    let left = word.match(/^([^\[]+)/)?.[1] || "";
    let space = "";
    for(let i = 0; i < left.length; i++) space += "&nbsp;&nbsp;";
    return space;
}

function savePos(idx) {
    localStorage.setItem("phoneticLastIdx", idx);
}
function getLastPos() {
    let idx = localStorage.getItem("phoneticLastIdx");
    return idx ? parseInt(idx) : 0;
}

function init() {
    showList = allList.slice(0, 10);
    let last = getLastPos();
    curIdx = last;
    if(last > 0) {
        document.getElementById("tipLabel").style.display = "inline-block";
        setTimeout(()=>document.getElementById("tipLabel").style.display="none", 2500);
    }
    renderQ();
    bindScrollLoad();
}

function bindScrollLoad() {
    window.addEventListener("scroll", ()=>{
        if(hasLoadAll) return;
        let scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
        let scrollHeight = document.documentElement.scrollHeight;
        let clientHeight = document.documentElement.clientHeight;
        if(scrollTop + clientHeight >= scrollHeight - 60) {
            showList = allList.slice(0, 20);
            hasLoadAll = true;
        }
    });
}

// 核心渲染：序号也放进同结构容器
function renderQ() {
    savePos(curIdx);
    let q = showList[curIdx];
    let isAnswered = answerRecord[curIdx] !== undefined;

    let html = `
    <div class="option-row">
        <!-- 序号容器：和选项结构完全一样 -->
        <div class="num-item">
            <div class="num-text">${curIdx + 1}.</div>
        </div>
    `;

    q.words.forEach((item, i) => {
        let letter = String.fromCharCode(65 + i);
        let showW = formatWord(item.word);
        let pureW = getPureWord(item.word);
        let space = getAlignSpace(item.word);

        let statusClass = "";
        let icon = "";
        if(isAnswered) {
            if(i === q.answerIndex) {
                statusClass = "correct";
                icon = '<span class="icon-tag correct-icon">✔</span>';
            } else if(i === answerRecord[curIdx]) {
                statusClass = "wrong";
                icon = '<span class="icon-tag wrong-icon">✘</span>';
            }
        }

        html += `
            <div class="option-item ${statusClass}" data-idx="${i}" data-pure="${pureW}">
                <div class="word-text">${letter}. ${showW}${icon}</div>
                <div class="phonetic-line">${space}${item.phonetic}</div>
            </div>
        `;
    });

    html += `</div>`;
    document.getElementById("qWrap").innerHTML = html;

    document.querySelectorAll(".option-item").forEach(el => {
        el.onclick = function() {
            if(answerRecord[curIdx] !== undefined) return;
            document.querySelectorAll(".option-item").forEach(x => x.classList.remove("active"));
            this.classList.add("active");
            selectAns(this, q);
        };
    });

    if(isAnswered) {
        document.querySelectorAll(".phonetic-line").forEach(el => el.style.display = "block");
        bindReadOnly();
    }
}

function selectAns(el, q) {
    let myIdx = parseInt(el.dataset.idx);
    answerRecord[curIdx] = myIdx;
    renderQ();
}

function bindReadOnly() {
    document.querySelectorAll(".option-item").forEach(el => {
        el.onclick = function() {
            let w = this.dataset.pure;
            let u = new SpeechSynthesisUtterance(w);
            u.lang = "en-US";
            speechSynthesis.speak(u);
        };
    });
}

function prevQ() {
    if(curIdx > 0) {
        curIdx--;
        renderQ();
        window.scrollTo(0,0);
    }
}
function nextQ() {
    if(curIdx < showList.length -1) {
        curIdx++;
        renderQ();
        window.scrollTo(0,0);
    }
}

init();
</script>
</body>
</html>
