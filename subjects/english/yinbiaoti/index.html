<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>音标练习</title>
<style>
/* 小朋友护眼 · 暖黄橙主体 + 淡紫点缀 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "微软雅黑", sans-serif;
}
body {
    background: #fff9f0;
    color: #4a4a4a;
    padding: 15px;
    line-height: 1.6;
}
.top-desc {
    text-align: center;
    font-size: 17px;
    color: #d48e55;
    font-weight: bold;
    margin-bottom: 18px;
}
.back-tip {
    display: inline-block;
    background: #e6b688;
    color: #fff;
    padding: 3px 12px;
    border-radius: 15px;
    font-size: 13px;
    margin-bottom: 12px;
}

/* 题目容器 */
.q-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
}

/* 题目卡片 */
.question-card {
    border-radius: 12px;
    padding: 16px 15px;
    width: 100%;
    max-width: 600px;
}

/* 整体布局：序号 + 内容主体 */
.option-row {
    display: flex;
    align-items: flex-start;
    gap: 8px; /* 🔴 缩小题号与题目间距（原来15px） */
    width: 100%;
}

/* 左侧题号 */
.num-item {
    width: 36px; /* 🔴 题号宽度缩小，更紧凑 */
    text-align: center;
    padding-top: 10px;
    flex-shrink: 0;
}
.num-text {
    font-size: 19px;
    color: #d48e55;
    font-weight: bold;
}

/* 右侧选项+音标 容器 竖排 */
.option-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* 单行选项布局：单词列 + 音标列 */
.option-line {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    transition: all 0.2s ease;
    cursor: pointer;
    border: 1px solid transparent;
    white-space: nowrap; /* 🔴 强制不换行 */
    flex-wrap: nowrap;    /* 🔴 禁止换行 */
}
.option-line:hover {
    background: #f9d9b5;
}
.option-line.active {
    background: #f9e3c7;
    border-color: #f1c79e;
}
.option-line.correct {
    color: #6e9c68;
}
.option-line.wrong {
    color: #4a4a4a;
}

/* 单词区域 */
.word-box {
    font-size: 18px;
    flex: 1;
}
/* 音标区域 固定靠右 */
.phonetic-box {
    font-size: 15px;
    color: #888;
    min-width: unset; /* 🔴 去掉固定宽度 */
    width: auto;
    text-align: left;
    flex-shrink: 0; /* 🔴 防止音标被挤压换行 */
}

.icon-tag {
    margin-left: 8px;
    font-weight: bold;
}
.icon-tag.correct-icon { color: #6e9c68; }
.icon-tag.wrong-icon { color: #e27070; }

/* 下划线红色 */
u {
    color: #e74c3c;
    text-decoration-color: #e74c3c;
    text-underline-offset: 3px;
}

/* 答题后才显示音标 */
.hide-pho .phonetic-box {
    display: none;
}
.show-pho .phonetic-box {
    display: block;
}

.btn-box {
    text-align: center;
    margin: 30px 0;
}
button {
    background: #a886c7;
    border: none;
    color: #fff;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin: 0 6px;
}
button:hover {
    background: #9472b3;
}
</style>
</head>
<body>

<div class="top-desc">选出划线发音不同的一项</div>
<div class="q-container" id="qWrap"></div>

<div class="btn-box">
    <button onclick="prevQ()">上一题</button>
    <button onclick="nextQ()">下一题</button>
</div>

<script src="phonetic.js"></script>
<script>
let allList = phoneticBank;
let showList = [];
let curIdx = 0;
let answerRecord = {};

// 只处理划线，不再内嵌音标
function formatWord(str) {
    return str.replace(/\[(.+?)\]/g, "<u>$1</u>");
}
function getPureWord(str) {
    return str.replace(/\[|\]/g, "");
}

function savePos(idx) {
    localStorage.setItem("phoneticLastIdx", idx);
}
function getLastPos() {
    let idx = localStorage.getItem("phoneticLastIdx");
    return idx ? parseInt(idx) : 0;
}

function init() {
    showList = allList;
    let last = getLastPos();
    curIdx = last;
    renderQ();
}

function renderQ() {
    savePos(curIdx);
    let q = showList[curIdx];
    let isAnswered = answerRecord[curIdx] !== undefined;
    let phoClass = isAnswered ? 'show-pho' : 'hide-pho';

    let html = `
    <div class="question-card">
        <div class="option-row">
            <div class="num-item">
                <div class="num-text">${curIdx + 1}.</div>
            </div>
            <div class="option-wrap ${phoClass}">
    `;

    q.words.forEach((item, i) => {
        let letter = String.fromCharCode(65 + i);
        let showW = formatWord(item.word);
        let pureW = getPureWord(item.word);

        let statusClass = "";
        let icon = "";
        if(isAnswered) {
            if(i === q.answerIndex) {
                statusClass = "correct";
                icon = '<span class="icon-tag correct-icon">✔</span>';
            } else if(i === answerRecord[curIdx]) {
                statusClass = "wrong";
                icon = '<span class="icon-tag wrong-icon">✘</span>';
            }
        }

        html += `
            <div class="option-line ${statusClass}" data-idx="${i}" data-pure="${pureW}">
                <div class="word-box">${letter}. ${showW}${icon}</div>
                <div class="phonetic-box">${item.phonetic}</div>
            </div>
        `;
    });

    html += `</div></div></div>`;
    document.getElementById("qWrap").innerHTML = html;

    // 绑定点击
    document.querySelectorAll(".option-line").forEach(el => {
        el.onclick = function() {
            if(answerRecord[curIdx] !== undefined) return;
            document.querySelectorAll(".option-line").forEach(x => x.classList.remove("active"));
            this.classList.add("active");
            selectAns(this, q);
        };
    });
}

function selectAns(el, q) {
    let myIdx = parseInt(el.dataset.idx);
    answerRecord[curIdx] = myIdx;
    renderQ();
}

function prevQ() {
    if(curIdx > 0) {
        curIdx--;
        renderQ();
    }
}
function nextQ() {
    if(curIdx < showList.length -1) {
        curIdx++;
        renderQ();
    }
}

init();
</script>
</body>
</html>
