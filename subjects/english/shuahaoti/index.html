<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>初中好题易错题</title>
    <style>
:root {
    --primary-color: #5A4B75;
    --secondary-color: #72638D;
    --accent-color: #4A3C63;
    --light-bg: #3a3a3a;
    --text-color: #241B33;
    --light-text: #5A4B75;
    --border-color: #9C8EB5;
    --error-color: #C62828;
    --success-color: #6A5889;
    --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.24);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background-color: var(--light-bg);
    color: var(--text-color);
    line-height: 1.6;
    transition: background-color 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
}

.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: background-color 0.3s ease;
}

/* 右上角选项按钮 */
.top-right-option {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 999;
    display: flex;
    gap: 8px;
}
.option-menu-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(126,87,194,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
.option-menu-btn.active {
    background: #7E57C2;
    border-color: #673AB7;
}
.option-menu-btn.active img {
    filter: brightness(0) invert(1);
}
.option-menu-btn img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}

/* 统一筛选面板 */
.filter-panel {
    position: fixed;
    top: 60px;
    right: 12px;
    width: 220px;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(90,75,117,0.25);
    border: 1px solid rgba(126,87,194,0.15);
    padding: 12px 14px;
    z-index: 998;
    display: none;
}
.filter-panel.show {
    display: block;
}
.filter-group {
    margin-bottom: 12px;
}
.filter-group:last-child {
    margin-bottom: 0;
}
.filter-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
}
.filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.filter-tag {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    background: #f5f1fc;
    color: #5A4B75;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
}
.filter-tag.active {
    background: #7E57C2;
    color: #fff;
}
.filter-tag.all {
    background: #f1f1f1;
    color: #666;
}

/* ===== 右侧浮动操作栏 ===== */


/* ===== 主答题区域 ===== */
.question-area {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 54px 44px;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
}

.card-wrapper {
    position: relative;
    width: 100%;
    margin-top: 24px;
}

.question-card {
    position: relative;
    background: white;
    border-radius: 16px;
    padding: 20px 16px 16px;
    box-shadow: var(--card-shadow);
    border: 2px solid var(--primary-color);
    transition: background-color 0.3s ease, border-color 0.3s ease;
    width: 100%;
    touch-action: pan-y;
    height: 480px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.question-card-body {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(126,87,194,0.25) transparent;
}
.question-card-body::-webkit-scrollbar {
    width: 5px;
}
.question-card-body::-webkit-scrollbar-thumb {
    background: rgba(126,87,194,0.25);
    border-radius: 8px;
}

.question-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    width: 32px;
    height: 24px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    background-color: var(--primary-color);
    transition: background-color 0.3s ease;
    margin-right: 6px;
    vertical-align: middle;
    border: none;
    outline: none;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    padding: 0;
}
.question-number:focus {
    background-color: #7E57C2;
    box-shadow: 0 0 0 2px rgba(126,87,194,0.4);
}

.badge-row {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
}

/* 错过标签 */
.wrong-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    background: #FFEBEE;
    color: #C62828;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(198,40,40,0.25);
    transition: all 0.2s;
    margin-left: auto;
    flex-shrink: 0;
    user-select: none;
}
.wrong-tag.removable {
    cursor: pointer;
}
.wrong-tag:not(.removable) {
    cursor: default;
    opacity: 0.7;
}
.wrong-tag.removable::after {
    content: '✕';
    font-size: 10px;
    margin-left: 2px;
    opacity: 0.6;
}
/* 统计栏（题目卡片右上角外侧） */
.stats-bar {
    position: absolute;
    top: -28px;
    right: 2px;
    display: flex;
    gap: 8px;
    z-index: 5;
}
.stat-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    color: #999;
    padding: 2px 4px;
    user-select: none;
}
.stat-item.clickable {
    cursor: pointer;
    transition: opacity 0.15s;
}
.stat-item.clickable:hover {
    opacity: 0.7;
}
.stat-item img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    vertical-align: middle;
}
.stat-num {
    font-weight: 500;
    min-width: 12px;
    text-align: center;
    line-height: 24px;
}

.question-text {
    font-size: 15px;
    margin: 12px 0;
    line-height: 1.5;
    font-weight: 500;
    transition: color 0.3s ease;
    flex: 1;
    min-width: 0;
    word-break: break-word;
}

.options-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-radius: 12px;
    background-color: #FCFAFF;
    cursor: pointer;
    transition: all 0.2s, background-color 0.3s ease, border-color 0.3s ease;
    border: 1px solid var(--border-color);
}

.option:hover {
    border-color: var(--primary-color);
    background-color: #EDE7F6;
}

.option input[type="radio"] {
    margin-right: 12px;
    accent-color: var(--primary-color);
}

.option .option-text {
    flex: 1;
}

.option .result-icon {
    font-size: 18px;
    margin-left: 8px;
    font-weight: bold;
}

.result-icon.correct-icon {
    color: var(--success-color);
}

.result-icon.incorrect-icon {
    color: var(--error-color);
}

.option.correct {
    border-color: #4CAF50;
    background-color: #e8f5e9;
}

.option.incorrect {
    border-color: #C62828;
    background-color: #FFEBEE;
}

.fill-input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    font-size: 15px;
    margin-top: 8px;
    background-color: #FCFAFF;
    transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
}

.fill-input:focus {
    border-color: var(--primary-color);
    outline: none;
    box-shadow: 0 0 0 2px #D1C4E9;
}

.fill-input.correct {
    border-color: #4CAF50;
    background-color: #e8f5e9;
}

.fill-input.incorrect {
    border-color: var(--error-color);
    background-color: #FFEBEE;
}

/* 填空题行内输入框（参考 shitai 组件） */
.inline-fill {
    display: inline-block;
    border: none;
    border-bottom: 2px solid var(--primary-color);
    font-size: 18px;
    padding: 2px 6px;
    min-width: 50px;
    width: 80px;
    text-align: center;
    outline: none;
    background: transparent;
    transition: border-color 0.3s ease, color 0.3s ease;
    font-family: inherit;
    vertical-align: bottom;
}
.inline-fill:focus {
    border-bottom-color: var(--secondary-color);
}
.inline-fill.correct {
    border-bottom-color: #4CAF50;
    color: #4CAF50;
}
.inline-fill.incorrect {
    border-bottom-color: var(--error-color);
    color: var(--error-color);
}
.fill-result-text {
    font-size: 13px;
    margin-top: 6px;
    display: block;
}

.submit-btn {
    margin-top: 10px;
    padding: 8px 18px;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
}

.submit-btn:hover {
    background-color: var(--secondary-color);
    transform: translateY(-1px);
}

.show-answer-btn {
    margin-top: 10px;
    padding: 8px 18px;
    background-color: #7B1FA2;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
}

.show-answer-btn:hover {
    background-color: #9C27B0;
    transform: translateY(-1px);
}

.explanation {
    margin-top: 16px;
    padding: 12px;
    background-color: rgba(126, 87, 194, 0.05);
    border-radius: 8px;
    display: none;
    font-size: 14px;
    border: 1px solid var(--border-color);
    transition: background-color 0.3s ease, border-color 0.3s ease;
    font-family: "SimSun", "宋体", serif !important;
}

.explanation-title {
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--primary-color);
    transition: color 0.3s ease;
}

.grade-badge, .unit-badge, .knowledge-badge {
    display: inline-block;
    font-size: 11px;
    background: #E8E4F0;
    padding: 3px 10px;
    border-radius: 6px;
    margin-right: 8px;
    color: #5A4B75;
    font-weight: 500;
}

.empty-message {
    text-align: center;
    padding: 40px 20px;
    color: var(--light-text);
    background: #F3E5F5;
    border-radius: 24px;
    width: 100%;
}

.loading-more {
    text-align: center;
    padding: 20px;
    color: var(--light-text);
    font-size: 14px;
}

/* ===== 夜间模式 ===== */
body.night-mode {
    background-color: #1a1e2a;
}

body.night-mode .container {
    background-color: #1a1e2a;
}

body.night-mode .question-card {
    background-color: #242a38;
    border-color: #7E57C2;
}

body.night-mode .question-text {
    color: #ffffff;
}

body.night-mode .option {
    background-color: #1e2533;
    border-color: #3d4559;
    color: #e8edf5;
}

body.night-mode .option:hover {
    background-color: #3a4a5a;
    border-color: #7E57C2;
}

body.night-mode .option.correct {
    border-color: #4CAF50;
    background-color: rgba(76, 175, 80, 0.25);
    color: #ffffff;
}

body.night-mode .option.incorrect {
    border-color: #b57272;
    background-color: rgba(181, 114, 114, 0.25);
    color: #e8b8b8;
}

body.night-mode .fill-input {
    background-color: #1e2533;
    border-color: #3d4559;
    color: #e8edf5;
}

body.night-mode .fill-input:focus {
    border-color: #7E57C2;
    box-shadow: 0 0 0 2px rgba(126, 87, 194, 0.3);
}

body.night-mode .fill-input.correct {
    border-color: #4CAF50;
    background-color: rgba(76, 175, 80, 0.2);
    color: #ffffff;
}

body.night-mode .fill-input.incorrect {
    border-color: #b57272;
    background-color: rgba(181, 114, 114, 0.2);
    color: #e8b8b8;
}

body.night-mode .inline-fill {
    color: #e8edf5;
    border-bottom-color: #7E57C2;
}
body.night-mode .inline-fill.correct {
    border-bottom-color: #4CAF50;
    color: #4CAF50;
}
body.night-mode .inline-fill.incorrect {
    border-bottom-color: #b57272;
    color: #e8b8b8;
}

body.night-mode .explanation {
    background-color: #1e2533;
    border-color: #3d4559;
    color: #c8d0e0;
}

body.night-mode .explanation-title {
    color: #D1C4E9;
}

body.night-mode .wrong-tag {
    background: rgba(198,40,40,0.18);
    color: #ff6b6b;
    border-color: rgba(255,107,107,0.3);
}
body.night-mode .wrong-tag:not(.removable) {
    opacity: 0.6;
    cursor: default;
}
body.night-mode .wrong-tag.removable:hover {
    background: rgba(198,40,40,0.3);
}

body.night-mode .stat-item {
    color: #aaa;
}
body.night-mode .stat-item.clickable:hover {
    opacity: 0.7;
}
body.night-mode .empty-message {
    background-color: #1e2533;
    color: #a8b5c9;
}

body.night-mode .question-number {
    background-color: #7E57C2;
}

body.night-mode .grade-badge,
body.night-mode .unit-badge,
body.night-mode .knowledge-badge {
    background: #5A4B75;
    color: #ffffff;
}

/* 夜间模式 - 筛选面板 */
body.night-mode .filter-panel {
    background: rgba(36,42,56,0.98);
    border-color: rgba(126,87,194,0.25);
}
body.night-mode .filter-title {
    color: #ccc;
}
body.night-mode .filter-tag {
    background: #2a3040;
    color: #d0d8e8;
}
body.night-mode .filter-tag.active {
    background: #7E57C2;
    color: #fff;
}
body.night-mode .filter-tag.all {
    background: #2d3342;
    color: #aaa;
}

/* ===== 响应式 ===== */
@media (min-width: 768px) {
    .question-area {
        max-width: 860px;
        padding: 24px 64px 44px;
    }
}

@media (max-width: 767px) {
    .question-area {
        padding: 12px 12px 44px;
    }
    .question-card {
        padding: 18px 12px 12px;
        height: 420px;
    }
}
@media (min-width: 768px) and (max-width: 1023px) {
    .question-area {
        padding: 20px 32px 44px;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <!-- 右上角：错题 + 选项按钮 -->
        <div class="top-right-option">
            <div class="option-menu-btn" id="only-wrong-btn" title="错题模式">
                <img src="../../../images/错题1.png" alt="错题">
            </div>
            <div class="option-menu-btn" id="option-menu-btn" title="筛选选项">
                <img src="../../../images/选项.png" alt="选项">
            </div>
            <div class="filter-panel" id="filter-panel">
                <div class="filter-group">
                    <div class="filter-title">题型</div>
                    <div class="filter-tags" id="type-tags"></div>
                </div>
                <div class="filter-group">
                    <div class="filter-title">年级</div>
                    <div class="filter-tags" id="grade-tags"></div>
                </div>
                <div class="filter-group">
                    <div class="filter-title">单元</div>
                    <div class="filter-tags" id="unit-tags"></div>
                </div>
                <div class="filter-group">
                    <div class="filter-title">考点</div>
                    <div class="filter-tags" id="knowledge-tags"></div>
                </div>
            </div>
        </div>



        <!-- 主答题区域 -->
        <div class="question-area" id="question-area">
            <div class="loading-more">加载题目中...</div>
        </div>

    </div>

    <script>
        // ---------- 全局变量 ----------
        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let isOnlyWrongMode = false;

        let questionAttempts = {};
        let questionCorrectStatus = {};
        let userAnswers = {};
        let lastQuestionId = localStorage.getItem('lastQuestionId') || null;
        let questionFavs = new Set();
        let questionLikes = new Set();

        // 多选筛选集合
        let selectedTypes = new Set();
        let selectedGrades = new Set();
        let selectedUnits = new Set();
        let selectedKnowledges = new Set();

        // DOM
        const questionArea = document.getElementById('question-area');
        const onlyWrongBtn = document.getElementById('only-wrong-btn');
        const optionMenuBtn = document.getElementById('option-menu-btn');
        const filterPanel = document.getElementById('filter-panel');



        // ---------- 右上角筛选面板 ----------
        function getUniqueList(key) {
            let set = new Set();
            allQuestions.forEach(q => {
                let val = q[key];
                if (val) set.add(val);
            });
            return Array.from(set).sort();
        }

        function renderFilterTags() {
            // 题型
            renderTagGroup('type-tags', getUniqueList('type'), selectedTypes);
            // 年级
            renderTagGroup('grade-tags', getUniqueList('grade'), selectedGrades);
            // 单元
            renderTagGroup('unit-tags', getUniqueList('unit'), selectedUnits);
            // 考点
            renderTagGroup('knowledge-tags', getUniqueList('knowledge_point'), selectedKnowledges);
        }

        function renderTagGroup(containerId, list, selectedSet) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            const allTag = document.createElement('div');
            allTag.className = 'filter-tag all';
            allTag.textContent = '全部';
            allTag.onclick = () => {
                selectedSet.clear();
                list.forEach(item => selectedSet.add(item));
                renderFilterTags();
                doFilter();
            };
            container.appendChild(allTag);

            list.forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'filter-tag';
                if (selectedSet.has(item)) tag.classList.add('active');
                tag.textContent = item;
                tag.onclick = () => {
                    if (selectedSet.has(item)) selectedSet.delete(item);
                    else selectedSet.add(item);
                    renderFilterTags();
                    doFilter();
                };
                container.appendChild(tag);
            });
        }

        optionMenuBtn.onclick = (e) => {
            e.stopPropagation();
            let shown = filterPanel.classList.toggle('show');
            optionMenuBtn.classList.toggle('active', shown);
        };

        document.addEventListener('click', () => {
            if (filterPanel.classList.contains('show')) {
                filterPanel.classList.remove('show');
                optionMenuBtn.classList.remove('active');
            }
        });
        filterPanel.onclick = (e) => e.stopPropagation();

        // ---------- 加载题库 ----------
        async function loadQuestions() {
            try {
                const response = await fetch('tiku.json');
                if (!response.ok) throw new Error('无法加载题库文件');
                const data = await response.json();
                return data.questions || [];
            } catch (error) {
                console.error('加载题目失败:', error);
                questionArea.innerHTML = '<div class="empty-message">❌ 加载题目失败，请确保 tiku.json 文件存在且格式正确</div>';
                return [];
            }
        }

        // 综合筛选
        function filterQuestions() {
            let res = [...allQuestions];
            if (selectedTypes.size > 0 && selectedTypes.size !== getUniqueList('type').length) {
                res = res.filter(q => selectedTypes.has(q.type));
            }
            if (selectedGrades.size > 0 && selectedGrades.size !== getUniqueList('grade').length) {
                res = res.filter(q => selectedGrades.has(q.grade));
            }
            if (selectedUnits.size > 0 && selectedUnits.size !== getUniqueList('unit').length) {
                res = res.filter(q => selectedUnits.has(q.unit));
            }
            if (selectedKnowledges.size > 0 && selectedKnowledges.size !== getUniqueList('knowledge_point').length) {
                res = res.filter(q => selectedKnowledges.has(q.knowledge_point));
            }
            if (isOnlyWrongMode) {
                let wrongIds = new Set(Object.keys(questionCorrectStatus).filter(id => questionCorrectStatus[id] === true));
                res = res.filter(q => wrongIds.has(q.id));
            }
            return res;
        }

        function doFilter() {
            filteredQuestions = filterQuestions();
            currentIndex = 0;
            renderCurrent();
        }

        // 渲染当前题目
        function renderCurrent() {
            questionArea.innerHTML = '';
            if (filteredQuestions.length === 0) {
                questionArea.innerHTML = '<div class="empty-message">没有匹配的题目</div>';
                return;
            }
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= filteredQuestions.length) currentIndex = filteredQuestions.length - 1;

            let q = filteredQuestions[currentIndex];
            questionArea.appendChild(createQuestionCard(q));
        }

        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrent();
            }
        }

        function goToNext() {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                renderCurrent();
            }
        }

        // 去除错过标签
        function removeWrongTag(qid) {
            if (questionCorrectStatus[qid]) {
                questionCorrectStatus[qid] = false;
                saveAllData();
                renderCurrent();
            }
        }

        // 生成题目卡片
        function createQuestionCard(q) {
            // wrapper 包裹后支持统计栏溢出到卡片外
            let wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';

            // 右上外侧统计栏（demo，数字写死，以后改）
            let isFaved = questionFavs.has(q.id);
            let isLiked = questionLikes.has(q.id);
            let stats = document.createElement('div');
            stats.className = 'stats-bar';
            stats.innerHTML = `
                <span class="stat-item"><img src="../../../images/icon_学生错题.png" alt="错"><span class="stat-num">10</span></span>
                <span class="stat-item clickable" title="收藏"><img src="${isFaved ? '../../../images/收藏2.png' : '../../../images/收藏1.png'}" alt="收藏"><span class="stat-num">10</span></span>
                <span class="stat-item clickable" title="点赞"><img src="${isLiked ? '../../../images/点赞2.png' : '../../../images/点赞1.png'}" alt="点赞"><span class="stat-num">10</span></span>
            `;
            // 收藏点击事件
            let favItem = stats.querySelectorAll('.stat-item.clickable')[0];
            favItem.onclick = (e) => {
                e.stopPropagation();
                if (questionFavs.has(q.id)) {
                    questionFavs.delete(q.id);
                } else {
                    questionFavs.add(q.id);
                }
                saveAllData();
                renderCurrent();
            };
            // 点赞点击事件
            let likeItem = stats.querySelectorAll('.stat-item.clickable')[1];
            likeItem.onclick = (e) => {
                e.stopPropagation();
                if (questionLikes.has(q.id)) {
                    questionLikes.delete(q.id);
                } else {
                    questionLikes.add(q.id);
                }
                saveAllData();
                renderCurrent();
            };
            wrapper.appendChild(stats);

            let card = document.createElement('div');
            card.className = 'question-card';
            card.setAttribute('data-qid', q.id);

            let badgeDiv = document.createElement('div');
            badgeDiv.className = 'badge-row';

            // 可输入跳转的序号
            let num = document.createElement('input');
            num.type = 'text';
            num.className = 'question-number';
            num.value = currentIndex + 1;
            num.title = '输入序号跳转题目';
            num.setAttribute('data-idx', currentIndex);
            num.addEventListener('focus', () => num.select());
            num.addEventListener('blur', () => {
                let n = parseInt(num.value);
                if (!isNaN(n) && n >= 1 && n <= filteredQuestions.length && (n - 1) !== currentIndex) {
                    currentIndex = n - 1;
                    renderCurrent();
                } else {
                    num.value = currentIndex + 1;
                }
            });
            num.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    num.blur();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    e.stopPropagation();
                }
            });
            badgeDiv.appendChild(num);

            if (q.grade) {
                let b = document.createElement('span');
                b.className = 'grade-badge';
                b.textContent = q.grade;
                badgeDiv.appendChild(b);
            }
            if (q.unit) {
                let b = document.createElement('span');
                b.className = 'unit-badge';
                b.textContent = q.unit;
                badgeDiv.appendChild(b);
            }
            if (q.knowledge_point) {
                let b = document.createElement('span');
                b.className = 'knowledge-badge';
                b.textContent = q.knowledge_point;
                badgeDiv.appendChild(b);
            }

            let isCurrentWrong = questionCorrectStatus[q.id] === true;
            if (isCurrentWrong) {
                let isCorrectNow = isAnsweredCorrectly(q);
                let wt = document.createElement('span');
                if (isCorrectNow) {
                    wt.className = 'wrong-tag removable';
                    wt.title = '点击去除错过标记';
                    wt.onclick = (e) => {
                        e.stopPropagation();
                        removeWrongTag(q.id);
                    };
                } else {
                    wt.className = 'wrong-tag';
                    wt.title = '答对后点击可去除错过标记';
                }
                wt.textContent = '错过';
                badgeDiv.appendChild(wt);
            }

            card.appendChild(badgeDiv);
            let body = document.createElement('div');
            body.className = 'question-card-body';

            let qtext = document.createElement('div');
            qtext.className = 'question-text';
            qtext.innerHTML = q.question;

            if (q.type === '选择') {
                body.appendChild(qtext);
                let opts = document.createElement('div');
                opts.className = 'options-container';
                q.options.forEach(opt => {
                    let label = document.createElement('label');
                    label.className = 'option';
                    let radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `q_${q.id}`;
                    radio.value = opt;
                    if (userAnswers[q.id]) radio.disabled = true;
                    if (userAnswers[q.id] === opt) radio.checked = true;

                    let resultIcon = document.createElement('span');
                    resultIcon.className = 'result-icon';

                    if (userAnswers[q.id]) {
                        let cor = checkAnswer(userAnswers[q.id], q.answer);
                        if (userAnswers[q.id] === opt) {
                            label.classList.add(cor ? 'correct' : 'incorrect');
                            resultIcon.textContent = cor ? '✓' : '✗';
                            resultIcon.classList.add(cor ? 'correct-icon' : 'incorrect-icon');
                        } else if (opt === q.answer) {
                            label.classList.add('correct');
                            resultIcon.textContent = '✓';
                            resultIcon.classList.add('correct-icon');
                        }
                    }

                    radio.onchange = () => {
                        if (userAnswers[q.id]) return;
                        userAnswers[q.id] = opt;
                        let cor = checkAnswer(opt, q.answer);
                        recordAttempt(q.id, cor);
                        card.replaceWith(createQuestionCard(q));
                    };

                    let span = document.createElement('span');
                    span.className = 'option-text';
                    span.textContent = opt;
                    label.appendChild(radio);
                    label.appendChild(span);
                    label.appendChild(resultIcon);
                    opts.appendChild(label);
                });
                body.appendChild(opts);
                if (userAnswers[q.id] && (q.explanation || q.meaning)) {
                    let exp = document.createElement('div');
                    exp.className = 'explanation';
                    exp.style.display = 'block';
                    let html = '';
                    if (q.meaning) html += `<div class="explanation-title">翻译</div>${q.meaning}`;
                    if (q.explanation) html += `<div class="explanation-title">解析</div>${q.explanation}`;
                    exp.innerHTML = html;
                    body.appendChild(exp);
                }
            } else if (q.type === '填空' || q.type === '音标') {
                let blankIdx = 0;
                qtext.innerHTML = q.question.replace(/______/g, () => {
                    let val = '';
                    let cls = 'inline-fill';
                    let dis = '';
                    if (userAnswers[q.id]) {
                        let parts = userAnswers[q.id].split(';');
                        val = (parts[blankIdx] || '').trim();
                        let isCor = checkAnswerEach(blankIdx, userAnswers[q.id], q.answer);
                        cls += isCor ? ' correct' : ' incorrect';
                        dis = ' disabled';
                    }
                    blankIdx++;
                    return `<input type="text" class="${cls}"${dis} value="${val}" autocomplete="off">`;
                });
                body.appendChild(qtext);

                if (!userAnswers[q.id]) {
                    let btn = document.createElement('button');
                    btn.className = 'submit-btn';
                    btn.textContent = '提交答案';
                    btn.onclick = () => {
                        let inputs = card.querySelectorAll('.inline-fill');
                        let vals = Array.from(inputs).map(inp => inp.value.trim());
                        if (vals.every(v => !v)) return alert('请输入答案');
                        userAnswers[q.id] = vals.join(';');
                        let cor = checkAnswerBlank(vals, q.answer);
                        recordAttempt(q.id, cor);
                        card.replaceWith(createQuestionCard(q));
                    };
                    body.appendChild(btn);
                } else {
                    let cor = checkAnswerBlank(
                        userAnswers[q.id].split(';').map(s => s.trim()),
                        q.answer
                    );
                    if (!cor) {
                        let rt = document.createElement('span');
                        rt.className = 'fill-result-text';
                        rt.style.color = 'var(--error-color)';
                        rt.textContent = '✗ 正确答案：' + q.answer.replace(/;/g, ' / ');
                        body.appendChild(rt);
                    }
                    if (q.meaning || q.explanation) {
                        let exp = document.createElement('div');
                        exp.className = 'explanation';
                        exp.style.display = 'block';
                        let html = '';
                        if (q.meaning) html += `<div class="explanation-title">翻译</div>${q.meaning}`;
                        if (q.explanation) html += `<div class="explanation-title">解析</div>${q.explanation}`;
                        exp.innerHTML = html;
                        body.appendChild(exp);
                    }
                }
            } else if (q.type === '句型转换') {
                let blankIdx = 0;
                qtext.innerHTML = q.question.replace(/_{3,}/g, () => {
                    let val = '';
                    let cls = 'inline-fill';
                    let dis = '';
                    if (userAnswers[q.id] && userAnswers[q.id] !== '[查看]') {
                        let parts = userAnswers[q.id].split(';');
                        val = (parts[blankIdx] || '').trim();
                        let isCor = checkAnswerEach(blankIdx, userAnswers[q.id], q.answer);
                        cls += isCor ? ' correct' : ' incorrect';
                        dis = ' disabled';
                    }
                    blankIdx++;
                    return `<input type="text" class="${cls}"${dis} value="${val}" autocomplete="off">`;
                });
                body.appendChild(qtext);

                if (!userAnswers[q.id]) {
                    let btn = document.createElement('button');
                    btn.className = 'submit-btn';
                    btn.textContent = '提交答案';
                    btn.onclick = () => {
                        let inputs = card.querySelectorAll('.inline-fill');
                        let vals = Array.from(inputs).map(inp => inp.value.trim());
                        if (vals.every(v => !v)) return alert('请输入答案');
                        userAnswers[q.id] = vals.join(';');
                        let cor = vals.join(' ').toLowerCase().trim() === q.answer.toLowerCase().trim();
                        recordAttempt(q.id, cor);
                        card.replaceWith(createQuestionCard(q));
                    };
                    body.appendChild(btn);
                } else {
                    let cor = userAnswers[q.id] !== '[查看]'
                        && userAnswers[q.id].split(';').join(' ').toLowerCase().trim() === q.answer.toLowerCase().trim();
                    let rt = document.createElement('span');
                    rt.className = 'fill-result-text';
                    rt.textContent = '正确答案：' + q.answer;
                    rt.style.color = cor ? 'var(--success-color)' : 'var(--error-color)';
                    if (!cor) rt.textContent = '✗ ' + rt.textContent;
                    body.appendChild(rt);

                    if (q.meaning || q.explanation) {
                        let exp = document.createElement('div');
                        exp.className = 'explanation';
                        exp.style.display = 'block';
                        let html = '';
                        if (q.explanation) html += `<div class="explanation-title">解析</div>${q.explanation}`;
                        if (q.meaning) {
                            if (q.explanation) html += '<br>';
                            html += `<div class="explanation-title">翻译</div>${q.meaning}`;
                        }
                        exp.innerHTML = html;
                        body.appendChild(exp);
                    }
                }
            }
            card.appendChild(body);
            wrapper.appendChild(card);
            return wrapper;
        }

        function checkAnswer(userAns, correctAns) {
            return userAns.trim().toLowerCase() === correctAns.trim().toLowerCase();
        }

        function checkAnswerEach(blankIdx, userAnswerStr, correctAnswer) {
            let userParts = userAnswerStr.split(';').map(s => s.trim());
            let correctParts = correctAnswer.includes(';')
                ? correctAnswer.split(';').map(s => s.trim())
                : correctAnswer.split(/\s+/).map(s => s.trim());
            if (blankIdx >= userParts.length || blankIdx >= correctParts.length) return false;
            return userParts[blankIdx].toLowerCase() === correctParts[blankIdx].toLowerCase();
        }

        function checkAnswerBlank(userVals, correctAnswer) {
            let correctParts = correctAnswer.split(';').map(s => s.trim());
            if (userVals.length !== correctParts.length) return false;
            return userVals.every((v, i) => v.trim().toLowerCase() === correctParts[i].toLowerCase());
        }

        function isAnsweredCorrectly(q) {
            if (!userAnswers[q.id]) return false;
            if (q.type === '选择') {
                return checkAnswer(userAnswers[q.id], q.answer);
            }
            let vals = userAnswers[q.id].split(';').map(s => s.trim());
            return checkAnswerBlank(vals, q.answer);
        }

        function recordAttempt(qid, isCorrect) {
            questionAttempts[qid] = true;
            if (!isCorrect) questionCorrectStatus[qid] = true;
            localStorage.setItem('lastQuestionId', qid);
            saveAllData();
        }

        function saveAllData() {
            localStorage.setItem('questionAttempts', JSON.stringify(questionAttempts));
            localStorage.setItem('questionCorrectStatus', JSON.stringify(questionCorrectStatus));
            localStorage.setItem('questionFavs', JSON.stringify([...questionFavs]));
            localStorage.setItem('questionLikes', JSON.stringify([...questionLikes]));
        }

        function loadAllData() {
            try {
                questionAttempts = JSON.parse(localStorage.getItem('questionAttempts')) || {};
                questionCorrectStatus = JSON.parse(localStorage.getItem('questionCorrectStatus')) || {};
                questionFavs = new Set(JSON.parse(localStorage.getItem('questionFavs')) || []);
                questionLikes = new Set(JSON.parse(localStorage.getItem('questionLikes')) || []);
            } catch (e) {}
            userAnswers = {};
        }

        function toggleOnlyWrongMode() {
            isOnlyWrongMode = !isOnlyWrongMode;
            onlyWrongBtn.classList.toggle('active', isOnlyWrongMode);
            currentIndex = 0;
            doFilter();
        }

        // 滑动切换
        function setupSwipe() {
            let touchStartX = 0;
            let touchStartY = 0;
            questionArea.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });
            questionArea.addEventListener('touchend', e => {
                let dx = e.changedTouches[0].screenX - touchStartX;
                let dy = e.changedTouches[0].screenY - touchStartY;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx < 0) goToNext();
                    else goToPrev();
                }
            });
        }

        // ---------- 初始化 ----------
        async function init() {
            allQuestions = await loadQuestions();
            if (!allQuestions.length) return;

            loadAllData();
            filteredQuestions = filterQuestions();
            // 自动跳转到上次做题位置
            let lastId = localStorage.getItem('lastQuestionId');
            if (lastId) {
                let idx = filteredQuestions.findIndex(q => q.id === lastId);
                if (idx !== -1) currentIndex = idx;
            }
            renderFilterTags();
            renderCurrent();
            setupSwipe();

            // 右上角按钮
            onlyWrongBtn.onclick = toggleOnlyWrongMode;

            // 键盘
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === 'ArrowLeft') goToPrev();
                if (e.key === 'ArrowRight') goToNext();
            });

        }

        init();
    </script>
</body>
</html>
