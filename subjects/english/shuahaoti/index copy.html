<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>初中好题易错题</title>
    <style>
html {
    touch-action: manipulation;
    overscroll-behavior: none none;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
}

:root {
    --paper-white: #ffffff;
    --paper-cream: #fefcf7;
    --line-blue: #c5daf0;
    --margin-red: #e8a0a0;
    --margin-red-light: rgba(232,160,160,0.35);
    --ink: #1a1a2e;
    --ink-light: #4a4a6e;
    --ink-blue: #1a3a6e;
    --ink-red: #c0392b;
    --ink-green: #1a7a3a;
    --desk-color: #6b5b4a;
    --line-h: 30px;
    --margin-x: 44px;
    --tab-h: 36px;
}

/* Theme: Wrong notebook */
.notebook.theme-wrong {
    --line-blue: #f5c2c2;
    --margin-red: #d44;
    --margin-red-light: rgba(221,68,68,0.3);
    --paper-white: #fff8f8;
}
.notebook.theme-wrong ~ .page-tab,
.page-tab.theme-wrong {
    background: linear-gradient(135deg, #fce8e8 0%, #f8d8d8 100%);
    color: #7a3a3a;
}

/* Theme: Favorite notebook */
.notebook.theme-fav {
    --line-blue: #e8d5b0;
    --margin-red: #c49a6c;
    --margin-red-light: rgba(196,154,108,0.3);
    --paper-white: #fffcf5;
}
.notebook.theme-fav ~ .page-tab,
.page-tab.theme-fav {
    background: linear-gradient(135deg, #fcf0d8 0%, #f4e8c8 100%);
    color: #6a5a2a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'KaiTi', 'STKaiti', serif;
    background: var(--desk-color);
    color: var(--ink);
    line-height: 1;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

.desk {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
    overflow: hidden;
    position: relative;
}

.notebook {
    position: relative;
    width: 100%;
    max-width: 640px;
    height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    background: var(--paper-white);
    box-shadow: 4px 0 16px rgba(0,0,0,0.2);
    border-radius: 0 4px 4px 0;
    margin-top: 30px;
    z-index: 2;
}

.notebook-lines {
    display: none;
}

.notebook-margin {
    position: absolute;
    top: 0; bottom: 0;
    left: var(--margin-x);
    width: 2px;
    background: var(--margin-red);
    z-index: 1;
    pointer-events: none;
}

.notebook-margin-light {
    position: absolute;
    top: 0; bottom: 0;
    left: calc(var(--margin-x) + 3px);
    width: 1px;
    background: var(--margin-red-light);
    z-index: 1;
    pointer-events: none;
}

.notebook-holes {
    position: absolute;
    top: 0; bottom: 0;
    left: 12px;
    width: 20px;
    z-index: 7;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    padding: 80px 0;
}

.hole {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--desk-color);
    border: 1.5px solid rgba(0,0,0,0.12);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
}

.notebook-top-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    padding: 0 8px;
    height: var(--tab-h);
    flex-shrink: 0;
    gap: 3px;
}

.page-tab {
    position: absolute;
    bottom: calc(100% - 36px);
    margin-bottom: 0;
    background: var(--paper-white);
    color: var(--ink-blue);
    padding: 4px 18px 5px;
    font-family: 'KaiTi', 'STKaiti', cursive;
    font-size: 16px;
    cursor: pointer;
    border: none;
    outline: none;
    border-radius: 3px 3px 0 0;
    min-width: 90px;
    text-align: center;
    z-index: 1;
}

.page-tab::after {
    display: none;
}

.page-tab input {
    font-family: 'KaiTi', 'STKaiti', cursive;
    font-size: 16px;
    color: var(--ink-blue);
    background: transparent;
    border: none;
    outline: none;
    width: 80px;
    text-align: center;
    cursor: pointer;
}

.filter-panel {
    position: absolute;
    top: 50%;
    right: -8px;
    transform: translateY(-50%);
    width: 200px;
    background: var(--paper-cream);
    border-radius: 6px 0 0 6px;
    box-shadow: -4px 2px 16px rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.06);
    border-right: none;
    padding: 0;
    z-index: 25;
    display: none;
    overflow-y: auto;
    max-height: 70vh;
}

.filter-panel.show { display: block; }

.filter-group {
    padding: 10px 12px 8px;
    border-bottom: 1px dashed rgba(0,0,0,0.08);
}
.filter-group:last-of-type { border-bottom: none; }

.filter-title {
    font-size: 11px;
    color: #888;
    margin-bottom: 6px;
    letter-spacing: 1px;
    font-family: 'KaiTi', 'STKaiti', cursive;
    font-weight: normal;
}

.filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}

.filter-tag {
    padding: 3px 9px;
    border-radius: 3px;
    font-size: 12px;
    background: rgba(26,58,110,0.05);
    color: var(--ink-blue);
    cursor: pointer;
    border: 1px solid transparent;
    font-family: 'KaiTi', 'STKaiti', cursive;
    transition: all 0.15s;
}

.filter-tag.active {
    background: var(--ink-blue);
    color: #fff;
    border-color: transparent;
}

.unit-placeholder {
    display: inline-block;
    font-size: 12px;
    color: #bbb;
    font-family: 'KaiTi', 'STKaiti', cursive;
    padding: 2px 0;
}

.filter-actions {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    background: rgba(192,57,43,0.04);
    border-top: 1px dashed rgba(0,0,0,0.08);
}

.filter-action-btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 3px;
    border: 1px solid rgba(192,57,43,0.2);
    background: rgba(255,235,235,0.5);
    color: var(--ink-red);
    font-size: 11px;
    font-family: 'KaiTi', 'STKaiti', cursive;
    cursor: pointer;
    transition: background 0.15s;
}

.filter-action-btn:hover { background: rgba(255,220,220,0.6); }

.page-area {
    flex: 1;
    position: relative;
    z-index: 5;
    overflow: hidden;
}

.page {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: calc(var(--line-h) - 6px) 36px 14px calc(var(--margin-x) + 12px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: rgba(26,58,110,0.15) transparent;
    background-image:
        repeating-linear-gradient(
            to bottom,
            transparent,
            transparent calc(var(--line-h) - 1px),
            var(--line-blue) calc(var(--line-h) - 1px),
            var(--line-blue) var(--line-h)
        );
    background-size: 100% var(--line-h);
    background-attachment: local;
    background-position: 0 calc(var(--line-h) - 6px);
}

.page::-webkit-scrollbar { width: 3px; }
.page::-webkit-scrollbar-thumb { background: rgba(26,58,110,0.15); border-radius: 2px; }

.badge-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    min-height: var(--line-h);
    line-height: var(--line-h);
}

.grade-badge, .unit-badge, .knowledge-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    padding: 0 6px;
    border-radius: 2px;
    color: var(--ink);
    border: none;
    box-shadow: none;
    line-height: 18px;
    height: 18px;
}

.grade-badge {
    background: rgba(255,235,59,0.45);
}

.unit-badge {
    background: rgba(129,212,250,0.45);
}

.knowledge-badge {
    background: rgba(165,214,167,0.45);
}

.right-group {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 22px;
}

.question-text {
    font-size: 18px;
    line-height: var(--line-h);
    color: var(--ink);
    word-break: break-word;
    min-height: var(--line-h);
    display: flex;
    align-items: center;
}

.options-container {
    display: flex;
    flex-direction: column;
    gap: 0;
}

.option {
    display: flex;
    align-items: center;
    padding: 0 8px;
    cursor: pointer;
    border: none;
    font-family: 'KaiTi', 'STKaiti', cursive;
    font-size: 17px;
    color: var(--ink);
    line-height: var(--line-h);
    min-height: var(--line-h);
    background: transparent;
}

.option:hover {
    background: rgba(26,58,110,0.08);
}

.option .option-text { flex: 1; line-height: var(--line-h); }

.option .result-icon {
    font-size: 16px;
    margin-left: 6px;
    font-weight: bold;
}

.result-icon.correct-icon { color: var(--ink-green); }
.result-icon.incorrect-icon { color: var(--ink-red); }

.option.correct {
    background: rgba(26,122,58,0.06);
}

.option.incorrect {
    background: rgba(192,57,43,0.06);
}

.inline-fill {
    display: inline-block;
    border: none;
    border-bottom: 2px solid var(--ink-blue);
    font-size: 17px;
    padding: 0 4px;
    min-width: 50px;
    width: 80px;
    text-align: center;
    outline: none;
    background: transparent;
    font-family: 'KaiTi', 'STKaiti', cursive;
    color: var(--ink);
    vertical-align: baseline;
    line-height: calc(var(--line-h) - 4px);
}

.inline-fill:focus { border-bottom-color: var(--ink-blue); }
.inline-fill.correct { border-bottom-color: var(--ink-green); color: var(--ink-green); }
.inline-fill.incorrect { border-bottom-color: var(--ink-red); color: var(--ink-red); }

.fill-input {
    width: 100%;
    padding: 4px 8px;
    border: none;
    border-bottom: 2px solid var(--line-blue);
    font-size: 17px;
    margin-top: 4px;
    background: transparent;
    font-family: 'KaiTi', 'STKaiti', cursive;
    color: var(--ink);
    line-height: var(--line-h);
    outline: none;
}

.fill-input:focus { border-bottom-color: var(--ink-blue); }
.fill-input.correct { border-bottom-color: var(--ink-green); color: var(--ink-green); }
.fill-input.incorrect { border-bottom-color: var(--ink-red); color: var(--ink-red); }

.fill-result-text {
    font-size: 14px;
    margin-top: 4px;
    display: block;
    line-height: var(--line-h);
    font-family: 'KaiTi', 'STKaiti', cursive;
}

.submit-btn {
    margin-top: 4px;
    padding: 4px 16px;
    background: transparent;
    color: var(--ink-blue);
    border: 1.5px solid var(--ink-blue);
    border-radius: 2px;
    font-size: 15px;
    cursor: pointer;
    font-family: 'KaiTi', 'STKaiti', cursive;
    line-height: var(--line-h);
}

.submit-btn:hover { background: rgba(26,58,110,0.06); }

.show-answer-btn {
    margin-top: 4px;
    padding: 4px 16px;
    background: transparent;
    color: var(--ink-red);
    border: 1.5px dashed var(--ink-red);
    border-radius: 2px;
    font-size: 15px;
    cursor: pointer;
    font-family: 'KaiTi', 'STKaiti', cursive;
    line-height: var(--line-h);
}

.explanation {
    margin-top: var(--line-h);
    display: none;
    font-size: 15px;
    font-family: 'KaiTi', 'STKaiti', cursive;
    color: var(--ink-light);
    line-height: var(--line-h);
}

.explanation-title {
    display: inline-block;
    font-weight: 700;
    color: var(--ink);
    padding: 0 6px;
    border-radius: 2px;
    margin-right: 4px;
    margin-bottom: 2px;
}

.explanation-title.title-translate {
    background: rgba(255,235,59,0.45);
}

.explanation-title.title-explain {
    background: rgba(129,212,250,0.45);
}

.word-tag {
    display: inline-block;
    background: rgba(26,58,110,0.06);
    color: var(--ink-blue);
    padding: 0 8px;
    border-radius: 2px;
    font-size: 15px;
    border: 1px solid rgba(26,58,110,0.1);
    font-family: 'KaiTi', 'STKaiti', cursive;
    line-height: 22px;
}

.fav-icon {
    width: 20px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-blue);
}

.attempt-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    background: rgba(26,122,58,0.08);
    color: var(--ink-green);
    padding: 0 6px;
    border-radius: 2px;
    border: 1px dashed rgba(26,122,58,0.25);
    flex-shrink: 0;
    cursor: default;
    position: relative;
    height: 18px;
    line-height: 1;
}

.attempt-tooltip {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
    background: var(--paper-white);
    color: var(--ink);
    padding: 4px 8px;
    border-radius: 2px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 30;
    pointer-events: none;
    border: 1px dashed var(--line-blue);
    box-shadow: 1px 2px 6px rgba(0,0,0,0.1);
}

.attempt-tooltip .correct { color: var(--ink-green); }
.attempt-tooltip .wrong { color: var(--ink-red); }
.attempt-tag:hover .attempt-tooltip { display: block; }

.card-wrong-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: transparent;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}

.card-wrong-btn img { width: 18px; height: 18px; }
.card-wrong-btn.active { background: transparent; border-color: transparent; }

.empty-message {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-light);
    font-family: 'KaiTi', 'STKaiti', cursive;
    font-size: 18px;
    line-height: var(--line-h);
}

.loading-more {
    text-align: center;
    padding: 20px;
    color: var(--ink-light);
    font-size: 16px;
    font-family: 'KaiTi', 'STKaiti', cursive;
}

.mode-toast {
    position: fixed;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--paper-cream);
    color: var(--ink-blue);
    padding: 8px 20px;
    border-radius: 2px;
    font-size: 20px;
    font-family: 'Ma Shan Zheng', cursive;
    letter-spacing: 4px;
    z-index: 2000;
    pointer-events: none;
    border: 1px dashed var(--line-blue);
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
}

.page-shadow {
    position: absolute;
    top: 0; right: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(to left, rgba(0,0,0,0.06), transparent);
    pointer-events: none;
    z-index: 6;
}

.right-sidebar {
    position: absolute;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
    z-index: 15;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px 3px;
}

.sidebar-btn {
    width: 32px;
    height: 32px;
    border-radius: 4px 0 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    outline: none;
    font-size: 10px;
    font-family: 'KaiTi', 'STKaiti', cursive;
    flex-direction: column;
    gap: 1px;
}

.sidebar-btn svg {
    width: 14px;
    height: 14px;
}

.sidebar-btn-fav {
    background: #f5efe6;
    color: #8d6e63;
}

.sidebar-btn-fav.active {
    background: #c9a96e;
    color: #fff;
}

.sidebar-btn-wrong {
    background: #ffcdd2;
    color: #4a1a1a;
}

.sidebar-btn-wrong.active {
    background: #e53935;
    color: #fff;
}

.sidebar-btn-option {
    background: #c8e6c9;
    color: #1b5e20;
}

.sidebar-btn-option.active {
    background: #43a047;
    color: #fff;
}

@media (max-width: 767px) {
    :root {
        --margin-x: 28px;
        --line-h: 26px;
        --tab-h: 30px;
    }
    .notebook { margin-top: 28px; height: calc(100vh - 60px); }
    .page-tab { font-size: 13px; padding: 2px 10px 3px; min-width: 56px; bottom: calc(100% - 28px); }
    .page-tab input { font-size: 13px; width: 48px; }
    .page { padding: calc(var(--line-h) - 6px) 16px 10px calc(var(--margin-x) + 8px); }
    .question-text { font-size: 16px; }
    .option { font-size: 15px; padding: 0 4px; }
    .option input[type="radio"] { width: 16px; height: 16px; margin-right: 8px; }
    .option input[type="radio"]:checked::after {
        width: 3.5px;
        height: 7px;
        border-width: 0 1.5px 1.5px 0;
    }
    .hole { width: 10px; height: 10px; }
    .notebook-holes { left: 6px; padding: 60px 0; }
    .sidebar-btn { width: 28px; height: 28px; }
    .sidebar-btn svg { width: 12px; height: 12px; }
    .filter-panel { width: 180px; }
    .badge-row { gap: 4px; }
    .grade-badge, .unit-badge, .knowledge-badge { font-size: 11px; padding: 0 5px; height: 16px; line-height: 16px; }
}

@media (min-width: 768px) {
    .notebook { max-width: 680px; }
}
    </style>
</head>
<body>
<div class="desk">
    <div class="page-tab" id="page-tab">
        <input type="text" id="q-num-input" value="1/1" title="输入序号跳转">
    </div>
    <div class="notebook" id="notebook">
        <div class="notebook-lines"></div>
        <div class="notebook-margin"></div>
        <div class="notebook-margin-light"></div>
        <div class="notebook-holes">
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
        </div>

        <div class="page-area" id="page-area">
            <div class="page-shadow"></div>
            <div class="right-sidebar">
                <div class="sidebar-btn sidebar-btn-fav" id="only-fav-btn" title="收藏模式">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </div>
                <div class="sidebar-btn sidebar-btn-wrong" id="only-wrong-btn" title="错题模式">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </div>
                <div class="sidebar-btn sidebar-btn-option" id="option-menu-btn" title="筛选选项">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
                </div>
            </div>
            <div class="filter-panel" id="filter-panel">
                <div class="filter-group">
                    <div class="filter-title">题型</div>
                    <div class="filter-tags" id="type-tags"></div>
                </div>
                <div class="filter-group">
                    <div class="filter-title">年级</div>
                    <div class="filter-tags" id="grade-tags"></div>
                </div>
                <div class="filter-group">
                    <div class="filter-title">单元</div>
                    <div class="filter-tags" id="unit-tags"></div>
                </div>
                <div class="filter-group">
                    <div class="filter-title">考点</div>
                    <div class="filter-tags" id="knowledge-tags"></div>
                </div>
                <div class="filter-actions">
                    <button class="filter-action-btn" id="clear-wrong-btn">清空错题</button>
                    <button class="filter-action-btn" id="clear-fav-btn">清空收藏</button>
                </div>
            </div>
            <div class="page" id="page-content">
                <div class="loading-more">加载题目中...</div>
            </div>
        </div>
    </div>
</div>

<script>
let allQuestions = [];
let filteredQuestions = [];
let currentIndex = 0;
let isOnlyWrongMode = false;
let isOnlyFavMode = false;
let lastNormalIndex = 0;
let lastWrongIndex = 0;
let lastFavIndex = 0;

let questionAttempts = {};
let questionCorrectStatus = {};
let questionStats = {};
let userAnswers = {};
let lastQuestionId = localStorage.getItem('lastQuestionId') || null;
let questionFavs = new Set();

let selectedTypes = new Set();
let selectedGrades = new Set();
let selectedUnits = new Set();
let selectedKnowledges = new Set();

const pageArea = document.getElementById('page-area');
const pageContent = document.getElementById('page-content');
const onlyWrongBtn = document.getElementById('only-wrong-btn');
const onlyFavBtn = document.getElementById('only-fav-btn');
const clearWrongBtn = document.getElementById('clear-wrong-btn');
const clearFavBtn = document.getElementById('clear-fav-btn');
const optionMenuBtn = document.getElementById('option-menu-btn');
const filterPanel = document.getElementById('filter-panel');
const qNumInput = document.getElementById('q-num-input');

function getUniqueList(key) {
    let set = new Set();
    allQuestions.forEach(q => { if (q[key]) set.add(q[key]); });
    return Array.from(set).sort();
}

function getFilteredUnits() {
    let set = new Set();
    let base = selectedGrades.size > 0 ? allQuestions.filter(q => selectedGrades.has(q.grade)) : [];
    base.forEach(q => { if (q.unit) set.add(q.unit); });
    return Array.from(set).sort();
}

function renderFilterTags() {
    renderTagGroup('type-tags', getUniqueList('type'), selectedTypes);
    renderTagGroup('grade-tags', getUniqueList('grade'), selectedGrades);
    let filteredUnits = getFilteredUnits();
    if (selectedGrades.size === 0) {
        document.getElementById('unit-tags').innerHTML = '<span class="unit-placeholder">请先选择年级</span>';
    } else {
        for (let u of selectedUnits) { if (!filteredUnits.includes(u)) selectedUnits.delete(u); }
        renderTagGroup('unit-tags', filteredUnits, selectedUnits);
    }
    renderTagGroup('knowledge-tags', getUniqueList('knowledge_point'), selectedKnowledges);
}

function renderTagGroup(containerId, list, selectedSet) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const allTag = document.createElement('div');
    allTag.className = 'filter-tag all';
    allTag.textContent = '全部';
    allTag.onclick = () => {
        if (selectedSet.size >= list.length) selectedSet.clear();
        else list.forEach(item => selectedSet.add(item));
        renderFilterTags();
        doFilter();
        if (!isOnlyWrongMode) saveAllData();
    };
    container.appendChild(allTag);
    list.forEach(item => {
        const tag = document.createElement('div');
        tag.className = 'filter-tag';
        if (selectedSet.has(item)) tag.classList.add('active');
        tag.textContent = item;
        tag.onclick = () => {
            if (selectedSet.has(item)) selectedSet.delete(item);
            else selectedSet.add(item);
            renderFilterTags();
            doFilter();
            if (!isOnlyWrongMode) saveAllData();
        };
        container.appendChild(tag);
    });
}

optionMenuBtn.onclick = (e) => {
    e.stopPropagation();
    let shown = filterPanel.classList.toggle('show');
    optionMenuBtn.classList.toggle('active', shown);
};

document.addEventListener('click', () => {
    if (filterPanel.classList.contains('show')) {
        filterPanel.classList.remove('show');
        optionMenuBtn.classList.remove('active');
    }
});
filterPanel.onclick = (e) => e.stopPropagation();

async function loadQuestions() {
    try {
        const response = await fetch('tiku.json');
        if (!response.ok) throw new Error('无法加载题库文件');
        const data = await response.json();
        return data.questions || [];
    } catch (error) {
        console.error('加载题目失败:', error);
        pageContent.innerHTML = '<div class="empty-message">加载题目失败，请确保 tiku.json 文件存在</div>';
        return [];
    }
}

function filterQuestions() {
    let res = [...allQuestions];
    if (selectedTypes.size > 0 && selectedTypes.size !== getUniqueList('type').length)
        res = res.filter(q => !q.type || selectedTypes.has(q.type));
    if (selectedGrades.size > 0 && selectedGrades.size !== getUniqueList('grade').length)
        res = res.filter(q => !q.grade || selectedGrades.has(q.grade));
    if (selectedUnits.size > 0 && selectedUnits.size !== getUniqueList('unit').length)
        res = res.filter(q => !q.unit || selectedUnits.has(q.unit));
    if (selectedKnowledges.size > 0 && selectedUnits.size !== getUniqueList('knowledge_point').length)
        res = res.filter(q => !q.knowledge_point || selectedKnowledges.has(q.knowledge_point));
    if (isOnlyWrongMode) {
        let wrongIds = new Set(Object.keys(questionCorrectStatus).filter(id => questionCorrectStatus[id] === true));
        res = res.filter(q => wrongIds.has(q.id));
    }
    if (isOnlyFavMode) {
        res = res.filter(q => questionFavs.has(q.id));
    }
    return res;
}

function doFilter(targetIndex) {
    filteredQuestions = filterQuestions();
    let idx = (targetIndex !== undefined) ? targetIndex : 0;
    if (idx >= filteredQuestions.length) idx = Math.max(0, filteredQuestions.length - 1);
    currentIndex = idx;
    renderCurrent();
}

function updateQNum() {
    let prefix = '';
    if (isOnlyWrongMode) prefix = '错题';
    else if (isOnlyFavMode) prefix = '收藏';
    qNumInput.value = prefix + (currentIndex + 1) + '/' + filteredQuestions.length;
}

qNumInput.addEventListener('focus', () => {
    let raw = qNumInput.value.replace(/^(错题|收藏)/, '').split('/')[0].trim();
    qNumInput.value = raw;
    qNumInput.select();
});
qNumInput.addEventListener('blur', () => {
    let raw = qNumInput.value.replace(/^(错题|收藏)/, '').split('/')[0].trim();
    let n = parseInt(raw);
    if (!isNaN(n) && n >= 1 && n <= filteredQuestions.length && (n - 1) !== currentIndex) {
        flipTo(n - 1);
    } else {
        updateQNum();
    }
});
qNumInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') qNumInput.blur();
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.stopPropagation();
});

function renderCurrent() {
    let nb = document.getElementById('notebook');
    let pageTab = document.getElementById('page-tab');
    let themeClass = isOnlyWrongMode ? ' theme-wrong' : isOnlyFavMode ? ' theme-fav' : '';
    nb.className = 'notebook' + themeClass;
    pageTab.className = 'page-tab' + themeClass;
    pageContent.innerHTML = '';
    pageContent.className = 'page';
    if (filteredQuestions.length === 0) {
        pageContent.innerHTML = '<div class="empty-message">没有匹配的题目</div>';
        updateQNum();
        return;
    }
    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex >= filteredQuestions.length) currentIndex = filteredQuestions.length - 1;
    let q = filteredQuestions[currentIndex];
    localStorage.setItem('lastQuestionId', q.id);
    updateQNum();
    buildPageContent(pageContent, q);
}

function flipTo(targetIdx) {
    if (targetIdx < 0 || targetIdx >= filteredQuestions.length) return;
    if (targetIdx === currentIndex) return;
    currentIndex = targetIdx;
    let q = filteredQuestions[currentIndex];
    localStorage.setItem('lastQuestionId', q.id);
    updateQNum();
    pageContent.innerHTML = '';
    pageContent.className = 'page';
    let nb2 = document.getElementById('notebook');
    let pageTab2 = document.getElementById('page-tab');
    let themeClass2 = isOnlyWrongMode ? ' theme-wrong' : isOnlyFavMode ? ' theme-fav' : '';
    nb2.className = 'notebook' + themeClass2;
    pageTab2.className = 'page-tab' + themeClass2;
    buildPageContent(pageContent, q);
}

function goToPrev() {
    if (currentIndex > 0) flipTo(currentIndex - 1);
}

function goToNext() {
    if (currentIndex < filteredQuestions.length - 1) flipTo(currentIndex + 1);
}

function buildPageContent(container, q) {
    let badgeDiv = document.createElement('div');
    badgeDiv.className = 'badge-row';

    if (q.grade) {
        let b = document.createElement('span');
        b.className = 'grade-badge';
        b.textContent = q.grade;
        badgeDiv.appendChild(b);
    }
    if (q.unit) {
        let b = document.createElement('span');
        b.className = 'unit-badge';
        b.textContent = q.unit;
        badgeDiv.appendChild(b);
    }
    if (q.knowledge_point) {
        let b = document.createElement('span');
        b.className = 'knowledge-badge';
        b.textContent = q.knowledge_point;
        badgeDiv.appendChild(b);
    }

    let rightGroup = document.createElement('span');
    rightGroup.className = 'right-group';

    if (questionAttempts[q.id]) {
        let stats = questionStats[q.id] || { correct: 0, wrong: 0 };
        let at = document.createElement('span');
        at.className = 'attempt-tag';
        at.textContent = '做过';
        let tip = document.createElement('span');
        tip.className = 'attempt-tooltip';
        tip.innerHTML = '<span class="correct">✓' + stats.correct + '</span> <span class="wrong">✗' + stats.wrong + '</span>';
        at.appendChild(tip);
        rightGroup.appendChild(at);
    }

    let isWrong = questionCorrectStatus[q.id] === true;
    let wrongBtn = document.createElement('div');
    wrongBtn.className = 'card-wrong-btn';
    if (isWrong) wrongBtn.classList.add('active');
    wrongBtn.innerHTML = isWrong
        ? '<img src="../../../images/错题2.png" style="width:16px;height:16px;object-fit:contain;">'
        : '<img src="../../../images/错题1.png" style="width:16px;height:16px;object-fit:contain;opacity:0.6;">';
    wrongBtn.title = isWrong ? '从错题本移除' : '加入错题本';
    wrongBtn.onclick = (e) => {
        e.stopPropagation();
        if (questionCorrectStatus[q.id]) delete questionCorrectStatus[q.id];
        else questionCorrectStatus[q.id] = true;
        saveAllData();
        if (isOnlyWrongMode) doFilter();
        else renderCurrent();
    };
    rightGroup.appendChild(wrongBtn);

    let isFaved = questionFavs.has(q.id);
    let favIcon = document.createElement('div');
    favIcon.className = 'fav-icon';
    favIcon.innerHTML = isFaved
        ? '<img src="../../../images/收藏2.png" style="width:20px;height:20px;object-fit:contain;">'
        : '<img src="../../../images/收藏1.png" style="width:20px;height:20px;object-fit:contain;opacity:0.5;">';
    favIcon.title = isFaved ? '取消收藏' : '收藏';
    favIcon.onclick = (e) => {
        e.stopPropagation();
        if (questionFavs.has(q.id)) questionFavs.delete(q.id);
        else questionFavs.add(q.id);
        saveAllData();
        if (isOnlyFavMode && !questionFavs.has(q.id)) doFilter();
        else renderCurrent();
    };
    rightGroup.appendChild(favIcon);
    badgeDiv.appendChild(rightGroup);
    container.appendChild(badgeDiv);

    let qtext = document.createElement('div');
    qtext.className = 'question-text';
    qtext.innerHTML = q.question;

    if (q.type === '选择') {
        container.appendChild(qtext);
        let opts = document.createElement('div');
        opts.className = 'options-container';
        q.options.forEach(opt => {
            let label = document.createElement('label');
            label.className = 'option';
            let resultIcon = document.createElement('span');
            resultIcon.className = 'result-icon';
            if (userAnswers[q.id]) {
                let cor = checkAnswer(userAnswers[q.id], q.answer);
                if (userAnswers[q.id] === opt) {
                    label.classList.add(cor ? 'correct' : 'incorrect');
                    resultIcon.textContent = cor ? '✓' : '✗';
                    resultIcon.classList.add(cor ? 'correct-icon' : 'incorrect-icon');
                } else if (opt === q.answer) {
                    label.classList.add('correct');
                    resultIcon.textContent = '✓';
                    resultIcon.classList.add('correct-icon');
                }
            }
            label.onclick = () => {
                if (userAnswers[q.id]) return;
                userAnswers[q.id] = opt;
                let cor = checkAnswer(opt, q.answer);
                recordAttempt(q.id, cor);
                pageContent.innerHTML = '';
                buildPageContent(pageContent, q);
            };
            let span = document.createElement('span');
            span.className = 'option-text';
            span.textContent = opt;
            label.appendChild(span);
            label.appendChild(resultIcon);
            opts.appendChild(label);
        });
        container.appendChild(opts);
        if (userAnswers[q.id] && (q.explanation || q.meaning)) {
            let exp = document.createElement('div');
            exp.className = 'explanation';
            exp.style.display = 'block';
            let html = '';
            if (q.meaning) html += `<div class="explanation-title title-translate">翻译</div><div>${q.meaning}</div>`;
            if (q.explanation) html += `<div class="explanation-title title-explain">解析</div><div>${q.explanation}</div>`;
            exp.innerHTML = html;
            container.appendChild(exp);
        }
    } else if (q.type === '填空' || q.type === '音标') {
        let blankIdx = 0;
        qtext.innerHTML = q.question.replace(/______/g, () => {
            let val = '';
            let cls = 'inline-fill';
            let dis = '';
            if (userAnswers[q.id] && userAnswers[q.id] !== '[查看]') {
                let parts = userAnswers[q.id].split(';');
                val = (parts[blankIdx] || '').trim();
                let isCor = checkAnswerEach(blankIdx, userAnswers[q.id], q.answer);
                cls += isCor ? ' correct' : ' incorrect';
                dis = ' disabled';
            }
            blankIdx++;
            return `<input type="text" class="${cls}"${dis} value="${val}" autocomplete="off">`;
        });
        container.appendChild(qtext);
        if (!userAnswers[q.id]) {
            let btn = document.createElement('button');
            btn.className = 'submit-btn';
            btn.textContent = '提交答案';
            btn.onclick = () => {
                let inputs = pageContent.querySelectorAll('.inline-fill');
                let vals = Array.from(inputs).map(inp => inp.value.trim());
                userAnswers[q.id] = vals.join(';') || '[查看]';
                let cor = checkAnswerBlank(vals.map(s => s.trim()), q.answer);
                recordAttempt(q.id, cor);
                pageContent.innerHTML = '';
                buildPageContent(pageContent, q);
            };
            container.appendChild(btn);
        } else {
            let isViewOnly = userAnswers[q.id] === '[查看]';
            let cor = isViewOnly ? false : checkAnswerBlank(
                userAnswers[q.id].split(';').map(s => s.trim()), q.answer
            );
            if (!cor) {
                let rt = document.createElement('span');
                rt.className = 'fill-result-text';
                rt.style.color = 'var(--ink-red)';
                rt.textContent = '✗ 正确答案：' + q.answer.replace(/;/g, ' / ');
                container.appendChild(rt);
            }
            if (q.meaning || q.explanation) {
                let exp = document.createElement('div');
                exp.className = 'explanation';
                exp.style.display = 'block';
                let html = '';
                if (q.meaning) html += `<div class="explanation-title title-translate">翻译</div><div>${q.meaning}</div>`;
                if (q.explanation) html += `<div class="explanation-title title-explain">解析</div><div>${q.explanation}</div>`;
                exp.innerHTML = html;
                container.appendChild(exp);
            }
        }
    } else if (q.type === '句型转换') {
        let blankIdx = 0;
        qtext.innerHTML = q.question.replace(/_{3,}/g, () => {
            let val = '';
            let cls = 'inline-fill';
            let dis = '';
            if (userAnswers[q.id] && userAnswers[q.id] !== '[查看]') {
                let parts = userAnswers[q.id].split(';');
                val = (parts[blankIdx] || '').trim();
                let isCor = checkAnswerEach(blankIdx, userAnswers[q.id], q.answer);
                cls += isCor ? ' correct' : ' incorrect';
                dis = ' disabled';
            }
            blankIdx++;
            return `<input type="text" class="${cls}"${dis} value="${val}" autocomplete="off">`;
        });
        container.appendChild(qtext);
        if (!userAnswers[q.id]) {
            let btn = document.createElement('button');
            btn.className = 'submit-btn';
            btn.textContent = '提交答案';
            btn.onclick = () => {
                let inputs = pageContent.querySelectorAll('.inline-fill');
                let vals = Array.from(inputs).map(inp => inp.value.trim());
                userAnswers[q.id] = vals.join(';') || '[查看]';
                let normAnswer = q.answer.replace(/;/g, ' ').replace(/\s+/g, ' ').toLowerCase().trim();
                let cor = vals.join(' ').toLowerCase().trim() === normAnswer;
                recordAttempt(q.id, cor);
                pageContent.innerHTML = '';
                buildPageContent(pageContent, q);
            };
            container.appendChild(btn);
        } else {
            let normAnswer = q.answer.replace(/;/g, ' ').replace(/\s+/g, ' ').toLowerCase().trim();
            let isViewOnly = userAnswers[q.id] === '[查看]';
            let cor = isViewOnly ? false
                : userAnswers[q.id].split(';').join(' ').toLowerCase().trim() === normAnswer;
            let rt = document.createElement('span');
            rt.className = 'fill-result-text';
            rt.textContent = '正确答案：' + q.answer;
            rt.style.color = cor ? 'var(--ink-green)' : 'var(--ink-red)';
            if (!cor) rt.textContent = '✗ ' + rt.textContent;
            container.appendChild(rt);
            if (q.meaning || q.explanation) {
                let exp = document.createElement('div');
                exp.className = 'explanation';
                exp.style.display = 'block';
                let html = '';
                if (q.explanation) html += `<div class="explanation-title title-explain">解析</div><div>${q.explanation}</div><br>`;
                if (q.meaning) {
                    html += `<div class="explanation-title title-translate">翻译</div><div>${q.meaning}</div>`;
                }
                exp.innerHTML = html;
                container.appendChild(exp);
            }
        }
    } else if (q.type === '连词成句') {
        let wordsStr = q.question.replace(/[（(]连词成句[）)]/g, '').trim();
        let wordsList = wordsStr.split(/[,，]/).map(w => w.trim()).filter(w => w);
        let wordP = document.createElement('p');
        wordP.style.cssText = 'font-size:16px;color:var(--ink-light);margin-bottom:6px;line-height:var(--line-h);';
        wordP.textContent = wordsList.join(', ');
        container.appendChild(wordP);
        let input = document.createElement('input');
        input.type = 'text';
        input.className = 'fill-input';
        input.placeholder = '请在此输入完整的句子...';
        input.autocomplete = 'off';
        if (userAnswers[q.id]) {
            let isViewOnly = userAnswers[q.id] === '[查看]';
            input.value = isViewOnly ? '' : userAnswers[q.id];
            input.disabled = true;
            if (!isViewOnly) {
                let cor = normalizeAnswer(userAnswers[q.id]) === normalizeAnswer(q.answer);
                input.classList.add(cor ? 'correct' : 'incorrect');
            }
        }
        container.appendChild(input);
        if (!userAnswers[q.id]) {
            let btn = document.createElement('button');
            btn.className = 'submit-btn';
            btn.textContent = '提交答案';
            btn.onclick = () => {
                let val = input.value.trim();
                userAnswers[q.id] = val || '[查看]';
                let cor = normalizeAnswer(val) === normalizeAnswer(q.answer);
                recordAttempt(q.id, cor);
                pageContent.innerHTML = '';
                buildPageContent(pageContent, q);
            };
            container.appendChild(btn);
        } else {
            let cor = normalizeAnswer(userAnswers[q.id]) === normalizeAnswer(q.answer);
            if (!cor) {
                let rt = document.createElement('span');
                rt.className = 'fill-result-text';
                rt.style.color = 'var(--ink-red)';
                rt.textContent = '✗ 正确答案：' + q.answer;
                container.appendChild(rt);
            }
            if (q.meaning || q.explanation) {
                let exp = document.createElement('div');
                exp.className = 'explanation';
                exp.style.display = 'block';
                let html = '';
                if (q.meaning) html += `<div class="explanation-title title-translate">翻译</div><div>${q.meaning}</div>`;
                if (q.explanation) html += `<div class="explanation-title title-explain">解析</div><div>${q.explanation}</div>`;
                exp.innerHTML = html;
                container.appendChild(exp);
            }
        }
    }
}

function checkAnswer(userAns, correctAns) { return userAns.trim() === correctAns.trim(); }

function checkAnswerEach(blankIdx, userAnswerStr, correctAnswer) {
    let userParts = userAnswerStr.split(';').map(s => s.trim());
    let correctParts = correctAnswer.includes(';')
        ? correctAnswer.split(';').map(s => s.trim())
        : correctAnswer.split(/\s+/).map(s => s.trim());
    if (blankIdx >= userParts.length || blankIdx >= correctParts.length) return false;
    return userParts[blankIdx] === correctParts[blankIdx];
}

function checkAnswerBlank(userVals, correctAnswer) {
    let correctParts = correctAnswer.split(';').map(s => s.trim());
    if (userVals.length !== correctParts.length) return false;
    return userVals.every((v, i) => v.trim() === correctParts[i]);
}

function recordAttempt(qid, isCorrect) {
    questionAttempts[qid] = true;
    if (!questionStats[qid]) questionStats[qid] = { correct: 0, wrong: 0 };
    if (isCorrect) questionStats[qid].correct++;
    else {
        questionStats[qid].wrong++;
        questionCorrectStatus[qid] = true;
    }
    localStorage.setItem('lastQuestionId', qid);
    saveAllData();
}

function saveAllData() {
    localStorage.setItem('questionAttempts', JSON.stringify(questionAttempts));
    localStorage.setItem('questionCorrectStatus', JSON.stringify(questionCorrectStatus));
    localStorage.setItem('questionStats', JSON.stringify(questionStats));
    localStorage.setItem('filterTypes', JSON.stringify([...selectedTypes]));
    localStorage.setItem('filterGrades', JSON.stringify([...selectedGrades]));
    localStorage.setItem('filterUnits', JSON.stringify([...selectedUnits]));
    localStorage.setItem('filterKnowledges', JSON.stringify([...selectedKnowledges]));
    localStorage.setItem('questionFavs', JSON.stringify([...questionFavs]));
    localStorage.setItem('isOnlyFavMode', JSON.stringify(isOnlyFavMode));
}

function loadAllData() {
    try {
        questionAttempts = JSON.parse(localStorage.getItem('questionAttempts')) || {};
        questionCorrectStatus = JSON.parse(localStorage.getItem('questionCorrectStatus')) || {};
        questionStats = JSON.parse(localStorage.getItem('questionStats')) || {};
        selectedTypes = new Set(JSON.parse(localStorage.getItem('filterTypes')) || []);
        selectedGrades = new Set(JSON.parse(localStorage.getItem('filterGrades')) || []);
        selectedUnits = new Set(JSON.parse(localStorage.getItem('filterUnits')) || []);
        selectedKnowledges = new Set(JSON.parse(localStorage.getItem('filterKnowledges')) || []);
        questionFavs = new Set(JSON.parse(localStorage.getItem('questionFavs')) || []);
        isOnlyFavMode = JSON.parse(localStorage.getItem('isOnlyFavMode')) || false;
    } catch (e) {}
    userAnswers = {};
}

function showToast(msg) {
    let toast = document.createElement('div');
    toast.className = 'mode-toast show';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1500);
}

let savedFilterState = null;

function selectAllFilters() {
    getUniqueList('type').forEach(v => selectedTypes.add(v));
    getUniqueList('grade').forEach(v => selectedGrades.add(v));
    getUniqueList('unit').forEach(v => selectedUnits.add(v));
    getUniqueList('knowledge_point').forEach(v => selectedKnowledges.add(v));
}

function toggleOnlyWrongMode() {
    isOnlyWrongMode = !isOnlyWrongMode;
    onlyWrongBtn.classList.toggle('active', isOnlyWrongMode);
    if (isOnlyWrongMode) {
        if (isOnlyFavMode) {
            lastFavIndex = currentIndex;
            isOnlyFavMode = false;
            onlyFavBtn.classList.remove('active');
            savedFilterState = null;
        } else {
            lastNormalIndex = currentIndex;
        }
        if (!savedFilterState) {
            savedFilterState = {
                types: new Set([...selectedTypes]),
                grades: new Set([...selectedGrades]),
                units: new Set([...selectedUnits]),
                knowledges: new Set([...selectedKnowledges]),
            };
        }
        selectedTypes.clear();
        selectedGrades.clear();
        selectedUnits.clear();
        selectedKnowledges.clear();
        selectAllFilters();
    } else {
        lastWrongIndex = currentIndex;
        if (savedFilterState) {
            selectedTypes = savedFilterState.types;
            selectedGrades = savedFilterState.grades;
            selectedUnits = savedFilterState.units;
            selectedKnowledges = savedFilterState.knowledges;
            savedFilterState = null;
        }
    }
    let targetIdx = isOnlyWrongMode ? lastWrongIndex : lastNormalIndex;
    renderFilterTags();
    doFilter(targetIdx);
    saveAllData();
}

function clearAllWrong() {
    if (!confirm('确定要清空所有错题吗？此操作不可撤销。')) return;
    questionCorrectStatus = {};
    lastWrongIndex = 0;
    saveAllData();
    if (isOnlyWrongMode) {
        isOnlyWrongMode = false;
        onlyWrongBtn.classList.remove('active');
        if (savedFilterState) {
            selectedTypes = savedFilterState.types;
            selectedGrades = savedFilterState.grades;
            selectedUnits = savedFilterState.units;
            selectedKnowledges = savedFilterState.knowledges;
            savedFilterState = null;
        }
        renderFilterTags();
        doFilter(lastNormalIndex);
        saveAllData();
    } else {
        doFilter(currentIndex);
    }
    showToast('已清空所有错题');
}

function toggleOnlyFavMode() {
    isOnlyFavMode = !isOnlyFavMode;
    onlyFavBtn.classList.toggle('active', isOnlyFavMode);
    if (isOnlyFavMode) {
        if (isOnlyWrongMode) {
            lastWrongIndex = currentIndex;
            isOnlyWrongMode = false;
            onlyWrongBtn.classList.remove('active');
            if (savedFilterState) {
                selectedTypes = savedFilterState.types;
                selectedGrades = savedFilterState.grades;
                selectedUnits = savedFilterState.units;
                selectedKnowledges = savedFilterState.knowledges;
                savedFilterState = null;
            }
            renderFilterTags();
        } else {
            lastNormalIndex = currentIndex;
        }
    } else {
        lastFavIndex = currentIndex;
    }
    let targetIdx = isOnlyFavMode ? lastFavIndex : lastNormalIndex;
    doFilter(targetIdx);
    saveAllData();
}

function clearAllFavs() {
    if (!confirm('确定要清空所有收藏吗？此操作不可撤销。')) return;
    questionFavs.clear();
    lastFavIndex = 0;
    saveAllData();
    if (isOnlyFavMode) {
        isOnlyFavMode = false;
        onlyFavBtn.classList.remove('active');
        doFilter(lastNormalIndex);
        saveAllData();
    } else {
        doFilter(currentIndex);
    }
    showToast('已清空所有收藏');
}

function setupSwipe() {
    let touchStartX = 0;
    let touchStartY = 0;
    pageArea.addEventListener('touchstart', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TEXTAREA') return;
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });
    pageArea.addEventListener('touchend', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TEXTAREA') return;
        let dx = e.changedTouches[0].screenX - touchStartX;
        let dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            if (dx < 0) goToNext();
            else goToPrev();
        }
    });
}

async function init() {
    allQuestions = await loadQuestions();
    if (!allQuestions.length) return;
    loadAllData();
    filteredQuestions = filterQuestions();
    let lastId = localStorage.getItem('lastQuestionId');
    if (lastId) {
        let idx = filteredQuestions.findIndex(q => q.id === lastId);
        if (idx !== -1) currentIndex = idx;
    }
    renderFilterTags();
    renderCurrent();
    setupSwipe();
    positionTab();
    window.addEventListener('resize', positionTab);

    onlyWrongBtn.onclick = toggleOnlyWrongMode;
    onlyFavBtn.onclick = toggleOnlyFavMode;
    clearWrongBtn.onclick = clearAllWrong;
    clearFavBtn.onclick = clearAllFavs;
    onlyFavBtn.classList.toggle('active', isOnlyFavMode);

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'ArrowLeft') goToPrev();
        if (e.key === 'ArrowRight') goToNext();
    });
}

function positionTab() {
    let tab = document.getElementById('page-tab');
    let nb = document.getElementById('notebook');
    let marginX = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--margin-x'));
    tab.style.left = (nb.offsetLeft + marginX - 1) + 'px';
    // 垂直定位：标签底部贴合本子上边缘
    let deskH = tab.parentElement.offsetHeight;
    let nbTop = nb.offsetTop;
    tab.style.bottom = (deskH - nbTop) + 'px';
}

function normalizeAnswer(str) {
    return str.replace(/\s+/g, ' ').replace(/\s*([,.!?;:])\s*/g, '$1 ').replace(/\s+/g, ' ').trim();
}

init();
</script>
