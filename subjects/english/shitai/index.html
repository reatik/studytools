<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时态练习</title>

<style>
:root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #2c3e50;
    --border: #a8c5d8;
    --correct: #3f9414;
    --wrong: #e58989;
    --primary: #5a9fd4;
    --present: #4a8ac2;
    --continuous: #6a9bc2;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    font-family: "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 640px;
    margin: auto;
    position: relative; /* 👈 加上这一行 */
}

.home-title {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #3a6ea5;
    margin-bottom: 20px;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(90,150,200,0.08);
    border: none;
    outline: 2px dashed var(--border);
    outline-offset: -6px;

    /* 👇 加上这两行 */
    height: 450px;        /* 固定高度（你可以自己调数值） */
    overflow-y: auto;     /* 内容超长自动出现滚动条 */
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 10px;
}

/* 右上角错题按钮 */
.top-right-option {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 999;
    display: flex;
    gap: 8px;
}
.top-wrong-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(90,159,212,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
.top-wrong-btn img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}
.top-wrong-btn.active {
    background: var(--primary);
    border-color: #4a8fc2;
}
.top-wrong-btn.active img {
    filter: brightness(0) invert(1);
}
.top-wrong-btn:hover {
    border-color: var(--primary);
}

/* 清空错题按钮 */
.clear-wrong-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(211,47,47,0.2);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
    position: relative;
}
.clear-wrong-btn.show {
    display: flex;
}
.clear-wrong-btn:hover {
    border-color: #d32f2f;
    background: rgba(255,235,238,0.95);
}
.clear-wrong-btn svg {
    width: 20px;
    height: 20px;
    fill: #d32f2f;
}

/* 选项菜单按钮 */
.option-menu-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(90,159,212,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
.option-menu-btn.active {
    background: var(--primary);
    border-color: #4a8fc2;
}
.option-menu-btn.active img {
    filter: brightness(0) invert(1);
}
.option-menu-btn img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}

/* 筛选面板 */
.filter-panel {
    position: fixed;
    top: 60px;
    right: 12px;
    width: 220px;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(90,150,200,0.25);
    border: 1px solid rgba(90,159,212,0.15);
    padding: 12px 14px;
    z-index: 998;
    display: none;
}
.filter-panel.show {
    display: block;
}
.filter-group {
    margin-bottom: 12px;
}
.filter-group:last-child {
    margin-bottom: 0;
}
.filter-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
}
.filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.filter-tag {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    background: #f0f6fa;
    color: #3a6ea5;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
}
.filter-tag.active {
    background: var(--primary);
    color: #fff;
}
.filter-tag.all {
    background: #f1f1f1;
    color: #666;
}

/* 卡片内错题按钮 */
.card-wrong-btn {
    width: 25px;
    height: 25px;
    border-radius: 8px;
    background: rgba(255,255,255,0.95);
    border: 1px solid #e0e0e0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
}
.card-wrong-btn img {
    width: 16px;
    height: 16px;
    object-fit: contain;
}
.card-wrong-btn.active {
    background: var(--primary);
    border-color: #4a8fc2;
}
.card-wrong-btn.active img {
    filter: brightness(0) invert(1);
}
.card-wrong-btn:hover {
    border-color: var(--primary);
}

/* 未答计数 */
#unansweredProgress {
    color: #ac7c39;
}
.unanswered-count {
    color: #ac7c39;
}

.control-group {
    display: flex;
    gap: 8px;
    flex: 1;
}

.type-selector, .tense-selector {
    position: relative;
    flex: 1;
}

.type-dropdown, .tense-dropdown {
    position: relative;
    width: 100%;
}

.dropdown-btn {
    width: 100%;
    height: 40px;
    padding: 0 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    /* 手机12px ~ 桌面14px 自适应 */
    font-size: clamp(12px, 2.5vw, 14px) !important;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    white-space: nowrap; /* 强制不换行 */
}
.dropdown-btn:hover {
    border-color: var(--primary);
}

.dropdown-btn .selected-text {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}

.dropdown-btn .arrow {
    width: 18px;
    height: 18px;
    transition: transform 0.3s ease;
}

.type-dropdown.open .dropdown-btn,
.tense-dropdown.open .dropdown-btn {
    border-radius: 10px 10px 0 0;
    border-bottom-color: transparent;
}

.type-dropdown.open .arrow,
.tense-dropdown.open .arrow {
    transform: rotate(180deg);
}

.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border: 2px solid var(--primary);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(90,150,200,0.2);
}

.type-dropdown.open .dropdown-menu,
.tense-dropdown.open .dropdown-menu {
    display: block;
    animation: slideDown 0.25s ease;
}

@keyframes slideLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

.dropdown-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: all 0.2s ease;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
}

.dropdown-item:last-child {
    border-bottom: none;
}

.dropdown-item:hover {
    background: #e8f0f8;
}

.dropdown-item.selected {
    background: linear-gradient(135deg, var(--primary) 0%, #4a8fc2 100%);
    color: white;
}

.dropdown-item .item-text {
    flex: 1;
}

.dropdown-item .check-mark {
    opacity: 0;
    font-size: 12px;
}

.dropdown-item.selected .check-mark {
    opacity: 1;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px; /* 👈 从12px改成4px，把横线和下面的间距缩小 */
    padding-bottom: 6px; /* 👈 也可以顺便把横线本身的上下内边距缩小一点 */
    border-bottom: 1px solid var(--border);
}

.question-index {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    width: 32px;
    height: 24px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    background-color: var(--primary);
    margin-right: 6px;
    vertical-align: middle;
    border: none;
    outline: none;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    padding: 0;
}
.question-index:focus {
    background-color: #4a8ac2;
    box-shadow: 0 0 0 2px rgba(90,159,212,0.4);
}
.question-index.wrong-number {
    background-color: #C75B5B;
}
.question-index.wrong-number:focus {
    background-color: #D96C6C;
    box-shadow: 0 0 0 2px rgba(199,91,91,0.4);
}

.card-progress {
    font-size: 14px;
    color: var(--correct);
    font-weight: 600;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}
.question-tags {
    display: none; /* 隐藏旧标签 */
}



.question-area {

    margin-bottom: 0;
}

.question-text {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.8;
    color: #333;
}

.answer-hint {
    font-size: 14px;
    color: #888;
    margin-top: 10px;
    min-height: 24px;
}

.meaning-toggle-area {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-start;
}

.meaning-toggle-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border: 1px dashed #9b88d8;
    border-radius: 8px;
    background: #f5f2fc;
    color: #6b5cad;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
}
.meaning-toggle-btn:hover {
    background: #e3ecf8;
    border-color: #45689e;
}
.meaning-toggle-btn .arrow-icon {
    transition: transform 0.25s;
    font-size: 10px;
    display: inline-block;
}
.meaning-toggle-btn.open .arrow-icon {
    transform: rotate(90deg);
}

.meaning-content {
    font-size: 13px;
    color: #2d4a77;
    background: linear-gradient(135deg, #f1f5fb 0%, #e3ecf8 100%);
    padding: 5px 12px;
    border-radius: 8px;
    line-height: 1.6;
    display: none;
    flex: 1;
}
.meaning-content.show {
    display: block;
    animation: slideLeft 0.25s ease;
}

.meaning-content {
    font-size: 13px;
    color: #2c5c9e;
    background: linear-gradient(135deg, #e8f4ff 0%, #d8e8fa 100%);
    padding: 5px 12px;
    border-radius: 8px;
    line-height: 1.6;
    display: none;
    flex: 1;
}
.meaning-content.show {
    display: block;
    animation: slideLeft 0.25s ease;
}

.explanation {
    font-size: 13px;
    color: #4a6a8a;
    background: linear-gradient(135deg, #e8f4f8 0%, #d8eaf4 100%);
    padding: 2px 10px;
    border-radius: 12px;
    margin-top: 10px;
    box-shadow: 0 2px 8px rgba(90,150,200,0.15);
    line-height: 1.6;
}

.explanation::before {
    content: "解析";
    display: block;
    font-weight: bold;
    color: var(--primary);
    margin-bottom: 6px;
}

.fill-input {
    display: inline-block;
    border: none;
    border-bottom: 2px solid var(--primary);
    font-size: 18px;
    padding: 2px 4px;
    min-width: 50px;
    width: 80px !important; /* 👈 加这一行 */
    text-align: center;
    outline: none;
    background: transparent;
}

.fill-input:focus {
    border-bottom-color: #4a8fc2;
}
.fill-input.correct {
    border-bottom-color: #3f9414;
    color: #3f9414;
}
.fill-input.wrong {
    border-bottom-color: var(--wrong);
    color: var(--wrong);
}

.fill-footer {
    display: flex;
    align-items: center;
    margin-top: 10px;
}
/* 清空旧冲突样式 */
.answer-hint {
    font-size: 14px;
    color: #888;
    margin-top: 12px;
    min-height: 24px;
}

.fill-submit-btn {
    padding: 6px 16px;
    border: 1px solid #3f9414;
    border-radius: 8px;
    background: #3f9414;  /* 默认绿色背景 */
    color: #fff;         /* 白色文字 */
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
.fill-submit-btn:hover {
    background: #368010;  /* 深一点的绿色 */
}
.fill-submit-btn.correct {
    background: #3f9414;
    border-color: #3f9414;
    color: #fff;
}
.fill-submit-btn.wrong {
    background: #ac7c39;
    border-color: #ac7c39;
    color: #fff;
}
.fill-submit-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.options {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;

}

.option {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px; /* 👈 原来 16px，改成 10px 14px，高度变小 */
    cursor: pointer;
    position: relative;
    color: var(--text);
    background: #fafcfd;
    font-size: 15px;     /* 👈 文字稍微小一点 */
    min-height: 44px;    /* 👈 控制最小高度，更紧凑 */
    transition: all 0.2s;
}

.option:hover {
    background: #f0f6fa;
    border-color: var(--primary);
}

.option .option-letter {
    display: inline-block;
    width: 24px;       /* 👈 从 28px → 24px 变小 */
    height: 24px;      /* 👈 从 28px → 24px 变小 */
    line-height: 24px;
    text-align: center;
    background: #e8f0f8;
    border-radius: 6px;
    margin-right: 10px;
    font-weight: bold;
    color: var(--text);
    font-size: 14px;   /* 👈 字母也缩小 */
}

.option .option-text {
    font-size: 16px;
}

.option.correct {
    background: #E6F7E6;    /* 浅绿色背景 */
    border-color: #3f9414;  /* 绿色边框 */
}
.option.correct .option-letter {
    background: #398612;    /* 绿色字母背景 */
    color: white;
}

/* 勾 = 绿色 */
.option.correct .result-icon {
    color: #2e7d32;
}
/* 叉 = 红色 */
.option.wrong .result-icon {
    color: #d32f2f;
}

.option.wrong {
    background: #fff0f0;
    border-color: var(--wrong);
}

.option.wrong .option-letter {
    background: var(--wrong);
    color: white;
}

.option.disabled {
    pointer-events: none;
    opacity: 0.7;
}

.result-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    /* 关键：一开始就设置正确的居中，动画只做缩放 */
    transform: translateY(-50%) scale(1);
    font-size: 20px;
    /* 防止跳动 */
    backface-visibility: hidden;
}

.nav {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
}

.nav button {
    padding: 12px 24px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    background: #f0f6fa;
    font-size: 15px;
}

#prevBtn {
    background: #d0e8f0;
    border-color: #a0c8d8;
    color: #2a4a5a;
}

#prevBtn:hover {
    background: #c0dcee;
}

#nextBtn {
    background: #d0e8f0;
    border-color: #a0c8d8;
    color: #2a4a5a;
}

#nextBtn:hover {
    background: #c0dcee;
}

.nav button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.hidden { display: none; }

/* 动画 */
@keyframes bounce-in {
    0% { transform: translateY(-50%) scale(0); opacity: 0; }
    50% { transform: translateY(-50%) scale(1.3); }
    100% { transform: translateY(-50%) scale(1); opacity: 1; }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}

/* 纯数字 3D 翻转动画（只有数字会翻！） */
@keyframes numFlip {
    0% { transform: rotateX(0deg); opacity: 1; }
    50% { transform: rotateX(-90deg); opacity: 0.5; }
    100% { transform: rotateX(0deg); opacity: 1; }
}

/* 数字专用动画样式 */
.pop {
    animation: numFlip 0.4s ease-out;
    display: inline-block;
    transform-origin: center center;
}

.bounce-in {
    animation: bounce-in 0.4s ease-out;
}

.shake {
    animation: shake 0.4s ease-out;
}



/* 结果页 */
.result-card {
    text-align: center;
}

.score-display {
    padding: 30px;
    background: #f0f6fa;
    border-radius: 12px;
    margin-bottom: 20px;
}

.score-display .big {
    font-size: 56px;
    font-weight: bold;
    color: var(--correct);
}

.score-display .total {
    font-size: 16px;
    color: #666;
    margin-top: 8px;
}

.summary-item {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fafcff;
    text-align: left;
}

.summary-title {
    font-weight: bold;
    margin-bottom: 6px;
}

.restart-btn {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: 2px solid #4a8fc2;
    border-radius: 12px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    margin-top: 10px;
}

.restart-btn:hover {
    background: #4a90c2;
}

.fill-submit-btn.hide{
    display: none;
}

</style>
</head>

<body>

<h1 class="home-title">时态练习</h1>

<div class="container" id="practicePanel">
    <!-- 右上角按钮 -->
    <div class="top-right-option">
        <div class="top-wrong-btn" id="topWrongBtn" title="只练错题">
            <img src="../../../images/错题1.png" alt="错题">
        </div>
        <div class="clear-wrong-btn" id="clearWrongBtn" title="清空所有错题">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </div>
        <div class="option-menu-btn" id="optionMenuBtn" title="筛选选项">
            <img src="../../../images/选项.png" alt="选项">
        </div>
        <div class="filter-panel" id="filter-panel">
            <div class="filter-group">
                <div class="filter-title">题型</div>
                <div class="filter-tags" id="type-tags"></div>
            </div>
            <div class="filter-group">
                <div class="filter-title">时态</div>
                <div class="filter-tags" id="tense-tags"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <input type="text" class="question-index" id="questionLabel" value="1" title="输入序号跳转题目">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="card-progress" id="cardProgress">正确 0</span>
                <span class="card-progress" id="errorProgress" style="color: #e58989;">错误 0</span>
                <span class="card-progress" id="unansweredProgress">未答 0</span>
                <div class="card-wrong-btn" id="cardWrongBtn" title="加入错题本">
                    <img src="../../../images/错题2.png" alt="错">
                </div>
            </div>
        </div>
        <div class="question-area">
            <div class="question-tags" id="questionTags"></div>
            <div class="question-text" id="questionText"></div>
            <div class="meaning-toggle-area hidden" id="meaningToggleArea">
                <button class="meaning-toggle-btn" id="meaningToggleBtn" onclick="toggleMeaning()">
                    句意 <span class="arrow-icon">▶</span>
                </button>
                <div class="meaning-content" id="meaningContent"></div>
            </div>
    
            <!-- 提交按钮 放在 句意 下方 -->
            <div class="fill-footer">
                <button class="fill-submit-btn" id="fillSubmitBtn">提交</button>
                <span id="fillResultText" style="margin-left:10px; font-size:13px;"></span>
            </div>
        </div>
    
        <div id="fillArea" class="hidden">
            <div class="answer-hint" id="answerHint"></div>
        </div>
    
        <div class="options" id="options"></div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="prev()">上一题</button>
        <button id="nextBtn" onclick="next()">下一题</button>
    </div>
</div>


<script>
let sentenceBank = [];
let selectedTypes = ['fill', 'choice'];
let selectedTenses = ['一般现在时', '现在进行时'];
let questionPool = [];
let answers = [];
let correctCount = 0;
let errorCount = 0;
let unansweredCount = 0;
let currentIndex = 0;
let currentAnswer = null;
let currentMeaning = '';
let wrongQids = new Set();      // 错题 ID 集合
let isOnlyWrongMode = false;    // 只看错题模式
let hasUnansweredInRound = {};  // 记录本轮每题是否跳过未答
let lastNormalIndex = 0;       // 正常模式下最后的位置
let lastWrongIndex = 0;        // 错题模式下最后的位置

// 从localStorage恢复选择
function loadSelections() {
    const savedTypes = localStorage.getItem('shitai_types');
    const savedTenses = localStorage.getItem('shitai_tenses');
    
    if (savedTypes) selectedTypes = JSON.parse(savedTypes);
    if (savedTenses) selectedTenses = JSON.parse(savedTenses);
}

// 错题数据持久化
function loadWrongData() {
    try {
        const saved = localStorage.getItem('shitai_wrong_qids');
        if (saved) wrongQids = new Set(JSON.parse(saved));
        const savedMode = localStorage.getItem('shitai_only_wrong');
        if (savedMode) isOnlyWrongMode = JSON.parse(savedMode);
    } catch(e) {}
}

function saveWrongData() {
    localStorage.setItem('shitai_wrong_qids', JSON.stringify([...wrongQids]));
    localStorage.setItem('shitai_only_wrong', JSON.stringify(isOnlyWrongMode));
}

function addWrongQid(qid) {
    wrongQids.add(qid);
    saveWrongData();
}

function removeWrongQid(qid) {
    wrongQids.delete(qid);
    saveWrongData();
}

loadSelections();

// 筛选面板
let selectedTypeSet = new Set(selectedTypes);
let selectedTenseSet = new Set(selectedTenses);

const typeList = ['fill', 'choice'];
const typeNames = { 'fill': '填空', 'choice': '选择' };
const tenseList = ['一般现在时', '现在进行时'];
const tenseNames = { '一般现在时': '一般现在时', '现在进行时': '进行时' };

function renderFilterTags() {
    renderTagGroup('type-tags', typeList, typeNames, selectedTypeSet);
    renderTagGroup('tense-tags', tenseList, tenseNames, selectedTenseSet);
}

function renderTagGroup(containerId, list, nameMap, selectedSet) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    const allTag = document.createElement('div');
    allTag.className = 'filter-tag all';
    allTag.textContent = '全部';
    allTag.onclick = () => {
        if (selectedSet.size >= list.length) {
            selectedSet.clear();
        } else {
            list.forEach(item => selectedSet.add(item));
        }
        syncSelections();
        renderFilterTags();
        if (selectedSet.size > 0) resetQuestions();
    };
    container.appendChild(allTag);

    list.forEach(item => {
        const tag = document.createElement('div');
        tag.className = 'filter-tag';
        if (selectedSet.has(item)) tag.classList.add('active');
        tag.textContent = nameMap[item] || item;
        tag.onclick = () => {
            if (selectedSet.has(item)) selectedSet.delete(item);
            else selectedSet.add(item);
            syncSelections();
            renderFilterTags();
            if (selectedSet.size > 0) resetQuestions();
        };
        container.appendChild(tag);
    });
}

function syncSelections() {
    selectedTypes = [...selectedTypeSet];
    selectedTenses = [...selectedTenseSet];
    localStorage.setItem('shitai_types', JSON.stringify(selectedTypes));
    localStorage.setItem('shitai_tenses', JSON.stringify(selectedTenses));
}

// 筛选面板开关
const optionMenuBtn = document.getElementById('optionMenuBtn');
const filterPanel = document.getElementById('filter-panel');

optionMenuBtn.onclick = (e) => {
    e.stopPropagation();
    let shown = filterPanel.classList.toggle('show');
    optionMenuBtn.classList.toggle('active', shown);
};

document.addEventListener('click', () => {
    if (filterPanel.classList.contains('show')) {
        filterPanel.classList.remove('show');
        optionMenuBtn.classList.remove('active');
    }
});
filterPanel.onclick = (e) => e.stopPropagation();

function toggleMeaning() {
    const content = document.getElementById('meaningContent');
    const btn = document.getElementById('meaningToggleBtn');
    const isOpen = content.classList.toggle('show');
    btn.classList.toggle('open', isOpen);
}

function hideMeaning() {
    const content = document.getElementById('meaningContent');
    const btn = document.getElementById('meaningToggleBtn');
    content.classList.remove('show');
    btn.classList.remove('open');
}

function resetQuestions(targetIndex) {
    if (selectedTypes.length === 0 || selectedTenses.length === 0) return;
    let filterList = [...sentenceBank].filter(q => 
    selectedTypes.includes(q.type) && selectedTenses.includes(q.difficulty)
);
    // 错题模式过滤
    if (isOnlyWrongMode) {
        filterList = filterList.filter(q => wrongQids.has(q.id));
    }
questionPool = filterList;
    answers = [];
    correctCount = 0;
    errorCount = 0;
    unansweredCount = 0;
    hasUnansweredInRound = {};
    let idx = (targetIndex !== undefined) ? targetIndex : 0;
    if (idx >= questionPool.length) idx = Math.max(0, questionPool.length - 1);
    currentIndex = idx;
    updateProgress();
    showQuestion(currentIndex);
}

function showQuestion(index) {
    document.getElementById("fillSubmitBtn").classList.remove('hide');
    const q = questionPool[index];
    if (!q) return;

    const wasAnswered = answers[index] !== null && answers[index] !== undefined;
    
    if (!wasAnswered) {
        answers[index] = null;
    }
    
    const numEl = document.getElementById("questionLabel");
    if (isOnlyWrongMode) {
        numEl.value = (index + 1) + '/' + questionPool.length;
        numEl.style.width = '44px';
        numEl.classList.add('wrong-number');
    } else {
        numEl.value = index + 1;
        numEl.style.width = '32px';
        numEl.classList.remove('wrong-number');
    }

    const questionText = document.getElementById("questionText");
    const submitBtn = document.getElementById("fillSubmitBtn");
    const resultText = document.getElementById("fillResultText");
    const hintEl = document.getElementById("answerHint");

    // 重置按钮
    submitBtn.disabled = false;
    submitBtn.innerText = "提交";
    submitBtn.className = "fill-submit-btn";
    if(resultText) resultText.innerText = "";
    hintEl.innerText = "";
    
    if (q.type === 'fill') {
        if(wasAnswered){
    let ansArr = answers[index].value.split(';');
    let idx = 0;
    questionText.innerHTML = q.text.replace(/______/g, ()=>{
        let val = ansArr[idx] || '';
        idx++;
        return `<input type="text" class="fill-input inline-fill" autocomplete="off" value="${val}">`;
    });
}else{
    questionText.innerHTML = q.text.replace(/______/g, `<input type="text" class="fill-input inline-fill" autocomplete="off" value="">`);
}
        document.getElementById("fillArea").classList.remove("hidden");
        document.getElementById("options").innerHTML = "";
        
        const inputList = document.querySelectorAll(".inline-fill");
        
        if (wasAnswered) {
            inputList.forEach(el => el.disabled = true);
            // 逐空着色：每个空单独判断对错
            let userParts = answers[index].value.split(';');
            let correctParts = q.answer.split(';').map(s => s.trim());
            inputList.forEach((el, i) => {
                let correct = i < correctParts.length && i < userParts.length
                    && userParts[i].trim() === correctParts[i];
                el.classList.add(correct ? 'correct' : 'wrong');
            });

            submitBtn.disabled = true;
            if (answers[index].correct) {
                submitBtn.innerText = "✓ 正确";
                submitBtn.classList.add("correct");
                if(resultText) resultText.innerText = "";
            } else {
                submitBtn.innerText = "✗ 错误";
                submitBtn.classList.add("wrong");
                if(resultText) resultText.innerText = `正确答案：${q.answer}`;
                if(resultText) resultText.style.color = "var(--wrong)";
            }
            if (q.explanation) {
                hintEl.innerHTML = `<div class="explanation">${q.explanation}</div>`;
            }
        } else {
            inputList.forEach(el => el.classList.remove('correct', 'wrong'));
            document.getElementById("answerHint").innerText = "";
            if(inputList.length > 0) inputList[0].focus();
            const handler = () => submitFillAnswer();
            submitBtn.onclick = handler;
            inputList.forEach(el => {
                el.onkeypress = (e) => { if (e.key === 'Enter') handler(); };
            });
        }
    } else {
        document.getElementById("fillArea").classList.add("hidden");
        questionText.innerHTML = q.text;
        
        document.getElementById("options").innerHTML = q.options.map((opt, i) => `
            <div class="option" data-index="${i}">
                <span class="option-letter">${opt.label}</span>
                <span class="option-text">${opt.value}</span>
            </div>
        `).join("");

        if (wasAnswered) {
            const selectedIndex = q.options.findIndex((opt, i) => {
                if (q.type === 'choice') {
                    return answers[index].value === opt.value;
                }
                return false;
            });
            
            document.querySelectorAll(".option").forEach((optEl, i) => {
                optEl.classList.add("disabled");
                const opt = q.options[i];
                if (opt.correct) {
                    optEl.classList.add("correct");
                    optEl.innerHTML += '<span class="result-icon bounce-in">✓</span>';
                } else if (i === selectedIndex) {
                    optEl.classList.add("wrong");
                    optEl.innerHTML += '<span class="result-icon bounce-in">✗</span>';
                }
            });
            
            if (q.explanation) {
                document.getElementById("options").innerHTML += `<div class="explanation">${q.explanation}</div>`;
            }
        } else {
            document.querySelectorAll(".option").forEach(el => {
                el.onclick = () => selectOption(el, q);
            });
        }
        document.getElementById("fillSubmitBtn").classList.add('hide');
    }

    // 设置句意切换
    currentMeaning = q.meaning || '';
    const toggleArea = document.getElementById('meaningToggleArea');
    const contentEl = document.getElementById('meaningContent');
    contentEl.innerHTML = currentMeaning;
    contentEl.classList.remove('show');
    if (currentMeaning && !wasAnswered) {
        toggleArea.classList.remove('hidden');
    } else {
        toggleArea.classList.add('hidden');
    }
    hideMeaning();

    updateCardWrongBtn(q.id);
    updateNavButtons();
}

function submitFillAnswer() {
    const q = questionPool[currentIndex];
    const inputList = document.querySelectorAll(".inline-fill");
    const submitBtn = document.getElementById("fillSubmitBtn");
    const resultText = document.getElementById("fillResultText");
    const hintEl = document.getElementById("answerHint");

    let userAnswers = [];
    inputList.forEach(inp => {
        userAnswers.push(inp.value.trim());
    });

    // 检测是否全部未填（直接点提交）
    let allEmpty = userAnswers.every(v => !v);
    if (allEmpty && !hasUnansweredInRound[q.id]) {
        unansweredCount++;
        hasUnansweredInRound[q.id] = true;
    }

    let rightAnswers = q.answer.split(';').map(item => item.trim());

    let allRight = true;
    if (userAnswers.length !== rightAnswers.length) {
        allRight = false;
    } else {
        for (let i = 0; i < rightAnswers.length; i++) {
            if (userAnswers[i] !== rightAnswers[i]) {
                allRight = false;
                break;
            }
        }
    }

    inputList.forEach(inp => inp.disabled = true);
    // 逐空着色：每个空单独判断对错
    inputList.forEach((el, i) => {
        let correct = i < rightAnswers.length && i < userAnswers.length
            && userAnswers[i] === rightAnswers[i];
        el.classList.add(correct ? 'correct' : 'wrong');
    });
    submitBtn.disabled = true;

    answers[currentIndex] = { value: userAnswers.join(";"), correct: allRight };

    if (allRight) {
        submitBtn.innerText = "✓ 正确";
        submitBtn.classList.add("correct");
        correctCount++;
        resultText.innerText = q.answer;
        resultText.style.color = "var(--correct)";
    } else if (allEmpty) {
        submitBtn.innerText = "未作答";
        submitBtn.classList.add("wrong");
        resultText.innerText = q.answer;
        resultText.style.color = "#888";
    } else {
        submitBtn.innerText = "✗ 错误";
        submitBtn.classList.add("wrong");
        errorCount++;
        addWrongQid(q.id); // 答错自动加入错题
        resultText.innerText = q.answer;
        resultText.style.color = "var(--wrong)";
    }
    updateProgress(true);
    updateCardWrongBtn(q.id);

    if (q.explanation) {
        hintEl.innerHTML = `<div class="explanation">${q.explanation}</div>`;
    }
}

function selectOption(el, q) {
    if (answers[currentIndex]) {
        alert('此题已作答，请查看上一题或下一题');
        return;
    }

    const selectedIndex = +el.dataset.index;
    const selected = q.options[selectedIndex];
    answers[currentIndex] = selected;
    currentAnswer = selected;

    document.querySelectorAll(".option").forEach((optEl, i) => {
        optEl.classList.add("disabled");
        const opt = q.options[i];

        if (opt.correct) {
            optEl.classList.add("correct");
            optEl.innerHTML += '<span class="result-icon bounce-in">✓</span>';
        } else if (i === selectedIndex) {
            optEl.classList.add("wrong");
            optEl.classList.add("shake");
            optEl.innerHTML += '<span class="result-icon bounce-in">✗</span>';
        }
    });

    // 添加解析
    const optionsEl = document.getElementById("options");
    if (q.explanation) {
        optionsEl.innerHTML += `<div class="explanation">${q.explanation}</div>`;
    }

    if (selected.correct) {
        correctCount++;
    } else {
        errorCount++;
        addWrongQid(q.id); // 答错自动加入错题
    }
    updateProgress(true);
    updateCardWrongBtn(q.id);
    updateNavButtons();
    document.getElementById("fillSubmitBtn").classList.add('hide');
}

function updateNavButtons() {
    document.getElementById("prevBtn").disabled = currentIndex === 0;
    const isLast = currentIndex === questionPool.length - 1;
    document.getElementById("nextBtn").disabled = isLast;
}

function updateProgress(animate) {
    const correctEl = document.getElementById("cardProgress");
    const errorEl = document.getElementById("errorProgress");
    const unansweredEl = document.getElementById("unansweredProgress");

    correctEl.innerText = `正确 ${correctCount}`;
    errorEl.innerText = `错误 ${errorCount}`;
    unansweredEl.innerText = `未答 ${unansweredCount}`;

    if (animate) {
        // 先清空所有动画
        correctEl.classList.remove("pop");
        errorEl.classList.remove("pop");
        unansweredEl.classList.remove("pop");
        void correctEl.offsetWidth;

        // 👇 关键修改：只有未答时，才播放动画
        if (unansweredCount > 0) {
            unansweredEl.classList.add("pop");
        }
        // 正确和错误都不做动画
    }
}
// 更新卡片内错题按钮状态
function updateCardWrongBtn(qid) {
    const btn = document.getElementById("cardWrongBtn");
    const img = btn.querySelector("img");
    if (wrongQids.has(qid)) {
        btn.classList.add("active");
        img.src = "../../../images/错题1.png";
        btn.title = "从错题本移除";
    } else {
        btn.classList.remove("active");
        img.src = "../../../images/错题2.png";
        btn.title = "加入错题本";
    }
}

// 切换错题模式
function toggleOnlyWrongMode() {
    const topBtn = document.getElementById("topWrongBtn");
    const clearBtn = document.getElementById("clearWrongBtn");
    // 切换前保存当前题库中的位置
    if (isOnlyWrongMode) {
        lastWrongIndex = currentIndex;
        isOnlyWrongMode = false;
    } else {
        lastNormalIndex = currentIndex;
        isOnlyWrongMode = true;
    }
    topBtn.classList.toggle("active", isOnlyWrongMode);
    clearBtn.classList.toggle("show", isOnlyWrongMode);
    saveWrongData();
    // 根据目标模式恢复对应位置
    let targetIdx = isOnlyWrongMode ? lastWrongIndex : lastNormalIndex;
    resetQuestions(targetIdx);
    // 错题模式且没有错题时的提示
    if (isOnlyWrongMode && questionPool.length === 0) {
        document.getElementById("questionText").innerText = "错题本暂无题目";
        document.getElementById("options").innerHTML = "";
        document.getElementById("fillArea").classList.add("hidden");
    }
}

function clearAllWrong() {
    if (!confirm('确定要清空所有错题吗？此操作不可撤销。')) return;
    wrongQids.clear();
    lastWrongIndex = 0;
    saveWrongData();
    if (isOnlyWrongMode) {
        // 在错题模式下，清空后自动退出错题模式
        isOnlyWrongMode = false;
        document.getElementById("topWrongBtn").classList.remove("active");
        document.getElementById("clearWrongBtn").classList.remove("show");
        saveWrongData();
        doFilterAfterClearWrong();
    } else {
        // 不在错题模式下，刷新当前视图
        updateCardWrongBtn(questionPool[currentIndex] ? questionPool[currentIndex].id : null);
    }
    alert('已清空所有错题');
}

function doFilterAfterClearWrong() {
    let filterList = [...sentenceBank].filter(q => 
        selectedTypes.includes(q.type) && selectedTenses.includes(q.difficulty)
    );
    questionPool = filterList;
    answers = [];
    correctCount = 0;
    errorCount = 0;
    unansweredCount = 0;
    hasUnansweredInRound = {};
    lastWrongIndex = 0;
    let idx = Math.min(lastNormalIndex, questionPool.length - 1);
    if (idx < 0) idx = 0;
    currentIndex = idx;
    updateProgress();
    if (questionPool.length > 0) {
        showQuestion(currentIndex);
    } else {
        document.getElementById("questionText").innerText = "暂无题目";
        document.getElementById("options").innerHTML = "";
        document.getElementById("fillArea").classList.add("hidden");
    }
    updateNavButtons();
}

function next() {
    if (currentIndex < questionPool.length - 1) {
        currentIndex++;
        showQuestion(currentIndex);
    }
}

function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        showQuestion(currentIndex);
    }
}

function goHome() {
    // 返回上一页，回到主页
    window.history.back();
}

function shuffle(arr) {
    // Fisher-Yates 洗牌算法确保真正随机
    const result = [...arr];
    for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
}

// 异步加载题库并初始化
fetch('sentences.json')
    .then(res => {
        if (!res.ok) throw new Error('加载题库失败');
        return res.text();
    })
    .then(code => {
        // sentences.json 现在是纯 JSON 数组，用 eval 执行并赋值
        sentenceBank = eval(code);
        if (!sentenceBank || sentenceBank.length === 0) {
            console.error('题库数据为空');
            return;
        }
        loadWrongData();
        selectedTypeSet = new Set(selectedTypes);
        selectedTenseSet = new Set(selectedTenses);
        renderFilterTags();
        // 恢复错题模式按钮状态
        document.getElementById('topWrongBtn').classList.toggle('active', isOnlyWrongMode);
        setupSwipe();
        setupKeyboard();
        setupQuestionNumberJump();
        resetQuestions();
    })
    .catch(err => {
        console.error('加载题库出错:', err);
        document.getElementById('questionText').innerText = '题库加载失败，请刷新重试';
    });

// ======================
// 滑动题目卡片切换上下题
// ======================
function setupSwipe() {
    const panel = document.getElementById('practicePanel');
    let touchStartX = 0;
    let touchStartY = 0;

    panel.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    panel.addEventListener('touchend', function(e) {
        let dx = e.changedTouches[0].screenX - touchStartX;
        let dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            if (dx < 0) {
                if (!document.getElementById('nextBtn').disabled) next();
            } else {
                if (!document.getElementById('prevBtn').disabled) prev();
            }
        }
    });
}



// 键盘左右键切换题目（桌面端）
function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
            e.preventDefault();
            if (e.key === 'ArrowRight') {
                if (!document.getElementById('nextBtn').disabled) next();
            } else {
                if (!document.getElementById('prevBtn').disabled) prev();
            }
        }
    });
}



// 按钮事件绑定
function bindEvents() {
    // 右上角错题模式按钮
    document.getElementById('topWrongBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleOnlyWrongMode();
    });

    // 清空错题按钮
    document.getElementById('clearWrongBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        clearAllWrong();
    });

    // 卡片内错题按钮（事件委托）
    document.getElementById('practicePanel').addEventListener('click', (e) => {
        const wrongBtn = e.target.closest('#cardWrongBtn');
        if (!wrongBtn) return;
        e.stopPropagation();
        const q = questionPool[currentIndex];
        if (!q) return;
        if (wrongQids.has(q.id)) {
            removeWrongQid(q.id);
        } else {
            addWrongQid(q.id);
        }
        updateCardWrongBtn(q.id);
        // 如果在错题模式下移除了最后一题，需要刷新
        if (isOnlyWrongMode && !wrongQids.has(q.id)) {
            doFilterAfterWrongChange();
        }
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindEvents);
} else {
    bindEvents();
}

// 错题模式下移除后刷新
function doFilterAfterWrongChange() {
    let filterList = [...sentenceBank].filter(q => 
        selectedTypes.includes(q.type) && selectedTenses.includes(q.difficulty)
    );
    filterList = filterList.filter(q => wrongQids.has(q.id));
    questionPool = filterList;
    if (questionPool.length === 0) {
        document.getElementById("questionText").innerText = "错题本暂无题目";
        document.getElementById("options").innerHTML = "";
        document.getElementById("fillArea").classList.add("hidden");
        correctCount = 0; errorCount = 0; unansweredCount = 0;
        updateProgress();
        return;
    }
    if (currentIndex >= questionPool.length) currentIndex = questionPool.length - 1;
    showQuestion(currentIndex);
}

// 题号输入跳转
function setupQuestionNumberJump() {
    const numEl = document.getElementById('questionLabel');
    numEl.addEventListener('focus', () => numEl.select());
    numEl.addEventListener('blur', () => {
        let raw = numEl.value.split('/')[0].trim();
        let n = parseInt(raw);
        if (!isNaN(n) && n >= 1 && n <= questionPool.length && (n - 1) !== currentIndex) {
            currentIndex = n - 1;
            showQuestion(currentIndex);
        } else {
            // 恢复原来的显示
            if (isOnlyWrongMode) {
                numEl.value = (currentIndex + 1) + '/' + questionPool.length;
            } else {
                numEl.value = currentIndex + 1;
            }
        }
    });
    numEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            numEl.blur();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            e.stopPropagation();
        }
    });
}
</script>

</body>
