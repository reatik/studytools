<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时态练习</title>

<style>
:root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #2c3e50;
    --border: #a8c5d8;
    --correct: #3f9414;
    --wrong: #e58989;
    --primary: #5a9fd4;
    --present: #4a8ac2;
    --continuous: #6a9bc2;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    font-family: "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 640px;
    margin: auto;
    position: relative; /* 👈 加上这一行 */
}

.home-title {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #3a6ea5;
    margin-bottom: 20px;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(90,150,200,0.08);
    border: none;
    outline: 2px dashed var(--border);
    outline-offset: -6px;

    /* 👇 加上这两行 */
    height: 450px;        /* 固定高度（你可以自己调数值） */
    overflow-y: auto;     /* 内容超长自动出现滚动条 */
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 10px;
}

.back-btn {
    position: fixed;
    top: 10px;
    left: 20px; /* 和题目板左侧对齐，和body的padding:20px一致 */
    width: 32px;       /* 按钮整体缩小：从40px改成32px */
    height: 32px;      /* 按钮整体缩小：从40px改成32px */
    border-radius: 6px; /* 圆角也跟着缩小，更协调 */
    background: #fff;
    border: 2px solid var(--border);
    cursor: pointer;
    z-index: 999;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.back-btn img {
    width: 18px;       /* 图标缩小：从24px改成18px */
    height: 18px;
    display: block;
}

.back-btn:hover {
    background: #f0f6fa;
}

.control-group {
    display: flex;
    gap: 8px;
    flex: 1;
}

.type-selector, .tense-selector {
    position: relative;
    flex: 1;
}

.type-dropdown, .tense-dropdown {
    position: relative;
    width: 100%;
}

.dropdown-btn {
    width: 100%;
    height: 40px;
    padding: 0 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    /* 手机12px ~ 桌面14px 自适应 */
    font-size: clamp(12px, 2.5vw, 14px) !important;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    white-space: nowrap; /* 强制不换行 */
}
.dropdown-btn:hover {
    border-color: var(--primary);
}

.dropdown-btn .selected-text {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}

.dropdown-btn .arrow {
    width: 18px;
    height: 18px;
    transition: transform 0.3s ease;
}

.type-dropdown.open .dropdown-btn,
.tense-dropdown.open .dropdown-btn {
    border-radius: 10px 10px 0 0;
    border-bottom-color: transparent;
}

.type-dropdown.open .arrow,
.tense-dropdown.open .arrow {
    transform: rotate(180deg);
}

.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border: 2px solid var(--primary);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(90,150,200,0.2);
}

.type-dropdown.open .dropdown-menu,
.tense-dropdown.open .dropdown-menu {
    display: block;
    animation: slideDown 0.25s ease;
}

@keyframes slideLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

.dropdown-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: all 0.2s ease;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
}

.dropdown-item:last-child {
    border-bottom: none;
}

.dropdown-item:hover {
    background: #e8f0f8;
}

.dropdown-item.selected {
    background: linear-gradient(135deg, var(--primary) 0%, #4a8fc2 100%);
    color: white;
}

.dropdown-item .item-text {
    flex: 1;
}

.dropdown-item .check-mark {
    opacity: 0;
    font-size: 12px;
}

.dropdown-item.selected .check-mark {
    opacity: 1;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px; /* 👈 从12px改成4px，把横线和下面的间距缩小 */
    padding-bottom: 6px; /* 👈 也可以顺便把横线本身的上下内边距缩小一点 */
    border-bottom: 1px solid var(--border);
}

.question-index {
    font-size: 14px;
    font-weight: bold;
    height: 30px;
    line-height: 30px;
    color: var(--primary);
    background: linear-gradient(135deg, #f8fafc 0%, #e8f0f8 100%);
    padding: 0 0 0 8px;
    border-radius: 8px 0 0 8px;
    border: none;
    white-space: nowrap;
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
}

.question-id-input {
    font-size: 14px;
    font-weight: bold;
    height: 30px;
    line-height: 30px;
    color: var(--primary);
    background: linear-gradient(135deg, #f8fafc 0%, #e8f0f8 100%);
    padding: 0 4px;
    border-radius: 0 8px 8px 0;
    border: none;
    outline: none;
    text-align: left;
    width: 42px;
    box-sizing: border-box;
}
.question-id-input:focus {
    border-color: var(--primary);
}
.question-id-input::-webkit-inner-spin-button,
.question-id-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

.card-progress {
    font-size: 14px;
    color: var(--correct);
    font-weight: 600;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}
.question-tags {
    display: none; /* 隐藏旧标签 */
}

.tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
}

.tag-wrong {
    background: #fff0f0;
    color: var(--wrong);
    border: 1px solid var(--wrong);
}

.tag-count {
    background: #f0f0f8;
    color: #666;
    border: 1px solid #ddd;
}

.question-area {

    margin-bottom: 0;
}

.question-text {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.8;
    color: #333;
}

.answer-hint {
    font-size: 14px;
    color: #888;
    margin-top: 10px;
    min-height: 24px;
}

.meaning-toggle-area {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-start;
}

.meaning-toggle-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border: 1px dashed #9b88d8;
    border-radius: 8px;
    background: #f5f2fc;
    color: #6b5cad;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
}
.meaning-toggle-btn:hover {
    background: #e3ecf8;
    border-color: #45689e;
}
.meaning-toggle-btn .arrow-icon {
    transition: transform 0.25s;
    font-size: 10px;
    display: inline-block;
}
.meaning-toggle-btn.open .arrow-icon {
    transform: rotate(90deg);
}

.meaning-content {
    font-size: 13px;
    color: #2d4a77;
    background: linear-gradient(135deg, #f1f5fb 0%, #e3ecf8 100%);
    padding: 5px 12px;
    border-radius: 8px;
    line-height: 1.6;
    display: none;
    flex: 1;
}
.meaning-content.show {
    display: block;
    animation: slideLeft 0.25s ease;
}

.meaning-content {
    font-size: 13px;
    color: #2c5c9e;
    background: linear-gradient(135deg, #e8f4ff 0%, #d8e8fa 100%);
    padding: 5px 12px;
    border-radius: 8px;
    line-height: 1.6;
    display: none;
    flex: 1;
}
.meaning-content.show {
    display: block;
    animation: slideLeft 0.25s ease;
}

.explanation {
    font-size: 13px;
    color: #4a6a8a;
    background: linear-gradient(135deg, #e8f4f8 0%, #d8eaf4 100%);
    padding: 2px 10px;
    border-radius: 12px;
    margin-top: 10px;
    box-shadow: 0 2px 8px rgba(90,150,200,0.15);
    line-height: 1.6;
}

.explanation::before {
    content: "解析";
    display: block;
    font-weight: bold;
    color: var(--primary);
    margin-bottom: 6px;
}

.fill-input {
    display: inline-block;
    border: none;
    border-bottom: 2px solid var(--primary);
    font-size: 18px;
    padding: 2px 4px;
    min-width: 50px;
    width: 80px !important; /* 👈 加这一行 */
    text-align: center;
    outline: none;
    background: transparent;
}

.fill-input:focus {
    border-bottom-color: #4a8fc2;
}
.fill-input.correct {
    border-bottom-color: #3f9414;
    color: #3f9414;
}
.fill-input.wrong {
    border-bottom-color: var(--wrong);
    color: var(--wrong);
}

.fill-footer {
    display: flex;
    align-items: center;
    margin-top: 10px;
}
/* 清空旧冲突样式 */
.answer-hint {
    font-size: 14px;
    color: #888;
    margin-top: 12px;
    min-height: 24px;
}

.fill-submit-btn {
    padding: 6px 16px;
    border: 1px solid #3f9414;
    border-radius: 8px;
    background: #3f9414;  /* 默认绿色背景 */
    color: #fff;         /* 白色文字 */
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
.fill-submit-btn:hover {
    background: #368010;  /* 深一点的绿色 */
}
.fill-submit-btn.correct {
    background: #3f9414;
    border-color: #3f9414;
    color: #fff;
}
.fill-submit-btn.wrong {
    background: #e58989;
    border-color: #e58989;
    color: #fff;
}
.fill-submit-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.options {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;

}

.option {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px; /* 👈 原来 16px，改成 10px 14px，高度变小 */
    cursor: pointer;
    position: relative;
    color: var(--text);
    background: #fafcfd;
    font-size: 15px;     /* 👈 文字稍微小一点 */
    min-height: 44px;    /* 👈 控制最小高度，更紧凑 */
    transition: all 0.2s;
}

.option:hover {
    background: #f0f6fa;
    border-color: var(--primary);
}

.option .option-letter {
    display: inline-block;
    width: 24px;       /* 👈 从 28px → 24px 变小 */
    height: 24px;      /* 👈 从 28px → 24px 变小 */
    line-height: 24px;
    text-align: center;
    background: #e8f0f8;
    border-radius: 6px;
    margin-right: 10px;
    font-weight: bold;
    color: var(--text);
    font-size: 14px;   /* 👈 字母也缩小 */
}

.option .option-text {
    font-size: 16px;
}

.option.correct {
    background: #E6F7E6;    /* 浅绿色背景 */
    border-color: #3f9414;  /* 绿色边框 */
}
.option.correct .option-letter {
    background: #398612;    /* 绿色字母背景 */
    color: white;
}

/* 勾 = 绿色 */
.option.correct .result-icon {
    color: #2e7d32;
}
/* 叉 = 红色 */
.option.wrong .result-icon {
    color: #d32f2f;
}

.option.wrong {
    background: #fff0f0;
    border-color: var(--wrong);
}

.option.wrong .option-letter {
    background: var(--wrong);
    color: white;
}

.option.disabled {
    pointer-events: none;
    opacity: 0.7;
}

.result-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    /* 关键：一开始就设置正确的居中，动画只做缩放 */
    transform: translateY(-50%) scale(1);
    font-size: 20px;
    /* 防止跳动 */
    backface-visibility: hidden;
}

.nav {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
}

.nav button {
    padding: 12px 24px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    background: #f0f6fa;
    font-size: 15px;
}

#prevBtn {
    background: #d0e8f0;
    border-color: #a0c8d8;
    color: #2a4a5a;
}

#prevBtn:hover {
    background: #c0dcee;
}

#nextBtn {
    background: #d0e8f0;
    border-color: #a0c8d8;
    color: #2a4a5a;
}

#nextBtn:hover {
    background: #c0dcee;
}

.nav button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.hidden { display: none; }

/* 动画 */
@keyframes bounce-in {
    0% { transform: translateY(-50%) scale(0); opacity: 0; }
    50% { transform: translateY(-50%) scale(1.3); }
    100% { transform: translateY(-50%) scale(1); opacity: 1; }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}

/* 纯数字 3D 翻转动画（只有数字会翻！） */
@keyframes numFlip {
    0% { transform: rotateX(0deg); opacity: 1; }
    50% { transform: rotateX(-90deg); opacity: 0.5; }
    100% { transform: rotateX(0deg); opacity: 1; }
}

/* 数字专用动画样式 */
.pop {
    animation: numFlip 0.4s ease-out;
    display: inline-block;
    transform-origin: center center;
}

.bounce-in {
    animation: bounce-in 0.4s ease-out;
}

.shake {
    animation: shake 0.4s ease-out;
}



/* 结果页 */
.result-card {
    text-align: center;
}

.score-display {
    padding: 30px;
    background: #f0f6fa;
    border-radius: 12px;
    margin-bottom: 20px;
}

.score-display .big {
    font-size: 56px;
    font-weight: bold;
    color: var(--correct);
}

.score-display .total {
    font-size: 16px;
    color: #666;
    margin-top: 8px;
}

.summary-item {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fafcff;
    text-align: left;
}

.summary-title {
    font-weight: bold;
    margin-bottom: 6px;
}

.restart-btn {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: 2px solid #4a8fc2;
    border-radius: 12px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    margin-top: 10px;
}

.restart-btn:hover {
    background: #4a90c2;
}

.fill-submit-btn.hide{
    display: none;
}

</style>
</head>

<body>

<h1 class="home-title">时态练习</h1>

<div class="container" id="practicePanel">
    <div class="top-bar">
        <button onclick="goHome()" class="back-btn">
            <img src="../../../images/fanhuiblack.png" alt="返回">
        </button>
        <div class="control-group">
            <div class="type-selector">
                <div class="type-dropdown" id="typeDropdown">
                    <button type="button" class="dropdown-btn" onclick="toggleTypeDropdown()">
                        <span class="selected-text" id="selectedTypeName">题型</span>
                        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item selected" data-value="fill" onclick="toggleType('fill')">
                            <span class="item-text">适当形式填空</span>
                        </div>
                        <div class="dropdown-item selected" data-value="choice" onclick="toggleType('choice')">
                            <span class="item-text">选择题</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tense-selector">
                <div class="tense-dropdown" id="tenseDropdown">
                    <button type="button" class="dropdown-btn" onclick="toggleTenseDropdown()">
                        <span class="selected-text" id="selectedTenseName">时态</span>
                        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item selected" data-value="一般现在时" onclick="toggleTense('一般现在时')">
                            <span class="item-text">一般现在时</span>
                        </div>
                        <div class="dropdown-item selected" data-value="现在进行时" onclick="toggleTense('现在进行时')">
                            <span class="item-text">现在进行时</span>
                        </div>
                    </div>
                </div>
            </div>
            <button id="orderSwitchBtn" style="padding:0 10px;border:2px solid var(--border);border-radius:10px;background:linear-gradient(135deg, #f8fafc 0%, #e8f0f8 100%);color:var(--text);font-size:12px;cursor:pointer;height:40px;flex-shrink:0;white-space:nowrap;" onclick="toggleOrderMode()">随机</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div style="display: flex; align-items: center; gap: 0;">
                <span class="question-index" id="questionLabel">第1题 · ID</span>
                <input type="number" id="questionId" class="question-id-input" onblur="jumpToId()" onkeypress="if(event.key==='Enter')this.blur()">
                <span class="tag tag-wrong" id="wrongTag" style="display: none; margin-left: 6px;">错题</span>
            </div>
            <div style="display: flex; gap: 4px;">
                <span class="card-progress" id="cardProgress">正确 0</span>
                <span class="card-progress" id="errorProgress" style="color: #e58989;">错误 0</span>
            </div>
        </div>
        <div class="question-area">
            <div class="question-tags" id="questionTags"></div>
            <div class="question-text" id="questionText"></div>
            <div class="meaning-toggle-area hidden" id="meaningToggleArea">
                <button class="meaning-toggle-btn" id="meaningToggleBtn" onclick="toggleMeaning()">
                    句意 <span class="arrow-icon">▶</span>
                </button>
                <div class="meaning-content" id="meaningContent"></div>
            </div>
    
            <!-- 提交按钮 放在 句意 下方 -->
            <div class="fill-footer">
                <button class="fill-submit-btn" id="fillSubmitBtn">提交</button>
                <span id="fillResultText" style="margin-left:10px; font-size:13px;"></span>
            </div>
        </div>
    
        <div id="fillArea" class="hidden">
            <div class="answer-hint" id="answerHint"></div>
        </div>
    
        <div class="options" id="options"></div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="prev()">上一题</button>
        <button id="nextBtn" onclick="next()">下一题</button>
    </div>
</div>


<script>
let sentenceBank = [];
let selectedTypes = ['fill', 'choice'];
let selectedTenses = ['一般现在时', '现在进行时'];
let questionPool = [];
let answers = [];
let correctCount = 0;
let errorCount = 0;
let currentIndex = 0;
let currentAnswer = null;
let currentMeaning = '';
let isRandomMode = true;

// 从localStorage恢复选择
function loadSelections() {
    const savedTypes = localStorage.getItem('shitai_types');
    const savedTenses = localStorage.getItem('shitai_tenses');
    
    if (savedTypes) selectedTypes = JSON.parse(savedTypes);
    if (savedTenses) selectedTenses = JSON.parse(savedTenses);
}

// 初始化时更新下拉菜单UI
function initDropdownUI() {
    document.querySelectorAll('#typeDropdown .dropdown-item').forEach(item => {
        item.classList.toggle('selected', selectedTypes.includes(item.dataset.value));
    });
    document.querySelectorAll('#tenseDropdown .dropdown-item').forEach(item => {
        item.classList.toggle('selected', selectedTenses.includes(item.dataset.value));
    });
    updateTypeName();
    updateTenseName();
}

loadSelections();

function toggleTypeDropdown() {
    const dropdown = document.getElementById('typeDropdown');
    dropdown.classList.toggle('open');
    document.getElementById('tenseDropdown').classList.remove('open');
}

function toggleTenseDropdown() {
    const dropdown = document.getElementById('tenseDropdown');
    dropdown.classList.toggle('open');
    document.getElementById('typeDropdown').classList.remove('open');
}

function toggleType(type) {
    const idx = selectedTypes.indexOf(type);
    if (idx > -1) {
        selectedTypes.splice(idx, 1);
    } else {
        selectedTypes.push(type);
    }
    
    document.querySelectorAll('#typeDropdown .dropdown-item').forEach(item => {
        item.classList.toggle('selected', selectedTypes.includes(item.dataset.value));
    });
    
    updateTypeName();
    localStorage.setItem('shitai_types', JSON.stringify(selectedTypes));
    
    if (selectedTypes.length > 0) {
        resetQuestions();
    }
}

function updateTypeName() {
    const names = { 'fill': '填空', 'choice': '选择' };
    let text = selectedTypes.map(t => names[t]).join('+');
    if (selectedTypes.length === 0) {
        text = '请选择题型';
    } else if (selectedTypes.length === 2) {
        text = '全部题型';
    }
    document.getElementById('selectedTypeName').innerText = text;
}

function toggleTense(tense) {
    const idx = selectedTenses.indexOf(tense);
    if (idx > -1) {
        selectedTenses.splice(idx, 1);
    } else {
        selectedTenses.push(tense);
    }
    
    document.querySelectorAll('#tenseDropdown .dropdown-item').forEach(item => {
        item.classList.toggle('selected', selectedTenses.includes(item.dataset.value));
    });
    
    updateTenseName();
    localStorage.setItem('shitai_tenses', JSON.stringify(selectedTenses));
    
    if (selectedTenses.length > 0) {
        resetQuestions();
    }
}

function updateTenseName() {
    const names = { '一般现在时': '一般现在时', '现在进行时': '进行时' };
    let text = selectedTenses.map(t => names[t]).join('+');
    if (selectedTenses.length === 0) {
        text = '请选择时态';
    } else if (selectedTenses.length === 2) {
        text = '全部时态';
    }
    document.getElementById('selectedTenseName').innerText = text;
}

// 点击外部关闭下拉菜单
document.addEventListener('click', function(e) {
    if (!document.getElementById('typeDropdown').contains(e.target)) {
        document.getElementById('typeDropdown').classList.remove('open');
    }
    if (!document.getElementById('tenseDropdown').contains(e.target)) {
        document.getElementById('tenseDropdown').classList.remove('open');
    }
});

function toggleMeaning() {
    const content = document.getElementById('meaningContent');
    const btn = document.getElementById('meaningToggleBtn');
    const isOpen = content.classList.toggle('show');
    btn.classList.toggle('open', isOpen);
}

function hideMeaning() {
    const content = document.getElementById('meaningContent');
    const btn = document.getElementById('meaningToggleBtn');
    content.classList.remove('show');
    btn.classList.remove('open');
}

function resetQuestions() {
    if (selectedTypes.length === 0 || selectedTenses.length === 0) return;
    let filterList = [...sentenceBank].filter(q => 
    selectedTypes.includes(q.type) && selectedTenses.includes(q.difficulty)
);
questionPool = isRandomMode ? shuffle(filterList) : filterList;
    answers = [];
    correctCount = 0;
    errorCount = 0;
    currentIndex = 0;
    updateProgress();
    showQuestion(0);
}

function showQuestion(index) {
    document.getElementById("fillSubmitBtn").classList.remove('hide');
    const q = questionPool[index];
    if (!q) return;

    const wasAnswered = answers[index] !== null && answers[index] !== undefined;
    
    if (!wasAnswered) {
        answers[index] = null;
    }
    
    // 显示序号
    document.getElementById("questionLabel").innerText = `第${index + 1}题 · ID`;
    document.getElementById("questionId").value = q.id;
    
// 显示标签（清空旧标签）
const tagsEl = document.getElementById("questionTags");
tagsEl.innerHTML = '';

// 显示红色【错题】标签（仅答错显示）
const wrongTag = document.getElementById("wrongTag");
if (wasAnswered && !answers[index].correct) {
    wrongTag.style.display = "inline-flex";
} else {
    wrongTag.style.display = "none";
}

    const questionText = document.getElementById("questionText");
    const submitBtn = document.getElementById("fillSubmitBtn");
    const resultText = document.getElementById("fillResultText");
    const hintEl = document.getElementById("answerHint");

    // 重置按钮
    submitBtn.disabled = false;
    submitBtn.innerText = "提交";
    submitBtn.className = "fill-submit-btn";
    if(resultText) resultText.innerText = "";
    hintEl.innerText = "";
    
    if (q.type === 'fill') {
        if(wasAnswered){
    let ansArr = answers[index].value.split(';');
    let idx = 0;
    questionText.innerHTML = q.text.replace(/______/g, ()=>{
        let val = ansArr[idx] || '';
        idx++;
        return `<input type="text" class="fill-input inline-fill" autocomplete="off" value="${val}">`;
    });
}else{
    questionText.innerHTML = q.text.replace(/______/g, `<input type="text" class="fill-input inline-fill" autocomplete="off" value="">`);
}
        document.getElementById("fillArea").classList.remove("hidden");
        document.getElementById("options").innerHTML = "";
        
        const inputList = document.querySelectorAll(".inline-fill");
        
        if (wasAnswered) {
            inputList.forEach(el => el.disabled = true);
            // 逐空着色：每个空单独判断对错
            let userParts = answers[index].value.split(';');
            let correctParts = q.answer.split(';').map(s => s.trim());
            inputList.forEach((el, i) => {
                let correct = i < correctParts.length && i < userParts.length
                    && userParts[i].trim() === correctParts[i];
                el.classList.add(correct ? 'correct' : 'wrong');
            });

            submitBtn.disabled = true;
            if (isCorrect) {
                submitBtn.innerText = "✓ 正确";
                submitBtn.classList.add("correct");
                if(resultText) resultText.innerText = "";
            } else {
                submitBtn.innerText = "✗ 错误";
                submitBtn.classList.add("wrong");
                if(resultText) resultText.innerText = `正确答案：${q.answer}`;
                if(resultText) resultText.style.color = "var(--wrong)";
            }
            if (q.explanation) {
                hintEl.innerHTML = `<div class="explanation">${q.explanation}</div>`;
            }
        } else {
            inputList.forEach(el => el.classList.remove('correct', 'wrong'));
            document.getElementById("answerHint").innerText = "";
            if(inputList.length > 0) inputList[0].focus();
            const handler = () => submitFillAnswer();
            submitBtn.onclick = handler;
            inputList.forEach(el => {
                el.onkeypress = (e) => { if (e.key === 'Enter') handler(); };
            });
        }
    } else {
        document.getElementById("fillArea").classList.add("hidden");
        questionText.innerHTML = q.text;
        
        document.getElementById("options").innerHTML = q.options.map((opt, i) => `
            <div class="option" data-index="${i}">
                <span class="option-letter">${opt.label}</span>
                <span class="option-text">${opt.value}</span>
            </div>
        `).join("");

        if (wasAnswered) {
            const selectedIndex = q.options.findIndex((opt, i) => {
                if (q.type === 'choice') {
                    return answers[index].value === opt.value;
                }
                return false;
            });
            
            document.querySelectorAll(".option").forEach((optEl, i) => {
                optEl.classList.add("disabled");
                const opt = q.options[i];
                if (opt.correct) {
                    optEl.classList.add("correct");
                    optEl.innerHTML += '<span class="result-icon bounce-in">✓</span>';
                } else if (i === selectedIndex) {
                    optEl.classList.add("wrong");
                    optEl.innerHTML += '<span class="result-icon bounce-in">✗</span>';
                }
            });
            
            if (q.explanation) {
                document.getElementById("options").innerHTML += `<div class="explanation">${q.explanation}</div>`;
            }
        } else {
            document.querySelectorAll(".option").forEach(el => {
                el.onclick = () => selectOption(el, q);
            });
        }
        document.getElementById("fillSubmitBtn").classList.add('hide');
    }

    // 设置句意切换
    currentMeaning = q.meaning || '';
    const toggleArea = document.getElementById('meaningToggleArea');
    const contentEl = document.getElementById('meaningContent');
    contentEl.innerHTML = currentMeaning;
    contentEl.classList.remove('show');
    if (currentMeaning && !wasAnswered) {
        toggleArea.classList.remove('hidden');
    } else {
        toggleArea.classList.add('hidden');
    }
    hideMeaning();

    updateNavButtons();
}

function submitFillAnswer() {
    const q = questionPool[currentIndex];
    const inputList = document.querySelectorAll(".inline-fill");
    const submitBtn = document.getElementById("fillSubmitBtn");
    const resultText = document.getElementById("fillResultText");
    const hintEl = document.getElementById("answerHint");

    let userAnswers = [];
    inputList.forEach(inp => {
        userAnswers.push(inp.value.trim());
    });

    let rightAnswers = q.answer.split(';').map(item => item.trim());

    let allRight = true;
    if (userAnswers.length !== rightAnswers.length) {
        allRight = false;
    } else {
        for (let i = 0; i < rightAnswers.length; i++) {
            if (userAnswers[i] !== rightAnswers[i]) {
                allRight = false;
                break;
            }
        }
    }

    inputList.forEach(inp => inp.disabled = true);
    // 逐空着色：每个空单独判断对错
    inputList.forEach((el, i) => {
        let correct = i < rightAnswers.length && i < userAnswers.length
            && userAnswers[i] === rightAnswers[i];
        el.classList.add(correct ? 'correct' : 'wrong');
    });
    submitBtn.disabled = true;

    answers[currentIndex] = { value: userAnswers.join(";"), correct: allRight };

    if (allRight) {
        submitBtn.innerText = "✓ 正确";
        submitBtn.classList.add("correct");
        correctCount++;
        resultText.innerText = q.answer;
        resultText.style.color = "var(--correct)";
    } else {
        submitBtn.innerText = "✗ 错误";
        submitBtn.classList.add("wrong");
        errorCount++;
        resultText.innerText = q.answer;
        resultText.style.color = "var(--wrong)";
    }
    updateProgress(true);

    if (q.explanation) {
        hintEl.innerHTML = `<div class="explanation">${q.explanation}</div>`;
    }
}

function selectOption(el, q) {
    if (answers[currentIndex]) {
        alert('此题已作答，请查看上一题或下一题');
        return;
    }

    const selectedIndex = +el.dataset.index;
    const selected = q.options[selectedIndex];
    answers[currentIndex] = selected;
    currentAnswer = selected;

    document.querySelectorAll(".option").forEach((optEl, i) => {
        optEl.classList.add("disabled");
        const opt = q.options[i];

        if (opt.correct) {
            optEl.classList.add("correct");
            optEl.innerHTML += '<span class="result-icon bounce-in">✓</span>';
        } else if (i === selectedIndex) {
            optEl.classList.add("wrong");
            optEl.classList.add("shake");
            optEl.innerHTML += '<span class="result-icon bounce-in">✗</span>';
        }
    });

    // 添加解析
    const optionsEl = document.getElementById("options");
    if (q.explanation) {
        optionsEl.innerHTML += `<div class="explanation">${q.explanation}</div>`;
    }

    if (selected.correct) {
        correctCount++;
    } else {
        errorCount++;
    }
    updateProgress(true);
    updateNavButtons();
    document.getElementById("fillSubmitBtn").classList.add('hide');
}

function updateNavButtons() {
    document.getElementById("prevBtn").disabled = currentIndex === 0;
    const isLast = currentIndex === questionPool.length - 1;
    document.getElementById("nextBtn").disabled = isLast;
}

function updateProgress(animate) {
    const el = document.getElementById("cardProgress");
    el.innerText = `正确 ${correctCount}`;
    document.getElementById("errorProgress").innerText = `错误 ${errorCount}`;
    if (animate) {
        el.classList.remove("pop");
        void el.offsetWidth;
        el.classList.add("pop");
    }
}

function next() {
    if (currentIndex < questionPool.length - 1) {
        currentIndex++;
        showQuestion(currentIndex);
    }
}

function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        showQuestion(currentIndex);
    }
}

function goHome() {
    // 返回上一页，回到主页
    window.history.back();
}

function shuffle(arr) {
    // Fisher-Yates 洗牌算法确保真正随机
    const result = [...arr];
    for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
}

// 异步加载题库并初始化
fetch('sentences.json')
    .then(res => {
        if (!res.ok) throw new Error('加载题库失败');
        return res.text();
    })
    .then(code => {
        // sentences.json 现在是纯 JSON 数组，用 eval 执行并赋值
        sentenceBank = eval(code);
        if (!sentenceBank || sentenceBank.length === 0) {
            console.error('题库数据为空');
            return;
        }
        initDropdownUI();
        resetQuestions();
    })
    .catch(err => {
        console.error('加载题库出错:', err);
        document.getElementById('questionText').innerText = '题库加载失败，请刷新重试';
    });

   // ======================
// 滑动题目卡片切换上下题
// ======================
let card = document.querySelector('.card');
let startX = 0;

card.addEventListener('touchstart', function(e) {
  startX = e.changedTouches[0].clientX;
});

card.addEventListener('touchend', function(e) {
  let endX = e.changedTouches[0].clientX;
  let diff = endX - startX;

  if (Math.abs(diff) < 50) return;

  if (diff > 0) {
    if (!document.getElementById('prevBtn').disabled) prev();
  } else {
    if (!document.getElementById('nextBtn').disabled) next();
  }
});

function jumpToId() {
    const el = document.getElementById('questionId');
    const val = el.value.trim();
    
    if (!val) {
        el.value = questionPool[currentIndex] ? questionPool[currentIndex].id : '';
        return;
    }
    
    const targetId = parseInt(val);
    const idx = questionPool.findIndex(q => q.id === targetId);

    if (idx === -1) {
        alert('未找到 ID：' + targetId);
        el.value = questionPool[currentIndex] ? questionPool[currentIndex].id : '';
        return;
    }

    currentIndex = idx;
    showQuestion(currentIndex);
    updateNavButtons();
}

function toggleOrderMode(){
    isRandomMode = !isRandomMode;
    const btn = document.getElementById('orderSwitchBtn');
    btn.innerText = isRandomMode ? "随机" : "顺序";
    resetQuestions();
}
