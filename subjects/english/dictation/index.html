<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分组文字转语音</title>
    <style>
:root {
    --primary-color: #1A73E8;
    --secondary-color: #5F6368;
    --light-gray: #F1F3F4;
    --medium-gray: #DADCE0;
    --dark-gray: #5F6368;
    --success-color: #34A853;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background-color: #FAFAFA;
    color: #202124;
    line-height: 1.5;
    padding: 0;
    margin: 0;
    -webkit-text-size-adjust: 100%;
}

.container {
    width: 100%;
    padding: 8px;
}

.panel {
    background-color: #f5f5f5;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    width: 100%;
    overflow: hidden;
}

h2 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--primary-color), var(--success-color));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: flex;
    justify-content: center;
    width: 100%;
    text-align: center;
    margin: 0 auto 25px;
    padding: 0;
    position: relative;
}

h2::before,
h2::after {
    content: "";
    flex: 1;
    align-self: center;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--medium-gray), transparent);
    margin: 0 15px;
}

textarea {
    display: block;
    width: 100%;
    border: 1px solid var(--primary-color);
    border-radius: 6px;
    height: 100px;
    margin-bottom: 10px;
    padding: 10px;
    resize: vertical;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    background-color: white;
    color: inherit;
    transition: all 0.3s ease;
    overflow: auto;
}

textarea:focus {
    border-color: var(--primary-color);
    outline: none;
    box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.3);
}

.button-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
    width: 100%;
}

.button-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    width: 100%;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 60px;
    flex: 1;
    text-align: center;
    white-space: nowrap;
    background-color: var(--light-gray);
    color: var(--dark-gray);
}

.small-btn {
    padding: 6px 10px;
    font-size: 12px;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.btn-primary {
    background-color: var(--primary-color);
    color: white;
}

.btn-success {
    background-color: var(--success-color);
    color: white;
}

.btn-secondary {
    background-color: var(--secondary-color);
    color: white;
}

.hidden {
    display: none;
}

.content-list {
    margin-top: 12px;
    width: 100%;
    overflow-x: auto;
}

.content-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
}

.content-item {
    display: flex;
    flex-direction: column;
    padding: 8px;
    border: 1px solid var(--medium-gray);
    border-radius: 6px;
    background-color: white;
    user-select: none;
    position: relative;
    min-height: 60px;
    word-break: break-word;
    height: 100%;
}

.content-item.selected {
    background-color: #E8F0FE;
    border-color: var(--primary-color);
}

.english-container {
    font-weight: 500;
    color: #202124;
    white-space: pre-line;
    padding: 4px 6px 2px 6px;
    margin-bottom: 0;
    display: block;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.3;
}

.chinese-container {
    color: var(--secondary-color);
    white-space: pre-line;
    padding: 2px 6px 4px 6px;
    margin-top: 0;
    display: block;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.3;
}

.dictation-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px !important;
    width: 100%;
    margin-top: 20px !important;
}

.play-controls-center {
    display: flex;
    align-items: center;
    gap: 30px;
}

.auto-play-btn {
    background: #f1f3f4;
    border: 1px solid #dadce0;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
}

.auto-play-btn.active {
    background: var(--primary-color);
    color: white;
    border-color: var(--primary-color);
}

.dictation-btn {
    width: 40px !important;
    height: 40px !important;
    border-radius: 50%;
    display: flex !important;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    margin: 0 -8px !important;
    flex: none !important;
}

.dictation-btn img {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain;
    display: block !important;
}

.progress {
    margin: 12px 0;
    font-size: 13px;
    color: var(--dark-gray);
    text-align: center;
}

.language-modes {
    display: flex;
    align-items: center;
    margin-top: 16px;
    width: 100%;
    white-space: nowrap;
}

.mode-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding: 10px 12px;
    background-color: #f1f3f4;
    border: 1px solid #dadce0;
    border-radius: 6px;
}

.mode-row-left {
    display: flex;
    align-items: center;
    gap: 6px;
}

.play-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 12px;
    gap: 40px;
}

.play-controls-left {
    width: 50px;
}

.play-controls-center {
    display: flex;
    align-items: center;
    gap: 30px;
}

.play-controls-right {
    width: 50px;
}

.language-toggle-container {
    display: flex;
    align-items: center;
    gap: 6px;
}

.language-btn {
    padding: 6px 10px;
    border-radius: 16px;
    background-color: var(--light-gray);
    color: var(--dark-gray);
    font-size: 12px;
    min-width: 70px;
}

.language-btn.active {
    background-color: var(--primary-color);
    color: white;
}

.status-info {
    font-size: 13px;
    color: var(--dark-gray);
    margin: 8px 0;
    text-align: center;
}

.dictation-content {
    margin: 0;
    padding: 0;
    border: none;
    border-radius: 0;
    background-color: #f5f5f5;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 10;
}

/* 强制隐藏英文 */
.dictation-english {
    display: none !important;
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 10px;
    text-align: center;
    word-break: break-word;
    white-space: pre-line;
}

.dictation-chinese {
    font-size: 28px;
    font-weight: 600;
    color: #202124;
    text-align: center;
    line-height: 1.6;
    padding: 0 20px;
    word-break: break-word;
    white-space: pre-line;
    max-width: 90%;
    margin: 0 auto;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    letter-spacing: 1px;

    /* 过渡核心：透明度 + 位移 */
    opacity: 1;
    transform: translateY(0);
    transition: all 0.3s ease-out; /* 0.3秒平滑过渡 */
}

/* 退场：向左滑出 */
.dictation-chinese.slide-up {
    opacity: 0;
    transform: translateX(-100px);
}

/* 退场：向右滑出 */
.dictation-chinese.slide-down {
    opacity: 0;
    transform: translateX(100px);
}

/* 入场：从右侧滑入 */
.dictation-chinese.fade-in-up {
    opacity: 1;
    transform: translateX(0);
}

/* 入场：从左侧滑入 */
.dictation-chinese.fade-in-down {
    opacity: 1;
    transform: translateX(0);
}


.dictation-chinese.hidden {
    display: none;
}

.combined-controls {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.repeat-mini {
    display: flex;
    align-items: center;
    gap: 2px;
}

.repeat-mini-btn {
    width: 22px;
    height: 22px;
    border-radius: 11px;
    background-color: var(--light-gray);
    border: 1px solid var(--medium-gray);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}

.repeat-mini-val {
    min-width: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--dark-gray);
}

.repeat-mini-label {
    font-size: 12px;
    color: var(--dark-gray);
    margin-left: 4px;
}

.auto-play-toggle {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
}

.auto-play-toggle-switch {
    position: relative;
    display: inline-block;
    width: 52px;
    height: 26px;
}

.auto-play-toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.auto-play-toggle-switch label {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 34px;
}

.auto-play-toggle-switch label:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

.auto-play-toggle-switch input:checked + label {
    background-color: var(--primary-color);
}

.auto-play-toggle-switch input:checked + label:before {
    transform: translateX(26px);
}

.language-toggle-btn {
    padding: 4px 8px;
    border-radius: 4px;
    background-color: transparent;
    color: var(--dark-gray);
    font-size: 13px;
    min-width: 40px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    border: 1px solid var(--medium-gray);
}

.language-toggle-btn.active {
    color: var(--primary-color);
    border-color: var(--primary-color);
    background-color: rgba(26, 115, 232, 0.1);
}

.language-toggle-btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.toggle-arrow {
    font-size: 14px;
    color: var(--dark-gray);
    padding: 0 4px;
    cursor: pointer;
    user-select: none;
}

.toggle-arrow:hover {
    color: var(--primary-color);
}

.play-order-label {
    font-size: 13px;
    color: var(--dark-gray);
    margin-right: 6px;
}

.order-toggle-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 10px;
}

.order-toggle-btn {
    padding: 8px 16px;
    border-radius: 6px;
    background-color: var(--light-gray);
    color: var(--dark-gray);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
}

.order-toggle-btn:hover {
    background-color: var(--medium-gray);
}

.order-toggle-btn::after {
    content: "点击切换朗读顺序";
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background-color: var(--dark-gray);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
}

.order-toggle-btn:hover::after {
    opacity: 1;
}

.order-indicator {
    display: none;
}

.prompt-help {
    background-color: var(--light-gray);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 13px;
}

.prompt-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
}

.prompt-title {
    font-weight: 500;
    color: var(--primary-color);
    margin-bottom: 8px;
    font-size: 14px;
}

.copy-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(26, 115, 232, 0.1);
    color: #1A73E8;
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
}
.prompt-help::after {
    content: "";
    display: table;
    clear: both;
}

.copy-text {
    white-space: nowrap;
}

.copy-icon {
    width: 16px;
    height: 16px;
}

.copy-notification {
    position: fixed;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    background-color: white;
    color: #202124;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 1000;
    transition: bottom 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid #DADCE0;
}

.copy-notification.show {
    bottom: 20px;
}

.check-icon {
    width: 16px;
    height: 16px;
}

.progress-text {
    font-size: 13px;
    color: var(--dark-gray);
    min-width: 40px;
}

.complete-check {
    width: 22px;
    height: 22px;
    border-radius: 11px;
    background-color: var(--success-color);
    color: white;
    font-size: 14px;
    line-height: 22px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
}

#prevBtn:hover img,
#nextBtn:hover img {
    filter: brightness(0) saturate(100%) invert(26%) sepia(99%) saturate(1765%) hue-rotate(206deg) brightness(97%) contrast(101%);
    transition: filter 0.2s ease;
}

#prevBtn:active img,
#nextBtn:active img {
    filter: brightness(0) saturate(100%) invert(26%) sepia(99%) saturate(1765%) hue-rotate(206deg) brightness(97%) contrast(101%);
}

#readBtn:hover img,
#readBtn:active img {
  filter: brightness(0) saturate(100%) invert(26%) sepia(99%) saturate(1765%) hue-rotate(206deg) brightness(97%) contrast(101%);
  transition: filter 0.2s ease;
}

/* 左上角悬浮返回 */
.fix-back-btn{
    position: fixed;
    top:15px;
    left:15px;
    z-index:9999;
    padding:6px 15px;
    background:#fff;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

/* 右侧悬浮设置面板 */
.right-fix-set{
    position:fixed;
    right:15px;
    top:80%; /* 下移控件 */
    transform:translateY(-50%);
    z-index:9999;
    display:flex;
    flex-direction:column;
    gap:12px;
}
.set-btn{
    padding:8px 12px;
    border-radius:6px;
    border:none;
    background:#fff;
    box-shadow:0 0 5px #ddd;
    font-size:14px;
}
.count-select{
    width:70px;
    text-align:center;
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* 只在听写面板显示时，禁止页面上下拉刷新 */
body.dictation-active {
  overscroll-behavior-y: contain; /* 阻止下拉刷新 + 上滑回弹刷新 */
}
    </style>
</head>
<body>
    <div class="container">
        <div id="inputPanel" class="panel">
            <h2>听写工具</h2>
            <textarea id="inputText" placeholder="请将默写的内容粘贴到此处"></textarea>

            <div id="promptHelp" class="prompt-help" style="margin-bottom: 12px;">
                <div style="background:#f8f9fa; padding:12px; border-radius:4px; position:relative; min-height:50px;">
                    <div style="padding-right:100px; word-break:break-word; line-height:1.5;">
                        提取图片中的中英文对照内容：英文在前中文在后，单空格分隔；保留原始格式（包括连字符单词）；每组独立成行
                    </div>
                    <button id="copyPromptBtn" class="copy-btn" title="复制提示词">
                        <span class="copy-text">复制AI提示词</span>
                        <svg class="copy-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                            <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z" fill="#34A853"/>
                        </svg>
                    </button>
                </div>
                <div id="copyNotification" class="copy-notification">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z" fill="#34A853"/>
                    </svg>
                    <span>已复制</span>
                </div>
            </div>
            
            <div id="tutorialSection" class="prompt-help" style="cursor:pointer;">
                <div class="prompt-title" style="display:flex; align-items:center; justify-content:space-between;">
                    <span>详细教程</span>
                    <span id="tutorialArrow">▼</span>
                </div>
                <div id="tutorialContent" style="display:none; margin-top:10px;">
                    <p>
                        <strong>1.准备默写内容</strong><br>
                        - 拍摄文本内容（确保光线充足、文字清晰）<br>
                        - 将照片导入AI工具使用上方提示词转换<br>
                        <em>已有内容可直接跳过</em><br><br>
                        <strong>2.粘贴内容</strong><br>
                        格式：英文 中文 一行一组<br><br>
                        <strong>3.勾选内容开始听写</strong>
                    </p>
                </div>
            </div>
            
            <div class="button-group">
                <div id="actionButtons" class="button-row hidden">
                    <button id="toggleSelectAllBtn" class="small-btn">全选</button>
                    <button id="invertSelectionBtn" class="small-btn">反选</button>
                    <button id="clearBtn" class="small-btn">清空</button>
                </div>
                <button id="startBtn" class="btn-primary hidden">开始朗读</button>
            </div>
            
            <div id="contentList" class="content-list">
                <div id="contentGrid" class="content-grid"></div>
            </div>
        </div>

        <!-- 听写播放页面 -->
        <div id="dictationPanel" class="panel hidden">
            <!-- 悬浮返回 -->
            <button class="fix-back-btn" id="floatExitBtn">返回</button>
            <!-- 右侧悬浮设置 -->
            <div class="right-fix-set">
                <button class="set-btn" id="floatAutoBtn">auto</button>
                <select class="count-select" id="countSelect">
                    <option value="1">1遍</option>
                    <option value="2">2遍</option>
                    <option value="3">3遍</option>
                    <option value="4">4遍</option>
                    <option value="5">5遍</option>
                    <option value="99">循环</option>
                </select>
            </div>

            <div class="mode-row">
                <div class="mode-row-left">
                    <span class="play-order-label">播放模式</span>
                    <div id="englishToggleBtn" class="language-toggle-btn active">英</div>
                    <div id="toggleArrow" class="toggle-arrow">↔</div>
                    <div id="chineseToggleBtn" class="language-toggle-btn active">中</div>
                </div>
                <div class="repeat-mini">
                    <button id="decreaseCountBtn" class="repeat-mini-btn">-</button>
                    <span id="repeatCountValue" class="repeat-mini-val">1</span>
                    <button id="increaseCountBtn" class="repeat-mini-btn">+</button>
                    <span class="repeat-mini-label">遍</span>
                </div>
            </div>
            
            <div class="dictation-content" id="dictationMainBox">
                <div id="dictationEnglish" class="dictation-english"></div>
                <div id="dictationChinese" class="dictation-chinese"></div>
            </div>
            
            <div class="play-controls">
                <div class="play-controls-left">
                    <button id="autoPlayBtn" class="auto-play-btn active">自动</button>
                </div>
                <div class="play-controls-center">
                    <button id="prevBtn" class="dictation-btn prev-btn">
                        <img src="../../../images/back1.png" alt="上一个">
                    </button>
                    <button id="readBtn" class="dictation-btn">
                        <img id="playImg" src="../../../images/play1.png" alt="播放">
                    </button>
                    <button id="nextBtn" class="dictation-btn next-btn">
                        <img src="../../../images/next1.png" alt="下一个">
                    </button>
                </div>
                <div class="play-controls-right"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const elements = {
                inputPanel: document.getElementById('inputPanel'),
                dictationPanel: document.getElementById('dictationPanel'),
                inputText: document.getElementById('inputText'),
                startBtn: document.getElementById('startBtn'),
                prevBtn: document.getElementById('prevBtn'),
                nextBtn: document.getElementById('nextBtn'),
                readBtn: document.getElementById('readBtn'),
                playImg: document.getElementById('playImg'),
                progressText: document.getElementById('progressText'),
                contentList: document.getElementById('contentList'),
                contentGrid: document.getElementById('contentGrid'),
                toggleSelectAllBtn: document.getElementById('toggleSelectAllBtn'),
                invertSelectionBtn: document.getElementById('invertSelectionBtn'),
                clearBtn: document.getElementById('clearBtn'),
                actionButtons: document.getElementById('actionButtons'),
                dictationEnglish: document.getElementById('dictationEnglish'),
                dictationChinese: document.getElementById('dictationChinese'),
                autoPlayBtn: document.getElementById('autoPlayBtn'),
                englishToggleBtn: document.getElementById('englishToggleBtn'),
                chineseToggleBtn: document.getElementById('chineseToggleBtn'),
                toggleArrow: document.getElementById('toggleArrow'),
                decreaseCountBtn: document.getElementById('decreaseCountBtn'),
                increaseCountBtn: document.getElementById('increaseCountBtn'),
                repeatCountValue: document.getElementById('repeatCountValue'),
                dictationMainBox: document.getElementById('dictationMainBox')
            };
    
            const synth = window.speechSynthesis;
            let voices = [];
            let currentLineIndex = 0;
            let lines = [];
            let isReading = false;
            let currentUtterance = null;
            let isPlaying = false;
            let allCompleted = false;
    
            let autoPlayEnabled = true;
            let repeatCount = 1;
            let currentRepeat = 0;
            let autoPlayTimeout = null;
            let perCharInterval = 300;
    
            let selectedRows = [];
            let englishEnabled = true;
            let chineseEnabled = true;
            let languageOrder = 'english-first';
    
            let autoPlayLockPlay2 = false;
            let isReadingGroup = false;
            let tutorialExpanded = false;
            let currentPlayingLineIndex = -1;
            let dragReadTimeout = null;
            let readSessionId = 0;

            let touchStartY = 0;

            // 本地存储工具
            const Storage = {
                get(key, def) {
                    try {
                        let v = localStorage.getItem(key);
                        return v == null ? def : JSON.parse(v);
                    } catch(e) { return def; }
                },
                set(key, val) {
                    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
                }
            };

            // 加载上次设置
            let savedAuto = Storage.get('dict_auto', true);
            let savedCount = Storage.get('dict_count', 1);
            autoPlayEnabled = savedAuto;
            repeatCount = savedCount;

            const countSelect = document.getElementById('countSelect');
            countSelect.value = repeatCount;
            if(repeatCount === 99){
                elements.repeatCountValue.innerText = "无限";
            }else{
                elements.repeatCountValue.innerText = repeatCount;
            }

            // 全屏区域点击播放暂停
            elements.dictationMainBox.addEventListener('click', function(e){
                if (isPlaying) {
                    stopReading();
                } else {
                    if (autoPlayEnabled) {
                        currentRepeat = 0;
                        autoPlayLockPlay2 = true;
                        readCurrentItem();
                    } else {
                        readCurrentItem();
                    }
                }
            });
// 统一：触屏左右滑 + 网页鼠标左右拖
let touchStartX = 0;
let isMouseDown = false;
const SWIPE_THRESHOLD = 60;

// ---------- 触屏 ----------
document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
});

document.addEventListener('touchend', function(e) {
    if (elements.dictationPanel.classList.contains('hidden')) return;
    const touchEndX = e.changedTouches[0].clientX;
    const diffX = touchEndX - touchStartX;

    if (diffX > SWIPE_THRESHOLD) {
        // 右滑 → 上一题
        elements.prevBtn.click();
    } else if (diffX < -SWIPE_THRESHOLD) {
        // 左滑 → 下一题
        elements.nextBtn.click();
    }
});

// ---------- 网页鼠标拖动左右切换 ----------
elements.dictationMainBox.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    isMouseDown = true;
    touchStartX = e.clientX;
    e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
    if (!isMouseDown) return;
    e.preventDefault();
});

document.addEventListener('mouseup', function(e) {
    if (!isMouseDown) return;
    isMouseDown = false;
    const endX = e.clientX;
    const diffX = endX - touchStartX;

    if (diffX > SWIPE_THRESHOLD) {
        elements.prevBtn.click();
    } else if (diffX < -SWIPE_THRESHOLD) {
        elements.nextBtn.click();
    }
});

            // 悬浮返回按钮
            document.getElementById('floatExitBtn').addEventListener('click',exitDictation);

            // 右侧悬浮自动按钮联动
            const floatAutoBtn = document.getElementById('floatAutoBtn');
            function syncAutoStyle(){
                if(autoPlayEnabled){
                    floatAutoBtn.style.background='#1A73E8';
                    floatAutoBtn.style.color='#fff';
                    elements.autoPlayBtn.classList.add('active');
                }else{
                    floatAutoBtn.style.background='#fff';
                    floatAutoBtn.style.color='#333';
                    elements.autoPlayBtn.classList.remove('active');
                }
            }
            syncAutoStyle();

            floatAutoBtn.addEventListener('click',function(){
                autoPlayEnabled = !autoPlayEnabled;
                Storage.set('dict_auto', autoPlayEnabled);
                syncAutoStyle();
                if(!autoPlayEnabled){
                    clearTimeout(autoPlayTimeout);
                }
            });

            // 右侧下拉选择播放遍数
            countSelect.addEventListener('change',function(){
                repeatCount = parseInt(this.value);
                Storage.set('dict_count', repeatCount);
                if(repeatCount === 99){
                    elements.repeatCountValue.innerText = "无限";
                }else{
                    elements.repeatCountValue.innerText = repeatCount;
                }
            });

            // 教程展开收起
            document.getElementById('tutorialSection').addEventListener('click', function() {
                const content = document.getElementById('tutorialContent');
                const arrow = document.getElementById('tutorialArrow');
                tutorialExpanded = !tutorialExpanded;
                content.style.display = tutorialExpanded ? 'block' : 'none';
                arrow.textContent = tutorialExpanded ? '▲' : '▼';
            });

            // 初始化语音音色
            function initVoices() {
                voices = synth.getVoices();
                if (voices.length === 0) setTimeout(initVoices, 100);
            }
            initVoices();
            synth.onvoiceschanged = initVoices;
    
            function resetPlayIcon() {
                elements.playImg.src = '../../../images/play1.png';
                autoPlayLockPlay2 = false;
            }
            function setPlayIconActive() {
                elements.playImg.src = '../../../images/play2.png';
            }
    
            elements.clearBtn.addEventListener('click', function() {
                selectedRows = [];
                renderContentGrid();
                updateToggleSelectAllButton();
            });
    
            // 自动解析粘贴文本
            function autoImportContent() {
                const text = elements.inputText.value.trim();
                document.getElementById('promptHelp').style.display = text ? 'none' : 'block';
                document.getElementById('tutorialSection').style.display = text ? 'none' : 'block';
    
                if (!text) {
                    lines = []; selectedRows = [];
                    elements.contentGrid.innerHTML = '';
                    elements.startBtn.classList.add('hidden');
                    elements.actionButtons.classList.add('hidden');
                    return;
                }
    
                const rawLines = text.split('\n').filter(line => line.trim() !== '');
                lines = [];
    
                rawLines.forEach(line => {
                    line = line.trim();
                    let english = '', chinese = '';
                    let splitPos = -1;
    
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (isChineseChar(char) || isChinesePunctuation(char) ||
                            (isChineseNumber(char) && i > 0 && !isEnglishChar(line[i-1]))) {
                            splitPos = i; break;
                        }
                    }
    
                    if (splitPos > 0) {
                        english = line.substring(0, splitPos).trim();
                        chinese = line.substring(splitPos).trim();
                    } else if (splitPos === 0) {
                        chinese = line;
                    } else {
                        english = line;
                    }
    
                    lines.push({ english, chinese });
                });
    
                selectedRows = Array.from({ length: lines.length }, (_, i) => i);
                elements.actionButtons.classList.remove('hidden');
                elements.startBtn.classList.remove('hidden');
                renderContentGrid();
            }
    
            // 复制提示词
            document.getElementById('copyPromptBtn').addEventListener('click', function() {
                const promptText = "提取图片中的中英文对照内容：英文在前中文在后，单空格分隔；保留原始格式（包括连字符单词）；每组独立成行";
                const textarea = document.createElement('textarea');
                textarea.value = promptText;
                textarea.style.position = 'fixed';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    const ok = document.execCommand('copy');
                    if(ok){
                        document.getElementById('copyNotification').classList.add('show');
                        setTimeout(()=>{
                            document.getElementById('copyNotification').classList.remove('show');
                        },2000);
                    }
                }catch(e){}
                document.body.removeChild(textarea);
            });
    
            let debounceTimer;
            elements.inputText.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(autoImportContent, 500);
            });
    
            if (elements.inputText.value.trim()) autoImportContent();
    
            // 字符判断
            function isChinesePunctuation(char) {
                return /[《》「」『』【】（）]/.test(char);
            }
            function isEnglishChar(char) {
                return /[a-zA-Z\-]/.test(char);
            }
            function isChineseNumber(char) {
                return /[一二三四五六七八九十百千万亿]/.test(char);
            }
            function isChineseChar(char) {
                return /[\u4e00-\u9fa5]/.test(char);
            }
    
            // 渲染列表
            function renderContentGrid() {
                elements.contentGrid.innerHTML = '';
                lines.forEach((line, rowIndex) => {
                    const item = createContentItem(line, rowIndex);
                    elements.contentGrid.appendChild(item);
                });
                setupItemInteractions();
            }
    
            function createContentItem(line, rowIndex) {
                const item = document.createElement('div');
                item.className = 'content-item';
                item.dataset.rowIndex = rowIndex;
                if (isRowSelected(rowIndex)) item.classList.add('selected');
                item.innerHTML = `
                    <div class="english-container">${line.english}</div>
                    ${line.chinese ? `<div class="chinese-container">${line.chinese}</div>` : ''}
                `;
                return item;
            }
    
            function isRowSelected(rowIndex) {
                return selectedRows.includes(rowIndex);
            }
    
            function setupItemInteractions() {
                document.querySelectorAll('.content-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const idx = parseInt(item.dataset.rowIndex);
                        handleItemSelection(idx);
                    });
                });
            }
    
            function handleItemSelection(rowIndex) {
                const sel = isRowSelected(rowIndex);
                toggleRowSelection(rowIndex,!sel);
            }
    
            function toggleRowSelection(rowIndex, select) {
                if(select){
                    if(!selectedRows.includes(rowIndex)) selectedRows.push(rowIndex);
                }else{
                    selectedRows = selectedRows.filter(i=>i!==rowIndex);
                }
                renderContentGrid();
                updateToggleSelectAllButton();
            }
    
            elements.invertSelectionBtn.addEventListener('click', invertSelection);
            function invertSelection() {
                const all = Array.from({length:lines.length},(_,i)=>i);
                selectedRows = all.filter(i=>!selectedRows.includes(i));
                renderContentGrid();
                updateToggleSelectAllButton();
            }
    
            elements.toggleSelectAllBtn.addEventListener('click', function() {
                const allSel = lines.length>0 && selectedRows.length===lines.length;
                allSel ? deselectAll() : selectAll();
            });
    
            function selectAll() {
                selectedRows = Array.from({length:lines.length},(_,i)=>i);
                renderContentGrid();
                elements.toggleSelectAllBtn.innerText = '取消全选';
            }
            function deselectAll() {
                selectedRows = [];
                renderContentGrid();
                elements.toggleSelectAllBtn.innerText = '全选';
            }
    
            function updateToggleSelectAllButton() {
                const allSel = lines.length>0 && selectedRows.length===lines.length;
                elements.toggleSelectAllBtn.innerText = allSel ? '取消全选' : '全选';
            }
    
            // 进入听写页面
            elements.startBtn.addEventListener('click', function() {
                if(lines.length===0) return alert('暂无内容');
                if(selectedRows.length===0) return alert('请勾选需要听写的内容');
                currentLineIndex = 0;
                currentRepeat = 0;
                allCompleted = false;
                elements.inputPanel.classList.add('hidden');
                elements.dictationPanel.classList.remove('hidden');
                document.body.classList.add('dictation-active'); // 加上这句
                updateDictationContent();
                resetPlayIcon();
                syncAutoStyle();
            });
            
            function updateDictationContent(direction = 'next') {
    if(currentLineIndex >= selectedRows.length) return;

    const chineseEl = elements.dictationChinese;
    // 退场动画
    if (direction === 'next') {
        chineseEl.classList.add('slide-up'); // 左滑出 → 下一题
    } else {
        chineseEl.classList.add('slide-down'); // 右滑出 → 上一题
    }

    setTimeout(() => {
        let idx = selectedRows[currentLineIndex];
        let item = lines[idx];
        let number = currentLineIndex + 1;

        chineseEl.innerText = `${number}.${item.chinese || ''}`;
        chineseEl.style.display = 'block';

        chineseEl.classList.remove('slide-up', 'slide-down');
        if (direction === 'next') {
            chineseEl.classList.add('fade-in-down'); // 从右入
        } else {
            chineseEl.classList.add('fade-in-up');   // 从左入
        }

        // 等待入场动画完成 + 额外停顿，再朗读
        setTimeout(() => {
            chineseEl.classList.remove('fade-in-up', 'fade-in-down');
            // 【核心修改】动画结束后再额外等待 800ms 再朗读，视觉停留足够明显
            setTimeout(()=>{
                // 仅自动播放模式才自动朗读
                if(autoPlayEnabled){
                    readCurrentItem();
                }
            }, 800);
        }, 300);

    }, 300);
}
            // 朗读当前条目
            function readCurrentItem() {
                if(isReadingGroup)return;
                stopReading(false);
                if(currentLineIndex >= selectedRows.length){
                    currentLineIndex = selectedRows.length-1;
                    return;
                }
                let idx = selectedRows[currentLineIndex];
                let item = lines[idx];
                if(!item)return;
                let sid = ++readSessionId;
                isPlaying = true;
                isReading = true;
                isReadingGroup = true;
                currentPlayingLineIndex = currentLineIndex;
                setPlayIconActive();
                readContentWithSettings(item,()=>{
    isReadingGroup = false;
    if(sid !== readSessionId)return;
    
    // 不管是否自动，都执行重复逻辑
    if(autoPlayEnabled){
        setTimeout(()=>{
            if(sid !== readSessionId)return;
            handleAutoPlayNext();
        },800);
    } else {
        // 非自动模式：也按设置遍数朗读
        handleAutoPlayNext();
    }
});
            }

            // 按设置朗读
            function readContentWithSettings(line,cb) {
                if(!englishEnabled && !chineseEnabled){cb&&cb();return;}
                let delay = 500;
                if(englishEnabled && chineseEnabled){
                    if(languageOrder === 'english-first'){
                        if(line.english && line.chinese){
                            readText(line.english,'en',()=>{
                                setTimeout(()=>readText(line.chinese,'zh',cb),delay);
                            });
                        }else if(line.english) readText(line.english,'en',cb);
                        else readText(line.chinese,'zh',cb);
                    }else{
                        if(line.chinese && line.english){
                            readText(line.chinese,'zh',()=>{
                                setTimeout(()=>readText(line.english,'en',cb),delay);
                            });
                        }else if(line.chinese) readText(line.chinese,'zh',cb);
                        else readText(line.english,'en',cb);
                    }
                }else if(englishEnabled){
                    line.english ? readText(line.english,'en',cb) : cb&&cb();
                }else{
                    line.chinese ? readText(line.chinese,'zh',cb) : cb&&cb();
                }
            }

            // 语音朗读
            function readText(text,lang,cb) {
                if(!text){cb&&cb();return;}
                let sid = readSessionId;
                let u = new SpeechSynthesisUtterance(text);
                u.rate = lang==='zh'?0.9:1.0;
                let v = voices.find(x=>x.lang.includes(lang==='zh'?'zh':'en'));
                if(v)u.voice = v;
                u.onend = ()=>{if(sid===readSessionId)cb&&cb();};
                u.onerror = ()=>{if(sid===readSessionId)cb&&cb();};
                synth.speak(u);
            }
    
            // 停止朗读
            function stopReading(reset=true) {
                clearTimeout(autoPlayTimeout);
                readSessionId++;
                synth.cancel();
                currentUtterance = null;
                isPlaying = false;
                isReadingGroup = false;
                if(reset) resetPlayIcon();
            }
    
            // 上一题（点击左侧按钮，显示上一题内容）
            elements.prevBtn.addEventListener('click', function() {
                stopReading();
                allCompleted = false;
                if(currentLineIndex>0){
                    currentLineIndex--;
                    currentRepeat=0;
                    updateDictationContent('prev'); // 旧内容向右消失，新内容从左边进来
                    readCurrentItem();
                }
            });
    
            // 下一题（点击右侧按钮，显示下一题内容）
            elements.nextBtn.addEventListener('click', function() {
                stopReading();
                allCompleted = false;
                if(currentLineIndex < selectedRows.length-1){
                    currentLineIndex++;
                    currentRepeat=0;
                    updateDictationContent('next'); // 旧内容向左消失，新内容从右边进来
                    readCurrentItem();
                }
            });
    
            // 播放暂停按钮
            elements.readBtn.addEventListener('click', function() {
                if(isPlaying){
                    stopReading();
                }else{
                    if(autoPlayEnabled){
                        currentRepeat=0;
                        autoPlayLockPlay2=true;
                        readCurrentItem();
                    }else{
                        readCurrentItem();
                    }
                }
            });
    
            // 退出听写
            function exitDictation() {
                if(confirm('确定退出听写吗？')){
                    stopReading();
                    elements.inputPanel.classList.remove('hidden');
elements.dictationPanel.classList.add('hidden');
document.body.classList.remove('dictation-active'); // 加上这句
                    isReading = false;
                    resetPlayIcon();
                }
            }
    
            // 中英文显示切换
            elements.englishToggleBtn.addEventListener('click', function() {
                if(!chineseEnabled && englishEnabled)return;
                englishEnabled = !englishEnabled;
                updateLangBtn();
                if(isPlaying){
                    stopReading(false);
                    setTimeout(readCurrentItem,300);
                }
            });
            elements.chineseToggleBtn.addEventListener('click', function() {
                if(!englishEnabled && chineseEnabled)return;
                chineseEnabled = !chineseEnabled;
                updateLangBtn();
                if(isPlaying){
                    stopReading(false);
                    setTimeout(readCurrentItem,300);
                }
            });
            function updateLangBtn(){
                englishEnabled ? elements.englishToggleBtn.classList.add('active') : elements.englishToggleBtn.classList.remove('active');
                chineseEnabled ? elements.chineseToggleBtn.classList.add('active') : elements.chineseToggleBtn.classList.remove('active');
            }
    
            // 切换朗读顺序
            elements.toggleArrow.addEventListener('click',function(){
                languageOrder = languageOrder==='english-first' ? 'chinese-first' : 'english-first';
                if(isPlaying){
                    stopReading(false);
                    setTimeout(readCurrentItem,300);
                }
            });
    
            // 原生自动按钮
            elements.autoPlayBtn.addEventListener('click',function(){
                autoPlayEnabled = !autoPlayEnabled;
                Storage.set('dict_auto', autoPlayEnabled);
                syncAutoStyle();
                if(!autoPlayEnabled){
                    clearTimeout(autoPlayTimeout);
                }
            });
    
            // 增减遍数
            elements.increaseCountBtn.addEventListener('click',function(){
                if(repeatCount<5){
                    repeatCount++;
                    elements.repeatCountValue.innerText = repeatCount;
                    countSelect.value = repeatCount;
                    Storage.set('dict_count', repeatCount);
                }
            });
            elements.decreaseCountBtn.addEventListener('click',function(){
                if(repeatCount>1){
                    repeatCount--;
                    elements.repeatCountValue.innerText = repeatCount;
                    countSelect.value = repeatCount;
                    Storage.set('dict_count', repeatCount);
                }
            });
            function handleAutoPlayNext() {
    // 无限循环：间隔2秒重复当前
    if(repeatCount === 99){
        autoPlayTimeout = setTimeout(()=>{
            readCurrentItem();
        }, 2000);
        return;
    }

    // 普通重复：每一遍之间停顿2秒
    currentRepeat++;
    if(currentRepeat < repeatCount){
        autoPlayTimeout = setTimeout(() => {
            readCurrentItem();
        }, 2000);
        return;
    }
    
    // 读完所有遍数，重置并切下一题
    currentRepeat = 0;
    if(autoPlayEnabled){
        currentLineIndex++;
        if(currentLineIndex >= selectedRows.length){
            allCompleted = true;
            stopReading();
            return;
        }
        updateDictationContent();
        readCurrentItem();
    }else{
        resetPlayIcon();
        isPlaying = false;
    }
}

document.addEventListener('keydown', function(e){
    // 只在听写页面生效
    if(elements.dictationPanel.classList.contains('hidden')) return;
    
    // 左箭头 ← = 上一题
    if(e.key === 'ArrowLeft'){
        e.preventDefault();
        elements.prevBtn.click();
    }
    // 右箭头 → = 下一题
    if(e.key === 'ArrowRight'){
        e.preventDefault();
        elements.nextBtn.click();
    }
});
        });
    </script>
